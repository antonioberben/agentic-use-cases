name: Deploy website (GitHub Pages)

# NOTA: la publicación oficial es rama gh-pages + custom domain (usecases.emea.solo.io),
# vía website/publish-pages.sh. Este workflow (Source = GitHub Actions) publica en la
# RAIZ del dominio y PISA ese esquema, dejando /v1/ en 404. Por eso NO se dispara en
# push: solo manual (workflow_dispatch), y únicamente si se decide volver a Actions.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
