                            - paragraph [ref=e1745]: For the purposes of point (a), a pledge, or a similar security interest, of financial instruments in connection with the depositing of the financial instruments in a custody account does not need to be notified, unless and until such time that such pledge or other security interest is designated to secure a specific credit facility.
                            - paragraph [ref=e1746]:
                              - link "▼M1" [ref=e1747] [cursor=pointer]:
