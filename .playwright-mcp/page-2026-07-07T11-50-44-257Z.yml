                                - generic [ref=e1358]: 
                            - generic [ref=e1359]:
                              - text: "12."
                              - generic [ref=e1360]:
                                - paragraph [ref=e1361]: "Without prejudice to accepted market practices as established in accordance with paragraphs 1 to 11 of this Article, an issuer of financial instruments admitted to trading on an SME growth market may enter into a liquidity contract for its shares where all of the following conditions are met:"
                                - generic [ref=e1362]:
                                  - generic [ref=e1363]: (a)
                                  - paragraph [ref=e1365]:
                                    - text: the terms and conditions of the liquidity contract comply with the criteria set out in paragraph 2 of this Article and in Commission Delegated Regulation (EU) 2016/908 (
                                    - link "8" [ref=e1366] [cursor=pointer]:
                                      - /url: "#E0008"
                                    - text: );
                                - generic [ref=e1367]:
                                  - generic [ref=e1368]: (b)
                                  - paragraph [ref=e1370]: the liquidity contract is drawn up in accordance with the Union template referred to in paragraph 13 of this Article;
                                - generic [ref=e1371]:
                                  - generic [ref=e1372]: (c)
                                  - paragraph [ref=e1374]: the liquidity provider is duly authorised by the competent authority in accordance with Directive 2014/65/EU and is registered as a market member with the market operator or the investment firm operating the SME growth market;
                                - generic [ref=e1375]:
                                  - generic [ref=e1376]: (d)
                                  - paragraph [ref=e1378]: the market operator or the investment firm operating the SME growth market acknowledges in writing to the issuer that it has received a copy of the liquidity contract and agrees to that contract’s terms and conditions.
                                - paragraph [ref=e1379]: The issuer referred to in the first subparagraph of this paragraph shall be able to demonstrate at any time that the conditions under which the contract was concluded are met on an ongoing basis. That issuer and the market operator or the investment firm operating the SME growth market shall provide the relevant competent authorities with a copy of the liquidity contract upon their request.
                            - generic [ref=e1380]: 13. ESMA shall develop draft regulatory technical standards to draw up a contractual template to be used for the purposes of entering into a liquidity contract in accordance with paragraph 12, in order to ensure compliance with the criteria set out in paragraph 2, including as regards transparency to the market and performance of the liquidity provision.
                            - paragraph [ref=e1381]: ESMA shall submit those draft regulatory technical standards to the Commission by 1 September 2020.
                            - paragraph [ref=e1382]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the first subparagraph of this paragraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
