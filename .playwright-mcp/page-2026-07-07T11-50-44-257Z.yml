                          - generic [ref=e970]:
                            - paragraph [ref=e971]: Article 6
                            - paragraph [ref=e973]: Exemption for monetary and public debt management activities and climate policy activities
                            - generic [ref=e974]:
                              - text: "1."
                              - generic [ref=e975]:
                                - paragraph [ref=e976]: "This Regulation does not apply to transactions, orders or behaviour, in pursuit of monetary, exchange rate or public debt management policy by:"
                                - generic [ref=e977]:
                                  - generic [ref=e978]: (a)
                                  - paragraph [ref=e980]: a Member State;
                                - generic [ref=e981]:
                                  - generic [ref=e982]: (b)
                                  - paragraph [ref=e984]: the members of the ESCB;
                                - generic [ref=e985]:
                                  - generic [ref=e986]: (c)
                                  - paragraph [ref=e988]: a ministry, agency or special purpose vehicle of one or several Member States, or by a person acting on its behalf;
                                - generic [ref=e989]:
                                  - generic [ref=e990]: (d)
                                  - paragraph [ref=e992]: in the case of a Member State that is a federal state, a member making up the federation.
                            - generic [ref=e993]: 2. This Regulation does not apply to transactions, orders or behaviour carried out by the Commission or any other officially designated body or by any person acting on its behalf, in pursuit of public debt management policy.
                            - paragraph [ref=e994]: "This Regulation does not apply to such transactions, orders or behaviour carried out by:"
                            - generic [ref=e995]:
                              - generic [ref=e996]: (a)
                              - paragraph [ref=e998]: the Union;
                            - generic [ref=e999]:
                              - generic [ref=e1000]: (b)
                              - paragraph [ref=e1002]: a special purpose vehicle of one or several Member States;
                            - generic [ref=e1003]:
                              - generic [ref=e1004]: (c)
                              - paragraph [ref=e1006]: the European Investment Bank;
                            - generic [ref=e1007]:
                              - generic [ref=e1008]: (d)
                              - paragraph [ref=e1010]: the European Financial Stability Facility;
                            - generic [ref=e1011]:
                              - generic [ref=e1012]: (e)
                              - paragraph [ref=e1014]: the European Stability Mechanism;
                            - generic [ref=e1015]:
                              - generic [ref=e1016]: (f)
                              - paragraph [ref=e1018]: an international financial institution established by two or more Member States which has the purpose to mobilise funding and provide financial assistance to the benefit of its members that are experiencing or threatened by severe financing problems.
                            - generic [ref=e1019]: 3. This Regulation does not apply to the activity of a Member State, the Commission or any other officially designated body, or of any person acting on their behalf, which concerns emission allowances and which is undertaken in pursuit of the Union’s climate policy in accordance with Directive 2003/87/EC.
                            - generic [ref=e1020]: 4. This Regulation does not apply to the activities of a Member State, the Commission or any other officially designated body, or of any person acting on their behalf, that are undertaken in pursuit of the Union’s Common Agricultural Policy or of the Union’s Common Fisheries Policy in accordance with acts adopted or with international agreements concluded under the TFEU.
                            - generic [ref=e1021]: 5. The Commission shall be empowered to adopt delegated acts in accordance with Article 35 to extend the exemption referred to in paragraph 1 to certain public bodies and central banks of third countries.
                            - paragraph [ref=e1022]: To that end, the Commission shall, by 3 January 2016, prepare and present to the European Parliament and to the Council a report assessing the international treatment of public bodies charged with, or intervening in, public debt management and of central banks in third countries.
                            - paragraph [ref=e1023]: The report shall include a comparative analysis of the treatment of those bodies and central banks within the legal framework of third countries, and the risk management standards applicable to the transactions entered into by those bodies and central banks in those jurisdictions. If the report concludes, in particular in regard to the comparative analysis, that the exemption of the monetary responsibilities of those third-country central banks from the obligations and prohibitions of this Regulation is necessary the Commission shall extend the exemption referred to in paragraph 1 also to the central banks of those third countries.
                            - generic [ref=e1024]: 6. The Commission shall also be empowered to adopt delegated acts in accordance with Article 35 to extend the exemption set out in paragraph 3 to certain designated public bodies of third countries that have entered into an agreement with the Union pursuant to Article 25 of Directive 2003/87/EC.
                            - generic [ref=e1025]: 7. This Article shall not apply to persons working under a contract of employment or otherwise for the entities referred to in this Article where those persons carry out transactions or orders, or engage in behaviour, directly or indirectly, on their own account.
                        - generic [ref=e1026]:
                          - paragraph [ref=e1027]: CHAPTER 2
                          - paragraph [ref=e1028]: INSIDE INFORMATION, INSIDER DEALING, UNLAWFUL DISCLOSURE OF INSIDE INFORMATION AND MARKET MANIPULATION
                          - generic [ref=e1029]:
                            - paragraph [ref=e1030]: Article 7
                            - paragraph [ref=e1032]: Inside information
                            - generic [ref=e1033]:
                              - text: "1."
                              - generic [ref=e1034]:
                                - paragraph [ref=e1035]: "For the purposes of this Regulation, inside information shall comprise the following types of information:"
                                - generic [ref=e1036]:
                                  - generic [ref=e1037]: (a)
                                  - paragraph [ref=e1039]: information of a precise nature, which has not been made public, relating, directly or indirectly, to one or more issuers or to one or more financial instruments, and which, if it were made public, would be likely to have a significant effect on the prices of those financial instruments or on the price of related derivative financial instruments;
                                - generic [ref=e1040]:
                                  - generic [ref=e1041]: (b)
                                  - paragraph [ref=e1043]: in relation to commodity derivatives, information of a precise nature, which has not been made public, relating, directly or indirectly to one or more such derivatives or relating directly to the related spot commodity contract, and which, if it were made public, would be likely to have a significant effect on the prices of such derivatives or related spot commodity contracts, and where this is information which is reasonably expected to be disclosed or is required to be disclosed in accordance with legal or regulatory provisions at the Union or national level, market rules, contract, practice or custom, on the relevant commodity derivatives markets or spot markets;
                                - generic [ref=e1044]:
                                  - generic [ref=e1045]: (c)
                                  - paragraph [ref=e1047]: in relation to emission allowances or auctioned products based thereon, information of a precise nature, which has not been made public, relating, directly or indirectly, to one or more such instruments, and which, if it were made public, would be likely to have a significant effect on the prices of such instruments or on the prices of related derivative financial instruments;
                                - generic [ref=e1048]:
                                  - generic [ref=e1049]: (d)
                                  - paragraph [ref=e1051]: for persons charged with the execution of orders concerning financial instruments, it also means information conveyed by a client and relating to the client’s pending orders in financial instruments, which is of a precise nature, relating, directly or indirectly, to one or more issuers or to one or more financial instruments, and which, if it were made public, would be likely to have a significant effect on the prices of those financial instruments, the price of related spot commodity contracts, or on the price of related derivative financial instruments.
                            - generic [ref=e1052]: 2. For the purposes of paragraph 1, information shall be deemed to be of a precise nature if it indicates a set of circumstances which exists or which may reasonably be expected to come into existence, or an event which has occurred or which may reasonably be expected to occur, where it is specific enough to enable a conclusion to be drawn as to the possible effect of that set of circumstances or event on the prices of the financial instruments or the related derivative financial instrument, the related spot commodity contracts, or the auctioned products based on the emission allowances. In this respect in the case of a protracted process that is intended to bring about, or that results in, particular circumstances or a particular event, those future circumstances or that future event, and also the intermediate steps of that process which are connected with bringing about or resulting in those future circumstances or that future event, may be deemed to be precise information.
                            - generic [ref=e1053]: 3. An intermediate step in a protracted process shall be deemed to be inside information if, by itself, it satisfies the criteria of inside information as referred to in this Article.
                            - generic [ref=e1054]: 4. For the purposes of paragraph 1, information which, if it were made public, would be likely to have a significant effect on the prices of financial instruments, derivative financial instruments, related spot commodity contracts, or auctioned products based on emission allowances shall mean information a reasonable investor would be likely to use as part of the basis of his or her investment decisions.
                            - paragraph [ref=e1055]: In the case of participants in the emission allowance market with aggregate emissions or rated thermal input at or below the threshold set in accordance with the second subparagraph of Article 17(2), information about their physical operations shall be deemed not to have a significant effect on the price of emission allowances, of auctioned products based thereon, or of derivative financial instruments.
                            - generic [ref=e1056]: 5. ESMA shall issue guidelines to establish a non-exhaustive indicative list of information which is reasonably expected or is required to be disclosed in accordance with legal or regulatory provisions in Union or national law, market rules, contract, practice or custom, on the relevant commodity derivatives markets or spot markets as referred to in point (b) of paragraph 1. ESMA shall duly take into account specificities of those markets.
                          - generic [ref=e1057]:
                            - paragraph [ref=e1058]: Article 8
                            - paragraph [ref=e1060]: Insider dealing
                            - generic [ref=e1061]: 1. For the purposes of this Regulation, insider dealing arises where a person possesses inside information and uses that information by acquiring or disposing of, for its own account or for the account of a third party, directly or indirectly, financial instruments to which that information relates. The use of inside information by cancelling or amending an order concerning a financial instrument to which the information relates where the order was placed before the person concerned possessed the inside information, shall also be considered to be insider dealing. In relation to auctions of emission allowances or other auctioned products based thereon that are held pursuant to Regulation (EU) No 1031/2010, the use of inside information shall also comprise submitting, modifying or withdrawing a bid by a person for its own account or for the account of a third party.
                            - generic [ref=e1062]:
                              - text: "2."
                              - generic [ref=e1063]:
                                - paragraph [ref=e1064]: "For the purposes of this Regulation, recommending that another person engage in insider dealing, or inducing another person to engage in insider dealing, arises where the person possesses inside information and:"
                                - generic [ref=e1065]:
                                  - generic [ref=e1066]: (a)
                                  - paragraph [ref=e1068]: recommends, on the basis of that information, that another person acquire or dispose of financial instruments to which that information relates, or induces that person to make such an acquisition or disposal, or
                                - generic [ref=e1069]:
                                  - generic [ref=e1070]: (b)
                                  - paragraph [ref=e1072]: recommends, on the basis of that information, that another person cancel or amend an order concerning a financial instrument to which that information relates, or induces that person to make such a cancellation or amendment.
                            - generic [ref=e1073]: 3. The use of the recommendations or inducements referred to in paragraph 2 amounts to insider dealing within the meaning of this Article where the person using the recommendation or inducement knows or ought to know that it is based upon inside information.
                            - generic [ref=e1074]:
                              - text: "4."
                              - generic [ref=e1075]:
                                - paragraph [ref=e1076]: "This Article applies to any person who possesses inside information as a result of:"
                                - generic [ref=e1077]:
                                  - generic [ref=e1078]: (a)
                                  - paragraph [ref=e1080]: being a member of the administrative, management or supervisory bodies of the issuer or emission allowance market participant;
                                - generic [ref=e1081]:
                                  - generic [ref=e1082]: (b)
                                  - paragraph [ref=e1084]: having a holding in the capital of the issuer or emission allowance market participant;
                                - generic [ref=e1085]:
                                  - generic [ref=e1086]: (c)
                                  - paragraph [ref=e1088]: having access to the information through the exercise of an employment, profession or duties; or
                                - generic [ref=e1089]:
                                  - generic [ref=e1090]: (d)
                                  - paragraph [ref=e1092]: being involved in criminal activities.
                            - paragraph [ref=e1093]: This Article also applies to any person who possesses inside information under circumstances other than those referred to in the first subparagraph where that person knows or ought to know that it is inside information.
                            - generic [ref=e1094]: 5. Where the person is a legal person, this Article shall also apply, in accordance with national law, to the natural persons who participate in the decision to carry out the acquisition, disposal, cancellation or amendment of an order for the account of the legal person concerned.
                          - generic [ref=e1095]:
                            - paragraph [ref=e1096]: Article 9
                            - paragraph [ref=e1098]: Legitimate behaviour
                            - generic [ref=e1099]:
                              - text: "1."
                              - generic [ref=e1100]:
                                - paragraph [ref=e1101]: "For the purposes of Articles 8 and 14, it shall not be deemed from the mere fact that a legal person is or has been in possession of inside information that that person has used that information and has thus engaged in insider dealing on the basis of an acquisition or disposal, where that legal person:"
                                - generic [ref=e1102]:
                                  - generic [ref=e1103]: (a)
                                  - paragraph [ref=e1105]: has established, implemented and maintained adequate and effective internal arrangements and procedures that effectively ensure that neither the natural person who made the decision on its behalf to acquire or dispose of financial instruments to which the information relates, nor another natural person who may have had an influence on that decision, was in possession of the inside information; and
                                - generic [ref=e1106]:
                                  - generic [ref=e1107]: (b)
                                  - paragraph [ref=e1109]: has not encouraged, made a recommendation to, induced or otherwise influenced the natural person who, on behalf of the legal person, acquired or disposed of financial instruments to which the information relates.
                            - generic [ref=e1110]:
                              - text: "2."
                              - generic [ref=e1111]:
                                - paragraph [ref=e1112]: "For the purposes of Articles 8 and 14, it shall not be deemed from the mere fact that a person is in possession of inside information that that person has used that information and has thus engaged in insider dealing on the basis of an acquisition or disposal where that person:"
                                - generic [ref=e1113]:
                                  - generic [ref=e1114]: (a)
                                  - paragraph [ref=e1116]: for the financial instrument to which that information relates, is a market maker or a person authorised to act as a counterparty, and the acquisition or disposal of financial instruments to which that information relates is made legitimately in the normal course of the exercise of its function as a market maker or as a counterparty for that financial instrument; or
                                - generic [ref=e1117]:
                                  - generic [ref=e1118]: (b)
                                  - paragraph [ref=e1120]: is authorised to execute orders on behalf of third parties, and the acquisition or disposal of financial instruments to which the order relates, is made to carry out such an order legitimately in the normal course of the exercise of that person’s employment, profession or duties.
                            - generic [ref=e1121]:
                              - text: "3."
                              - generic [ref=e1122]:
                                - paragraph [ref=e1123]: "For the purposes of Articles 8 and 14, it shall not be deemed from the mere fact that a person is in possession of inside information that that person has used that information and has thus engaged in insider dealing on the basis of an acquisition or disposal where that person conducts a transaction to acquire or dispose of financial instruments and that transaction is carried out in the discharge of an obligation that has become due in good faith and not to circumvent the prohibition against insider dealing and:"
                                - generic [ref=e1124]:
                                  - generic [ref=e1125]: (a)
                                  - paragraph [ref=e1127]: that obligation results from an order placed or an agreement concluded before the person concerned possessed inside information; or
                                - generic [ref=e1128]:
                                  - generic [ref=e1129]: (b)
                                  - paragraph [ref=e1131]: that transaction is carried out to satisfy a legal or regulatory obligation that arose, before the person concerned possessed inside information.
                            - generic [ref=e1132]: 4. For the purposes of Article 8 and 14, it shall not be deemed from the mere fact that a person is in possession of inside information that that person has used that information and has thus engaged in insider dealing, where such person has obtained that inside information in the conduct of a public takeover or merger with a company and uses that inside information solely for the purpose of proceeding with that merger or public takeover, provided that at the point of approval of the merger or acceptance of the offer by the shareholders of that company, any inside information has been made public or has otherwise ceased to constitute inside information.
                            - paragraph [ref=e1133]: This paragraph shall not apply to stake-building.
                            - generic [ref=e1134]: 5. For the purposes of Articles 8 and 14, the mere fact that a person uses its own knowledge that it has decided to acquire or dispose of financial instruments in the acquisition or disposal of those financial instruments shall not of itself constitute use of inside information.
                            - generic [ref=e1135]: 6. Notwithstanding paragraphs 1 to 5 of this Article, an infringement of the prohibition of insider dealing set out in Article 14 may still be deemed to have occurred if the competent authority establishes that there was an illegitimate reason for the orders to trade, transactions or behaviours concerned.
                          - generic [ref=e1136]:
                            - paragraph [ref=e1137]: Article 10
                            - paragraph [ref=e1139]: Unlawful disclosure of inside information
                            - generic [ref=e1140]: 1. For the purposes of this Regulation, unlawful disclosure of inside information arises where a person possesses inside information and discloses that information to any other person, except where the disclosure is made in the normal exercise of an employment, a profession or duties.
                            - paragraph [ref=e1141]: This paragraph applies to any natural or legal person in the situations or circumstances referred to in Article 8(4).
                            - generic [ref=e1142]: 2. For the purposes of this Regulation the onward disclosure of recommendations or inducements referred to in Article 8(2) amounts to unlawful disclosure of inside information under this Article where the person disclosing the recommendation or inducement knows or ought to know that it was based on inside information.
                          - generic [ref=e1143]:
                            - paragraph [ref=e1144]: Article 11
                            - paragraph [ref=e1146]: Market soundings
                            - generic [ref=e1147]:
                              - text: "1."
                              - generic [ref=e1148]:
                                - paragraph [ref=e1149]: "A market sounding comprises the communication of information, prior to the announcement of a transaction, in order to gauge the interest of potential investors in a possible transaction and the conditions relating to it such as its potential size or pricing, to one or more potential investors by:"
                                - generic [ref=e1150]:
                                  - generic [ref=e1151]: (a)
                                  - paragraph [ref=e1153]: an issuer;
                                - generic [ref=e1154]:
                                  - generic [ref=e1155]: (b)
                                  - paragraph [ref=e1157]: a secondary offeror of a financial instrument, in such quantity or value that the transaction is distinct from ordinary trading and involves a selling method based on the prior assessment of potential interest from potential investors;
                                - generic [ref=e1158]:
                                  - generic [ref=e1159]: (c)
                                  - paragraph [ref=e1161]: an emission allowance market participant; or
                                - generic [ref=e1162]:
                                  - generic [ref=e1163]: (d)
                                  - paragraph [ref=e1165]: a third party acting on behalf or on the account of a person referred to in point (a), (b) or (c).
                            - paragraph [ref=e1166]:
                              - link "▼M3" [ref=e1167] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32019R2115
                              - link [ref=e1168] [cursor=pointer]:
                                - /url: "#M3-2"
                                - generic [ref=e1169]: 
                            - generic [ref=e1170]:
                              - text: 1a.
                              - generic [ref=e1171]:
                                - text: Where an offer of securities is addressed solely to qualified investors as defined in point (e) of Article 2 of Regulation (EU) 2017/1129 of the European Parliament and of the Council (
                                - link "7" [ref=e1172] [cursor=pointer]:
                                  - /url: "#E0007"
                                - text: ), communication of information to those qualified investors for the purposes of negotiating the contractual terms and conditions of their participation in an issuance of bonds by an issuer that has financial instruments admitted to trading on a trading venue, or by any person acting on its behalf or on its account, shall not constitute a market sounding. Such communication shall be deemed to be made in the normal exercise of a person’s employment, profession or duties as provided for in Article 10(1) of this Regulation, and therefore shall not constitute unlawful disclosure of inside information. That issuer or any person acting on its behalf or on its account shall ensure that the qualified investors receiving the information are aware of, and acknowledge in writing, the legal and regulatory duties entailed and are aware of the sanctions applicable to insider dealing and unlawful disclosure of inside information.
                            - paragraph [ref=e1173]:
                              - link "▼B" [ref=e1174] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32014R0596
                              - link [ref=e1175] [cursor=pointer]:
                                - /url: "#B-4"
                                - generic [ref=e1176]: 
                            - generic [ref=e1177]:
                              - text: "2."
                              - generic [ref=e1178]:
                                - paragraph [ref=e1179]: "Without prejudice to Article 23(3), disclosure of inside information by a person intending to make a takeover bid for the securities of a company or a merger with a company to parties entitled to the securities, shall also constitute a market sounding, provided that:"
                                - generic [ref=e1180]:
                                  - generic [ref=e1181]: (a)
                                  - paragraph [ref=e1183]: "the information is necessary to enable the parties entitled to the securities to form an opinion on their willingness to offer their securities: and"
                                - generic [ref=e1184]:
                                  - generic [ref=e1185]: (b)
                                  - paragraph [ref=e1187]: the willingness of parties entitled to the securities to offer their securities is reasonably required for the decision to make the takeover bid or merger.
                            - generic [ref=e1188]: 3. A disclosing market participant shall, prior to conducting a market sounding, specifically consider whether the market sounding will involve the disclosure of inside information. The disclosing market participant shall make a written record of its conclusion and the reasons therefor. It shall provide such written records to the competent authority upon request. This obligation shall apply to each disclosure of information throughout the course of the market sounding. The disclosing market participant shall update the written records referred to in this paragraph accordingly.
                            - generic [ref=e1189]: 4. For the purposes of Article 10(1), disclosure of inside information made in the course of a market sounding shall be deemed to be made in the normal exercise of a person’s employment, profession or duties where the disclosing market participant complies with paragraphs 3 and 5 of this Article.
                            - generic [ref=e1190]:
                              - text: "5."
                              - generic [ref=e1191]:
                                - paragraph [ref=e1192]: "For the purposes of paragraph 4, the disclosing market participant shall, before making the disclosure:"
                                - generic [ref=e1193]:
                                  - generic [ref=e1194]: (a)
                                  - paragraph [ref=e1196]: obtain the consent of the person receiving the market sounding to receive inside information;
                                - generic [ref=e1197]:
                                  - generic [ref=e1198]: (b)
                                  - paragraph [ref=e1200]: inform the person receiving the market sounding that he is prohibited from using that information, or attempting to use that information, by acquiring or disposing of, for his own account or for the account of a third party, directly or indirectly, financial instruments relating to that information;
                                - generic [ref=e1201]:
                                  - generic [ref=e1202]: (c)
                                  - paragraph [ref=e1204]: inform the person receiving the market sounding that he is prohibited from using that information, or attempting to use that information, by cancelling or amending an order which has already been placed concerning a financial instrument to which the information relates; and
                                - generic [ref=e1205]:
                                  - generic [ref=e1206]: (d)
                                  - paragraph [ref=e1208]: inform the person receiving the market sounding that by agreeing to receive the information he is obliged to keep the information confidential.
                            - paragraph [ref=e1209]: The disclosing market participant shall make and maintain a record of all information given to the person receiving the market sounding, including the information given in accordance with points (a) to (d) of the first subparagraph, and the identity of the potential investors to whom the information has been disclosed, including but not limited to the legal and natural persons acting on behalf of the potential investor, and the date and time of each disclosure. The disclosing market participant shall provide that record to the competent authority upon request.
                            - generic [ref=e1210]: 6. Where information that has been disclosed in the course of a market sounding ceases to be inside information according to the assessment of the disclosing market participant, the disclosing market participant shall inform the recipient accordingly, as soon as possible.
                            - paragraph [ref=e1211]: The disclosing market participant shall maintain a record of the information given in accordance with this paragraph and shall provide it to the competent authority upon request.
                            - generic [ref=e1212]: 7. Notwithstanding the provisions of this Article, the person receiving the market sounding shall assess for itself whether it is in possession of inside information or when it ceases to be in possession of inside information.
                            - generic [ref=e1213]: 8. The disclosing market participant shall keep the records referred to in this Article for a period of at least five years.
                            - generic [ref=e1214]: 9. In order to ensure consistent harmonisation of this Article, ESMA shall develop draft regulatory technical standards to determine appropriate arrangements, procedures and record keeping requirements for persons to comply with the requirements laid down in paragraphs 4, 5, 6 and 8.
                            - paragraph [ref=e1215]: ESMA shall submit those draft regulatory technical standards to the Commission by 3 July 2015.
                            - paragraph [ref=e1216]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the first subparagraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
                            - generic [ref=e1217]: 10. In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to specify the systems and notification templates to be used by persons to comply with the requirements established by paragraphs 4, 5, 6 and 8 of this Article, particularly the precise format of the records referred to in paragraphs 4 to 8 and the technical means for appropriate communication of the information referred to in paragraph 6 to the person receiving the market sounding.
                            - paragraph [ref=e1218]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2015.
                            - paragraph [ref=e1219]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                            - generic [ref=e1220]:
                              - text: "11."
                              - generic [ref=e1221]:
                                - paragraph [ref=e1222]: "ESMA shall issue guidelines in accordance with Article 16 of Regulation (EU) No 1095/2010, addressed to persons receiving market soundings, regarding:"
                                - generic [ref=e1223]:
                                  - generic [ref=e1224]: (a)
                                  - paragraph [ref=e1226]: the factors that such persons are to take into account when information is disclosed to them as part of a market sounding in order for them to assess whether the information amounts to inside information;
                                - generic [ref=e1227]:
                                  - generic [ref=e1228]: (b)
                                  - paragraph [ref=e1230]: the steps that such persons are to take if inside information has been disclosed to them in order to comply with Articles 8 and 10 of this Regulation; and
                                - generic [ref=e1231]:
                                  - generic [ref=e1232]: (c)
                                  - paragraph [ref=e1234]: the records that such persons are to maintain in order to demonstrate that they have complied with Articles 8 and 10 of this Regulation.
                          - generic [ref=e1235]:
                            - paragraph [ref=e1236]: Article 12
                            - paragraph [ref=e1238]: Market manipulation
                            - generic [ref=e1239]:
                              - text: "1."
                              - generic [ref=e1240]:
                                - paragraph [ref=e1241]: "For the purposes of this Regulation, market manipulation shall comprise the following activities:"
                                - generic [ref=e1242]:
                                  - generic [ref=e1243]: (a)
                                  - generic [ref=e1244]:
                                    - paragraph [ref=e1245]: "entering into a transaction, placing an order to trade or any other behaviour which:"
                                    - generic [ref=e1246]:
                                      - generic [ref=e1247]: (i)
                                      - paragraph [ref=e1249]: gives, or is likely to give, false or misleading signals as to the supply of, demand for, or price of, a financial instrument, a related spot commodity contract or an auctioned product based on emission allowances; or
                                    - generic [ref=e1250]:
                                      - generic [ref=e1251]: (ii)
                                      - paragraph [ref=e1253]: secures, or is likely to secure, the price of one or several financial instruments, a related spot commodity contract or an auctioned product based on emission allowances at an abnormal or artificial level;
                                    - paragraph [ref=e1254]: unless the person entering into a transaction, placing an order to trade or engaging in any other behaviour establishes that such transaction, order or behaviour have been carried out for legitimate reasons, and conform with an accepted market practice as established in accordance with Article 13;
                                - generic [ref=e1255]:
                                  - generic [ref=e1256]: (b)
                                  - paragraph [ref=e1258]: entering into a transaction, placing an order to trade or any other activity or behaviour which affects or is likely to affect the price of one or several financial instruments, a related spot commodity contract or an auctioned product based on emission allowances, which employs a fictitious device or any other form of deception or contrivance;
                                - generic [ref=e1259]:
                                  - generic [ref=e1260]: (c)
                                  - paragraph [ref=e1262]: disseminating information through the media, including the internet, or by any other means, which gives, or is likely to give, false or misleading signals as to the supply of, demand for, or price of, a financial instrument, a related spot commodity contract or an auctioned product based on emission allowances or secures, or is likely to secure, the price of one or several financial instruments, a related spot commodity contract or an auctioned product based on emission allowances at an abnormal or artificial level, including the dissemination of rumours, where the person who made the dissemination knew, or ought to have known, that the information was false or misleading;
                                - generic [ref=e1263]:
                                  - generic [ref=e1264]: (d)
                                  - paragraph [ref=e1266]: transmitting false or misleading information or providing false or misleading inputs in relation to a benchmark where the person who made the transmission or provided the input knew or ought to have known that it was false or misleading, or any other behaviour which manipulates the calculation of a benchmark.
                            - generic [ref=e1267]:
                              - text: "2."
                              - generic [ref=e1268]:
                                - paragraph [ref=e1269]: "The following behaviour shall, inter alia, be considered as market manipulation:"
                                - generic [ref=e1270]:
                                  - generic [ref=e1271]: (a)
                                  - paragraph [ref=e1273]: the conduct by a person, or persons acting in collaboration, to secure a dominant position over the supply of or demand for a financial instrument, related spot commodity contracts or auctioned products based on emission allowances which has, or is likely to have, the effect of fixing, directly or indirectly, purchase or sale prices or creates, or is likely to create, other unfair trading conditions;
                                - generic [ref=e1274]:
                                  - generic [ref=e1275]: (b)
                                  - paragraph [ref=e1277]: the buying or selling of financial instruments, at the opening or closing of the market, which has or is likely to have the effect of misleading investors acting on the basis of the prices displayed, including the opening or closing prices;
                                - generic [ref=e1278]:
                                  - generic [ref=e1279]: (c)
                                  - generic [ref=e1280]:
                                    - paragraph [ref=e1281]: "the placing of orders to a trading venue, including any cancellation or modification thereof, by any available means of trading, including by electronic means, such as algorithmic and high-frequency trading strategies, and which has one of the effects referred to in paragraph 1(a) or (b), by:"
                                    - generic [ref=e1282]:
                                      - generic [ref=e1283]: (i)
                                      - paragraph [ref=e1285]: disrupting or delaying the functioning of the trading system of the trading venue or being likely to do so;
                                    - generic [ref=e1286]:
                                      - generic [ref=e1287]: (ii)
                                      - paragraph [ref=e1289]: making it more difficult for other persons to identify genuine orders on the trading system of the trading venue or being likely to do so, including by entering orders which result in the overloading or destabilisation of the order book; or
                                    - generic [ref=e1290]:
                                      - generic [ref=e1291]: (iii)
                                      - paragraph [ref=e1293]: creating or being likely to create a false or misleading signal about the supply of, or demand for, or price of, a financial instrument, in particular by entering orders to initiate or exacerbate a trend;
                                - generic [ref=e1294]:
                                  - generic [ref=e1295]: (d)
                                  - paragraph [ref=e1297]: the taking advantage of occasional or regular access to the traditional or electronic media by voicing an opinion about a financial instrument, related spot commodity contract or an auctioned product based on emission allowances (or indirectly about its issuer) while having previously taken positions on that financial instrument, a related spot commodity contract or an auctioned product based on emission allowances and profiting subsequently from the impact of the opinions voiced on the price of that instrument, related spot commodity contract or an auctioned product based on emission allowances, without having simultaneously disclosed that conflict of interest to the public in a proper and effective way;
                                - generic [ref=e1298]:
                                  - generic [ref=e1299]: (e)
                                  - paragraph [ref=e1301]: the buying or selling on the secondary market of emission allowances or related derivatives prior to the auction held pursuant to Regulation (EU) No 1031/2010 with the effect of fixing the auction clearing price for the auctioned products at an abnormal or artificial level or misleading bidders bidding in the auctions.
                            - generic [ref=e1302]: 3. For the purposes of applying paragraph 1(a) and (b), and without prejudice to the forms of behaviour set out in paragraph 2, Annex I defines non-exhaustive indicators relating to the employment of a fictitious device or any other form of deception or contrivance, and non-exhaustive indicators related to false or misleading signals and to price securing.
                            - generic [ref=e1303]: 4. Where the person referred to in this Article is a legal person, this Article shall also apply, in accordance with national law, to the natural persons who participate in the decision to carry out activities for the account of the legal person concerned.
                            - generic [ref=e1304]: 5. The Commission shall be empowered to adopt delegated acts in accordance with Article 35 specifying the indicators laid down in Annex I, in order to clarify their elements and to take into account technical developments on financial markets.
                          - generic [ref=e1305]:
                            - paragraph [ref=e1306]: Article 13
                            - paragraph [ref=e1308]: Accepted market practices
                            - generic [ref=e1309]: 1. The prohibition in Article 15 shall not apply to the activities referred to in Article 12(1)(a), provided that the person entering into a transaction, placing an order to trade or engaging in any other behaviour establishes that such transaction, order or behaviour have been carried out for legitimate reasons, and conform with an accepted market practice as established in accordance with this Article.
                            - generic [ref=e1310]:
                              - text: "2."
                              - generic [ref=e1311]:
                                - paragraph [ref=e1312]: "A competent authority may establish an accepted market practice, taking into account the following criteria:"
                                - generic [ref=e1313]:
                                  - generic [ref=e1314]: (a)
                                  - paragraph [ref=e1316]: whether the market practice provides for a substantial level of transparency to the market;
                                - generic [ref=e1317]:
                                  - generic [ref=e1318]: (b)
                                  - paragraph [ref=e1320]: whether the market practice ensures a high degree of safeguards to the operation of market forces and the proper interplay of the forces of supply and demand;
                                - generic [ref=e1321]:
                                  - generic [ref=e1322]: (c)
                                  - paragraph [ref=e1324]: whether the market practice has a positive impact on market liquidity and efficiency;
                                - generic [ref=e1325]:
                                  - generic [ref=e1326]: (d)
                                  - paragraph [ref=e1328]: whether the market practice takes into account the trading mechanism of the relevant market and enables market participants to react properly and in a timely manner to the new market situation created by that practice;
                                - generic [ref=e1329]:
                                  - generic [ref=e1330]: (e)
                                  - paragraph [ref=e1332]: whether the market practice does not create risks for the integrity of, directly or indirectly, related markets, whether regulated or not, in the relevant financial instrument within the Union;
                                - generic [ref=e1333]:
                                  - generic [ref=e1334]: (f)
                                  - paragraph [ref=e1336]: the outcome of any investigation of the relevant market practice by any competent authority or by another authority, in particular whether the relevant market practice infringed rules or regulations designed to prevent market abuse, or codes of conduct, irrespective of whether it concerns the relevant market or directly or indirectly related markets within the Union; and
                                - generic [ref=e1337]:
                                  - generic [ref=e1338]: (g)
                                  - paragraph [ref=e1340]: the structural characteristics of the relevant market, inter alia, whether it is regulated or not, the types of financial instruments traded and the type of market participants, including the extent of retail-investor participation in the relevant market.
                            - paragraph [ref=e1341]: A market practice that has been established by a competent authority as an accepted market practice in a particular market shall not be considered to be applicable to other markets unless the competent authorities of those other markets have accepted that practice pursuant to this Article.
                            - generic [ref=e1342]: 3. Before establishing an accepted market practice in accordance with paragraph 2, the competent authority shall notify ESMA and the other competent authorities of its intention to establish an accepted market practice and shall provide the details of that assessment made in accordance with the criteria laid down in paragraph 2. Such a notification shall be made at least three months before the accepted market practice is intended to take effect.
                            - generic [ref=e1343]: 4. Within two months following receipt of the notification, ESMA shall issue an opinion to the notifying competent authority assessing the compatibility of the accepted market practice with paragraph 2 and with the regulatory technical standards adopted pursuant to paragraph 7. ESMA shall also assess whether the establishment of the accepted market practice would not threaten the market confidence in the Union’s financial market. The opinion shall be published on ESMA’s website.
                            - generic [ref=e1344]: 5. Where a competent authority establishes an accepted market practice contrary to the opinion of ESMA issued in accordance with paragraph 4, it shall publish on its website within 24 hours of establishing the accepted market practice a notice setting out in full its reasons for doing so, including why the accepted market practice does not threaten market confidence.
                            - generic [ref=e1345]: 6. Where a competent authority considers that another competent authority has established an accepted market practice that does not meet the criteria set out in paragraph 2, ESMA shall assist the authorities concerned in reaching an agreement in accordance with its powers under Article 19 of Regulation (EU) No 1095/2010.
                            - paragraph [ref=e1346]: If the competent authorities concerned fail to reach an agreement, ESMA may take a decision in accordance with Article 19(3) of Regulation (EU) No 1095/2010.
                            - generic [ref=e1347]: 7. In order to ensure consistent harmonisation of this Article, ESMA shall develop draft regulatory technical standards specifying the criteria, the procedure and the requirements for establishing an accepted market practice under paragraphs 2, 3 and 4, and the requirements for maintaining it, terminating it, or modifying the conditions for its acceptance.
                            - paragraph [ref=e1348]: ESMA shall submit those draft regulatory technical standards to the Commission by 3 July 2015.
                            - paragraph [ref=e1349]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the first subparagraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
                            - generic [ref=e1350]: 8. Competent authorities shall review regularly, and at least every two years, the accepted market practices that they have established, in particular by taking into account significant changes to the relevant market environment, such as changes to trading rules or to market infrastructures, with a view to deciding whether to maintain it, to terminate it, or to modify the conditions for its acceptance.
                            - generic [ref=e1351]: 9. ESMA shall publish on its website a list of accepted market practices and in which Member States they are applicable.
                            - generic [ref=e1352]: 10. ESMA shall monitor the application of accepted market practices and shall submit an annual report to the Commission on how they are applied in the markets concerned.
                            - generic [ref=e1353]: 11. Competent authorities shall notify accepted market practices that they have established before 2 July 2014 to ESMA within three months of the entry into force of the regulatory technical standards referred to in paragraph 7.
                            - paragraph [ref=e1354]: The accepted market practices referred to in the first subparagraph of this paragraph shall continue to apply in the Member State concerned until the competent authority has made a decision regarding the continuation of that practice following ESMA’s opinion under paragraph 4.
                            - paragraph [ref=e1355]:
                              - link "▼M3" [ref=e1356] [cursor=pointer]:
