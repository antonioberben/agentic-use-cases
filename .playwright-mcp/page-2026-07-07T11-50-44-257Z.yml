                      - generic [ref=e564]:
                        - paragraph [ref=e565]: REGULATION (EU) No 596/2014 OF THE EUROPEAN PARLIAMENT AND OF THE COUNCIL
                        - paragraph [ref=e566]: of 16 April 2014
                        - paragraph [ref=e567]: on market abuse (market abuse regulation) and repealing Directive 2003/6/EC of the European Parliament and of the Council and Commission Directives 2003/124/EC, 2003/125/EC and 2004/72/EC
                        - paragraph [ref=e568]: (Text with EEA relevance)
                      - generic [ref=e569]:
                        - paragraph [ref=e570]
                        - generic [ref=e571]:
                          - paragraph [ref=e572]: CHAPTER 1
                          - paragraph [ref=e573]: GENERAL PROVISIONS
                          - generic [ref=e574]:
                            - paragraph [ref=e575]: Article 1
                            - paragraph [ref=e577]: Subject matter
                            - paragraph [ref=e578]: This Regulation establishes a common regulatory framework on insider dealing, the unlawful disclosure of inside information and market manipulation (market abuse) as well as measures to prevent market abuse to ensure the integrity of financial markets in the Union and to enhance investor protection and confidence in those markets.
                          - generic [ref=e579]:
                            - paragraph [ref=e580]: Article 2
                            - paragraph [ref=e582]: Scope
                            - generic [ref=e583]:
                              - text: "1."
                              - generic [ref=e584]:
                                - paragraph [ref=e585]: "This Regulation applies to the following:"
                                - generic [ref=e586]:
                                  - generic [ref=e587]: (a)
                                  - paragraph [ref=e589]: financial instruments admitted to trading on a regulated market or for which a request for admission to trading on a regulated market has been made;
                                - generic [ref=e590]:
                                  - generic [ref=e591]: (b)
                                  - paragraph [ref=e593]: financial instruments traded on an MTF, admitted to trading on an MTF or for which a request for admission to trading on an MTF has been made;
                                - generic [ref=e594]:
                                  - generic [ref=e595]: (c)
                                  - paragraph [ref=e597]: financial instruments traded on an OTF;
                                - generic [ref=e598]:
                                  - generic [ref=e599]: (d)
                                  - paragraph [ref=e601]: financial instruments not covered by point (a), (b) or (c), the price or value of which depends on or has an effect on the price or value of a financial instrument referred to in those points, including, but not limited to, credit default swaps and contracts for difference.
                            - paragraph [ref=e602]: This Regulation also applies to behaviour or transactions, including bids, relating to the auctioning on an auction platform authorised as a regulated market of emission allowances or other auctioned products based thereon, including when auctioned products are not financial instruments, pursuant to Regulation (EU) No 1031/2010. Without prejudice to any specific provisions referring to bids submitted in the context of an auction, any requirements and prohibitions in this Regulation referring to orders to trade shall apply to such bids.
                            - generic [ref=e603]:
                              - text: "2."
                              - generic [ref=e604]:
                                - paragraph [ref=e605]: "Articles 12 and 15 also apply to:"
                                - generic [ref=e606]:
                                  - generic [ref=e607]: (a)
                                  - paragraph [ref=e609]: spot commodity contracts, which are not wholesale energy products, where the transaction, order or behaviour has or is likely or intended to have an effect on the price or value of a financial instrument referred to in paragraph 1;
                                - generic [ref=e610]:
                                  - generic [ref=e611]: (b)
                                  - paragraph [ref=e613]: types of financial instruments, including derivative contracts or derivative instruments for the transfer of credit risk, where the transaction, order, bid or behaviour has or is likely to have an effect on the price or value of a spot commodity contract where the price or value depends on the price or value of those financial instruments; and
                                - generic [ref=e614]:
                                  - generic [ref=e615]: (c)
                                  - paragraph [ref=e617]: behaviour in relation to benchmarks.
                            - generic [ref=e618]: 3. This Regulation applies to any transaction, order or behaviour concerning any financial instrument as referred to in paragraphs 1 and 2, irrespective of whether or not such transaction, order or behaviour takes place on a trading venue.
                            - generic [ref=e619]: 4. The prohibitions and requirements in this Regulation shall apply to actions and omissions, in the Union and in a third country, concerning the instruments referred to in paragraphs 1 and 2.
                          - generic [ref=e620]:
                            - paragraph [ref=e621]: Article 3
                            - paragraph [ref=e623]: Definitions
                            - generic [ref=e624]:
                              - text: "1."
                              - generic [ref=e625]:
                                - paragraph [ref=e626]: "For the purposes of this Regulation, the following definitions apply:"
                                - generic [ref=e627]:
                                  - generic [ref=e628]: (1)
                                  - paragraph [ref=e630]: ‘financial instrument’ means a financial instrument as defined in point (15) of Article 4(1) of Directive 2014/65/EU;
                                - generic [ref=e631]:
                                  - generic [ref=e632]: (2)
                                  - paragraph [ref=e634]: ‘investment firm’ means an investment firm as defined in point (1) of Article 4(1) of Directive 2014/65/EU;
                                - generic [ref=e635]:
                                  - generic [ref=e636]: (3)
                                  - paragraph [ref=e638]:
                                    - text: ‘credit institution’ means a credit institution as defined in point (1) of Article 4(1) of Regulation (EU) No 575/2013 of the European Parliament and of the Council (
                                    - link "1" [ref=e639] [cursor=pointer]:
                                      - /url: "#E0001"
                                    - text: );
                                - generic [ref=e640]:
                                  - generic [ref=e641]: (4)
                                  - paragraph [ref=e643]: ‘financial institution’ means a financial institution as defined in point (26) of Article 4(1) of Regulation (EU) No 575/2013;
                                - generic [ref=e644]:
                                  - generic [ref=e645]: (5)
                                  - paragraph [ref=e647]: ‘market operator’ means a market operator as defined in point (18) of Article 4(1) of Directive 2014/65/EU;
                                - generic [ref=e648]:
                                  - generic [ref=e649]: (6)
                                  - paragraph [ref=e651]: ‘regulated market’ means a regulated market as defined in point (21) of Article 4(1) of Directive 2014/65/EU;
                                - generic [ref=e652]:
                                  - generic [ref=e653]: (7)
                                  - paragraph [ref=e655]: ‘multilateral trading facility’ or ‘MTF’ means a multilateral system as defined in point (22) of Article 4(1) of Directive 2014/65/EU;
                                - generic [ref=e656]:
                                  - generic [ref=e657]: (8)
                                  - paragraph [ref=e659]: ‘organised trading facility’ or ‘OTF’ means a system or facility in the Union as defined in point (23) of Article 4(1) of Directive 2014/65/EU;
                                - generic [ref=e660]:
                                  - generic [ref=e661]: (9)
                                  - paragraph [ref=e663]: ‘accepted market practice’ means a specific market practice that is accepted by a competent authority in accordance with Article 13;
                                - generic [ref=e664]:
                                  - generic [ref=e665]: (10)
                                  - paragraph [ref=e667]: ‘trading venue’ means a trading venue as defined in point (24) of Article 4(1) of Directive 2014/65/EU;
                                - generic [ref=e668]:
                                  - generic [ref=e669]: (11)
                                  - paragraph [ref=e671]: ‘SME growth market’ means SME growth market as defined in point (12) of Article 4(1) of Directive 2014/65/EU;
                                - generic [ref=e672]:
                                  - generic [ref=e673]: (12)
                                  - paragraph [ref=e675]: ‘competent authority’ means an authority designated in accordance with Article 22, unless otherwise specified in this Regulation;
                                - generic [ref=e676]:
                                  - generic [ref=e677]: (13)
                                  - paragraph [ref=e679]: ‘person’ means a natural or legal person;
                                - generic [ref=e680]:
                                  - generic [ref=e681]: (14)
                                  - paragraph [ref=e683]:
                                    - text: ‘commodity’ means a commodity as defined in point (1) of Article 2 of Commission Regulation (EC) No 1287/2006 (
                                    - link "2" [ref=e684] [cursor=pointer]:
                                      - /url: "#E0002"
                                    - text: );
                                - generic [ref=e685]:
                                  - generic [ref=e686]: (15)
                                  - paragraph [ref=e688]: ‘spot commodity contract’ means a contract for the supply of a commodity traded on a spot market which is promptly delivered when the transaction is settled, and a contract for the supply of a commodity that is not a financial instrument, including a physically settled forward contract;
                                - generic [ref=e689]:
                                  - generic [ref=e690]: (16)
                                  - paragraph [ref=e692]: ‘spot market’ means a commodity market in which commodities are sold for cash and promptly delivered when the transaction is settled, and other non-financial markets, such as forward markets for commodities;
                                - generic [ref=e693]:
                                  - generic [ref=e694]: (17)
                                  - paragraph [ref=e696]:
                                    - text: ‘buy-back programme’ means trading in own shares in accordance with Articles 21 to 27 of Directive 2012/30/EU of the European Parliament and of the Council (
                                    - link "3" [ref=e697] [cursor=pointer]:
                                      - /url: "#E0003"
                                    - text: );
                                - generic [ref=e698]:
                                  - generic [ref=e699]: (18)
                                  - paragraph [ref=e701]: ‘algorithmic trading’ means algorithmic trading as defined in point (39) of Article 4(1) of Directive 2014/65/EU;
                                - generic [ref=e702]:
                                  - generic [ref=e703]: (19)
                                  - paragraph [ref=e705]: ‘emission allowance’ means emission allowance as described in point (11) of Section C of Annex I to Directive 2014/65/EU;
                                - generic [ref=e706]:
                                  - generic [ref=e707]: (20)
                                  - paragraph [ref=e709]: ‘emission allowance market participant’ means any person who enters into transactions, including the placing of orders to trade, in emission allowances, auctioned products based thereon, or derivatives thereof and who does not benefit from an exemption pursuant to the second subparagraph of Article 17(2);
                                - generic [ref=e710]:
                                  - generic [ref=e711]: (21)
                                  - paragraph [ref=e713]: ‘issuer’ means a legal entity governed by private or public law, which issues or proposes to issue financial instruments, the issuer being, in case of depository receipts representing financial instruments, the issuer of the financial instrument represented;
                                - generic [ref=e714]:
                                  - generic [ref=e715]: (22)
                                  - paragraph [ref=e717]: ‘wholesale energy product’ means wholesale energy product as defined in point (4) of Article 2 of Regulation (EU) No 1227/2011;
                                - generic [ref=e718]:
                                  - generic [ref=e719]: (23)
                                  - paragraph [ref=e721]: ‘national regulatory authority’ means national regulatory authority as defined in point (10) of Article 2 of Regulation (EU) No 1227/2011;
                                - generic [ref=e722]:
                                  - generic [ref=e723]: (24)
                                  - paragraph [ref=e725]:
                                    - text: ‘commodity derivatives’ means commodity derivatives as defined in point (30) of Article 2(1) of Regulation (EU) No 600/2014 of the European Parliament and of the Council (
                                    - link "4" [ref=e726] [cursor=pointer]:
                                      - /url: "#E0004"
                                    - text: );
                                - generic [ref=e727]:
                                  - generic [ref=e728]: (25)
                                  - generic [ref=e729]:
                                    - paragraph [ref=e730]: "‘person discharging managerial responsibilities’ means a person within an issuer, an emission allowance market participant or another entity referred to in Article 19(10), who is:"
                                    - generic [ref=e731]:
                                      - generic [ref=e732]: (a)
                                      - paragraph [ref=e734]: a member of the administrative, management or supervisory body of that entity; or
                                    - generic [ref=e735]:
                                      - generic [ref=e736]: (b)
