                              - generic [ref=e2020]:
                                - paragraph [ref=e2021]: "Without prejudice to any criminal sanctions and without prejudice to the supervisory powers of competent authorities under Article 23, Member States shall, in accordance with national law, provide for competent authorities to have the power to take appropriate administrative sanctions and other administrative measures in relation to at least the following infringements:"
