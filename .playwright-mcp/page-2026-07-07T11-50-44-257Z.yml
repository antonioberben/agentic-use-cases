                      - generic [ref=e2336]:
                        - paragraph [ref=e2337]
                        - separator [ref=e2338]
                        - paragraph [ref=e2339]
                        - paragraph [ref=e2340]: ANNEX I
                        - paragraph [ref=e2341]:
                          - text: A.
                          - generic [ref=e2342]: Indicators of manipulative behaviour relating to false or misleading signals and to price securing
                        - paragraph [ref=e2343]: "For the purposes of applying point (a) of Article 12(1) of this Regulation, and without prejudice to the forms of behaviour set out in paragraph 2 of that Article, the following non-exhaustive indicators, which shall not necessarily be deemed, in themselves, to constitute market manipulation, shall be taken into account when transactions or orders to trade are examined by market participants and competent authorities:"
                        - generic [ref=e2344]:
                          - generic [ref=e2345]: (a)
                          - paragraph [ref=e2347]: the extent to which orders to trade given or transactions undertaken represent a significant proportion of the daily volume of transactions in the relevant financial instrument, related spot commodity contract, or auctioned product based on emission allowances, in particular when those activities lead to a significant change in their prices;
                        - generic [ref=e2348]:
                          - generic [ref=e2349]: (b)
                          - paragraph [ref=e2351]: the extent to which orders to trade given or transactions undertaken by persons with a significant buying or selling position in a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, lead to significant changes in the price of that financial instrument, related spot commodity contract, or auctioned product based on emission allowances;
                        - generic [ref=e2352]:
                          - generic [ref=e2353]: (c)
                          - paragraph [ref=e2355]: whether transactions undertaken lead to no change in beneficial ownership of a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances;
                        - generic [ref=e2356]:
                          - generic [ref=e2357]: (d)
                          - paragraph [ref=e2359]: the extent to which orders to trade given or transactions undertaken or orders cancelled include position reversals in a short period and represent a significant proportion of the daily volume of transactions in the relevant financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, and might be associated with significant changes in the price of a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances;
                        - generic [ref=e2360]:
                          - generic [ref=e2361]: (e)
                          - paragraph [ref=e2363]: the extent to which orders to trade given or transactions undertaken are concentrated within a short time span in the trading session and lead to a price change which is subsequently reversed;
                        - generic [ref=e2364]:
                          - generic [ref=e2365]: (f)
                          - paragraph [ref=e2367]: the extent to which orders to trade given change the representation of the best bid or offer prices in a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, or more generally the representation of the order book available to market participants, and are removed before they are executed; and
                        - generic [ref=e2368]:
                          - generic [ref=e2369]: (g)
                          - paragraph [ref=e2371]: the extent to which orders to trade are given or transactions are undertaken at or around a specific time when reference prices, settlement prices and valuations are calculated and lead to price changes which have an effect on such prices and valuations.
                        - paragraph [ref=e2372]:
                          - text: B.
                          - generic [ref=e2373]: Indicators of manipulative behaviour relating to the employment of a fictitious device or any other form of deception or contrivance
                        - paragraph [ref=e2374]: "For the purposes of applying point (b) of Article 12(1) of this Regulation, and without prejudice to the forms of behaviour set out in paragraph 2 of that Article thereof, the following non-exhaustive indicators, which shall not necessarily be deemed, in themselves, to constitute market manipulation, shall be taken into account where transactions or orders to trade are examined by market participants and competent authorities:"
                        - generic [ref=e2375]:
                          - generic [ref=e2376]: (a)
                          - paragraph [ref=e2378]: whether orders to trade given or transactions undertaken by persons are preceded or followed by dissemination of false or misleading information by the same persons or by persons linked to them; and
                        - generic [ref=e2379]:
                          - generic [ref=e2380]: (b)
                          - paragraph [ref=e2382]: whether orders to trade are given or transactions are undertaken by persons before or after the same persons or persons linked to them produce or disseminate investment recommendations which are erroneous, biased, or demonstrably influenced by material interest.
