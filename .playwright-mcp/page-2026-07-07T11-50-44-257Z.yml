                          - generic [ref=e2261]:
                            - paragraph [ref=e2262]: Article 38
                            - paragraph [ref=e2264]: Report
                            - paragraph [ref=e2265]: "By 3 July 2019, the Commission shall submit a report to the European Parliament and to the Council on the application of this Regulation, together with a legislative proposal to amend it if appropriate. That report shall assess, inter alia:"
                            - generic [ref=e2266]:
                              - generic [ref=e2267]: (a)
                              - paragraph [ref=e2269]: the appropriateness of introducing common rules on the need for all Member States to provide for administrative sanctions for insider dealing and market manipulation;
                            - generic [ref=e2270]:
                              - generic [ref=e2271]: (b)
                              - paragraph [ref=e2273]: whether the definition of inside information is sufficient to cover all information relevant for competent authorities to effectively combat market abuse;
                            - generic [ref=e2274]:
                              - generic [ref=e2275]: (c)
                              - paragraph [ref=e2277]: the appropriateness of the conditions under which the prohibition on trading is mandated in accordance with Article 19(11) with a view to identifying whether there are any further circumstances under which the prohibition should apply;
                            - generic [ref=e2278]:
                              - generic [ref=e2279]: (d)
                              - paragraph [ref=e2281]: the possibility of establishing a Union framework for cross-market order book surveillance in relation to market abuse, including recommendations for such a framework; and
                            - generic [ref=e2282]:
                              - generic [ref=e2283]: (e)
                              - paragraph [ref=e2285]: the scope of the application of the benchmark provisions.
                            - paragraph [ref=e2286]: For the purposes of point (a) of the first subparagraph, ESMA shall undertake a mapping exercise of the application of administrative sanctions and, where Member States have decided, pursuant to the second subparagraph of Article 30(1), to lay down criminal sanctions as referred to therein for infringements of this Regulation, of the application of such criminal sanctions within Member States. That exercise shall also include any data made available under Article 33(1) and (2).
                            - paragraph [ref=e2287]:
                              - link "▼M1" [ref=e2288] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32016R1011
                              - link [ref=e2289] [cursor=pointer]:
                                - /url: "#M1-6"
                                - generic [ref=e2290]: 
                            - paragraph [ref=e2291]: By 3 July 2019, the Commission shall, after consulting ESMA, submit a report to the European Parliament and to the Council on the level of the thresholds set out in Article 19(1a)(a) and (b) in relation to managers' transactions where the issuer's shares or debt instruments form part of a collective investment undertaking or provide exposure to a portfolio of assets, with a view to assessing whether that level is appropriate or should be adjusted.
                            - paragraph [ref=e2292]: The Commission shall be empowered to adopt delegated acts in accordance with Article 35 adjusting the thresholds in Article 19(1a)(a) and (b), if it determines in that report that those thresholds should be adjusted.
                            - paragraph [ref=e2293]:
