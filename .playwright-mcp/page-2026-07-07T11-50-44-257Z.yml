                                - generic [ref=e2026]:
                                  - generic [ref=e2027]: (b)
                                  - paragraph [ref=e2029]: failure to cooperate or to comply with an investigation, with an inspection or with a request as referred to in Article 23(2).
                            - paragraph [ref=e2030]: Member States may decide not to lay down rules for administrative sanctions as referred to in the first subparagraph where the infringements referred to in point (a) or point (b) of that subparagraph are already subject to criminal sanctions in their national law by 3 July 2016. Where they so decide, Member States shall notify, in detail, to the Commission and to ESMA, the relevant parts of their criminal law.
                            - paragraph [ref=e2031]: By 3 July 2016, Member States shall notify, in detail, the rules referred to in the first and second subparagraph to the Commission and to ESMA. They shall notify the Commission and ESMA without delay of any subsequent amendments thereto.
                            - generic [ref=e2032]:
                              - text: "2."
                              - generic [ref=e2033]:
                                - paragraph [ref=e2034]: "Member States shall, in accordance with national law, ensure that competent authorities have the power to impose at least the following administrative sanctions and to take at least the following administrative measures in the event of the infringements referred to in point (a) of the first subparagraph of paragraph 1:"
                                - generic [ref=e2035]:
                                  - generic [ref=e2036]: (a)
                                  - paragraph [ref=e2038]: an order requiring the person responsible for the infringement to cease the conduct and to desist from a repetition of that conduct;
                                - generic [ref=e2039]:
