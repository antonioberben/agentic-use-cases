                            - generic [ref=e1684]: 5. Issuers and emission allowance market participants shall notify the person discharging managerial responsibilities of their obligations under this Article in writing. Issuers and emission allowance market participants shall draw up a list of all persons discharging managerial responsibilities and persons closely associated with them.
                            - paragraph [ref=e1685]: Persons discharging managerial responsibilities shall notify the persons closely associated with them of their obligations under this Article in writing and shall keep a copy of this notification.
