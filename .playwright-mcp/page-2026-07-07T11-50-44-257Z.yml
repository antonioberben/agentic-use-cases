                            - generic [ref=e1660]: 2. For the purposes of paragraph 1, and without prejudice to the right of Member States to provide for notification obligations other than those referred to in this Article, all transactions conducted on the own account of the persons referred to in paragraph 1, shall be notified by those persons to the competent authorities.
                            - paragraph [ref=e1661]: The rules applicable to notifications, with which persons referred to in paragraph 1 must comply, shall be those of the Member State where the issuer or emission allowance market participant is registered. Notifications shall be made within three working days of the transaction date to the competent authority of that Member State. Where the issuer is not registered in a Member State, the notification shall be made to the competent authority of the home Member State in accordance with point (i) of Article 2(1) of Directive 2004/109/EC or, in the absence thereof, to the competent authority of the trading venue.
