                                - generic [ref=e1724]:
                                  - generic [ref=e1725]: (b)
                                  - paragraph [ref=e1727]: transactions undertaken by persons professionally arranging or executing transactions or by another person on behalf of a person discharging managerial responsibilities or a person closely associated with such a person, as referred to in paragraph 1, including where discretion is exercised;
                                - generic [ref=e1728]:
