                            - generic [ref=e2104]: 3. Member States may provide that competent authorities have powers in addition to those referred to in paragraph 2 and may provide for higher levels of sanctions than those established in that paragraph.
                          - generic [ref=e2105]:
                            - paragraph [ref=e2106]: Article 31
                            - paragraph [ref=e2108]: Exercise of supervisory powers and imposition of sanctions
                            - generic [ref=e2109]:
                              - text: "1."
                              - generic [ref=e2110]:
                                - paragraph [ref=e2111]: "Member States shall ensure that when determining the type and level of administrative sanctions, competent authorities take into account all relevant circumstances, including, where appropriate:"
                                - generic [ref=e2112]:
                                  - generic [ref=e2113]: (a)
                                  - paragraph [ref=e2115]: the gravity and duration of the infringement;
                                - generic [ref=e2116]:
                                  - generic [ref=e2117]: (b)
                                  - paragraph [ref=e2119]: the degree of responsibility of the person responsible for the infringement;
                                - generic [ref=e2120]:
                                  - generic [ref=e2121]: (c)
                                  - paragraph [ref=e2123]: the financial strength of the person responsible for the infringement, as indicated, for example, by the total turnover of a legal person or the annual income of a natural person;
                                - generic [ref=e2124]:
                                  - generic [ref=e2125]: (d)
                                  - paragraph [ref=e2127]: the importance of the profits gained or losses avoided by the person responsible for the infringement, insofar as they can be determined;
                                - generic [ref=e2128]:
                                  - generic [ref=e2129]: (e)
                                  - paragraph [ref=e2131]: the level of cooperation of the person responsible for the infringement with the competent authority, without prejudice to the need to ensure disgorgement of profits gained or losses avoided by that person;
                                - generic [ref=e2132]:
                                  - generic [ref=e2133]: (f)
                                  - paragraph [ref=e2135]: previous infringements by the person responsible for the infringement; and
                                - generic [ref=e2136]:
                                  - generic [ref=e2137]: (g)
                                  - paragraph [ref=e2139]: measures taken by the person responsible for the infringement to prevent its repetition.
                            - generic [ref=e2140]: 2. In the exercise of their powers to impose administrative sanctions and other administrative measures under Article 30, competent authorities shall cooperate closely to ensure that the exercise of their supervisory and investigative powers, and the administrative sanctions that they impose, and the other administrative measures that they take, are effective and appropriate under this Regulation. They shall coordinate their actions in accordance with Article 25 in order to avoid duplication and overlaps when exercising their supervisory and investigative powers and when imposing administrative sanctions in respect of cross-border cases.
                          - generic [ref=e2141]:
                            - paragraph [ref=e2142]: Article 32
                            - paragraph [ref=e2144]: Reporting of infringements
                            - generic [ref=e2145]: 1. Member States shall ensure that competent authorities establish effective mechanisms to enable reporting of actual or potential infringements of this Regulation to competent authorities.
                            - generic [ref=e2146]:
                              - text: "2."
                              - generic [ref=e2147]:
                                - paragraph [ref=e2148]: "The mechanisms referred to in paragraph 1 shall include at least:"
                                - generic [ref=e2149]:
                                  - generic [ref=e2150]: (a)
                                  - paragraph [ref=e2152]: specific procedures for the receipt of reports of infringements and their follow-up, including the establishment of secure communication channels for such reports;
                                - generic [ref=e2153]:
                                  - generic [ref=e2154]: (b)
                                  - paragraph [ref=e2156]: within their employment, appropriate protection for persons working under a contract of employment, who report infringements or are accused of infringements, against retaliation, discrimination or other types of unfair treatment at a minimum; and
                                - generic [ref=e2157]:
                                  - generic [ref=e2158]: (c)
                                  - paragraph [ref=e2160]: protection of personal data both of the person who reports the infringement and the natural person who allegedly committed the infringement, including protection in relation to preserving the confidentiality of their identity, at all stages of the procedure without prejudice to disclosure of information being required by national law in the context of investigations or subsequent judicial proceedings.
                            - generic [ref=e2161]: 3. Member States shall require employers who carry out activities that are regulated by financial services regulation to have in place appropriate internal procedures for their employees to report infringements of this Regulation.
                            - generic [ref=e2162]: 4. Member States may provide for financial incentives to persons who offer relevant information about potential infringements of this Regulation to be granted in accordance with national law where such persons do not have other pre-existing legal or contractual duties to report such information, and provided that the information is new, and that it results in the imposition of an administrative or criminal sanction, or the taking of another administrative measure, for an infringement of this Regulation.
                            - generic [ref=e2163]: 5. The Commission shall adopt implementing acts to specify the procedures referred to in paragraph 1, including the arrangements for reporting and for following-up reports, and measures for the protection of persons working under a contract of employment and measures for the protection of personal data. Those implementing acts shall be adopted in accordance with the examination procedure referred to in Article 36(2).
                          - generic [ref=e2164]:
                            - paragraph [ref=e2165]: Article 33
                            - paragraph [ref=e2167]: Exchange of information with ESMA
                            - generic [ref=e2168]: 1. Competent authorities shall provide ESMA annually with aggregated information regarding all administrative sanctions and other administrative measures imposed by the competent authority in accordance with Articles 30, 31 and 32. ESMA shall publish that information in an annual report. Competent authorities shall also provide ESMA annually with anonymised and aggregated data regarding all administrative investigations undertaken in accordance with those Articles.
                            - generic [ref=e2169]: 2. Where Member States have, in accordance with the second subparagraph of Article 30(1), laid down criminal sanctions for the infringements referred to in that Article, their competent authorities shall provide ESMA annually with anonymised and aggregated data regarding all criminal investigations undertaken and criminal penalties imposed by the judicial authorities in accordance with Articles 30, 31 and 32. ESMA shall publish data on criminal sanctions imposed in an annual report.
                            - generic [ref=e2170]: 3. Where the competent authority has disclosed administrative or criminal sanctions or other administrative measures to the public, it shall simultaneously notify ESMA thereof.
                            - generic [ref=e2171]: 4. Where a published administrative or criminal sanction or other administrative measure relates to an investment firm authorised in accordance with Directive 2014/65/EU, ESMA shall add a reference to that published sanction or measure in the register of investment firms established under Article 5(3) of that Directive.
                            - generic [ref=e2172]: 5. In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to determine the procedures and forms for exchange of information as referred to in this Article.
                            - paragraph [ref=e2173]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2016.
                            - paragraph [ref=e2174]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                          - generic [ref=e2175]:
                            - paragraph [ref=e2176]: Article 34
                            - paragraph [ref=e2178]: Publication of decisions
                            - generic [ref=e2179]: 1. Subject to the third subparagraph, competent authorities shall publish any decision imposing an administrative sanction or other administrative measure in relation to an infringement of this Regulation on their website immediately after the person subject to that decision has been informed of that decision. Such publication shall include at least information on the type and nature of the infringement and the identity of the person subject to the decision.
                            - paragraph [ref=e2180]: The first subparagraph does not apply to decisions imposing measures that are of an investigatory nature.
                            - paragraph [ref=e2181]: "Where a competent authority considers that the publication of the identity of the legal person subject to the decision, or of the personal data of a natural person, would be disproportionate following a case-by-case assessment conducted on the proportionality of the publication of such data, or where such publication would jeopardise an ongoing investigation or the stability of the financial markets, it shall do any of the following:"
                            - generic [ref=e2182]:
                              - generic [ref=e2183]: (a)
                              - paragraph [ref=e2185]: defer publication of the decision until the reasons for that deferral cease to exist;
                            - generic [ref=e2186]:
                              - generic [ref=e2187]: (b)
                              - paragraph [ref=e2189]: publish the decision on an anonymous basis in accordance with national law where such publication ensures the effective protection of the personal data concerned;
                            - generic [ref=e2190]:
                              - generic [ref=e2191]: (c)
                              - generic [ref=e2192]:
                                - paragraph [ref=e2193]: "not publish the decision in the event that the competent authority is of the opinion that publication in accordance with point (a) or (b) will be insufficient to ensure:"
                                - generic [ref=e2194]:
                                  - generic [ref=e2195]: (i)
                                  - paragraph [ref=e2197]: that the stability of financial markets is not jeopardised; or
                                - generic [ref=e2198]:
                                  - generic [ref=e2199]: (ii)
                                  - paragraph [ref=e2201]: the proportionality of the publication of such decisions with regard to measures which are deemed to be of a minor nature.
                            - paragraph [ref=e2202]: Where a competent authority takes a decision to publish a decision on an anonymous basis as referred to in point (b) of the third subparagraph, it may postpone the publication of the relevant data for a reasonable period of time where it is foreseeable that the reasons for anonymous publication will cease to exist during that period.
                            - generic [ref=e2203]: 2. Where the decision is subject to an appeal before a national judicial, administrative or other authority, competent authorities shall also publish immediately on their website such information and any subsequent information on the outcome of such an appeal. Moreover, any decision annulling a decision subject to appeal shall also be published.
                            - generic [ref=e2204]: 3. Competent authorities shall ensure that any decision that is published in accordance with this Article shall remain accessible on their website for a period of at least five years after its publication. Personal data contained in such publications shall be kept on the website of the competent authority for the period which is necessary in accordance with the applicable data protection rules.
