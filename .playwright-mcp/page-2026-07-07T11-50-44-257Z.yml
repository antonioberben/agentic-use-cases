                                    - generic [ref=e2075]:
                                      - generic [ref=e2076]: (ii)
                                      - paragraph [ref=e2078]: for infringements of Articles 16 and 17, EUR 1 000 000 or in the Member States whose currency is not the euro, the corresponding value in the national currency on 2 July 2014; and
                                    - generic [ref=e2079]:
                                      - generic [ref=e2080]: (iii)
                                      - paragraph [ref=e2082]: for infringements of Articles 18, 19 and 20, EUR 500 000 or in the Member States whose currency is not the euro, the corresponding value in the national currency on 2 July 2014; and
                                - generic [ref=e2083]:
                                  - generic [ref=e2084]: (j)
                                  - generic [ref=e2085]:
                                    - paragraph [ref=e2086]: "in respect of legal persons, maximum administrative pecuniary sanctions of at least:"
                                    - generic [ref=e2087]:
                                      - generic [ref=e2088]: (i)
                                      - paragraph [ref=e2090]: for infringements of Articles 14 and 15, EUR 15 000 000 or 15 % of the total annual turnover of the legal person according to the last available accounts approved by the management body, or in the Member States whose currency is not the euro, the corresponding value in the national currency on 2 July 2014;
                                    - generic [ref=e2091]:
                                      - generic [ref=e2092]: (ii)
                                      - paragraph [ref=e2094]: for infringements of Articles 16 and 17, EUR 2 500 000 or 2 % of its total annual turnover according to the last available accounts approved by the management body, or in the Member States whose currency is not the euro, the corresponding value in the national currency on 2 July 2014; and
                                    - generic [ref=e2095]:
                                      - generic [ref=e2096]: (iii)
                                      - paragraph [ref=e2098]: for infringements of Articles 18, 19 and 20, EUR 1 000 000 or in the Member States whose currency is not the euro, the corresponding value in the national currency on 2 July 2014.
                            - paragraph [ref=e2099]: References to the competent authority in this paragraph are without prejudice to the ability of the competent authority to exercise its functions in any ways referred to in Article 23(1).
                            - paragraph [ref=e2100]:
                              - text: For the purposes of points (j)(i) and (ii) of the first subparagraph, where the legal person is a parent undertaking or a subsidiary undertaking which is required to prepare consolidated financial accounts pursuant to Directive 2013/34/EU (
                              - link "13" [ref=e2101] [cursor=pointer]:
