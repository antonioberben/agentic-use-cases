                                - generic [ref=e1386]: 
                          - generic [ref=e1387]:
                            - paragraph [ref=e1388]: Article 14
                            - paragraph [ref=e1390]: Prohibition of insider dealing and of unlawful disclosure of inside information
                            - paragraph [ref=e1391]: "A person shall not:"
                            - generic [ref=e1392]:
                              - generic [ref=e1393]: (a)
                              - paragraph [ref=e1395]: engage or attempt to engage in insider dealing;
                            - generic [ref=e1396]:
                              - generic [ref=e1397]: (b)
                              - paragraph [ref=e1399]: recommend that another person engage in insider dealing or induce another person to engage in insider dealing; or
                            - generic [ref=e1400]:
                              - generic [ref=e1401]: (c)
                              - paragraph [ref=e1403]: unlawfully disclose inside information.
                          - generic [ref=e1404]:
                            - paragraph [ref=e1405]: Article 15
                            - paragraph [ref=e1407]: Prohibition of market manipulation
                            - paragraph [ref=e1408]: A person shall not engage in or attempt to engage in market manipulation.
                          - generic [ref=e1409]:
                            - paragraph [ref=e1410]: Article 16
                            - paragraph [ref=e1412]: Prevention and detection of market abuse
                            - generic [ref=e1413]: 1. Market operators and investment firms that operate a trading venue shall establish and maintain effective arrangements, systems and procedures aimed at preventing and detecting insider dealing, market manipulation and attempted insider dealing and market manipulation, in accordance with Articles 31 and 54 of Directive 2014/65/EU.
                            - paragraph [ref=e1414]: A person referred to in the first subparagraph shall report orders and transactions, including any cancellation or modification thereof, that could constitute insider dealing, market manipulation or attempted insider dealing or market manipulation to the competent authority of the trading venue without delay.
                            - generic [ref=e1415]: 2. Any person professionally arranging or executing transactions shall establish and maintain effective arrangements, systems and procedures to detect and report suspicious orders and transactions. Where such a person has a reasonable suspicion that an order or transaction in any financial instrument, whether placed or executed on or outside a trading venue, could constitute insider dealing, market manipulation or attempted insider dealing or market manipulation, the person shall notify the competent authority as referred to in paragraph 3 without delay.
                            - generic [ref=e1416]: 3. Without prejudice to Article 22, persons professionally arranging or executing transactions shall be subject to the rules of notification of the Member State in which they are registered or have their head office, or, in the case of a branch, the Member State where the branch is situated. The notification shall be addressed to the competent authority of that Member State.
                            - generic [ref=e1417]: 4. The competent authorities as referred to in paragraph 3 receiving the notification of suspicious orders and transactions shall transmit such information immediately to the competent authorities of the trading venues concerned.
                            - generic [ref=e1418]:
                              - text: "5."
                              - generic [ref=e1419]:
                                - paragraph [ref=e1420]: "In order to ensure consistent harmonisation of this Article, ESMA shall develop draft regulatory technical standards to determine:"
                                - generic [ref=e1421]:
                                  - generic [ref=e1422]: (a)
                                  - paragraph [ref=e1424]: appropriate arrangements, systems and procedures for persons to comply with the requirements established in paragraphs 1 and 2; and
                                - generic [ref=e1425]:
                                  - generic [ref=e1426]: (b)
                                  - paragraph [ref=e1428]: the notification templates to be used by persons to comply with the requirements established in paragraphs 1 and 2.
                            - paragraph [ref=e1429]: ESMA shall submit those draft regulatory technical standards to the Commission by 3 July 2016.
                            - paragraph [ref=e1430]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the first subparagraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
                        - generic [ref=e1431]:
                          - paragraph [ref=e1432]: CHAPTER 3
                          - paragraph [ref=e1433]: DISCLOSURE REQUIREMENTS
                          - generic [ref=e1434]:
                            - paragraph [ref=e1435]: Article 17
                            - paragraph [ref=e1437]: Public disclosure of inside information
                            - generic [ref=e1438]: 1. An issuer shall inform the public as soon as possible of inside information which directly concerns that issuer.
                            - paragraph [ref=e1439]:
                              - text: The issuer shall ensure that the inside information is made public in a manner which enables fast access and complete, correct and timely assessment of the information by the public and, where applicable, in the officially appointed mechanism referred to in Article 21 of Directive 2004/109/EC of the European Parliament and the Council (
                              - link "9" [ref=e1440] [cursor=pointer]:
                                - /url: "#E0009"
                              - text: ). The issuer shall not combine the disclosure of inside information to the public with the marketing of its activities. The issuer shall post and maintain on its website for a period of at least five years, all inside information it is required to disclose publicly.
                            - paragraph [ref=e1441]: This Article shall apply to issuers who have requested or approved admission of their financial instruments to trading on a regulated market in a Member State or, in the case of instruments only traded on an MTF or on an OTF, issuers who have approved trading of their financial instruments on an MTF or an OTF or have requested admission to trading of their financial instruments on an MTF in a Member State.
                            - generic [ref=e1442]: 2. An emission allowance market participant shall publicly, effectively and in a timely manner disclose inside information concerning emission allowances which it holds in respect of its business, including aviation activities as specified in Annex I to Directive 2003/87/EC or installations within the meaning of Article 3(e) of that Directive which the participant concerned, or its parent undertaking or related undertaking, owns or controls or for the operational matters of which the participant, or its parent undertaking or related undertaking, is responsible, in whole or in part. With regard to installations, such disclosure shall include information relevant to the capacity and utilisation of installations, including planned or unplanned unavailability of such installations.
                            - paragraph [ref=e1443]: The first subparagraph shall not apply to a participant in the emission allowance market where the installations or aviation activities that it owns, controls or is responsible for, in the preceding year have had emissions not exceeding a minimum threshold of carbon dioxide equivalent and, where they carry out combustion activities, have had a rated thermal input not exceeding a minimum threshold.
                            - paragraph [ref=e1444]: The Commission shall be empowered to adopt delegated acts in accordance with Article 35 establishing a minimum threshold of carbon dioxide equivalent and a minimum threshold of rated thermal input for the purposes of the application of the exemption provided for in the second subparagraph of this paragraph.
                            - generic [ref=e1445]: 3. The Commission shall be empowered to adopt delegated acts in accordance with Article 35 specifying the competent authority for the notifications of paragraphs 4 and 5 of this Article.
                            - generic [ref=e1446]:
                              - text: "4."
                              - generic [ref=e1447]:
                                - paragraph [ref=e1448]: "An issuer or an emission allowance market participant, may, on its own responsibility, delay disclosure to the public of inside information provided that all of the following conditions are met:"
                                - generic [ref=e1449]:
                                  - generic [ref=e1450]: (a)
                                  - paragraph [ref=e1452]: immediate disclosure is likely to prejudice the legitimate interests of the issuer or emission allowance market participant;
                                - generic [ref=e1453]:
                                  - generic [ref=e1454]: (b)
                                  - paragraph [ref=e1456]: delay of disclosure is not likely to mislead the public;
                                - generic [ref=e1457]:
                                  - generic [ref=e1458]: (c)
                                  - paragraph [ref=e1460]: the issuer or emission allowance market participant is able to ensure the confidentiality of that information.
                            - paragraph [ref=e1461]: In the case of a protracted process that occurs in stages and that is intended to bring about, or that results in, a particular circumstance or a particular event, an issuer or an emission allowance market participant may on its own responsibility delay the public disclosure of inside information relating to this process, subject to points (a), (b) and (c) of the first subparagraph.
                            - paragraph [ref=e1462]: Where an issuer or emission allowance market participant has delayed the disclosure of inside information under this paragraph, it shall inform the competent authority specified under paragraph 3 that disclosure of the information was delayed and shall provide a written explanation of how the conditions set out in this paragraph were met, immediately after the information is disclosed to the public. Alternatively, Member States may provide that a record of such an explanation is to be provided only upon the request of the competent authority specified under paragraph 3.
                            - paragraph [ref=e1463]:
                              - link "▼M3" [ref=e1464] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32019R2115
                              - link [ref=e1465] [cursor=pointer]:
                                - /url: "#M3-4"
                                - generic [ref=e1466]: 
                            - paragraph [ref=e1467]: By way of derogation from the third subparagraph of this paragraph, an issuer whose financial instruments are admitted to trading only on an SME growth market shall provide a written explanation to the competent authority specified under paragraph 3 only upon request. As long as the issuer is able to justify its decision to delay, the issuer shall not be required to keep a record of that explanation.
                            - paragraph [ref=e1468]:
                              - link "▼B" [ref=e1469] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32014R0596
                              - link [ref=e1470] [cursor=pointer]:
                                - /url: "#B-6"
                                - generic [ref=e1471]: 
                            - generic [ref=e1472]:
                              - text: "5."
                              - generic [ref=e1473]:
                                - paragraph [ref=e1474]: "In order to preserve the stability of the financial system, an issuer that is a credit institution or a financial institution, may, on its own responsibility, delay the public disclosure of inside information, including information which is related to a temporary liquidity problem and, in particular, the need to receive temporary liquidity assistance from a central bank or lender of last resort, provided that all of the following conditions are met:"
                                - generic [ref=e1475]:
                                  - generic [ref=e1476]: (a)
                                  - paragraph [ref=e1478]: the disclosure of the inside information entails a risk of undermining the financial stability of the issuer and of the financial system;
                                - generic [ref=e1479]:
                                  - generic [ref=e1480]: (b)
                                  - paragraph [ref=e1482]: it is in the public interest to delay the disclosure;
                                - generic [ref=e1483]:
                                  - generic [ref=e1484]: (c)
                                  - paragraph [ref=e1486]: the confidentiality of that information can be ensured; and
                                - generic [ref=e1487]:
                                  - generic [ref=e1488]: (d)
                                  - paragraph [ref=e1490]: the competent authority specified under paragraph 3 has consented to the delay on the basis that the conditions in points (a), (b) and (c) are met.
                            - generic [ref=e1491]:
                              - text: "6."
                              - generic [ref=e1492]:
                                - paragraph [ref=e1493]: "For the purposes of points (a) to (d) of paragraph 5, an issuer shall notify the competent authority specified under paragraph 3 of its intention to delay the disclosure of the inside information and provide evidence that the conditions set out in points (a), (b) and (c) of paragraph 5 are met. The competent authority specified under paragraph 3 shall consult, as appropriate, the national central bank or the macro-prudential authority, where instituted, or, alternatively, the following authorities:"
                                - generic [ref=e1494]:
                                  - generic [ref=e1495]: (a)
                                  - paragraph [ref=e1497]:
                                    - text: where the issuer is a credit institution or an investment firm the authority designated in accordance with Article 133(1) of Directive 2013/36/EU of the European Parliament and of the Council (
                                    - link "10" [ref=e1498] [cursor=pointer]:
                                      - /url: "#E0010"
                                    - text: );
                                - generic [ref=e1499]:
                                  - generic [ref=e1500]: (b)
                                  - paragraph [ref=e1502]: in cases other than those referred to in point (a), any other national authority responsible for the supervision of the issuer.
                            - paragraph [ref=e1503]: The competent authority specified under paragraph 3 shall ensure that disclosure of the inside information is delayed only for a period as is necessary in the public interest. The competent authority specified under paragraph 3 shall evaluate at least on a weekly basis whether the conditions set out in points (a), (b) and (c) of paragraph 5 are still met.
                            - paragraph [ref=e1504]: If the competent authority specified under paragraph 3 does not consent to the delay of disclosure of the inside information, the issuer shall disclose the inside information immediately.
                            - paragraph [ref=e1505]: This paragraph shall apply to cases where the issuer does not decide to delay the disclosure of inside information in accordance with paragraph 4.
                            - paragraph [ref=e1506]: Reference in this paragraph to the competent authority specified under paragraph 3 is without prejudice to the ability of the competent authority to exercise its functions in any of the ways referred to in Article 23(1).
                            - generic [ref=e1507]: 7. Where disclosure of inside information has been delayed in accordance with paragraph 4 or 5 and the confidentiality of that inside information is no longer ensured, the issuer or the emission allowance market participant shall disclose that inside information to the public as soon as possible.
                            - paragraph [ref=e1508]: This paragraph includes situations where a rumour explicitly relates to inside information the disclosure of which has been delayed in accordance with paragraph 4 or 5, where that rumour is sufficiently accurate to indicate that the confidentiality of that information is no longer ensured.
                            - generic [ref=e1509]: 8. Where an issuer or an emission allowance market participant, or a person acting on their behalf or for their account, discloses any inside information to any third party in the normal course of the exercise of an employment, profession or duties as referred to in Article 10(1), they must make complete and effective public disclosure of that information, simultaneously in the case of an intentional disclosure, and promptly in the case of a non-intentional disclosure. This paragraph shall not apply if the person receiving the information owes a duty of confidentiality, regardless of whether such duty is based on a law, on regulations, on articles of association, or on a contract.
                            - generic [ref=e1510]: 9. Inside information relating to issuers whose financial instruments are admitted to trading on an SME growth market, may be posted on the trading venue’s website instead of on the website of the issuer where the trading venue chooses to provide this facility for issuers on that market.
                            - generic [ref=e1511]:
                              - text: "10."
                              - generic [ref=e1512]:
                                - paragraph [ref=e1513]: "In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to determine:"
                                - generic [ref=e1514]:
                                  - generic [ref=e1515]: (a)
                                  - paragraph [ref=e1517]: the technical means for appropriate public disclosure of inside information as referred to in paragraphs 1, 2, 8 and 9; and
                                - generic [ref=e1518]:
                                  - generic [ref=e1519]: (b)
                                  - paragraph [ref=e1521]: the technical means for delaying the public disclosure of inside information as referred to in paragraphs 4 and 5.
                            - paragraph [ref=e1522]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2016.
                            - paragraph [ref=e1523]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                            - generic [ref=e1524]: 11. ESMA shall issue guidelines to establish a non-exhaustive indicative list of the legitimate interests of issuers, as referred to in point (a) of paragraph 4, and of situations in which delay of disclosure of inside information is likely to mislead the public as referred to in point (b) of paragraph 4.
                          - generic [ref=e1525]:
                            - paragraph [ref=e1526]: Article 18
                            - paragraph [ref=e1528]: Insider lists
                            - paragraph [ref=e1529]:
                              - link "▼M3" [ref=e1530] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32019R2115
                              - link [ref=e1531] [cursor=pointer]:
                                - /url: "#M3-5"
                                - generic [ref=e1532]: 
                            - generic [ref=e1533]:
                              - text: "1."
                              - generic [ref=e1534]:
                                - paragraph [ref=e1535]: "Issuers and any person acting on their behalf or on their account, shall each:"
                                - generic [ref=e1536]:
                                  - generic [ref=e1537]: (a)
                                  - paragraph [ref=e1539]: draw up a list of all persons who have access to inside information and who are working for them under a contract of employment, or otherwise performing tasks through which they have access to inside information, such as advisers, accountants or credit rating agencies (insider list);
                                - generic [ref=e1540]:
                                  - generic [ref=e1541]: (b)
                                  - paragraph [ref=e1543]: promptly update the insider list in accordance with paragraph 4; and
                                - generic [ref=e1544]:
                                  - generic [ref=e1545]: (c)
                                  - paragraph [ref=e1547]: provide the insider list to the competent authority as soon as possible upon its request.
                            - generic [ref=e1548]: 2. Issuers and any person acting on their behalf or on their account, shall take all reasonable steps to ensure that any person on the insider list acknowledges in writing the legal and regulatory duties entailed and is aware of the sanctions applicable to insider dealing and unlawful disclosure of inside information.
                            - paragraph [ref=e1549]: Where another person is requested by the issuer to draw up and update the issuer’s insider list, the issuer shall remain fully responsible for complying with this Article. The issuer shall always retain a right of access to the insider list that the other person is drawing up.
                            - paragraph [ref=e1550]:
                              - link "▼B" [ref=e1551] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32014R0596
                              - link [ref=e1552] [cursor=pointer]:
                                - /url: "#B-7"
                                - generic [ref=e1553]: 
                            - generic [ref=e1554]:
                              - text: "3."
                              - generic [ref=e1555]:
                                - paragraph [ref=e1556]: "The insider list shall include at least:"
                                - generic [ref=e1557]:
                                  - generic [ref=e1558]: (a)
                                  - paragraph [ref=e1560]: the identity of any person having access to inside information;
                                - generic [ref=e1561]:
                                  - generic [ref=e1562]: (b)
                                  - paragraph [ref=e1564]: the reason for including that person in the insider list;
                                - generic [ref=e1565]:
                                  - generic [ref=e1566]: (c)
                                  - paragraph [ref=e1568]: the date and time at which that person obtained access to inside information; and
                                - generic [ref=e1569]:
                                  - generic [ref=e1570]: (d)
                                  - paragraph [ref=e1572]: the date on which the insider list was drawn up.
                            - paragraph [ref=e1573]:
                              - link "▼M3" [ref=e1574] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32019R2115
                              - link [ref=e1575] [cursor=pointer]:
                                - /url: "#M3-6"
                                - generic [ref=e1576]: 
                            - generic [ref=e1577]:
                              - text: "4."
                              - generic [ref=e1578]:
                                - paragraph [ref=e1579]: "Issuers and any person acting on their behalf or on their account shall each update their insider list promptly, including the date of the update, in the following circumstances:"
                                - generic [ref=e1580]:
                                  - generic [ref=e1581]: (a)
                                  - paragraph [ref=e1583]: where there is a change in the reason for including a person already on the insider list;
                                - generic [ref=e1584]:
                                  - generic [ref=e1585]: (b)
                                  - paragraph [ref=e1587]: where there is a new person who has access to inside information and needs, therefore, to be added to the insider list; and
                                - generic [ref=e1588]:
                                  - generic [ref=e1589]: (c)
                                  - paragraph [ref=e1591]: where a person ceases to have access to inside information.
                                - paragraph [ref=e1592]: Each update shall specify the date and time when the change triggering the update occurred.
                            - generic [ref=e1593]: 5. Issuers and any person acting on their behalf or on their account shall each retain their insider list for a period of at least five years after it is drawn up or updated.
                            - generic [ref=e1594]: 6. Issuers whose financial instruments are admitted to trading on an SME growth market shall be entitled to include in their insider lists only those persons who, due to the nature of their function or position within the issuer, have regular access to inside information.
                            - paragraph [ref=e1595]: By way of derogation from the first subparagraph of this paragraph and where justified by specific national market integrity concerns, Member States may require issuers whose financial instruments are admitted to trading on an SME growth market to include in their insider lists all persons referred to in point (a) of paragraph 1. Those lists shall comprise information specified in the format determined by ESMA pursuant to the fourth subparagraph of this paragraph.
                            - paragraph [ref=e1596]: The insider lists referred to in the first and second subparagraphs of this paragraph shall be provided to the competent authority as soon as possible upon its request.
                            - paragraph [ref=e1597]: ESMA shall develop draft implementing technical standards to determine the precise format of the insider lists referred to in the second subparagraph of this paragraph. The format of the insider lists shall be proportionate and represent a lighter administrative burden compared to the format of insider lists referred to in paragraph 9.
                            - paragraph [ref=e1598]: ESMA shall submit those draft implementing technical standards to the Commission by 1 September 2020.
                            - paragraph [ref=e1599]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the fourth subparagraph of this paragraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                            - paragraph [ref=e1600]:
                              - link "▼B" [ref=e1601] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32014R0596
                              - link [ref=e1602] [cursor=pointer]:
                                - /url: "#B-8"
                                - generic [ref=e1603]: 
                            - generic [ref=e1604]: 7. This Article shall apply to issuers who have requested or approved admission of their financial instruments to trading on a regulated market in a Member State or, in the case of an instrument only traded on an MTF or an OTF, have approved trading of their financial instruments on an MTF or an OTF or have requested admission to trading of their financial instruments on an MTF in a Member State.
                            - generic [ref=e1605]:
                              - text: "8."
                              - generic [ref=e1606]:
                                - paragraph [ref=e1607]: "Paragraphs 1 to 5 of this Article shall also apply to:"
                                - generic [ref=e1608]:
                                  - generic [ref=e1609]: (a)
                                  - paragraph [ref=e1611]: emission allowance market participants in relation to inside information concerning emission allowances that arises in relation to the physical operations of that emission allowance market participant;
                                - generic [ref=e1612]:
                                  - generic [ref=e1613]: (b)
                                  - paragraph [ref=e1615]: any auction platform, auctioneer and auction monitor in relation to auctions of emission allowances or other auctioned products based thereon that are held pursuant to Regulation (EU) No 1031/2010.
                            - generic [ref=e1616]: 9. In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to determine the precise format of insider lists and the format for updating insider lists referred to in this Article.
                            - paragraph [ref=e1617]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2016.
                            - paragraph [ref=e1618]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                          - generic [ref=e1619]:
                            - paragraph [ref=e1620]: Article 19
                            - paragraph [ref=e1622]: Managers’ transactions
                            - generic [ref=e1623]:
                              - text: "1."
                              - generic [ref=e1624]:
                                - paragraph [ref=e1625]: "Persons discharging managerial responsibilities, as well as persons closely associated with them, shall notify the issuer or the emission allowance market participant and the competent authority referred to in the second subparagraph of paragraph 2:"
                                - generic [ref=e1626]:
                                  - generic [ref=e1627]: (a)
                                  - paragraph [ref=e1629]: in respect of issuers, of every transaction conducted on their own account relating to the shares or debt instruments of that issuer or to derivatives or other financial instruments linked thereto;
                                - generic [ref=e1630]:
                                  - generic [ref=e1631]: (b)
                                  - paragraph [ref=e1633]: in respect of emission allowance market participants, of every transaction conducted on their own account relating to emission allowances, to auction products based thereon or to derivatives relating thereto.
                            - paragraph [ref=e1634]: Such notifications shall be made promptly and no later than three business days after the date of the transaction.
                            - paragraph [ref=e1635]: The first subparagraph applies once the total amount of transactions has reached the threshold set out in paragraph 8 or 9, as applicable, within a calendar year.
                            - paragraph [ref=e1636]:
                              - link "▼M1" [ref=e1637] [cursor=pointer]:
                                - /url: ./../../../legal-content/EN/AUTO/?uri=celex:32016R1011
                              - link [ref=e1638] [cursor=pointer]:
                                - /url: "#M1-2"
                                - generic [ref=e1639]: 
                            - generic [ref=e1640]:
                              - text: 1a.
                              - generic [ref=e1641]:
                                - paragraph [ref=e1642]: "The notification obligation referred to in paragraph 1 shall not apply to transactions in financial instruments linked to shares or to debt instruments of the issuer referred to in that paragraph where at the time of the transaction any of the following conditions is met:"
                                - generic [ref=e1643]:
                                  - generic [ref=e1644]: (a)
                                  - paragraph [ref=e1646]: the financial instrument is a unit or share in a collective investment undertaking in which the exposure to the issuer's shares or debt instruments does not exceed 20 % of the assets held by the collective investment undertaking;
                                - generic [ref=e1647]:
                                  - generic [ref=e1648]: (b)
                                  - paragraph [ref=e1650]: the financial instrument provides exposure to a portfolio of assets in which the exposure to the issuer's shares or debt instruments does not exceed 20 % of the portfolio's assets;
                                - generic [ref=e1651]:
                                  - generic [ref=e1652]: (c)
                                  - paragraph [ref=e1654]: the financial instrument is a unit or share in a collective investment undertaking or provides exposure to a portfolio of assets and the person discharging managerial responsibilities or person closely associated with such a person does not know, and could not know, the investment composition or exposure of such collective investment undertaking or portfolio of assets in relation to the issuer's shares or debt instruments, and furthermore there is no reason for that person to believe that the issuer's shares or debt instruments exceed the thresholds in point (a) or (b).
                            - paragraph [ref=e1655]: If information regarding the investment composition of the collective investment undertaking or exposure to the portfolio of assets is available, then the person discharging managerial responsibility or person closely associated with such a person shall make all reasonable efforts to avail themselves of that information.
