                            - paragraph [ref=e1976]: ESMA shall perform a facilitation and coordination role in relation to the cooperation and exchange of information between competent authorities and regulatory authorities in other Member States and third countries. Competent authorities shall, where possible, conclude cooperation arrangements with third-country regulatory authorities responsible for the related spot markets in accordance with Article 26.
                            - generic [ref=e1977]: 9. In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to determine the procedures and forms for exchange of information and assistance as referred to in this Article.
