                            - generic [ref=e966]: 5. Without prejudice to Article 23(1), the details of all stabilisation transactions shall be notified by issuers, offerors, or entities undertaking the stabilisation, whether or not they act on behalf of such persons, to the competent authority of the trading venue no later than the end of the seventh daily market session following the date of execution of such transactions.
                            - generic [ref=e967]: 6. In order to ensure consistent harmonisation of this Article, ESMA shall develop draft regulatory technical standards to specify the conditions that buy-back programmes and stabilisation measures referred to in paragraphs 1 and 4 must meet, including conditions for trading, restrictions regarding time and volume, disclosure and reporting obligations, and price conditions.
