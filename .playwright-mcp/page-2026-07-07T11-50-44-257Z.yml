                                  - paragraph [ref=e945]: to meet obligations arising from share option programmes, or other allocations of shares, to employees or to members of the administrative, management or supervisory bodies of the issuer or of an associate company.
                            - generic [ref=e946]: 3. In order to benefit from the exemption provided for in paragraph 1, the issuer shall report to the competent authority of the trading venue on which the shares have been admitted to trading or are traded each transaction relating to the buy-back programme, including the information specified in Article 25(1) and (2) and Article 26(1), (2) and (3) of Regulation (EU) No 600/2014.
