                            - paragraph [ref=e911]: Exemption for buy-back programmes and stabilisation
                            - generic [ref=e912]:
                              - text: "1."
                              - generic [ref=e913]:
                                - paragraph [ref=e914]: "The prohibitions in Articles 14 and 15 of this Regulation do not apply to trading in own shares in buy-back programmes where:"
                                - generic [ref=e915]:
                                  - generic [ref=e916]: (a)
