                                - generic [ref=e1754]: 
                            - paragraph [ref=e1755]: Insofar as a policyholder of an insurance contract is required to notify transactions according to this paragraph, an obligation to notify is not incumbent on the insurance company.
                            - generic [ref=e1756]: 8. Paragraph 1 shall apply to any subsequent transaction once a total amount of EUR 5 000 has been reached within a calendar year. The threshold of EUR 5 000 shall be calculated by adding without netting all transactions referred to in paragraph 1.
                            - generic [ref=e1757]: 9. A competent authority may decide to increase the threshold set out in paragraph 8 to EUR 20 000 and shall inform ESMA of its decision and the justification for its decision, with specific reference to market conditions, to adopt the higher threshold prior to its application. ESMA shall publish on its website the list of thresholds that apply in accordance with this Article and the justifications provided by competent authorities for such thresholds.
                            - generic [ref=e1758]: 10. This Article shall also apply to transactions by persons discharging managerial responsibilities within any auction platform, auctioneer and auction monitor involved in the auctions held under Regulation (EU) No 1031/2010 and to persons closely associated with such persons in so far as their transactions involve emission allowances, derivatives thereof or auctioned products based thereon. Those persons shall notify their transactions to the auction platforms, auctioneers and auction monitor, as applicable, and to the competent authority where the auction platform, auctioneer or auction monitor, as applicable, is registered. The information that is so notified shall be made public by the auction platforms, auctioneers, auction monitor or competent authority in accordance with paragraph 3.
                            - generic [ref=e1759]:
                              - text: "11."
                              - generic [ref=e1760]:
                                - paragraph [ref=e1761]: "Without prejudice to Articles 14 and 15, a person discharging managerial responsibilities within an issuer shall not conduct any transactions on its own account or for the account of a third party, directly or indirectly, relating to the shares or debt instruments of the issuer or to derivatives or other financial instruments linked to them during a closed period of 30 calendar days before the announcement of an interim financial report or a year-end report which the issuer is obliged to make public according to:"
                                - generic [ref=e1762]:
                                  - generic [ref=e1763]: (a)
                                  - paragraph [ref=e1765]: the rules of the trading venue where the issuer’s shares are admitted to trading; or
                                - generic [ref=e1766]:
                                  - generic [ref=e1767]: (b)
                                  - paragraph [ref=e1769]: national law.
                            - generic [ref=e1770]:
                              - text: "12."
                              - generic [ref=e1771]:
                                - paragraph [ref=e1772]: "Without prejudice to Articles 14 and 15, an issuer may allow a person discharging managerial responsibilities within it to trade on its own account or for the account of a third party during a closed period as referred to in paragraph 11 either:"
                                - generic [ref=e1773]:
                                  - generic [ref=e1774]: (a)
                                  - paragraph [ref=e1776]: on a case-by-case basis due to the existence of exceptional circumstances, such as severe financial difficulty, which require the immediate sale of shares; or
                                - generic [ref=e1777]:
                                  - generic [ref=e1778]: (b)
                                  - paragraph [ref=e1780]: due to the characteristics of the trading involved for transactions made under, or related to, an employee share or saving scheme, qualification or entitlement of shares, or transactions where the beneficial interest in the relevant security does not change.
                            - generic [ref=e1781]: 13. The Commission shall be empowered to adopt delegated acts in accordance with Article 35 specifying the circumstances under which trading during a closed period may be permitted by the issuer, as referred to in paragraph 12, including the circumstances that would be considered as exceptional and the types of transaction that would justify the permission for trading.
                            - generic [ref=e1782]: 14. The Commission shall be empowered to adopt delegated acts in accordance with Article 35, specifying types of transactions that would trigger the requirement referred to in paragraph 1.
                            - generic [ref=e1783]: 15. In order to ensure uniform application of paragraph 1, ESMA shall develop draft implementing technical standards concerning the format and template in which the information referred to in paragraph 1 is to be notified and made public.
                            - paragraph [ref=e1784]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2015.
                            - paragraph [ref=e1785]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                          - generic [ref=e1786]:
                            - paragraph [ref=e1787]: Article 20
                            - paragraph [ref=e1789]: Investment recommendations and statistics
                            - generic [ref=e1790]: 1. Persons who produce or disseminate investment recommendations or other information recommending or suggesting an investment strategy shall take reasonable care to ensure that such information is objectively presented, and to disclose their interests or indicate conflicts of interest concerning the financial instruments to which that information relates.
                            - generic [ref=e1791]: 2. Public institutions disseminating statistics or forecasts liable to have a significant effect on financial markets shall disseminate them in an objective and transparent way.
                            - generic [ref=e1792]: 3. In order to ensure consistent harmonisation of this Article, ESMA shall develop draft regulatory technical standards to determine the technical arrangements for the categories of person referred to in paragraph 1, for objective presentation of investment recommendations or other information recommending or suggesting an investment strategy and for disclosure of particular interests or indications of conflicts of interest.
                            - paragraph [ref=e1793]: ESMA shall submit those draft regulatory technical standards to the Commission by 3 July 2015.
                            - paragraph [ref=e1794]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the first subparagraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
                            - paragraph [ref=e1795]: The technical arrangements laid down in the regulatory technical standards referred to in paragraph 3 shall not apply to journalists who are subject to equivalent appropriate regulation in a Member State, including equivalent appropriate self-regulation, provided that such regulation achieves similar effects as those technical arrangements. Member State shall notify the text of that equivalent appropriate regulation to the Commission.
                          - generic [ref=e1796]:
                            - paragraph [ref=e1797]: Article 21
                            - paragraph [ref=e1799]: Disclosure or dissemination of information in the media
                            - paragraph [ref=e1800]: "For the purposes of Article 10, Article 12(1)(c) and Article 20, where information is disclosed or disseminated and where recommendations are produced or disseminated for the purpose of journalism or other form of expression in the media, such disclosure or dissemination of information shall be assessed taking into account the rules governing the freedom of the press and freedom of expression in other media and the rules or codes governing the journalist profession, unless:"
                            - generic [ref=e1801]:
                              - generic [ref=e1802]: (a)
                              - paragraph [ref=e1804]: the persons concerned, or persons closely associated with them, derive, directly or indirectly, an advantage or profits from the disclosure or the dissemination of the information in question; or
                            - generic [ref=e1805]:
                              - generic [ref=e1806]: (b)
                              - paragraph [ref=e1808]: the disclosure or the dissemination is made with the intention of misleading the market as to the supply of, demand for, or price of financial instruments.
                        - generic [ref=e1809]:
                          - paragraph [ref=e1810]: CHAPTER 4
                          - paragraph [ref=e1811]: ESMA AND COMPETENT AUTHORITIES
                          - generic [ref=e1812]:
                            - paragraph [ref=e1813]: Article 22
                            - paragraph [ref=e1815]: Competent authorities
                            - paragraph [ref=e1816]: Without prejudice to the competences of the judicial authorities, each Member State shall designate a single administrative competent authority for the purpose of this Regulation. Member States shall inform the Commission, ESMA and the other competent authorities of other Member States accordingly. The competent authority shall ensure that the provisions of this Regulation are applied on its territory, regarding all actions carried out on its territory, and actions carried out abroad relating to instruments admitted to trading on a regulated market, for which a request for admission to trading on such market has been made, auctioned on an auction platform or which are traded on an MTF or an OTF or for which a request for admission to trading has been made on an MTF operating within its territory.
                          - generic [ref=e1817]:
                            - paragraph [ref=e1818]: Article 23
                            - paragraph [ref=e1820]: Powers of competent authorities
                            - generic [ref=e1821]:
                              - text: "1."
                              - generic [ref=e1822]:
                                - paragraph [ref=e1823]: "Competent authorities shall exercise their functions and powers in any of the following ways:"
                                - generic [ref=e1824]:
                                  - generic [ref=e1825]: (a)
                                  - paragraph [ref=e1827]: directly;
                                - generic [ref=e1828]:
                                  - generic [ref=e1829]: (b)
                                  - paragraph [ref=e1831]: in collaboration with other authorities or with the market undertakings;
                                - generic [ref=e1832]:
                                  - generic [ref=e1833]: (c)
                                  - paragraph [ref=e1835]: under their responsibility by delegation to such authorities or to market undertakings;
                                - generic [ref=e1836]:
                                  - generic [ref=e1837]: (d)
                                  - paragraph [ref=e1839]: by application to the competent judicial authorities.
                            - generic [ref=e1840]:
                              - text: "2."
                              - generic [ref=e1841]:
                                - paragraph [ref=e1842]: "In order to fulfil their duties under this Regulation, competent authorities shall have, in accordance with national law, at least the following supervisory and investigatory powers:"
                                - generic [ref=e1843]:
                                  - generic [ref=e1844]: (a)
                                  - paragraph [ref=e1846]: to access any document and data in any form, and to receive or take a copy thereof;
                                - generic [ref=e1847]:
                                  - generic [ref=e1848]: (b)
                                  - paragraph [ref=e1850]: to require or demand information from any person, including those who are successively involved in the transmission of orders or conduct of the operations concerned, as well as their principals, and if necessary, to summon and question any such person with a view to obtain information;
                                - generic [ref=e1851]:
                                  - generic [ref=e1852]: (c)
                                  - paragraph [ref=e1854]: in relation to commodity derivatives, to request information from market participants on related spot markets according to standardised formats, obtain reports on transactions, and have direct access to traders’ systems;
                                - generic [ref=e1855]:
                                  - generic [ref=e1856]: (d)
                                  - paragraph [ref=e1858]: to carry out on-site inspections and investigations at sites other than at the private residences of natural persons;
                                - generic [ref=e1859]:
                                  - generic [ref=e1860]: (e)
                                  - paragraph [ref=e1862]: subject to the second subparagraph, to enter the premises of natural and legal persons in order to seize documents and data in any form where a reasonable suspicion exists that documents or data relating to the subject matter of the inspection or investigation may be relevant to prove a case of insider dealing or market manipulation infringing this Regulation;
                                - generic [ref=e1863]:
                                  - generic [ref=e1864]: (f)
                                  - paragraph [ref=e1866]: to refer matters for criminal investigation;
                                - generic [ref=e1867]:
                                  - generic [ref=e1868]: (g)
                                  - paragraph [ref=e1870]: to require existing recordings of telephone conversations, electronic communications or data traffic records held by investment firms, credit institutions or financial institutions;
                                - generic [ref=e1871]:
                                  - generic [ref=e1872]: (h)
                                  - paragraph [ref=e1874]: to require, insofar as permitted by national law, existing data traffic records held by a telecommunications operator, where there is a reasonable suspicion of an infringement and where such records may be relevant to the investigation of an infringement of point (a) or (b) of Article 14 or Article 15;
                                - generic [ref=e1875]:
                                  - generic [ref=e1876]: (i)
                                  - paragraph [ref=e1878]: to request the freezing or sequestration of assets, or both;
                                - generic [ref=e1879]:
                                  - generic [ref=e1880]: (j)
                                  - paragraph [ref=e1882]: to suspend trading of the financial instrument concerned;
                                - generic [ref=e1883]:
                                  - generic [ref=e1884]: (k)
                                  - paragraph [ref=e1886]: to require the temporary cessation of any practice that the competent authority considers contrary to this Regulation;
                                - generic [ref=e1887]:
                                  - generic [ref=e1888]: (l)
                                  - paragraph [ref=e1890]: to impose a temporary prohibition on the exercise of professional activity; and
                                - generic [ref=e1891]:
                                  - generic [ref=e1892]: (m)
                                  - paragraph [ref=e1894]: to take all necessary measures to ensure that the public is correctly informed, inter alia, by correcting false or misleading disclosed information, including by requiring an issuer or other person who has published or disseminated false or misleading information to publish a corrective statement.
                            - paragraph [ref=e1895]: Where in accordance with national law prior authorisation to enter premises of natural and legal persons referred to in point (e) of the first subparagraph is needed from the judicial authority of the Member State concerned, the power as referred to in that point shall be used only after having obtained such prior authorisation.
                            - generic [ref=e1896]: 3. Member States shall ensure that appropriate measures are in place so that competent authorities have all the supervisory and investigatory powers that are necessary to fulfil their duties.
                            - paragraph [ref=e1897]: This Regulation is without prejudice to laws, regulations and administrative provisions adopted in relation to takeover bids, merger transactions and other transactions affecting the ownership or control of companies regulated by the supervisory authorities appointed by Member States pursuant to Article 4 of Directive 2004/25/EC that impose requirements in addition to the requirements of this Regulation.
                            - generic [ref=e1898]: 4. A person making information available to the competent authority in accordance with this Regulation shall not be considered to be infringing any restriction on disclosure of information imposed by contract or by any legislative, regulatory or administrative provision, and shall not involve the person notifying in liability of any kind related to such notification.
                          - generic [ref=e1899]:
                            - paragraph [ref=e1900]: Article 24
                            - paragraph [ref=e1902]: Cooperation with ESMA
                            - generic [ref=e1903]: 1. The competent authorities shall cooperate with ESMA for the purposes of this Regulation, in accordance with Regulation (EU) No 1095/2010.
                            - generic [ref=e1904]: 2. The competent authorities shall, without delay, provide ESMA with all information necessary to carry out its duties, in accordance with Article 35 of Regulation (EU) No 1095/2010.
                            - generic [ref=e1905]: 3. In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to determine the procedures and forms for exchange of information as referred to in paragraph 2.
                            - paragraph [ref=e1906]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2016.
                            - paragraph [ref=e1907]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                          - generic [ref=e1908]:
                            - paragraph [ref=e1909]: Article 25
                            - paragraph [ref=e1911]: Obligation to cooperate
                            - generic [ref=e1912]: 1. Competent authorities shall cooperate with each other and with ESMA where necessary for the purposes of this Regulation, unless one of the exceptions in paragraph 2 applies. Competent authorities shall render assistance to competent authorities of other Member States and ESMA. In particular, they shall exchange information without undue delay and cooperate in investigation, supervision and enforcement activities.
                            - paragraph [ref=e1913]: The obligation to cooperate and assist laid down in the first subparagraph shall also apply as regards the Commission in relation to the exchange of information relating to commodities which are agricultural products listed in Annex I to the TFEU.
                            - paragraph [ref=e1914]: The competent authorities and ESMA shall cooperate in accordance with Regulation (EU) No 1095/2010, in particular Article 35 thereof.
                            - paragraph [ref=e1915]: Where Member States have chosen, in accordance with Article 30(1), second subparagraph, to lay down criminal sanctions for infringements of the provisions of this Regulation referred to in that Article, they shall ensure that appropriate measures are in place so that competent authorities have all the necessary powers to liaise with judicial authorities within their jurisdiction to receive specific information related to criminal investigations or proceedings commenced for possible infringements of this Regulation and provide the same to other competent authorities and ESMA to fulfil their obligation to cooperate with each other and ESMA for the purposes of this Regulation.
                            - generic [ref=e1916]:
                              - text: "2."
                              - generic [ref=e1917]:
                                - paragraph [ref=e1918]: "A competent authority may refuse to act on a request for information or a request to cooperate with an investigation only in the following exceptional circumstances, namely where:"
                                - generic [ref=e1919]:
                                  - generic [ref=e1920]: (a)
                                  - paragraph [ref=e1922]: communication of relevant information could adversely affect the security of the Member State addressed, in particular the fight against terrorism and other serious crimes;
                                - generic [ref=e1923]:
                                  - generic [ref=e1924]: (b)
                                  - paragraph [ref=e1926]: complying with the request is likely adversely to affect its own investigation, enforcement activities or, where applicable, a criminal investigation;
                                - generic [ref=e1927]:
                                  - generic [ref=e1928]: (c)
                                  - paragraph [ref=e1930]: judicial proceedings have already been initiated in respect of the same actions and against the same persons before the authorities of the Member State addressed; or
                                - generic [ref=e1931]:
                                  - generic [ref=e1932]: (d)
                                  - paragraph [ref=e1934]: a final judgment has already been delivered in relation to such persons for the same actions in the Member State addressed.
                            - generic [ref=e1935]:
                              - text: "3."
                              - generic [ref=e1936]:
                                - text: Competent authorities and ESMA shall cooperate with the Agency for the Cooperation of Energy Regulators (ACER), established under Regulation (EC) No 713/2009 of the European Parliament and of the Council (
                                - link "12" [ref=e1937] [cursor=pointer]:
                                  - /url: "#E0012"
                                - text: ), and the national regulatory authorities of the Member States to ensure that a coordinated approach is taken to the enforcement of the relevant rules where transactions, orders to trade or other actions or behaviours relate to one or more financial instruments to which this Regulation applies and also to one or more wholesale energy products to which Article 3, 4 and 5 of Regulation (EU) No 1227/2011 apply. Competent authorities shall consider the specific characteristics of the definitions of Article 2 of Regulation (EU) No 1227/2011 and the provisions of Article 3, 4 and 5 of Regulation (EU) No 1227/2011 when they apply Articles 7, 8 and 12 of this Regulation to financial instruments related to wholesale energy products.
                            - generic [ref=e1938]: 4. Competent authorities shall, on request, immediately supply any information required for the purpose referred to in paragraph 1.
                            - generic [ref=e1939]: 5. Where a competent authority is convinced that acts contrary to the provisions of this Regulation are being, or have been, carried out on the territory of another Member State or that acts are affecting financial instruments traded on a trading venue situated in another Member State, it shall give notice of that fact in as specific a manner as possible to the competent authority of the other Member State and to ESMA and, in relation to wholesale energy products, to ACER. The competent authorities of the various Member States involved shall consult each other and ESMA and, in relation to wholesale energy products, ACER, on the appropriate action to take and inform each other of significant interim developments. They shall coordinate their action, in order to avoid possible duplication and overlap when applying administrative sanctions and other administrative measures to those cross-border cases in accordance with Articles 30 and 31, and shall assist each other in the enforcement of their decisions.
                            - generic [ref=e1940]: 6. The competent authority of one Member State may request assistance from the competent authority of another Member State with regard to on-site inspections or investigations.
                            - paragraph [ref=e1941]: A requesting competent authority may inform ESMA of any request referred to in the first subparagraph. In the case of an investigation or an inspection with cross-border effect, ESMA shall, if requested to do so by one of the competent authorities, coordinate the investigation or inspection.
                            - paragraph [ref=e1942]: "Where a competent authority receives a request from a competent authority of another Member State to carry out an on-site inspection or an investigation, it may do any of the following:"
                            - generic [ref=e1943]:
                              - generic [ref=e1944]: (a)
                              - paragraph [ref=e1946]: carry out the on-site inspection or investigation itself;
                            - generic [ref=e1947]:
                              - generic [ref=e1948]: (b)
                              - paragraph [ref=e1950]: allow the competent authority which submitted the request to participate in an on-site inspection or investigation;
                            - generic [ref=e1951]:
                              - generic [ref=e1952]: (c)
                              - paragraph [ref=e1954]: allow the competent authority which submitted the request to carry out the on-site inspection or investigation itself;
                            - generic [ref=e1955]:
                              - generic [ref=e1956]: (d)
                              - paragraph [ref=e1958]: appoint auditors or experts to carry out the on-site inspection or investigation;
                            - generic [ref=e1959]:
                              - generic [ref=e1960]: (e)
                              - paragraph [ref=e1962]: share specific tasks related to supervisory activities with the other competent authorities.
                            - paragraph [ref=e1963]: Competent authorities may also cooperate with competent authorities of other Member States with respect to facilitating the recovery of pecuniary sanctions.
                            - generic [ref=e1964]: 7. Without prejudice to Article 258 TFEU, a competent authority whose request for information or assistance in accordance with paragraphs 1, 3, 4 and 5 is not acted upon within a reasonable time or whose request for information or assistance is rejected may refer that rejection or absence of action within a reasonable timeframe to ESMA.
                            - paragraph [ref=e1965]: In those situations, ESMA may act in accordance with Article 19 of Regulation (EU) No 1095/2010, without prejudice to the possibility of ESMA acting in accordance with Article 17 of Regulation (EU) No 1095/2010.
                            - generic [ref=e1966]: 8. Competent authorities shall cooperate and exchange information with relevant national and third-country regulatory authorities responsible for the related spot markets where they have reasonable grounds to suspect that acts, which constitute insider dealing, unlawful disclosure of information or market manipulation infringing this Regulation, are being, or have been, carried out. Such cooperation shall ensure a consolidated overview of the financial and spot markets, and shall detect and impose sanctions for cross-market and cross-border market abuses.
                            - paragraph [ref=e1967]: "In relation to emission allowances, the cooperation and exchange of information provided for under the first subparagraph shall also be ensured with:"
