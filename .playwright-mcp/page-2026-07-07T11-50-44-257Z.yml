                                  - paragraph [ref=e926]: adequate limits with regard to price and volume are complied with; and
                                - generic [ref=e927]:
                                  - generic [ref=e928]: (d)
                                  - paragraph [ref=e930]: it is carried out in accordance with the objectives referred to in paragraph 2 and the conditions set out in this Article and in the regulatory technical standards referred to in paragraph 6.
                            - generic [ref=e931]:
                              - text: "2."
                              - generic [ref=e932]:
                                - paragraph [ref=e933]: "In order to benefit from the exemption provided for in paragraph 1, a buy-back programme shall have as its sole purpose:"
