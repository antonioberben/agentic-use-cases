                          - generic [ref=e863]:
                            - paragraph [ref=e864]: Article 4
                            - paragraph [ref=e866]: Notifications and list of financial instruments
                            - generic [ref=e867]: 1. Market operators of regulated markets and investment firms and market operators operating an MTF or an OTF shall, without delay, notify the competent authority of the trading venue of any financial instrument for which a request for admission to trading on their trading venue is made, which is admitted to trading, or which is traded for the first time.
                            - paragraph [ref=e868]: They shall also notify the competent authority of the trading venue when a financial instrument ceases to be traded or to be admitted to trading, unless the date on which the financial instrument ceases to be traded or to be admitted to trading is known and was referred to in the notification made in accordance with the first subparagraph.
                            - paragraph [ref=e869]: Notifications referred to in this paragraph shall include, as appropriate, the names and identifiers of the financial instruments concerned, and the date and time of the request for admission to trading, admission to trading, and the date and time of the first trade.
                            - paragraph [ref=e870]: Market operators and investment firms shall also transmit to the competent authority of the trading venue the information set out in the third subparagraph with regard to financial instruments that were the subject of a request for admission to trading or that were admitted to trading before 2 July 2014, and that are still admitted to trading or traded on that date.
                            - generic [ref=e871]: 2. Competent authorities of the trading venue shall transmit notifications that they receive pursuant to paragraph 1 to ESMA without delay. ESMA shall publish those notifications on in its website in the form of a list immediately on receipt. ESMA shall update that list immediately on receipt of a notification by a competent authority of the trading venue. The list shall not limit the scope of this Regulation.
                            - generic [ref=e872]:
