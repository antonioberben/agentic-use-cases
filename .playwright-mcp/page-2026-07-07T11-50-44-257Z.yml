                                - generic [ref=e1749]: 
                            - paragraph [ref=e1750]: For the purposes of point (b), transactions executed in shares or debt instruments of an issuer or derivatives or other financial instruments linked thereto by managers of a collective investment undertaking in which the person discharging managerial responsibilities or a person closely associated with them has invested do not need to be notified where the manager of the collective investment undertaking operates with full discretion, which excludes the manager receiving any instructions or suggestions on portfolio composition directly or indirectly from investors in that collective investment undertaking.
                            - paragraph [ref=e1751]:
