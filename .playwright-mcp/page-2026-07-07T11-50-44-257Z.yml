                          - generic [ref=e1980]:
                            - paragraph [ref=e1981]: Article 26
                            - paragraph [ref=e1983]: Cooperation with third countries
                            - generic [ref=e1984]: 1. The competent authorities of Member States shall, where necessary, conclude cooperation arrangements with supervisory authorities of third countries concerning the exchange of information with supervisory authorities in third countries and the enforcement of obligations arising under this Regulation in third countries. Those cooperation arrangements shall ensure at least an efficient exchange of information that allows the competent authorities to carry out their duties under this Regulation.
                            - paragraph [ref=e1985]: A competent authority shall inform ESMA and the other competent authorities where it proposes to enter into such an arrangement.
                            - generic [ref=e1986]: 2. ESMA shall, where possible, facilitate and coordinate the development of cooperation arrangements between the competent authorities and the relevant supervisory authorities of third countries.
                            - paragraph [ref=e1987]: In order to ensure consistent harmonisation of this Article, ESMA shall develop draft regulatory technical standards containing a template document for cooperation arrangements that are to be used by competent authorities of Member States where possible.
                            - paragraph [ref=e1988]: ESMA shall submit those draft regulatory technical standards to the Commission by 3 July 2015.
                            - paragraph [ref=e1989]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the second subparagraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
                            - paragraph [ref=e1990]: ESMA shall also, where possible, facilitate and coordinate the exchange between competent authorities of information obtained from supervisory authorities of third countries that may be relevant to the taking of measures under Articles 30 and 31.
                            - generic [ref=e1991]: 3. The competent authorities shall conclude cooperation arrangements on exchange of information with the supervisory authorities of third countries only where the information disclosed is subject to guarantees of professional secrecy which are at least equivalent to those set out in Article 27. Such exchange of information must be intended for the performance of the tasks of those competent authorities.
                          - generic [ref=e1992]:
                            - paragraph [ref=e1993]: Article 27
                            - paragraph [ref=e1995]: Professional secrecy
                            - generic [ref=e1996]: 1. Any confidential information received, exchanged or transmitted pursuant to this Regulation shall be subject to the conditions of professional secrecy laid down in paragraphs 2 and 3.
                            - generic [ref=e1997]: 2. All the information exchanged between the competent authorities under this Regulation that concerns business or operational conditions and other economic or personal affairs shall be considered to be confidential and shall be subject to the requirements of professional secrecy, except where the competent authority states at the time of communication that such information may be disclosed or such disclosure is necessary for legal proceedings.
                            - generic [ref=e1998]: 3. The obligation of professional secrecy applies to all persons who work or who have worked for the competent authority or for any authority or market undertaking to whom the competent authority has delegated its powers, including auditors and experts contracted by the competent authority. Information covered by professional secrecy may not be disclosed to any other person or authority except by virtue of provisions laid down by Union or national law.
                          - generic [ref=e1999]:
                            - paragraph [ref=e2000]: Article 28
                            - paragraph [ref=e2002]: Data protection
                            - paragraph [ref=e2003]: With regard to the processing of personal data within the framework of this Regulation, competent authorities shall carry out their tasks for the purposes of this Regulation in accordance with the national laws, regulations or administrative provisions transposing Directive 95/46/EC. With regard to the processing of personal data by ESMA within the framework of this Regulation, ESMA shall comply with the provisions of Regulation (EC) No 45/2001.
                            - paragraph [ref=e2004]: Personal data shall be retained for a maximum period of five years.
                          - generic [ref=e2005]:
                            - paragraph [ref=e2006]: Article 29
                            - paragraph [ref=e2008]: Disclosure of personal data to third countries
                            - generic [ref=e2009]: 1. The competent authority of a Member State may transfer personal data to a third country provided the requirements of Directive 95/46/EC are fulfilled and only on a case-by-case basis. The competent authority shall ensure that the transfer is necessary for the purpose of this Regulation and that the third country does not transfer the data to another third country unless it is given express written authorisation and complies with the conditions specified by the competent authority of the Member State.
                            - generic [ref=e2010]: 2. The competent authority of a Member State shall only disclose personal data received from a competent authority of another Member State to a supervisory authority of a third country where the competent authority of the Member State concerned has obtained express agreement from the competent authority which transmitted the data and, where applicable, the data is disclosed solely for the purposes for which that competent authority gave its agreement.
                            - generic [ref=e2011]: 3. Where a cooperation agreement provides for the exchange of personal data, it shall comply with the national laws, regulations or administrative provisions transposing Directive 95/46/EC.
