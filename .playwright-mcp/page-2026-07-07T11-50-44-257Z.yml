                                - generic [ref=e1665]: 
                            - generic [ref=e1666]: 3. The issuer or emission allowance market participant shall make public the information contained in a notification referred to in paragraph 1 within two business days of receipt of such a notification.
                            - paragraph [ref=e1667]:
                              - link "▼B" [ref=e1668] [cursor=pointer]:
