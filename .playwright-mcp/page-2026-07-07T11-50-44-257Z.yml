                            - paragraph [ref=e1671]: The issuer or emission allowance market participant shall use such media as may reasonably be relied upon for the effective dissemination of information to the public throughout the Union, and, where applicable, it shall use the officially appointed mechanism referred to in Article 21 of Directive 2004/109/EC.
                            - paragraph [ref=e1672]: Alternatively, national law may provide that a competent authority may itself make public the information.
                            - generic [ref=e1673]:
