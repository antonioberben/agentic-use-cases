                                    - row "(c) is based on the data subject's explicit consent." [ref=f3e4057]:
                                      - cell "(c)" [ref=f3e4058]:
                                        - paragraph [ref=f3e4059]: (c)
                                      - cell "is based on the data subject's explicit consent." [ref=f3e4060]:
                                        - paragraph [ref=f3e4061]: is based on the data subject's explicit consent.
                              - paragraph [ref=f3e4063]: 3. In the cases referred to in points (a) and (c) of paragraph 2, the data controller shall implement suitable measures to safeguard the data subject's rights and freedoms and legitimate interests, at least the right to obtain human intervention on the part of the controller, to express his or her point of view and to contest the decision.
                              - paragraph [ref=f3e4065]: 4. Decisions referred to in paragraph 2 shall not be based on special categories of personal data referred to in Article 9(1), unless point (a) or (g) of Article 9(2) applies and suitable measures to safeguard the data subject's rights and freedoms and legitimate interests are in place.
