                            - generic [ref=f3e3966]:
                              - paragraph [ref=f3e3967]: Article 19
                              - paragraph [ref=f3e3969]: Notification obligation regarding rectification or erasure of personal data or restriction of processing
                              - paragraph [ref=f3e3970]: The controller shall communicate any rectification or erasure of personal data or restriction of processing carried out in accordance with Article 16, Article 17(1) and Article 18 to each recipient to whom the personal data have been disclosed, unless this proves impossible or involves disproportionate effort. The controller shall inform the data subject about those recipients if the data subject requests it.
