                        - generic [ref=f3e4259]:
                          - paragraph [ref=f3e4260]: CHAPTER IV
                          - paragraph [ref=f3e4262]:
                            - generic [ref=f3e4263]: Controller and processor
                          - generic [ref=f3e4264]:
                            - paragraph [ref=f3e4265]: Section 1
                            - paragraph [ref=f3e4267]:
                              - generic [ref=f3e4268]: General obligations
                            - generic [ref=f3e4269]:
                              - paragraph [ref=f3e4270]: Article 24
                              - paragraph [ref=f3e4272]: Responsibility of the controller
                              - paragraph [ref=f3e4274]: 1. Taking into account the nature, scope, context and purposes of processing as well as the risks of varying likelihood and severity for the rights and freedoms of natural persons, the controller shall implement appropriate technical and organisational measures to ensure and to be able to demonstrate that processing is performed in accordance with this Regulation. Those measures shall be reviewed and updated where necessary.
                              - paragraph [ref=f3e4276]: 2. Where proportionate in relation to processing activities, the measures referred to in paragraph 1 shall include the implementation of appropriate data protection policies by the controller.
                              - paragraph [ref=f3e4278]: 3. Adherence to approved codes of conduct as referred to in Article 40 or approved certification mechanisms as referred to in Article 42 may be used as an element by which to demonstrate compliance with the obligations of the controller.
                            - generic [ref=f3e4279]:
                              - paragraph [ref=f3e4280]: Article 25
                              - paragraph [ref=f3e4282]: Data protection by design and by default
                              - paragraph [ref=f3e4284]: 1. Taking into account the state of the art, the cost of implementation and the nature, scope, context and purposes of processing as well as the risks of varying likelihood and severity for rights and freedoms of natural persons posed by the processing, the controller shall, both at the time of the determination of the means for processing and at the time of the processing itself, implement appropriate technical and organisational measures, such as pseudonymisation, which are designed to implement data-protection principles, such as data minimisation, in an effective manner and to integrate the necessary safeguards into the processing in order to meet the requirements of this Regulation and protect the rights of data subjects.
                              - paragraph [ref=f3e4286]: 2. The controller shall implement appropriate technical and organisational measures for ensuring that, by default, only personal data which are necessary for each specific purpose of the processing are processed. That obligation applies to the amount of personal data collected, the extent of their processing, the period of their storage and their accessibility. In particular, such measures shall ensure that by default personal data are not made accessible without the individual's intervention to an indefinite number of natural persons.
                              - paragraph [ref=f3e4288]: 3. An approved certification mechanism pursuant to Article 42 may be used as an element to demonstrate compliance with the requirements set out in paragraphs 1 and 2 of this Article.
                            - generic [ref=f3e4289]:
                              - paragraph [ref=f3e4290]: Article 26
                              - paragraph [ref=f3e4292]: Joint controllers
                              - paragraph [ref=f3e4294]: 1. Where two or more controllers jointly determine the purposes and means of processing, they shall be joint controllers. They shall in a transparent manner determine their respective responsibilities for compliance with the obligations under this Regulation, in particular as regards the exercising of the rights of the data subject and their respective duties to provide the information referred to in Articles 13 and 14, by means of an arrangement between them unless, and in so far as, the respective responsibilities of the controllers are determined by Union or Member State law to which the controllers are subject. The arrangement may designate a contact point for data subjects.
                              - paragraph [ref=f3e4296]: 2. The arrangement referred to in paragraph 1 shall duly reflect the respective roles and relationships of the joint controllers vis-à-vis the data subjects. The essence of the arrangement shall be made available to the data subject.
                              - paragraph [ref=f3e4298]: 3. Irrespective of the terms of the arrangement referred to in paragraph 1, the data subject may exercise his or her rights under this Regulation in respect of and against each of the controllers.
                            - generic [ref=f3e4299]:
                              - paragraph [ref=f3e4300]: Article 27
                              - paragraph [ref=f3e4302]: Representatives of controllers or processors not established in the Union
                              - paragraph [ref=f3e4304]: 1. Where Article 3(2) applies, the controller or the processor shall designate in writing a representative in the Union.
                              - generic [ref=f3e4305]:
                                - paragraph [ref=f3e4306]: "2. The obligation laid down in paragraph 1 of this Article shall not apply to:"
                                - table [ref=f3e4307]:
