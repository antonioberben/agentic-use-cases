                          - cell "L 119/1" [ref=f3e543]:
                            - paragraph [ref=f3e544]: L 119/1
                    - separator [ref=f3e545]
                    - generic [ref=f3e546]:
                      - generic [ref=f3e547]:
                        - paragraph [ref=f3e548]: REGULATION (EU) 2016/679 OF THE EUROPEAN PARLIAMENT AND OF THE COUNCIL
                        - paragraph [ref=f3e549]: of 27 April 2016
                        - paragraph [ref=f3e550]: on the protection of natural persons with regard to the processing of personal data and on the free movement of such data, and repealing Directive 95/46/EC (General Data Protection Regulation)
                        - paragraph [ref=f3e551]: (Text with EEA relevance)
                      - generic [ref=f3e552]:
                        - paragraph [ref=f3e553]: THE EUROPEAN PARLIAMENT AND THE COUNCIL OF THE EUROPEAN UNION,
                        - paragraph [ref=f3e555]: Having regard to the Treaty on the Functioning of the European Union, and in particular Article 16 thereof,
                        - paragraph [ref=f3e557]: Having regard to the proposal from the European Commission,
                        - paragraph [ref=f3e559]: After transmission of the draft legislative act to the national parliaments,
                        - paragraph [ref=f3e561]:
                          - text: Having regard to the opinion of the European Economic and Social Committee
                          - link "(1)" [ref=f3e562] [cursor=pointer]:
                            - /url: "#ntr1-L_2016119EN.01000101-E0001"
                          - text: ","
                        - paragraph [ref=f3e564]:
                          - text: Having regard to the opinion of the Committee of the Regions
                          - link "(2)" [ref=f3e565] [cursor=pointer]:
                            - /url: "#ntr2-L_2016119EN.01000101-E0002"
                          - text: ","
                        - paragraph [ref=f3e567]:
                          - text: Acting in accordance with the ordinary legislative procedure
                          - link "(3)" [ref=f3e568] [cursor=pointer]:
                            - /url: "#ntr3-L_2016119EN.01000101-E0003"
                          - text: ","
                        - paragraph [ref=f3e569]: "Whereas:"
                        - table [ref=f3e571]:
                          - rowgroup [ref=f3e575]:
                            - row "(1) The protection of natural persons in relation to the processing of personal data is a fundamental right. Article 8(1) of the Charter of Fundamental Rights of the European Union (the ‘Charter’) and Article 16(1) of the Treaty on the Functioning of the European Union (TFEU) provide that everyone has the right to the protection of personal data concerning him or her." [ref=f3e576]:
                              - cell "(1)" [ref=f3e577]:
                                - paragraph [ref=f3e578]: (1)
                              - cell "The protection of natural persons in relation to the processing of personal data is a fundamental right. Article 8(1) of the Charter of Fundamental Rights of the European Union (the ‘Charter’) and Article 16(1) of the Treaty on the Functioning of the European Union (TFEU) provide that everyone has the right to the protection of personal data concerning him or her." [ref=f3e579]:
                                - paragraph [ref=f3e580]: The protection of natural persons in relation to the processing of personal data is a fundamental right. Article 8(1) of the Charter of Fundamental Rights of the European Union (the ‘Charter’) and Article 16(1) of the Treaty on the Functioning of the European Union (TFEU) provide that everyone has the right to the protection of personal data concerning him or her.
                        - table [ref=f3e582]:
                          - rowgroup [ref=f3e586]:
                            - row "(2) The principles of, and rules on the protection of natural persons with regard to the processing of their personal data should, whatever their nationality or residence, respect their fundamental rights and freedoms, in particular their right to the protection of personal data. This Regulation is intended to contribute to the accomplishment of an area of freedom, security and justice and of an economic union, to economic and social progress, to the strengthening and the convergence of the economies within the internal market, and to the well-being of natural persons." [ref=f3e587]:
                              - cell "(2)" [ref=f3e588]:
                                - paragraph [ref=f3e589]: (2)
                              - cell "The principles of, and rules on the protection of natural persons with regard to the processing of their personal data should, whatever their nationality or residence, respect their fundamental rights and freedoms, in particular their right to the protection of personal data. This Regulation is intended to contribute to the accomplishment of an area of freedom, security and justice and of an economic union, to economic and social progress, to the strengthening and the convergence of the economies within the internal market, and to the well-being of natural persons." [ref=f3e590]:
                                - paragraph [ref=f3e591]: The principles of, and rules on the protection of natural persons with regard to the processing of their personal data should, whatever their nationality or residence, respect their fundamental rights and freedoms, in particular their right to the protection of personal data. This Regulation is intended to contribute to the accomplishment of an area of freedom, security and justice and of an economic union, to economic and social progress, to the strengthening and the convergence of the economies within the internal market, and to the well-being of natural persons.
                        - table [ref=f3e593]:
                          - rowgroup [ref=f3e597]:
                            - row "(3) Directive 95/46/EC of the European Parliament and of the Council (4) seeks to harmonise the protection of fundamental rights and freedoms of natural persons in respect of processing activities and to ensure the free flow of personal data between Member States." [ref=f3e598]:
                              - cell "(3)" [ref=f3e599]:
                                - paragraph [ref=f3e600]: (3)
                              - cell "Directive 95/46/EC of the European Parliament and of the Council (4) seeks to harmonise the protection of fundamental rights and freedoms of natural persons in respect of processing activities and to ensure the free flow of personal data between Member States." [ref=f3e601]:
                                - paragraph [ref=f3e602]:
                                  - text: Directive 95/46/EC of the European Parliament and of the Council
                                  - link "(4)" [ref=f3e603] [cursor=pointer]:
                                    - /url: "#ntr4-L_2016119EN.01000101-E0004"
                                  - text: seeks to harmonise the protection of fundamental rights and freedoms of natural persons in respect of processing activities and to ensure the free flow of personal data between Member States.
                        - table [ref=f3e605]:
                          - rowgroup [ref=f3e609]:
                            - row "(4) The processing of personal data should be designed to serve mankind. The right to the protection of personal data is not an absolute right; it must be considered in relation to its function in society and be balanced against other fundamental rights, in accordance with the principle of proportionality. This Regulation respects all fundamental rights and observes the freedoms and principles recognised in the Charter as enshrined in the Treaties, in particular the respect for private and family life, home and communications, the protection of personal data, freedom of thought, conscience and religion, freedom of expression and information, freedom to conduct a business, the right to an effective remedy and to a fair trial, and cultural, religious and linguistic diversity." [ref=f3e610]:
                              - cell "(4)" [ref=f3e611]:
                                - paragraph [ref=f3e612]: (4)
                              - cell "The processing of personal data should be designed to serve mankind. The right to the protection of personal data is not an absolute right; it must be considered in relation to its function in society and be balanced against other fundamental rights, in accordance with the principle of proportionality. This Regulation respects all fundamental rights and observes the freedoms and principles recognised in the Charter as enshrined in the Treaties, in particular the respect for private and family life, home and communications, the protection of personal data, freedom of thought, conscience and religion, freedom of expression and information, freedom to conduct a business, the right to an effective remedy and to a fair trial, and cultural, religious and linguistic diversity." [ref=f3e613]:
                                - paragraph [ref=f3e614]: The processing of personal data should be designed to serve mankind. The right to the protection of personal data is not an absolute right; it must be considered in relation to its function in society and be balanced against other fundamental rights, in accordance with the principle of proportionality. This Regulation respects all fundamental rights and observes the freedoms and principles recognised in the Charter as enshrined in the Treaties, in particular the respect for private and family life, home and communications, the protection of personal data, freedom of thought, conscience and religion, freedom of expression and information, freedom to conduct a business, the right to an effective remedy and to a fair trial, and cultural, religious and linguistic diversity.
                        - table [ref=f3e616]:
                          - rowgroup [ref=f3e620]:
                            - row "(5) The economic and social integration resulting from the functioning of the internal market has led to a substantial increase in cross-border flows of personal data. The exchange of personal data between public and private actors, including natural persons, associations and undertakings across the Union has increased. National authorities in the Member States are being called upon by Union law to cooperate and exchange personal data so as to be able to perform their duties or carry out tasks on behalf of an authority in another Member State." [ref=f3e621]:
                              - cell "(5)" [ref=f3e622]:
                                - paragraph [ref=f3e623]: (5)
                              - cell "The economic and social integration resulting from the functioning of the internal market has led to a substantial increase in cross-border flows of personal data. The exchange of personal data between public and private actors, including natural persons, associations and undertakings across the Union has increased. National authorities in the Member States are being called upon by Union law to cooperate and exchange personal data so as to be able to perform their duties or carry out tasks on behalf of an authority in another Member State." [ref=f3e624]:
                                - paragraph [ref=f3e625]: The economic and social integration resulting from the functioning of the internal market has led to a substantial increase in cross-border flows of personal data. The exchange of personal data between public and private actors, including natural persons, associations and undertakings across the Union has increased. National authorities in the Member States are being called upon by Union law to cooperate and exchange personal data so as to be able to perform their duties or carry out tasks on behalf of an authority in another Member State.
                        - table [ref=f3e627]:
                          - rowgroup [ref=f3e631]:
                            - row "(6) Rapid technological developments and globalisation have brought new challenges for the protection of personal data. The scale of the collection and sharing of personal data has increased significantly. Technology allows both private companies and public authorities to make use of personal data on an unprecedented scale in order to pursue their activities. Natural persons increasingly make personal information available publicly and globally. Technology has transformed both the economy and social life, and should further facilitate the free flow of personal data within the Union and the transfer to third countries and international organisations, while ensuring a high level of the protection of personal data." [ref=f3e632]:
                              - cell "(6)" [ref=f3e633]:
                                - paragraph [ref=f3e634]: (6)
                              - cell "Rapid technological developments and globalisation have brought new challenges for the protection of personal data. The scale of the collection and sharing of personal data has increased significantly. Technology allows both private companies and public authorities to make use of personal data on an unprecedented scale in order to pursue their activities. Natural persons increasingly make personal information available publicly and globally. Technology has transformed both the economy and social life, and should further facilitate the free flow of personal data within the Union and the transfer to third countries and international organisations, while ensuring a high level of the protection of personal data." [ref=f3e635]:
                                - paragraph [ref=f3e636]: Rapid technological developments and globalisation have brought new challenges for the protection of personal data. The scale of the collection and sharing of personal data has increased significantly. Technology allows both private companies and public authorities to make use of personal data on an unprecedented scale in order to pursue their activities. Natural persons increasingly make personal information available publicly and globally. Technology has transformed both the economy and social life, and should further facilitate the free flow of personal data within the Union and the transfer to third countries and international organisations, while ensuring a high level of the protection of personal data.
                        - table [ref=f3e638]:
                          - rowgroup [ref=f3e642]:
                            - row "(7) Those developments require a strong and more coherent data protection framework in the Union, backed by strong enforcement, given the importance of creating the trust that will allow the digital economy to develop across the internal market. Natural persons should have control of their own personal data. Legal and practical certainty for natural persons, economic operators and public authorities should be enhanced." [ref=f3e643]:
                              - cell "(7)" [ref=f3e644]:
                                - paragraph [ref=f3e645]: (7)
                              - cell "Those developments require a strong and more coherent data protection framework in the Union, backed by strong enforcement, given the importance of creating the trust that will allow the digital economy to develop across the internal market. Natural persons should have control of their own personal data. Legal and practical certainty for natural persons, economic operators and public authorities should be enhanced." [ref=f3e646]:
                                - paragraph [ref=f3e647]: Those developments require a strong and more coherent data protection framework in the Union, backed by strong enforcement, given the importance of creating the trust that will allow the digital economy to develop across the internal market. Natural persons should have control of their own personal data. Legal and practical certainty for natural persons, economic operators and public authorities should be enhanced.
                        - table [ref=f3e649]:
                          - rowgroup [ref=f3e653]:
                            - row "(8) Where this Regulation provides for specifications or restrictions of its rules by Member State law, Member States may, as far as necessary for coherence and for making the national provisions comprehensible to the persons to whom they apply, incorporate elements of this Regulation into their national law." [ref=f3e654]:
                              - cell "(8)" [ref=f3e655]:
                                - paragraph [ref=f3e656]: (8)
                              - cell "Where this Regulation provides for specifications or restrictions of its rules by Member State law, Member States may, as far as necessary for coherence and for making the national provisions comprehensible to the persons to whom they apply, incorporate elements of this Regulation into their national law." [ref=f3e657]:
                                - paragraph [ref=f3e658]: Where this Regulation provides for specifications or restrictions of its rules by Member State law, Member States may, as far as necessary for coherence and for making the national provisions comprehensible to the persons to whom they apply, incorporate elements of this Regulation into their national law.
                        - table [ref=f3e660]:
                          - rowgroup [ref=f3e664]:
                            - row [ref=f3e665]:
                              - cell "(9)" [ref=f3e666]:
                                - paragraph [ref=f3e667]: (9)
                              - cell [ref=f3e668]:
                                - paragraph [ref=f3e669]: The objectives and principles of Directive 95/46/EC remain sound, but it has not prevented fragmentation in the implementation of data protection across the Union, legal uncertainty or a widespread public perception that there are significant risks to the protection of natural persons, in particular with regard to online activity. Differences in the level of protection of the rights and freedoms of natural persons, in particular the right to the protection of personal data, with regard to the processing of personal data in the Member States may prevent the free flow of personal data throughout the Union. Those differences may therefore constitute an obstacle to the pursuit of economic activities at the level of the Union, distort competition and impede authorities in the discharge of their responsibilities under Union law. Such a difference in levels of protection is due to the existence of differences in the implementation and application of Directive 95/46/EC.
                        - table [ref=f3e671]:
                          - rowgroup [ref=f3e675]:
                            - row [ref=f3e676]:
                              - cell "(10)" [ref=f3e677]:
                                - paragraph [ref=f3e678]: (10)
                              - cell [ref=f3e679]:
                                - paragraph [ref=f3e680]: In order to ensure a consistent and high level of protection of natural persons and to remove the obstacles to flows of personal data within the Union, the level of protection of the rights and freedoms of natural persons with regard to the processing of such data should be equivalent in all Member States. Consistent and homogenous application of the rules for the protection of the fundamental rights and freedoms of natural persons with regard to the processing of personal data should be ensured throughout the Union. Regarding the processing of personal data for compliance with a legal obligation, for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller, Member States should be allowed to maintain or introduce national provisions to further specify the application of the rules of this Regulation. In conjunction with the general and horizontal law on data protection implementing Directive 95/46/EC, Member States have several sector-specific laws in areas that need more specific provisions. This Regulation also provides a margin of manoeuvre for Member States to specify its rules, including for the processing of special categories of personal data (‘sensitive data’). To that extent, this Regulation does not exclude Member State law that sets out the circumstances for specific processing situations, including determining more precisely the conditions under which the processing of personal data is lawful.
                        - table [ref=f3e682]:
                          - rowgroup [ref=f3e686]:
                            - row "(11) Effective protection of personal data throughout the Union requires the strengthening and setting out in detail of the rights of data subjects and the obligations of those who process and determine the processing of personal data, as well as equivalent powers for monitoring and ensuring compliance with the rules for the protection of personal data and equivalent sanctions for infringements in the Member States." [ref=f3e687]:
                              - cell "(11)" [ref=f3e688]:
                                - paragraph [ref=f3e689]: (11)
                              - cell "Effective protection of personal data throughout the Union requires the strengthening and setting out in detail of the rights of data subjects and the obligations of those who process and determine the processing of personal data, as well as equivalent powers for monitoring and ensuring compliance with the rules for the protection of personal data and equivalent sanctions for infringements in the Member States." [ref=f3e690]:
                                - paragraph [ref=f3e691]: Effective protection of personal data throughout the Union requires the strengthening and setting out in detail of the rights of data subjects and the obligations of those who process and determine the processing of personal data, as well as equivalent powers for monitoring and ensuring compliance with the rules for the protection of personal data and equivalent sanctions for infringements in the Member States.
                        - table [ref=f3e693]:
                          - rowgroup [ref=f3e697]:
                            - row "(12) Article 16(2) TFEU mandates the European Parliament and the Council to lay down the rules relating to the protection of natural persons with regard to the processing of personal data and the rules relating to the free movement of personal data." [ref=f3e698]:
                              - cell "(12)" [ref=f3e699]:
                                - paragraph [ref=f3e700]: (12)
                              - cell "Article 16(2) TFEU mandates the European Parliament and the Council to lay down the rules relating to the protection of natural persons with regard to the processing of personal data and the rules relating to the free movement of personal data." [ref=f3e701]:
                                - paragraph [ref=f3e702]: Article 16(2) TFEU mandates the European Parliament and the Council to lay down the rules relating to the protection of natural persons with regard to the processing of personal data and the rules relating to the free movement of personal data.
                        - table [ref=f3e704]:
                          - rowgroup [ref=f3e708]:
                            - row [ref=f3e709]:
                              - cell "(13)" [ref=f3e710]:
                                - paragraph [ref=f3e711]: (13)
                              - cell [ref=f3e712]:
                                - paragraph [ref=f3e713]:
                                  - text: In order to ensure a consistent level of protection for natural persons throughout the Union and to prevent divergences hampering the free movement of personal data within the internal market, a Regulation is necessary to provide legal certainty and transparency for economic operators, including micro, small and medium-sized enterprises, and to provide natural persons in all Member States with the same level of legally enforceable rights and obligations and responsibilities for controllers and processors, to ensure consistent monitoring of the processing of personal data, and equivalent sanctions in all Member States as well as effective cooperation between the supervisory authorities of different Member States. The proper functioning of the internal market requires that the free movement of personal data within the Union is not restricted or prohibited for reasons connected with the protection of natural persons with regard to the processing of personal data. To take account of the specific situation of micro, small and medium-sized enterprises, this Regulation includes a derogation for organisations with fewer than 250 employees with regard to record-keeping. In addition, the Union institutions and bodies, and Member States and their supervisory authorities, are encouraged to take account of the specific needs of micro, small and medium-sized enterprises in the application of this Regulation. The notion of micro, small and medium-sized enterprises should draw from Article 2 of the Annex to Commission Recommendation 2003/361/EC
                                  - link "(5)" [ref=f3e714] [cursor=pointer]:
                                    - /url: "#ntr5-L_2016119EN.01000101-E0005"
                                  - text: .
                        - table [ref=f3e716]:
                          - rowgroup [ref=f3e720]:
                            - row "(14) The protection afforded by this Regulation should apply to natural persons, whatever their nationality or place of residence, in relation to the processing of their personal data. This Regulation does not cover the processing of personal data which concerns legal persons and in particular undertakings established as legal persons, including the name and the form of the legal person and the contact details of the legal person." [ref=f3e721]:
                              - cell "(14)" [ref=f3e722]:
                                - paragraph [ref=f3e723]: (14)
                              - cell "The protection afforded by this Regulation should apply to natural persons, whatever their nationality or place of residence, in relation to the processing of their personal data. This Regulation does not cover the processing of personal data which concerns legal persons and in particular undertakings established as legal persons, including the name and the form of the legal person and the contact details of the legal person." [ref=f3e724]:
                                - paragraph [ref=f3e725]: The protection afforded by this Regulation should apply to natural persons, whatever their nationality or place of residence, in relation to the processing of their personal data. This Regulation does not cover the processing of personal data which concerns legal persons and in particular undertakings established as legal persons, including the name and the form of the legal person and the contact details of the legal person.
                        - table [ref=f3e727]:
                          - rowgroup [ref=f3e731]:
                            - row "(15) In order to prevent creating a serious risk of circumvention, the protection of natural persons should be technologically neutral and should not depend on the techniques used. The protection of natural persons should apply to the processing of personal data by automated means, as well as to manual processing, if the personal data are contained or are intended to be contained in a filing system. Files or sets of files, as well as their cover pages, which are not structured according to specific criteria should not fall within the scope of this Regulation." [ref=f3e732]:
