                                    - row "(a) processing which is occasional, does not include, on a large scale, processing of special categories of data as referred to in Article 9(1) or processing of personal data relating to criminal convictions and offences referred to in Article 10, and is unlikely to result in a risk to the rights and freedoms of natural persons, taking into account the nature, context, scope and purposes of the processing; or" [ref=f3e4312]:
                                      - cell "(a)" [ref=f3e4313]:
                                        - paragraph [ref=f3e4314]: (a)
                                      - cell "processing which is occasional, does not include, on a large scale, processing of special categories of data as referred to in Article 9(1) or processing of personal data relating to criminal convictions and offences referred to in Article 10, and is unlikely to result in a risk to the rights and freedoms of natural persons, taking into account the nature, context, scope and purposes of the processing; or" [ref=f3e4315]:
                                        - paragraph [ref=f3e4316]: processing which is occasional, does not include, on a large scale, processing of special categories of data as referred to in Article 9(1) or processing of personal data relating to criminal convictions and offences referred to in Article 10, and is unlikely to result in a risk to the rights and freedoms of natural persons, taking into account the nature, context, scope and purposes of the processing; or
                                - table [ref=f3e4317]:
                                  - rowgroup [ref=f3e4321]:
                                    - row "(b) a public authority or body." [ref=f3e4322]:
                                      - cell "(b)" [ref=f3e4323]:
                                        - paragraph [ref=f3e4324]: (b)
                                      - cell "a public authority or body." [ref=f3e4325]:
                                        - paragraph [ref=f3e4326]: a public authority or body.
                              - paragraph [ref=f3e4328]: 3. The representative shall be established in one of the Member States where the data subjects, whose personal data are processed in relation to the offering of goods or services to them, or whose behaviour is monitored, are.
                              - paragraph [ref=f3e4330]: 4. The representative shall be mandated by the controller or processor to be addressed in addition to or instead of the controller or the processor by, in particular, supervisory authorities and data subjects, on all issues related to processing, for the purposes of ensuring compliance with this Regulation.
                              - paragraph [ref=f3e4332]: 5. The designation of a representative by the controller or processor shall be without prejudice to legal actions which could be initiated against the controller or the processor themselves.
                            - generic [ref=f3e4333]:
                              - paragraph [ref=f3e4334]: Article 28
                              - paragraph [ref=f3e4336]: Processor
                              - paragraph [ref=f3e4338]: 1. Where processing is to be carried out on behalf of a controller, the controller shall use only processors providing sufficient guarantees to implement appropriate technical and organisational measures in such a manner that processing will meet the requirements of this Regulation and ensure the protection of the rights of the data subject.
                              - paragraph [ref=f3e4340]: 2. The processor shall not engage another processor without prior specific or general written authorisation of the controller. In the case of general written authorisation, the processor shall inform the controller of any intended changes concerning the addition or replacement of other processors, thereby giving the controller the opportunity to object to such changes.
                              - generic [ref=f3e4341]:
                                - paragraph [ref=f3e4342]: "3. Processing by a processor shall be governed by a contract or other legal act under Union or Member State law, that is binding on the processor with regard to the controller and that sets out the subject-matter and duration of the processing, the nature and purpose of the processing, the type of personal data and categories of data subjects and the obligations and rights of the controller. That contract or other legal act shall stipulate, in particular, that the processor:"
