                            - paragraph [ref=f3e2594]: Definitions
                            - paragraph [ref=f3e2595]: "For the purposes of this Regulation:"
                            - table [ref=f3e2596]:
                              - rowgroup [ref=f3e2600]:
                                - row "(1) ‘personal data’ means any information relating to an identified or identifiable natural person (‘data subject’); an identifiable natural person is one who can be identified, directly or indirectly, in particular by reference to an identifier such as a name, an identification number, location data, an online identifier or to one or more factors specific to the physical, physiological, genetic, mental, economic, cultural or social identity of that natural person;" [ref=f3e2601]:
