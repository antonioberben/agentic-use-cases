                                        - paragraph [ref=f3e3986]: the processing is based on consent pursuant to point (a) of Article 6(1) or point (a) of Article 9(2) or on a contract pursuant to point (b) of Article 6(1); and
                                - table [ref=f3e3987]:
                                  - rowgroup [ref=f3e3991]:
                                    - row "(b) the processing is carried out by automated means." [ref=f3e3992]:
                                      - cell "(b)" [ref=f3e3993]:
                                        - paragraph [ref=f3e3994]: (b)
                                      - cell "the processing is carried out by automated means." [ref=f3e3995]:
