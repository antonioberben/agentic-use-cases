                        - table [ref=f3e2392]:
                          - rowgroup [ref=f3e2396]:
                            - row "(165) This Regulation respects and does not prejudice the status under existing constitutional law of churches and religious associations or communities in the Member States, as recognised in Article 17 TFEU." [ref=f3e2397]:
