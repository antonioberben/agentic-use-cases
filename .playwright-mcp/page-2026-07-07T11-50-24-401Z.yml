                        - generic [ref=f3e5811]:
                          - paragraph [ref=f3e5812]: CHAPTER VI
                          - paragraph [ref=f3e5814]:
                            - generic [ref=f3e5815]: Independent supervisory authorities
                          - generic [ref=f3e5816]:
                            - paragraph [ref=f3e5817]: Section 1
                            - paragraph [ref=f3e5819]:
                              - generic [ref=f3e5820]: Independent status
                            - generic [ref=f3e5821]:
                              - paragraph [ref=f3e5822]: Article 51
                              - paragraph [ref=f3e5824]: Supervisory authority
                              - paragraph [ref=f3e5826]: 1. Each Member State shall provide for one or more independent public authorities to be responsible for monitoring the application of this Regulation, in order to protect the fundamental rights and freedoms of natural persons in relation to processing and to facilitate the free flow of personal data within the Union (‘supervisory authority’).
                              - paragraph [ref=f3e5828]: 2. Each supervisory authority shall contribute to the consistent application of this Regulation throughout the Union. For that purpose, the supervisory authorities shall cooperate with each other and the Commission in accordance with Chapter VII.
                              - paragraph [ref=f3e5830]: 3. Where more than one supervisory authority is established in a Member State, that Member State shall designate the supervisory authority which is to represent those authorities in the Board and shall set out the mechanism to ensure compliance by the other authorities with the rules relating to the consistency mechanism referred to in Article 63.
                              - paragraph [ref=f3e5832]: 4. Each Member State shall notify to the Commission the provisions of its law which it adopts pursuant to this Chapter, by 25 May 2018 and, without delay, any subsequent amendment affecting them.
                            - generic [ref=f3e5833]:
                              - paragraph [ref=f3e5834]: Article 52
                              - paragraph [ref=f3e5836]: Independence
                              - paragraph [ref=f3e5838]: 1. Each supervisory authority shall act with complete independence in performing its tasks and exercising its powers in accordance with this Regulation.
                              - paragraph [ref=f3e5840]: 2. The member or members of each supervisory authority shall, in the performance of their tasks and exercise of their powers in accordance with this Regulation, remain free from external influence, whether direct or indirect, and shall neither seek nor take instructions from anybody.
                              - paragraph [ref=f3e5842]: 3. Member or members of each supervisory authority shall refrain from any action incompatible with their duties and shall not, during their term of office, engage in any incompatible occupation, whether gainful or not.
                              - paragraph [ref=f3e5844]: 4. Each Member State shall ensure that each supervisory authority is provided with the human, technical and financial resources, premises and infrastructure necessary for the effective performance of its tasks and exercise of its powers, including those to be carried out in the context of mutual assistance, cooperation and participation in the Board.
                              - paragraph [ref=f3e5846]: 5. Each Member State shall ensure that each supervisory authority chooses and has its own staff which shall be subject to the exclusive direction of the member or members of the supervisory authority concerned.
                              - paragraph [ref=f3e5848]: 6. Each Member State shall ensure that each supervisory authority is subject to financial control which does not affect its independence and that it has separate, public annual budgets, which may be part of the overall state or national budget.
