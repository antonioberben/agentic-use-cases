                              - paragraph [ref=f3e3998]: 2. In exercising his or her right to data portability pursuant to paragraph 1, the data subject shall have the right to have the personal data transmitted directly from one controller to another, where technically feasible.
                              - paragraph [ref=f3e4000]: 3. The exercise of the right referred to in paragraph 1 of this Article shall be without prejudice to Article 17. That right shall not apply to processing necessary for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller.
                              - paragraph [ref=f3e4002]: 4. The right referred to in paragraph 1 shall not adversely affect the rights and freedoms of others.
