                            - paragraph [ref=f3e5673]: 3. The Commission may specify the format and procedures for the exchange of information between controllers, processors and supervisory authorities for binding corporate rules within the meaning of this Article. Those implementing acts shall be adopted in accordance with the examination procedure set out in Article 93(2).
                          - generic [ref=f3e5674]:
                            - paragraph [ref=f3e5675]: Article 48
                            - paragraph [ref=f3e5677]: Transfers or disclosures not authorised by Union law
                            - paragraph [ref=f3e5678]: Any judgment of a court or tribunal and any decision of an administrative authority of a third country requiring a controller or processor to transfer or disclose personal data may only be recognised or enforceable in any manner if based on an international agreement, such as a mutual legal assistance treaty, in force between the requesting third country and the Union or a Member State, without prejudice to other grounds for transfer pursuant to this Chapter.
                          - generic [ref=f3e5679]:
                            - paragraph [ref=f3e5680]: Article 49
                            - paragraph [ref=f3e5682]: Derogations for specific situations
                            - generic [ref=f3e5683]:
                              - paragraph [ref=f3e5684]: "1. In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an international organisation shall take place only on one of the following conditions:"
                              - table [ref=f3e5685]:
                                - rowgroup [ref=f3e5689]:
                                  - row "(a) the data subject has explicitly consented to the proposed transfer, after having been informed of the possible risks of such transfers for the data subject due to the absence of an adequacy decision and appropriate safeguards;" [ref=f3e5690]:
                                    - cell "(a)" [ref=f3e5691]:
                                      - paragraph [ref=f3e5692]: (a)
                                    - cell "the data subject has explicitly consented to the proposed transfer, after having been informed of the possible risks of such transfers for the data subject due to the absence of an adequacy decision and appropriate safeguards;" [ref=f3e5693]:
                                      - paragraph [ref=f3e5694]: the data subject has explicitly consented to the proposed transfer, after having been informed of the possible risks of such transfers for the data subject due to the absence of an adequacy decision and appropriate safeguards;
                              - table [ref=f3e5695]:
                                - rowgroup [ref=f3e5699]:
                                  - row "(b) the transfer is necessary for the performance of a contract between the data subject and the controller or the implementation of pre-contractual measures taken at the data subject's request;" [ref=f3e5700]:
                                    - cell "(b)" [ref=f3e5701]:
                                      - paragraph [ref=f3e5702]: (b)
                                    - cell "the transfer is necessary for the performance of a contract between the data subject and the controller or the implementation of pre-contractual measures taken at the data subject's request;" [ref=f3e5703]:
                                      - paragraph [ref=f3e5704]: the transfer is necessary for the performance of a contract between the data subject and the controller or the implementation of pre-contractual measures taken at the data subject's request;
                              - table [ref=f3e5705]:
                                - rowgroup [ref=f3e5709]:
                                  - row "(c) the transfer is necessary for the conclusion or performance of a contract concluded in the interest of the data subject between the controller and another natural or legal person;" [ref=f3e5710]:
                                    - cell "(c)" [ref=f3e5711]:
                                      - paragraph [ref=f3e5712]: (c)
                                    - cell "the transfer is necessary for the conclusion or performance of a contract concluded in the interest of the data subject between the controller and another natural or legal person;" [ref=f3e5713]:
                                      - paragraph [ref=f3e5714]: the transfer is necessary for the conclusion or performance of a contract concluded in the interest of the data subject between the controller and another natural or legal person;
                              - table [ref=f3e5715]:
                                - rowgroup [ref=f3e5719]:
