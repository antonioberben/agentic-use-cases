                              - paragraph [ref=f3e4724]: 4. If the controller has not already communicated the personal data breach to the data subject, the supervisory authority, having considered the likelihood of the personal data breach resulting in a high risk, may require it to do so or may decide that any of the conditions referred to in paragraph 3 are met.
                          - generic [ref=f3e4725]:
                            - paragraph [ref=f3e4726]: Section 3
                            - paragraph [ref=f3e4728]:
                              - generic [ref=f3e4729]: Data protection impact assessment and prior consultation
                            - generic [ref=f3e4730]:
                              - paragraph [ref=f3e4731]: Article 35
                              - paragraph [ref=f3e4733]: Data protection impact assessment
                              - paragraph [ref=f3e4735]: 1. Where a type of processing in particular using new technologies, and taking into account the nature, scope, context and purposes of the processing, is likely to result in a high risk to the rights and freedoms of natural persons, the controller shall, prior to the processing, carry out an assessment of the impact of the envisaged processing operations on the protection of personal data. A single assessment may address a set of similar processing operations that present similar high risks.
                              - paragraph [ref=f3e4737]: 2. The controller shall seek the advice of the data protection officer, where designated, when carrying out a data protection impact assessment.
                              - generic [ref=f3e4738]:
                                - paragraph [ref=f3e4739]: "3. A data protection impact assessment referred to in paragraph 1 shall in particular be required in the case of:"
                                - table [ref=f3e4740]:
                                  - rowgroup [ref=f3e4744]:
                                    - row "(a) a systematic and extensive evaluation of personal aspects relating to natural persons which is based on automated processing, including profiling, and on which decisions are based that produce legal effects concerning the natural person or similarly significantly affect the natural person;" [ref=f3e4745]:
                                      - cell "(a)" [ref=f3e4746]:
                                        - paragraph [ref=f3e4747]: (a)
                                      - cell "a systematic and extensive evaluation of personal aspects relating to natural persons which is based on automated processing, including profiling, and on which decisions are based that produce legal effects concerning the natural person or similarly significantly affect the natural person;" [ref=f3e4748]:
                                        - paragraph [ref=f3e4749]: a systematic and extensive evaluation of personal aspects relating to natural persons which is based on automated processing, including profiling, and on which decisions are based that produce legal effects concerning the natural person or similarly significantly affect the natural person;
                                - table [ref=f3e4750]:
                                  - rowgroup [ref=f3e4754]:
                                    - row "(b) processing on a large scale of special categories of data referred to in Article 9(1), or of personal data relating to criminal convictions and offences referred to in Article 10; or" [ref=f3e4755]:
                                      - cell "(b)" [ref=f3e4756]:
                                        - paragraph [ref=f3e4757]: (b)
                                      - cell "processing on a large scale of special categories of data referred to in Article 9(1), or of personal data relating to criminal convictions and offences referred to in Article 10; or" [ref=f3e4758]:
                                        - paragraph [ref=f3e4759]: processing on a large scale of special categories of data referred to in Article 9(1), or of personal data relating to criminal convictions and offences referred to in Article 10; or
                                - table [ref=f3e4760]:
                                  - rowgroup [ref=f3e4764]:
                                    - row "(c) a systematic monitoring of a publicly accessible area on a large scale." [ref=f3e4765]:
                                      - cell "(c)" [ref=f3e4766]:
                                        - paragraph [ref=f3e4767]: (c)
                                      - cell "a systematic monitoring of a publicly accessible area on a large scale." [ref=f3e4768]:
                                        - paragraph [ref=f3e4769]: a systematic monitoring of a publicly accessible area on a large scale.
                              - paragraph [ref=f3e4771]: 4. The supervisory authority shall establish and make public a list of the kind of processing operations which are subject to the requirement for a data protection impact assessment pursuant to paragraph 1. The supervisory authority shall communicate those lists to the Board referred to in Article 68.
                              - paragraph [ref=f3e4773]: 5. The supervisory authority may also establish and make public a list of the kind of processing operations for which no data protection impact assessment is required. The supervisory authority shall communicate those lists to the Board.
                              - paragraph [ref=f3e4775]: 6. Prior to the adoption of the lists referred to in paragraphs 4 and 5, the competent supervisory authority shall apply the consistency mechanism referred to in Article 63 where such lists involve processing activities which are related to the offering of goods or services to data subjects or to the monitoring of their behaviour in several Member States, or may substantially affect the free movement of personal data within the Union.
