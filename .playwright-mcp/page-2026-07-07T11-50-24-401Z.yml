                    - table [ref=f3e529]:
                      - rowgroup [ref=f3e535]:
                        - row "4.5.2016 EN Official Journal of the European Union L 119/1" [ref=f3e536]:
                          - cell "4.5.2016" [ref=f3e537]:
                            - paragraph [ref=f3e538]: 4.5.2016
