                                      - cell "(c)" [ref=f3e4719]:
                                        - paragraph [ref=f3e4720]: (c)
                                      - cell "it would involve disproportionate effort. In such a case, there shall instead be a public communication or similar measure whereby the data subjects are informed in an equally effective manner." [ref=f3e4721]:
