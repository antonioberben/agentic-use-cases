                        - generic [ref=f3e7233]:
                          - paragraph [ref=f3e7234]: CHAPTER VIII
                          - paragraph [ref=f3e7236]:
                            - generic [ref=f3e7237]: Remedies, liability and penalties
                          - generic [ref=f3e7238]:
                            - paragraph [ref=f3e7239]: Article 77
                            - paragraph [ref=f3e7241]: Right to lodge a complaint with a supervisory authority
                            - paragraph [ref=f3e7243]: 1. Without prejudice to any other administrative or judicial remedy, every data subject shall have the right to lodge a complaint with a supervisory authority, in particular in the Member State of his or her habitual residence, place of work or place of the alleged infringement if the data subject considers that the processing of personal data relating to him or her infringes this Regulation.
                            - paragraph [ref=f3e7245]: 2. The supervisory authority with which the complaint has been lodged shall inform the complainant on the progress and the outcome of the complaint including the possibility of a judicial remedy pursuant to Article 78.
                          - generic [ref=f3e7246]:
                            - paragraph [ref=f3e7247]: Article 78
                            - paragraph [ref=f3e7249]: Right to an effective judicial remedy against a supervisory authority
                            - paragraph [ref=f3e7251]: 1. Without prejudice to any other administrative or non-judicial remedy, each natural or legal person shall have the right to an effective judicial remedy against a legally binding decision of a supervisory authority concerning them.
                            - paragraph [ref=f3e7253]: 2. Without prejudice to any other administrative or non-judicial remedy, each data subject shall have the right to a an effective judicial remedy where the supervisory authority which is competent pursuant to Articles 55 and 56 does not handle a complaint or does not inform the data subject within three months on the progress or outcome of the complaint lodged pursuant to Article 77.
                            - paragraph [ref=f3e7255]: 3. Proceedings against a supervisory authority shall be brought before the courts of the Member State where the supervisory authority is established.
                            - paragraph [ref=f3e7257]: 4. Where proceedings are brought against a decision of a supervisory authority which was preceded by an opinion or a decision of the Board in the consistency mechanism, the supervisory authority shall forward that opinion or decision to the court.
                          - generic [ref=f3e7258]:
                            - paragraph [ref=f3e7259]: Article 79
                            - paragraph [ref=f3e7261]: Right to an effective judicial remedy against a controller or processor
                            - paragraph [ref=f3e7263]: 1. Without prejudice to any available administrative or non-judicial remedy, including the right to lodge a complaint with a supervisory authority pursuant to Article 77, each data subject shall have the right to an effective judicial remedy where he or she considers that his or her rights under this Regulation have been infringed as a result of the processing of his or her personal data in non-compliance with this Regulation.
                            - paragraph [ref=f3e7265]: 2. Proceedings against a controller or a processor shall be brought before the courts of the Member State where the controller or processor has an establishment. Alternatively, such proceedings may be brought before the courts of the Member State where the data subject has his or her habitual residence, unless the controller or processor is a public authority of a Member State acting in the exercise of its public powers.
                          - generic [ref=f3e7266]:
                            - paragraph [ref=f3e7267]: Article 80
                            - paragraph [ref=f3e7269]: Representation of data subjects
                            - paragraph [ref=f3e7271]: 1. The data subject shall have the right to mandate a not-for-profit body, organisation or association which has been properly constituted in accordance with the law of a Member State, has statutory objectives which are in the public interest, and is active in the field of the protection of data subjects' rights and freedoms with regard to the protection of their personal data to lodge the complaint on his or her behalf, to exercise the rights referred to in Articles 77, 78 and 79 on his or her behalf, and to exercise the right to receive compensation referred to in Article 82 on his or her behalf where provided for by Member State law.
                            - paragraph [ref=f3e7273]: 2. Member States may provide that any body, organisation or association referred to in paragraph 1 of this Article, independently of a data subject's mandate, has the right to lodge, in that Member State, a complaint with the supervisory authority which is competent pursuant to Article 77 and to exercise the rights referred to in Articles 78 and 79 if it considers that the rights of a data subject under this Regulation have been infringed as a result of the processing.
                          - generic [ref=f3e7274]:
                            - paragraph [ref=f3e7275]: Article 81
                            - paragraph [ref=f3e7277]: Suspension of proceedings
                            - paragraph [ref=f3e7279]: 1. Where a competent court of a Member State has information on proceedings, concerning the same subject matter as regards processing by the same controller or processor, that are pending in a court in another Member State, it shall contact that court in the other Member State to confirm the existence of such proceedings.
                            - paragraph [ref=f3e7281]: 2. Where proceedings concerning the same subject matter as regards processing of the same controller or processor are pending in a court in another Member State, any competent court other than the court first seized may suspend its proceedings.
                            - paragraph [ref=f3e7283]: 3. Where those proceedings are pending at first instance, any court other than the court first seized may also, on the application of one of the parties, decline jurisdiction if the court first seized has jurisdiction over the actions in question and its law permits the consolidation thereof.
                          - generic [ref=f3e7284]:
                            - paragraph [ref=f3e7285]: Article 82
                            - paragraph [ref=f3e7287]: Right to compensation and liability
                            - paragraph [ref=f3e7289]: 1. Any person who has suffered material or non-material damage as a result of an infringement of this Regulation shall have the right to receive compensation from the controller or processor for the damage suffered.
                            - paragraph [ref=f3e7291]: 2. Any controller involved in processing shall be liable for the damage caused by processing which infringes this Regulation. A processor shall be liable for the damage caused by processing only where it has not complied with obligations of this Regulation specifically directed to processors or where it has acted outside or contrary to lawful instructions of the controller.
                            - paragraph [ref=f3e7293]: 3. A controller or processor shall be exempt from liability under paragraph 2 if it proves that it is not in any way responsible for the event giving rise to the damage.
                            - paragraph [ref=f3e7295]: 4. Where more than one controller or processor, or both a controller and a processor, are involved in the same processing and where they are, under paragraphs 2 and 3, responsible for any damage caused by processing, each controller or processor shall be held liable for the entire damage in order to ensure effective compensation of the data subject.
                            - paragraph [ref=f3e7297]: 5. Where a controller or processor has, in accordance with paragraph 4, paid full compensation for the damage suffered, that controller or processor shall be entitled to claim back from the other controllers or processors involved in the same processing that part of the compensation corresponding to their part of responsibility for the damage, in accordance with the conditions set out in paragraph 2.
                            - paragraph [ref=f3e7299]: 6. Court proceedings for exercising the right to receive compensation shall be brought before the courts competent under the law of the Member State referred to in Article 79(2).
                          - generic [ref=f3e7300]:
                            - paragraph [ref=f3e7301]: Article 83
                            - paragraph [ref=f3e7303]: General conditions for imposing administrative fines
                            - paragraph [ref=f3e7305]: 1. Each supervisory authority shall ensure that the imposition of administrative fines pursuant to this Article in respect of infringements of this Regulation referred to in paragraphs 4, 5 and 6 shall in each individual case be effective, proportionate and dissuasive.
                            - generic [ref=f3e7306]:
                              - paragraph [ref=f3e7307]: "2. Administrative fines shall, depending on the circumstances of each individual case, be imposed in addition to, or instead of, measures referred to in points (a) to (h) and (j) of Article 58(2). When deciding whether to impose an administrative fine and deciding on the amount of the administrative fine in each individual case due regard shall be given to the following:"
