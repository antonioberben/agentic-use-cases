                                      - cell "(b)" [ref=f3e6711]:
                                        - paragraph [ref=f3e6712]: (b)
                                      - cell "the supervisory authority referred to, as the case may be, in paragraphs 1 and 2, and the Commission of the opinion and make it public." [ref=f3e6713]:
