                              - generic [ref=f3e4007]: Right to object and automated individual decision-making
                            - generic [ref=f3e4008]:
                              - paragraph [ref=f3e4009]: Article 21
                              - paragraph [ref=f3e4011]: Right to object
                              - paragraph [ref=f3e4013]: 1. The data subject shall have the right to object, on grounds relating to his or her particular situation, at any time to processing of personal data concerning him or her which is based on point (e) or (f) of Article 6(1), including profiling based on those provisions. The controller shall no longer process the personal data unless the controller demonstrates compelling legitimate grounds for the processing which override the interests, rights and freedoms of the data subject or for the establishment, exercise or defence of legal claims.
                              - paragraph [ref=f3e4015]: 2. Where personal data are processed for direct marketing purposes, the data subject shall have the right to object at any time to processing of personal data concerning him or her for such marketing, which includes profiling to the extent that it is related to such direct marketing.
                              - paragraph [ref=f3e4017]: 3. Where the data subject objects to processing for direct marketing purposes, the personal data shall no longer be processed for such purposes.
                              - paragraph [ref=f3e4019]: 4. At the latest at the time of the first communication with the data subject, the right referred to in paragraphs 1 and 2 shall be explicitly brought to the attention of the data subject and shall be presented clearly and separately from any other information.
                              - paragraph [ref=f3e4021]: 5. In the context of the use of information society services, and notwithstanding Directive 2002/58/EC, the data subject may exercise his or her right to object by automated means using technical specifications.
                              - paragraph [ref=f3e4023]: 6. Where personal data are processed for scientific or historical research purposes or statistical purposes pursuant to Article 89(1), the data subject, on grounds relating to his or her particular situation, shall have the right to object to processing of personal data concerning him or her, unless the processing is necessary for the performance of a task carried out for reasons of public interest.
                            - generic [ref=f3e4024]:
                              - paragraph [ref=f3e4025]: Article 22
                              - paragraph [ref=f3e4027]: Automated individual decision-making, including profiling
                              - paragraph [ref=f3e4029]: 1. The data subject shall have the right not to be subject to a decision based solely on automated processing, including profiling, which produces legal effects concerning him or her or similarly significantly affects him or her.
                              - generic [ref=f3e4030]:
