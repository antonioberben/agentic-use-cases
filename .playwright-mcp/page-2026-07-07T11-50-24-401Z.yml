                              - paragraph [ref=f3e6619]: Consistency mechanism
                              - paragraph [ref=f3e6620]: In order to contribute to the consistent application of this Regulation throughout the Union, the supervisory authorities shall cooperate with each other and, where relevant, with the Commission, through the consistency mechanism as set out in this Section.
