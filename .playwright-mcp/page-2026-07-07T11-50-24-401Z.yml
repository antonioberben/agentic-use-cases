                                      - paragraph [ref=f3e7503]: non-compliance with an order or a temporary or definitive limitation on processing or the suspension of data flows by the supervisory authority pursuant to Article 58(2) or failure to provide access in violation of Article 58(1).
                            - paragraph [ref=f3e7505]: 6. Non-compliance with an order by the supervisory authority as referred to in Article 58(2) shall, in accordance with paragraph 2 of this Article, be subject to administrative fines up to 20 000 000 EUR, or in the case of an undertaking, up to 4 % of the total worldwide annual turnover of the preceding financial year, whichever is higher.
                            - paragraph [ref=f3e7507]: 7. Without prejudice to the corrective powers of supervisory authorities pursuant to Article 58(2), each Member State may lay down the rules on whether and to what extent administrative fines may be imposed on public authorities and bodies established in that Member State.
                            - paragraph [ref=f3e7509]: 8. The exercise by the supervisory authority of its powers under this Article shall be subject to appropriate procedural safeguards in accordance with Union and Member State law, including effective judicial remedy and due process.
                            - paragraph [ref=f3e7511]: 9. Where the legal system of the Member State does not provide for administrative fines, this Article may be applied in such a manner that the fine is initiated by the competent supervisory authority and imposed by competent national courts, while ensuring that those legal remedies are effective and have an equivalent effect to the administrative fines imposed by supervisory authorities. In any event, the fines imposed shall be effective, proportionate and dissuasive. Those Member States shall notify to the Commission the provisions of their laws which they adopt pursuant to this paragraph by 25 May 2018 and, without delay, any subsequent amendment law or amendment affecting them.
                          - generic [ref=f3e7512]:
                            - paragraph [ref=f3e7513]: Article 84
                            - paragraph [ref=f3e7515]: Penalties
                            - paragraph [ref=f3e7517]: 1. Member States shall lay down the rules on other penalties applicable to infringements of this Regulation in particular for infringements which are not subject to administrative fines pursuant to Article 83, and shall take all measures necessary to ensure that they are implemented. Such penalties shall be effective, proportionate and dissuasive.
                            - paragraph [ref=f3e7519]: 2. Each Member State shall notify to the Commission the provisions of its law which it adopts pursuant to paragraph 1, by 25 May 2018 and, without delay, any subsequent amendment affecting them.
                        - generic [ref=f3e7520]:
                          - paragraph [ref=f3e7521]: CHAPTER IX
                          - paragraph [ref=f3e7523]:
                            - generic [ref=f3e7524]: Provisions relating to specific processing situations
                          - generic [ref=f3e7525]:
                            - paragraph [ref=f3e7526]: Article 85
                            - paragraph [ref=f3e7528]: Processing and freedom of expression and information
                            - paragraph [ref=f3e7530]: 1. Member States shall by law reconcile the right to the protection of personal data pursuant to this Regulation with the right to freedom of expression and information, including processing for journalistic purposes and the purposes of academic, artistic or literary expression.
                            - paragraph [ref=f3e7532]: 2. For processing carried out for journalistic purposes or the purpose of academic artistic or literary expression, Member States shall provide for exemptions or derogations from Chapter II (principles), Chapter III (rights of the data subject), Chapter IV (controller and processor), Chapter V (transfer of personal data to third countries or international organisations), Chapter VI (independent supervisory authorities), Chapter VII (cooperation and consistency) and Chapter IX (specific data processing situations) if they are necessary to reconcile the right to the protection of personal data with the freedom of expression and information.
                            - paragraph [ref=f3e7534]: 3. Each Member State shall notify to the Commission the provisions of its law which it has adopted pursuant to paragraph 2 and, without delay, any subsequent amendment law or amendment affecting them.
                          - generic [ref=f3e7535]:
                            - paragraph [ref=f3e7536]: Article 86
                            - paragraph [ref=f3e7538]: Processing and public access to official documents
                            - paragraph [ref=f3e7539]: Personal data in official documents held by a public authority or a public body or a private body for the performance of a task carried out in the public interest may be disclosed by the authority or body in accordance with Union or Member State law to which the public authority or body is subject in order to reconcile public access to official documents with the right to the protection of personal data pursuant to this Regulation.
                          - generic [ref=f3e7540]:
                            - paragraph [ref=f3e7541]: Article 87
                            - paragraph [ref=f3e7543]: Processing of the national identification number
                            - paragraph [ref=f3e7544]: Member States may further determine the specific conditions for the processing of a national identification number or any other identifier of general application. In that case the national identification number or any other identifier of general application shall be used only under appropriate safeguards for the rights and freedoms of the data subject pursuant to this Regulation.
                          - generic [ref=f3e7545]:
                            - paragraph [ref=f3e7546]: Article 88
                            - paragraph [ref=f3e7548]: Processing in the context of employment
                            - paragraph [ref=f3e7550]: 1. Member States may, by law or by collective agreements, provide for more specific rules to ensure the protection of the rights and freedoms in respect of the processing of employees' personal data in the employment context, in particular for the purposes of the recruitment, the performance of the contract of employment, including discharge of obligations laid down by law or by collective agreements, management, planning and organisation of work, equality and diversity in the workplace, health and safety at work, protection of employer's or customer's property and for the purposes of the exercise and enjoyment, on an individual or collective basis, of rights and benefits related to employment, and for the purpose of the termination of the employment relationship.
                            - paragraph [ref=f3e7552]: 2. Those rules shall include suitable and specific measures to safeguard the data subject's human dignity, legitimate interests and fundamental rights, with particular regard to the transparency of processing, the transfer of personal data within a group of undertakings, or a group of enterprises engaged in a joint economic activity and monitoring systems at the work place.
                            - paragraph [ref=f3e7554]: 3. Each Member State shall notify to the Commission those provisions of its law which it adopts pursuant to paragraph 1, by 25 May 2018 and, without delay, any subsequent amendment affecting them.
                          - generic [ref=f3e7555]:
                            - paragraph [ref=f3e7556]: Article 89
                            - paragraph [ref=f3e7558]: Safeguards and derogations relating to processing for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes
                            - paragraph [ref=f3e7560]: 1. Processing for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes, shall be subject to appropriate safeguards, in accordance with this Regulation, for the rights and freedoms of the data subject. Those safeguards shall ensure that technical and organisational measures are in place in particular in order to ensure respect for the principle of data minimisation. Those measures may include pseudonymisation provided that those purposes can be fulfilled in that manner. Where those purposes can be fulfilled by further processing which does not permit or no longer permits the identification of data subjects, those purposes shall be fulfilled in that manner.
                            - paragraph [ref=f3e7562]: 2. Where personal data are processed for scientific or historical research purposes or statistical purposes, Union or Member State law may provide for derogations from the rights referred to in Articles 15, 16, 18 and 21 subject to the conditions and safeguards referred to in paragraph 1 of this Article in so far as such rights are likely to render impossible or seriously impair the achievement of the specific purposes, and such derogations are necessary for the fulfilment of those purposes.
                            - paragraph [ref=f3e7564]: 3. Where personal data are processed for archiving purposes in the public interest, Union or Member State law may provide for derogations from the rights referred to in Articles 15, 16, 18, 19, 20 and 21 subject to the conditions and safeguards referred to in paragraph 1 of this Article in so far as such rights are likely to render impossible or seriously impair the achievement of the specific purposes, and such derogations are necessary for the fulfilment of those purposes.
                            - paragraph [ref=f3e7566]: 4. Where processing referred to in paragraphs 2 and 3 serves at the same time another purpose, the derogations shall apply only to processing for the purposes referred to in those paragraphs.
                          - generic [ref=f3e7567]:
                            - paragraph [ref=f3e7568]: Article 90
                            - paragraph [ref=f3e7570]: Obligations of secrecy
                            - paragraph [ref=f3e7572]: 1. Member States may adopt specific rules to set out the powers of the supervisory authorities laid down in points (e) and (f) of Article 58(1) in relation to controllers or processors that are subject, under Union or Member State law or rules established by national competent bodies, to an obligation of professional secrecy or other equivalent obligations of secrecy where this is necessary and proportionate to reconcile the right of the protection of personal data with the obligation of secrecy. Those rules shall apply only with regard to personal data which the controller or processor has received as a result of or has obtained in an activity covered by that obligation of secrecy.
                            - paragraph [ref=f3e7574]: 2. Each Member State shall notify to the Commission the rules adopted pursuant to paragraph 1, by 25 May 2018 and, without delay, any subsequent amendment affecting them.
                          - generic [ref=f3e7575]:
                            - paragraph [ref=f3e7576]: Article 91
                            - paragraph [ref=f3e7578]: Existing data protection rules of churches and religious associations
                            - paragraph [ref=f3e7580]: 1. Where in a Member State, churches and religious associations or communities apply, at the time of entry into force of this Regulation, comprehensive rules relating to the protection of natural persons with regard to processing, such rules may continue to apply, provided that they are brought into line with this Regulation.
                            - paragraph [ref=f3e7582]: 2. Churches and religious associations which apply comprehensive rules in accordance with paragraph 1 of this Article shall be subject to the supervision of an independent supervisory authority, which may be specific, provided that it fulfils the conditions laid down in Chapter VI of this Regulation.
                        - generic [ref=f3e7583]:
                          - paragraph [ref=f3e7584]: CHAPTER X
                          - paragraph [ref=f3e7586]:
                            - generic [ref=f3e7587]: Delegated acts and implementing acts
                          - generic [ref=f3e7588]:
                            - paragraph [ref=f3e7589]: Article 92
                            - paragraph [ref=f3e7591]: Exercise of the delegation
                            - paragraph [ref=f3e7593]: 1. The power to adopt delegated acts is conferred on the Commission subject to the conditions laid down in this Article.
                            - paragraph [ref=f3e7595]: 2. The delegation of power referred to in Article 12(8) and Article 43(8) shall be conferred on the Commission for an indeterminate period of time from 24 May 2016.
                            - paragraph [ref=f3e7597]: 3. The delegation of power referred to in Article 12(8) and Article 43(8) may be revoked at any time by the European Parliament or by the Council. A decision of revocation shall put an end to the delegation of power specified in that decision. It shall take effect the day following that of its publication in the Official Journal of the European Union or at a later date specified therein. It shall not affect the validity of any delegated acts already in force.
                            - paragraph [ref=f3e7599]: 4. As soon as it adopts a delegated act, the Commission shall notify it simultaneously to the European Parliament and to the Council.
                            - paragraph [ref=f3e7601]: 5. A delegated act adopted pursuant to Article 12(8) and Article 43(8) shall enter into force only if no objection has been expressed by either the European Parliament or the Council within a period of three months of notification of that act to the European Parliament and the Council or if, before the expiry of that period, the European Parliament and the Council have both informed the Commission that they will not object. That period shall be extended by three months at the initiative of the European Parliament or of the Council.
                          - generic [ref=f3e7602]:
                            - paragraph [ref=f3e7603]: Article 93
                            - paragraph [ref=f3e7605]: Committee procedure
                            - paragraph [ref=f3e7607]: 1. The Commission shall be assisted by a committee. That committee shall be a committee within the meaning of Regulation (EU) No 182/2011.
                            - paragraph [ref=f3e7609]: 2. Where reference is made to this paragraph, Article 5 of Regulation (EU) No 182/2011 shall apply.
                            - paragraph [ref=f3e7611]: 3. Where reference is made to this paragraph, Article 8 of Regulation (EU) No 182/2011, in conjunction with Article 5 thereof, shall apply.
                        - generic [ref=f3e7612]:
                          - paragraph [ref=f3e7613]: CHAPTER XI
                          - paragraph [ref=f3e7615]:
                            - generic [ref=f3e7616]: Final provisions
                          - generic [ref=f3e7617]:
                            - paragraph [ref=f3e7618]: Article 94
                            - paragraph [ref=f3e7620]: Repeal of Directive 95/46/EC
                            - paragraph [ref=f3e7622]: 1. Directive 95/46/EC is repealed with effect from 25 May 2018.
                            - paragraph [ref=f3e7624]: 2. References to the repealed Directive shall be construed as references to this Regulation. References to the Working Party on the Protection of Individuals with regard to the Processing of Personal Data established by Article 29 of Directive 95/46/EC shall be construed as references to the European Data Protection Board established by this Regulation.
                          - generic [ref=f3e7625]:
                            - paragraph [ref=f3e7626]: Article 95
                            - paragraph [ref=f3e7628]: Relationship with Directive 2002/58/EC
                            - paragraph [ref=f3e7629]: This Regulation shall not impose additional obligations on natural or legal persons in relation to processing in connection with the provision of publicly available electronic communications services in public communication networks in the Union in relation to matters for which they are subject to specific obligations with the same objective set out in Directive 2002/58/EC.
                          - generic [ref=f3e7630]:
                            - paragraph [ref=f3e7631]: Article 96
                            - paragraph [ref=f3e7633]: Relationship with previously concluded Agreements
                            - paragraph [ref=f3e7634]: International agreements involving the transfer of personal data to third countries or international organisations which were concluded by Member States prior to 24 May 2016, and which comply with Union law as applicable prior to that date, shall remain in force until amended, replaced or revoked.
                          - generic [ref=f3e7635]:
                            - paragraph [ref=f3e7636]: Article 97
                            - paragraph [ref=f3e7638]: Commission reports
                            - paragraph [ref=f3e7640]: 1. By 25 May 2020 and every four years thereafter, the Commission shall submit a report on the evaluation and review of this Regulation to the European Parliament and to the Council. The reports shall be made public.
                            - generic [ref=f3e7641]:
                              - paragraph [ref=f3e7642]: "2. In the context of the evaluations and reviews referred to in paragraph 1, the Commission shall examine, in particular, the application and functioning of:"
                              - table [ref=f3e7643]:
                                - rowgroup [ref=f3e7647]:
                                  - row "(a) Chapter V on the transfer of personal data to third countries or international organisations with particular regard to decisions adopted pursuant to Article 45(3) of this Regulation and decisions adopted on the basis of Article 25(6) of Directive 95/46/EC;" [ref=f3e7648]:
                                    - cell "(a)" [ref=f3e7649]:
                                      - paragraph [ref=f3e7650]: (a)
                                    - cell "Chapter V on the transfer of personal data to third countries or international organisations with particular regard to decisions adopted pursuant to Article 45(3) of this Regulation and decisions adopted on the basis of Article 25(6) of Directive 95/46/EC;" [ref=f3e7651]:
                                      - paragraph [ref=f3e7652]: Chapter V on the transfer of personal data to third countries or international organisations with particular regard to decisions adopted pursuant to Article 45(3) of this Regulation and decisions adopted on the basis of Article 25(6) of Directive 95/46/EC;
                              - table [ref=f3e7653]:
                                - rowgroup [ref=f3e7657]:
                                  - row "(b) Chapter VII on cooperation and consistency." [ref=f3e7658]:
                                    - cell "(b)" [ref=f3e7659]:
                                      - paragraph [ref=f3e7660]: (b)
                                    - cell "Chapter VII on cooperation and consistency." [ref=f3e7661]:
                                      - paragraph [ref=f3e7662]: Chapter VII on cooperation and consistency.
                            - paragraph [ref=f3e7664]: 3. For the purpose of paragraph 1, the Commission may request information from Member States and supervisory authorities.
                            - paragraph [ref=f3e7666]: 4. In carrying out the evaluations and reviews referred to in paragraphs 1 and 2, the Commission shall take into account the positions and findings of the European Parliament, of the Council, and of other relevant bodies or sources.
                            - paragraph [ref=f3e7668]: 5. The Commission shall, if necessary, submit appropriate proposals to amend this Regulation, in particular taking into account of developments in information technology and in the light of the state of progress in the information society.
                          - generic [ref=f3e7669]:
                            - paragraph [ref=f3e7670]: Article 98
                            - paragraph [ref=f3e7672]: Review of other Union legal acts on data protection
                            - paragraph [ref=f3e7673]: The Commission shall, if appropriate, submit legislative proposals with a view to amending other Union legal acts on the protection of personal data, in order to ensure uniform and consistent protection of natural persons with regard to processing. This shall in particular concern the rules relating to the protection of natural persons with regard to processing by Union institutions, bodies, offices and agencies and on the free movement of such data.
                          - generic [ref=f3e7674]:
                            - paragraph [ref=f3e7675]: Article 99
                            - paragraph [ref=f3e7677]: Entry into force and application
                            - paragraph [ref=f3e7679]: 1. This Regulation shall enter into force on the twentieth day following that of its publication in the Official Journal of the European Union.
                            - paragraph [ref=f3e7681]: 2. It shall apply from 25 May 2018.
                      - generic [ref=f3e7683]:
                        - paragraph [ref=f3e7684]: This Regulation shall be binding in its entirety and directly applicable in all Member States.
