                              - paragraph [ref=f3e6688]: 2. Any supervisory authority, the Chair of the Board or the Commission may request that any matter of general application or producing effects in more than one Member State be examined by the Board with a view to obtaining an opinion, in particular where a competent supervisory authority does not comply with the obligations for mutual assistance in accordance with Article 61 or for joint operations in accordance with Article 62.
                              - paragraph [ref=f3e6690]: 3. In the cases referred to in paragraphs 1 and 2, the Board shall issue an opinion on the matter submitted to it provided that it has not already issued an opinion on the same matter. That opinion shall be adopted within eight weeks by simple majority of the members of the Board. That period may be extended by a further six weeks, taking into account the complexity of the subject matter. Regarding the draft decision referred to in paragraph 1 circulated to the members of the Board in accordance with paragraph 5, a member which has not objected within a reasonable period indicated by the Chair, shall be deemed to be in agreement with the draft decision.
                              - paragraph [ref=f3e6692]: 4. Supervisory authorities and the Commission shall, without undue delay, communicate by electronic means to the Board, using a standardised format any relevant information, including as the case may be a summary of the facts, the draft decision, the grounds which make the enactment of such measure necessary, and the views of other supervisory authorities concerned.
                              - generic [ref=f3e6693]:
                                - paragraph [ref=f3e6694]: "5. The Chair of the Board shall, without undue, delay inform by electronic means:"
                                - table [ref=f3e6695]:
                                  - rowgroup [ref=f3e6699]:
                                    - row "(a) the members of the Board and the Commission of any relevant information which has been communicated to it using a standardised format. The secretariat of the Board shall, where necessary, provide translations of relevant information; and" [ref=f3e6700]:
                                      - cell "(a)" [ref=f3e6701]:
                                        - paragraph [ref=f3e6702]: (a)
                                      - cell "the members of the Board and the Commission of any relevant information which has been communicated to it using a standardised format. The secretariat of the Board shall, where necessary, provide translations of relevant information; and" [ref=f3e6703]:
                                        - paragraph [ref=f3e6704]: the members of the Board and the Commission of any relevant information which has been communicated to it using a standardised format. The secretariat of the Board shall, where necessary, provide translations of relevant information; and
                                - table [ref=f3e6705]:
