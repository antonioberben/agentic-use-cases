                                        - paragraph [ref=f3e4702]: the controller has implemented appropriate technical and organisational protection measures, and those measures were applied to the personal data affected by the personal data breach, in particular those that render the personal data unintelligible to any person who is not authorised to access it, such as encryption;
                                - table [ref=f3e4703]:
                                  - rowgroup [ref=f3e4707]:
                                    - row "(b) the controller has taken subsequent measures which ensure that the high risk to the rights and freedoms of data subjects referred to in paragraph 1 is no longer likely to materialise;" [ref=f3e4708]:
                                      - cell "(b)" [ref=f3e4709]:
                                        - paragraph [ref=f3e4710]: (b)
                                      - cell "the controller has taken subsequent measures which ensure that the high risk to the rights and freedoms of data subjects referred to in paragraph 1 is no longer likely to materialise;" [ref=f3e4711]:
                                        - paragraph [ref=f3e4712]: the controller has taken subsequent measures which ensure that the high risk to the rights and freedoms of data subjects referred to in paragraph 1 is no longer likely to materialise;
                                - table [ref=f3e4713]:
