                                      - paragraph [ref=f3e3274]: processing is necessary for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes in accordance with Article 89(1) based on Union or Member State law which shall be proportionate to the aim pursued, respect the essence of the right to data protection and provide for suitable and specific measures to safeguard the fundamental rights and the interests of the data subject.
                            - paragraph [ref=f3e3276]: 3. Personal data referred to in paragraph 1 may be processed for the purposes referred to in point (h) of paragraph 2 when those data are processed by or under the responsibility of a professional subject to the obligation of professional secrecy under Union or Member State law or rules established by national competent bodies or by another person also subject to an obligation of secrecy under Union or Member State law or rules established by national competent bodies.
                            - paragraph [ref=f3e3278]: 4. Member States may maintain or introduce further conditions, including limitations, with regard to the processing of genetic data, biometric data or data concerning health.
                          - generic [ref=f3e3279]:
                            - paragraph [ref=f3e3280]: Article 10
                            - paragraph [ref=f3e3282]: Processing of personal data relating to criminal convictions and offences
                            - paragraph [ref=f3e3283]: Processing of personal data relating to criminal convictions and offences or related security measures based on Article 6(1) shall be carried out only under the control of official authority or when the processing is authorised by Union or Member State law providing for appropriate safeguards for the rights and freedoms of data subjects. Any comprehensive register of criminal convictions shall be kept only under the control of official authority.
                          - generic [ref=f3e3284]:
                            - paragraph [ref=f3e3285]: Article 11
                            - paragraph [ref=f3e3287]: Processing which does not require identification
                            - paragraph [ref=f3e3289]: 1. If the purposes for which a controller processes personal data do not or do no longer require the identification of a data subject by the controller, the controller shall not be obliged to maintain, acquire or process additional information in order to identify the data subject for the sole purpose of complying with this Regulation.
                            - paragraph [ref=f3e3291]: 2. Where, in cases referred to in paragraph 1 of this Article, the controller is able to demonstrate that it is not in a position to identify the data subject, the controller shall inform the data subject accordingly, if possible. In such cases, Articles 15 to 20 shall not apply except where the data subject, for the purpose of exercising his or her rights under those articles, provides additional information enabling his or her identification.
                        - generic [ref=f3e3292]:
                          - paragraph [ref=f3e3293]: CHAPTER III
                          - paragraph [ref=f3e3295]:
                            - generic [ref=f3e3296]: Rights of the data subject
                          - generic [ref=f3e3297]:
                            - paragraph [ref=f3e3298]: Section 1
                            - paragraph [ref=f3e3300]:
                              - generic [ref=f3e3301]: Transparency and modalities
                            - generic [ref=f3e3302]:
                              - paragraph [ref=f3e3303]: Article 12
                              - paragraph [ref=f3e3305]: Transparent information, communication and modalities for the exercise of the rights of the data subject
                              - paragraph [ref=f3e3307]: 1. The controller shall take appropriate measures to provide any information referred to in Articles 13 and 14 and any communication under Articles 15 to 22 and 34 relating to processing to the data subject in a concise, transparent, intelligible and easily accessible form, using clear and plain language, in particular for any information addressed specifically to a child. The information shall be provided in writing, or by other means, including, where appropriate, by electronic means. When requested by the data subject, the information may be provided orally, provided that the identity of the data subject is proven by other means.
                              - paragraph [ref=f3e3309]: 2. The controller shall facilitate the exercise of data subject rights under Articles 15 to 22. In the cases referred to in Article 11(2), the controller shall not refuse to act on the request of the data subject for exercising his or her rights under Articles 15 to 22, unless the controller demonstrates that it is not in a position to identify the data subject.
                              - paragraph [ref=f3e3311]: 3. The controller shall provide information on action taken on a request under Articles 15 to 22 to the data subject without undue delay and in any event within one month of receipt of the request. That period may be extended by two further months where necessary, taking into account the complexity and number of the requests. The controller shall inform the data subject of any such extension within one month of receipt of the request, together with the reasons for the delay. Where the data subject makes the request by electronic form means, the information shall be provided by electronic means where possible, unless otherwise requested by the data subject.
                              - paragraph [ref=f3e3313]: 4. If the controller does not take action on the request of the data subject, the controller shall inform the data subject without delay and at the latest within one month of receipt of the request of the reasons for not taking action and on the possibility of lodging a complaint with a supervisory authority and seeking a judicial remedy.
                              - generic [ref=f3e3314]:
                                - paragraph [ref=f3e3315]: "5. Information provided under Articles 13 and 14 and any communication and any actions taken under Articles 15 to 22 and 34 shall be provided free of charge. Where requests from a data subject are manifestly unfounded or excessive, in particular because of their repetitive character, the controller may either:"
                                - table [ref=f3e3316]:
                                  - rowgroup [ref=f3e3320]:
                                    - row "(a) charge a reasonable fee taking into account the administrative costs of providing the information or communication or taking the action requested; or" [ref=f3e3321]:
                                      - cell "(a)" [ref=f3e3322]:
                                        - paragraph [ref=f3e3323]: (a)
                                      - cell "charge a reasonable fee taking into account the administrative costs of providing the information or communication or taking the action requested; or" [ref=f3e3324]:
                                        - paragraph [ref=f3e3325]: charge a reasonable fee taking into account the administrative costs of providing the information or communication or taking the action requested; or
                                - table [ref=f3e3326]:
                                  - rowgroup [ref=f3e3330]:
                                    - row "(b) refuse to act on the request." [ref=f3e3331]:
                                      - cell "(b)" [ref=f3e3332]:
                                        - paragraph [ref=f3e3333]: (b)
                                      - cell "refuse to act on the request." [ref=f3e3334]:
                                        - paragraph [ref=f3e3335]: refuse to act on the request.
                                - paragraph [ref=f3e3336]: The controller shall bear the burden of demonstrating the manifestly unfounded or excessive character of the request.
                              - paragraph [ref=f3e3338]: 6. Without prejudice to Article 11, where the controller has reasonable doubts concerning the identity of the natural person making the request referred to in Articles 15 to 21, the controller may request the provision of additional information necessary to confirm the identity of the data subject.
                              - paragraph [ref=f3e3340]: 7. The information to be provided to data subjects pursuant to Articles 13 and 14 may be provided in combination with standardised icons in order to give in an easily visible, intelligible and clearly legible manner a meaningful overview of the intended processing. Where the icons are presented electronically they shall be machine-readable.
                              - paragraph [ref=f3e3342]: 8. The Commission shall be empowered to adopt delegated acts in accordance with Article 92 for the purpose of determining the information to be presented by the icons and the procedures for providing standardised icons.
