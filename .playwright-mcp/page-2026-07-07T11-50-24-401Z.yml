                            - generic [ref=f3e7138]:
                              - paragraph [ref=f3e7139]: Article 75
                              - paragraph [ref=f3e7141]: Secretariat
                              - paragraph [ref=f3e7143]: 1. The Board shall have a secretariat, which shall be provided by the European Data Protection Supervisor.
                              - paragraph [ref=f3e7145]: 2. The secretariat shall perform its tasks exclusively under the instructions of the Chair of the Board.
                              - paragraph [ref=f3e7147]: 3. The staff of the European Data Protection Supervisor involved in carrying out the tasks conferred on the Board by this Regulation shall be subject to separate reporting lines from the staff involved in carrying out tasks conferred on the European Data Protection Supervisor.
                              - paragraph [ref=f3e7149]: 4. Where appropriate, the Board and the European Data Protection Supervisor shall establish and publish a Memorandum of Understanding implementing this Article, determining the terms of their cooperation, and applicable to the staff of the European Data Protection Supervisor involved in carrying out the tasks conferred on the Board by this Regulation.
                              - paragraph [ref=f3e7151]: 5. The secretariat shall provide analytical, administrative and logistical support to the Board.
