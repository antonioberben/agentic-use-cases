                              - paragraph [ref=f3e6503]: 4. The exercise of the powers conferred on the supervisory authority pursuant to this Article shall be subject to appropriate safeguards, including effective judicial remedy and due process, set out in Union and Member State law in accordance with the Charter.
                              - paragraph [ref=f3e6505]: 5. Each Member State shall provide by law that its supervisory authority shall have the power to bring infringements of this Regulation to the attention of the judicial authorities and where appropriate, to commence or engage otherwise in legal proceedings, in order to enforce the provisions of this Regulation.
                              - paragraph [ref=f3e6507]: 6. Each Member State may provide by law that its supervisory authority shall have additional powers to those referred to in paragraphs 1, 2 and 3. The exercise of those powers shall not impair the effective operation of Chapter VII.
                            - generic [ref=f3e6508]:
                              - paragraph [ref=f3e6509]: Article 59
                              - paragraph [ref=f3e6511]: Activity reports
                              - paragraph [ref=f3e6512]: Each supervisory authority shall draw up an annual report on its activities, which may include a list of types of infringement notified and types of measures taken in accordance with Article 58(2). Those reports shall be transmitted to the national parliament, the government and other authorities as designated by Member State law. They shall be made available to the public, to the Commission and to the Board.
                        - generic [ref=f3e6513]:
                          - paragraph [ref=f3e6514]: CHAPTER VII
                          - paragraph [ref=f3e6516]:
                            - generic [ref=f3e6517]: Cooperation and consistency
                          - generic [ref=f3e6518]:
                            - paragraph [ref=f3e6519]: Section 1
                            - paragraph [ref=f3e6521]:
                              - generic [ref=f3e6522]: Cooperation
                            - generic [ref=f3e6523]:
                              - paragraph [ref=f3e6524]: Article 60
                              - paragraph [ref=f3e6526]: Cooperation between the lead supervisory authority and the other supervisory authorities concerned
                              - paragraph [ref=f3e6528]: 1. The lead supervisory authority shall cooperate with the other supervisory authorities concerned in accordance with this Article in an endeavour to reach consensus. The lead supervisory authority and the supervisory authorities concerned shall exchange all relevant information with each other.
                              - paragraph [ref=f3e6530]: 2. The lead supervisory authority may request at any time other supervisory authorities concerned to provide mutual assistance pursuant to Article 61 and may conduct joint operations pursuant to Article 62, in particular for carrying out investigations or for monitoring the implementation of a measure concerning a controller or processor established in another Member State.
                              - paragraph [ref=f3e6532]: 3. The lead supervisory authority shall, without delay, communicate the relevant information on the matter to the other supervisory authorities concerned. It shall without delay submit a draft decision to the other supervisory authorities concerned for their opinion and take due account of their views.
                              - paragraph [ref=f3e6534]: 4. Where any of the other supervisory authorities concerned within a period of four weeks after having been consulted in accordance with paragraph 3 of this Article, expresses a relevant and reasoned objection to the draft decision, the lead supervisory authority shall, if it does not follow the relevant and reasoned objection or is of the opinion that the objection is not relevant or reasoned, submit the matter to the consistency mechanism referred to in Article 63.
                              - paragraph [ref=f3e6536]: 5. Where the lead supervisory authority intends to follow the relevant and reasoned objection made, it shall submit to the other supervisory authorities concerned a revised draft decision for their opinion. That revised draft decision shall be subject to the procedure referred to in paragraph 4 within a period of two weeks.
                              - paragraph [ref=f3e6538]: 6. Where none of the other supervisory authorities concerned has objected to the draft decision submitted by the lead supervisory authority within the period referred to in paragraphs 4 and 5, the lead supervisory authority and the supervisory authorities concerned shall be deemed to be in agreement with that draft decision and shall be bound by it.
                              - paragraph [ref=f3e6540]: 7. The lead supervisory authority shall adopt and notify the decision to the main establishment or single establishment of the controller or processor, as the case may be and inform the other supervisory authorities concerned and the Board of the decision in question, including a summary of the relevant facts and grounds. The supervisory authority with which a complaint has been lodged shall inform the complainant on the decision.
                              - paragraph [ref=f3e6542]: 8. By derogation from paragraph 7, where a complaint is dismissed or rejected, the supervisory authority with which the complaint was lodged shall adopt the decision and notify it to the complainant and shall inform the controller thereof.
                              - paragraph [ref=f3e6544]: 9. Where the lead supervisory authority and the supervisory authorities concerned agree to dismiss or reject parts of a complaint and to act on other parts of that complaint, a separate decision shall be adopted for each of those parts of the matter. The lead supervisory authority shall adopt the decision for the part concerning actions in relation to the controller, shall notify it to the main establishment or single establishment of the controller or processor on the territory of its Member State and shall inform the complainant thereof, while the supervisory authority of the complainant shall adopt the decision for the part concerning dismissal or rejection of that complaint, and shall notify it to that complainant and shall inform the controller or processor thereof.
                              - paragraph [ref=f3e6546]: 10. After being notified of the decision of the lead supervisory authority pursuant to paragraphs 7 and 9, the controller or processor shall take the necessary measures to ensure compliance with the decision as regards processing activities in the context of all its establishments in the Union. The controller or processor shall notify the measures taken for complying with the decision to the lead supervisory authority, which shall inform the other supervisory authorities concerned.
                              - paragraph [ref=f3e6548]: 11. Where, in exceptional circumstances, a supervisory authority concerned has reasons to consider that there is an urgent need to act in order to protect the interests of data subjects, the urgency procedure referred to in Article 66 shall apply.
                              - paragraph [ref=f3e6550]: 12. The lead supervisory authority and the other supervisory authorities concerned shall supply the information required under this Article to each other by electronic means, using a standardised format.
                            - generic [ref=f3e6551]:
                              - paragraph [ref=f3e6552]: Article 61
                              - paragraph [ref=f3e6554]: Mutual assistance
                              - paragraph [ref=f3e6556]: 1. Supervisory authorities shall provide each other with relevant information and mutual assistance in order to implement and apply this Regulation in a consistent manner, and shall put in place measures for effective cooperation with one another. Mutual assistance shall cover, in particular, information requests and supervisory measures, such as requests to carry out prior authorisations and consultations, inspections and investigations.
                              - paragraph [ref=f3e6558]: 2. Each supervisory authority shall take all appropriate measures required to reply to a request of another supervisory authority without undue delay and no later than one month after receiving the request. Such measures may include, in particular, the transmission of relevant information on the conduct of an investigation.
                              - paragraph [ref=f3e6560]: 3. Requests for assistance shall contain all the necessary information, including the purpose of and reasons for the request. Information exchanged shall be used only for the purpose for which it was requested.
                              - generic [ref=f3e6561]:
                                - paragraph [ref=f3e6562]: "4. The requested supervisory authority shall not refuse to comply with the request unless:"
                                - table [ref=f3e6563]:
                                  - rowgroup [ref=f3e6567]:
                                    - row "(a) it is not competent for the subject-matter of the request or for the measures it is requested to execute; or" [ref=f3e6568]:
                                      - cell "(a)" [ref=f3e6569]:
                                        - paragraph [ref=f3e6570]: (a)
                                      - cell "it is not competent for the subject-matter of the request or for the measures it is requested to execute; or" [ref=f3e6571]:
                                        - paragraph [ref=f3e6572]: it is not competent for the subject-matter of the request or for the measures it is requested to execute; or
                                - table [ref=f3e6573]:
                                  - rowgroup [ref=f3e6577]:
                                    - row "(b) compliance with the request would infringe this Regulation or Union or Member State law to which the supervisory authority receiving the request is subject." [ref=f3e6578]:
                                      - cell "(b)" [ref=f3e6579]:
                                        - paragraph [ref=f3e6580]: (b)
                                      - cell "compliance with the request would infringe this Regulation or Union or Member State law to which the supervisory authority receiving the request is subject." [ref=f3e6581]:
                                        - paragraph [ref=f3e6582]: compliance with the request would infringe this Regulation or Union or Member State law to which the supervisory authority receiving the request is subject.
                              - paragraph [ref=f3e6584]: 5. The requested supervisory authority shall inform the requesting supervisory authority of the results or, as the case may be, of the progress of the measures taken in order to respond to the request. The requested supervisory authority shall provide reasons for any refusal to comply with a request pursuant to paragraph 4.
                              - paragraph [ref=f3e6586]: 6. Requested supervisory authorities shall, as a rule, supply the information requested by other supervisory authorities by electronic means, using a standardised format.
                              - paragraph [ref=f3e6588]: 7. Requested supervisory authorities shall not charge a fee for any action taken by them pursuant to a request for mutual assistance. Supervisory authorities may agree on rules to indemnify each other for specific expenditure arising from the provision of mutual assistance in exceptional circumstances.
                              - paragraph [ref=f3e6590]: 8. Where a supervisory authority does not provide the information referred to in paragraph 5 of this Article within one month of receiving the request of another supervisory authority, the requesting supervisory authority may adopt a provisional measure on the territory of its Member State in accordance with Article 55(1). In that case, the urgent need to act under Article 66(1) shall be presumed to be met and require an urgent binding decision from the Board pursuant to Article 66(2).
                              - paragraph [ref=f3e6592]: 9. The Commission may, by means of implementing acts, specify the format and procedures for mutual assistance referred to in this Article and the arrangements for the exchange of information by electronic means between supervisory authorities, and between supervisory authorities and the Board, in particular the standardised format referred to in paragraph 6 of this Article. Those implementing acts shall be adopted in accordance with the examination procedure referred to in Article 93(2).
                            - generic [ref=f3e6593]:
                              - paragraph [ref=f3e6594]: Article 62
                              - paragraph [ref=f3e6596]: Joint operations of supervisory authorities
                              - paragraph [ref=f3e6598]: 1. The supervisory authorities shall, where appropriate, conduct joint operations including joint investigations and joint enforcement measures in which members or staff of the supervisory authorities of other Member States are involved.
                              - paragraph [ref=f3e6600]: 2. Where the controller or processor has establishments in several Member States or where a significant number of data subjects in more than one Member State are likely to be substantially affected by processing operations, a supervisory authority of each of those Member States shall have the right to participate in joint operations. The supervisory authority which is competent pursuant to Article 56(1) or (4) shall invite the supervisory authority of each of those Member States to take part in the joint operations and shall respond without delay to the request of a supervisory authority to participate.
                              - paragraph [ref=f3e6602]: 3. A supervisory authority may, in accordance with Member State law, and with the seconding supervisory authority's authorisation, confer powers, including investigative powers on the seconding supervisory authority's members or staff involved in joint operations or, in so far as the law of the Member State of the host supervisory authority permits, allow the seconding supervisory authority's members or staff to exercise their investigative powers in accordance with the law of the Member State of the seconding supervisory authority. Such investigative powers may be exercised only under the guidance and in the presence of members or staff of the host supervisory authority. The seconding supervisory authority's members or staff shall be subject to the Member State law of the host supervisory authority.
                              - paragraph [ref=f3e6604]: 4. Where, in accordance with paragraph 1, staff of a seconding supervisory authority operate in another Member State, the Member State of the host supervisory authority shall assume responsibility for their actions, including liability, for any damage caused by them during their operations, in accordance with the law of the Member State in whose territory they are operating.
                              - paragraph [ref=f3e6606]: 5. The Member State in whose territory the damage was caused shall make good such damage under the conditions applicable to damage caused by its own staff. The Member State of the seconding supervisory authority whose staff has caused damage to any person in the territory of another Member State shall reimburse that other Member State in full any sums it has paid to the persons entitled on their behalf.
                              - paragraph [ref=f3e6608]: 6. Without prejudice to the exercise of its rights vis-à-vis third parties and with the exception of paragraph 5, each Member State shall refrain, in the case provided for in paragraph 1, from requesting reimbursement from another Member State in relation to damage referred to in paragraph 4.
                              - paragraph [ref=f3e6610]: 7. Where a joint operation is intended and a supervisory authority does not, within one month, comply with the obligation laid down in the second sentence of paragraph 2 of this Article, the other supervisory authorities may adopt a provisional measure on the territory of its Member State in accordance with Article 55. In that case, the urgent need to act under Article 66(1) shall be presumed to be met and require an opinion or an urgent binding decision from the Board pursuant to Article 66(2).
                          - generic [ref=f3e6611]:
