                                        - paragraph [ref=f3e5966]: the conditions governing the obligations of the member or members and staff of each supervisory authority, prohibitions on actions, occupations and benefits incompatible therewith during and after the term of office and rules governing the cessation of employment.
                              - paragraph [ref=f3e5968]: 2. The member or members and the staff of each supervisory authority shall, in accordance with Union or Member State law, be subject to a duty of professional secrecy both during and after their term of office, with regard to any confidential information which has come to their knowledge in the course of the performance of their tasks or exercise of their powers. During their term of office, that duty of professional secrecy shall in particular apply to reporting by natural persons of infringements of this Regulation.
                          - generic [ref=f3e5969]:
                            - paragraph [ref=f3e5970]: Section 2
                            - paragraph [ref=f3e5972]:
                              - generic [ref=f3e5973]: Competence, tasks and powers
                            - generic [ref=f3e5974]:
                              - paragraph [ref=f3e5975]: Article 55
                              - paragraph [ref=f3e5977]: Competence
                              - paragraph [ref=f3e5979]: 1. Each supervisory authority shall be competent for the performance of the tasks assigned to and the exercise of the powers conferred on it in accordance with this Regulation on the territory of its own Member State.
                              - paragraph [ref=f3e5981]: 2. Where processing is carried out by public authorities or private bodies acting on the basis of point (c) or (e) of Article 6(1), the supervisory authority of the Member State concerned shall be competent. In such cases Article 56 does not apply.
                              - paragraph [ref=f3e5983]: 3. Supervisory authorities shall not be competent to supervise processing operations of courts acting in their judicial capacity.
                            - generic [ref=f3e5984]:
                              - paragraph [ref=f3e5985]: Article 56
                              - paragraph [ref=f3e5987]: Competence of the lead supervisory authority
                              - paragraph [ref=f3e5989]: 1. Without prejudice to Article 55, the supervisory authority of the main establishment or of the single establishment of the controller or processor shall be competent to act as lead supervisory authority for the cross-border processing carried out by that controller or processor in accordance with the procedure provided in Article 60.
                              - paragraph [ref=f3e5991]: 2. By derogation from paragraph 1, each supervisory authority shall be competent to handle a complaint lodged with it or a possible infringement of this Regulation, if the subject matter relates only to an establishment in its Member State or substantially affects data subjects only in its Member State.
                              - paragraph [ref=f3e5993]: 3. In the cases referred to in paragraph 2 of this Article, the supervisory authority shall inform the lead supervisory authority without delay on that matter. Within a period of three weeks after being informed the lead supervisory authority shall decide whether or not it will handle the case in accordance with the procedure provided in Article 60, taking into account whether or not there is an establishment of the controller or processor in the Member State of which the supervisory authority informed it.
                              - paragraph [ref=f3e5995]: 4. Where the lead supervisory authority decides to handle the case, the procedure provided in Article 60 shall apply. The supervisory authority which informed the lead supervisory authority may submit to the lead supervisory authority a draft for a decision. The lead supervisory authority shall take utmost account of that draft when preparing the draft decision referred to in Article 60(3).
                              - paragraph [ref=f3e5997]: 5. Where the lead supervisory authority decides not to handle the case, the supervisory authority which informed the lead supervisory authority shall handle it according to Articles 61 and 62.
                              - paragraph [ref=f3e5999]: 6. The lead supervisory authority shall be the sole interlocutor of the controller or processor for the cross-border processing carried out by that controller or processor.
