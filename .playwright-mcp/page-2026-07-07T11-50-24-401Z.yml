                          - paragraph [ref=f3e2497]:
                            - generic [ref=f3e2498]: General provisions
                          - generic [ref=f3e2499]:
                            - paragraph [ref=f3e2500]: Article 1
                            - paragraph [ref=f3e2502]: Subject-matter and objectives
                            - paragraph [ref=f3e2504]: 1. This Regulation lays down rules relating to the protection of natural persons with regard to the processing of personal data and rules relating to the free movement of personal data.
                            - paragraph [ref=f3e2506]: 2. This Regulation protects fundamental rights and freedoms of natural persons and in particular their right to the protection of personal data.
                            - paragraph [ref=f3e2508]: 3. The free movement of personal data within the Union shall be neither restricted nor prohibited for reasons connected with the protection of natural persons with regard to the processing of personal data.
                          - generic [ref=f3e2509]:
                            - paragraph [ref=f3e2510]: Article 2
                            - paragraph [ref=f3e2512]: Material scope
                            - paragraph [ref=f3e2514]: 1. This Regulation applies to the processing of personal data wholly or partly by automated means and to the processing other than by automated means of personal data which form part of a filing system or are intended to form part of a filing system.
