                                    - cell "(d)" [ref=f3e5721]:
                                      - paragraph [ref=f3e5722]: (d)
                                    - cell "the transfer is necessary for important reasons of public interest;" [ref=f3e5723]:
                                      - paragraph [ref=f3e5724]: the transfer is necessary for important reasons of public interest;
                              - table [ref=f3e5725]:
