                        - table [ref=f3e2358]:
                          - rowgroup [ref=f3e2362]:
                            - row [ref=f3e2363]:
                              - cell "(162)" [ref=f3e2364]:
                                - paragraph [ref=f3e2365]: (162)
                              - cell [ref=f3e2366]:
                                - paragraph [ref=f3e2367]: Where personal data are processed for statistical purposes, this Regulation should apply to that processing. Union or Member State law should, within the limits of this Regulation, determine statistical content, control of access, specifications for the processing of personal data for statistical purposes and appropriate measures to safeguard the rights and freedoms of the data subject and for ensuring statistical confidentiality. Statistical purposes mean any operation of collection and the processing of personal data necessary for statistical surveys or for the production of statistical results. Those statistical results may further be used for different purposes, including a scientific research purpose. The statistical purpose implies that the result of processing for statistical purposes is not personal data, but aggregate data, and that this result or the personal data are not used in support of measures or decisions regarding any particular natural person.
                        - table [ref=f3e2369]:
                          - rowgroup [ref=f3e2373]:
                            - row "(163) The confidential information which the Union and national statistical authorities collect for the production of official European and official national statistics should be protected. European statistics should be developed, produced and disseminated in accordance with the statistical principles as set out in Article 338(2) TFEU, while national statistics should also comply with Member State law. Regulation (EC) No 223/2009 of the European Parliament and of the Council (16) provides further specifications on statistical confidentiality for European statistics." [ref=f3e2374]:
