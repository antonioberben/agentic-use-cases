                              - paragraph [ref=f3e6716]: 6. The competent supervisory authority shall not adopt its draft decision referred to in paragraph 1 within the period referred to in paragraph 3.
                              - paragraph [ref=f3e6718]: 7. The supervisory authority referred to in paragraph 1 shall take utmost account of the opinion of the Board and shall, within two weeks after receiving the opinion, communicate to the Chair of the Board by electronic means whether it will maintain or amend its draft decision and, if any, the amended draft decision, using a standardised format.
                              - paragraph [ref=f3e6720]: 8. Where the supervisory authority concerned informs the Chair of the Board within the period referred to in paragraph 7 of this Article that it does not intend to follow the opinion of the Board, in whole or in part, providing the relevant grounds, Article 65(1) shall apply.
                            - generic [ref=f3e6721]:
                              - paragraph [ref=f3e6722]: Article 65
                              - paragraph [ref=f3e6724]: Dispute resolution by the Board
                              - generic [ref=f3e6725]:
                                - paragraph [ref=f3e6726]: "1. In order to ensure the correct and consistent application of this Regulation in individual cases, the Board shall adopt a binding decision in the following cases:"
                                - table [ref=f3e6727]:
                                  - rowgroup [ref=f3e6731]:
                                    - row "(a) where, in a case referred to in Article 60(4), a supervisory authority concerned has raised a relevant and reasoned objection to a draft decision of the lead authority or the lead authority has rejected such an objection as being not relevant or reasoned. The binding decision shall concern all the matters which are the subject of the relevant and reasoned objection, in particular whether there is an infringement of this Regulation;" [ref=f3e6732]:
                                      - cell "(a)" [ref=f3e6733]:
                                        - paragraph [ref=f3e6734]: (a)
                                      - cell "where, in a case referred to in Article 60(4), a supervisory authority concerned has raised a relevant and reasoned objection to a draft decision of the lead authority or the lead authority has rejected such an objection as being not relevant or reasoned. The binding decision shall concern all the matters which are the subject of the relevant and reasoned objection, in particular whether there is an infringement of this Regulation;" [ref=f3e6735]:
                                        - paragraph [ref=f3e6736]: where, in a case referred to in Article 60(4), a supervisory authority concerned has raised a relevant and reasoned objection to a draft decision of the lead authority or the lead authority has rejected such an objection as being not relevant or reasoned. The binding decision shall concern all the matters which are the subject of the relevant and reasoned objection, in particular whether there is an infringement of this Regulation;
                                - table [ref=f3e6737]:
                                  - rowgroup [ref=f3e6741]:
                                    - row "(b) where there are conflicting views on which of the supervisory authorities concerned is competent for the main establishment;" [ref=f3e6742]:
                                      - cell "(b)" [ref=f3e6743]:
                                        - paragraph [ref=f3e6744]: (b)
                                      - cell "where there are conflicting views on which of the supervisory authorities concerned is competent for the main establishment;" [ref=f3e6745]:
                                        - paragraph [ref=f3e6746]: where there are conflicting views on which of the supervisory authorities concerned is competent for the main establishment;
                                - table [ref=f3e6747]:
                                  - rowgroup [ref=f3e6751]:
                                    - row "(c) where a competent supervisory authority does not request the opinion of the Board in the cases referred to in Article 64(1), or does not follow the opinion of the Board issued under Article 64. In that case, any supervisory authority concerned or the Commission may communicate the matter to the Board." [ref=f3e6752]:
                                      - cell "(c)" [ref=f3e6753]:
                                        - paragraph [ref=f3e6754]: (c)
                                      - cell "where a competent supervisory authority does not request the opinion of the Board in the cases referred to in Article 64(1), or does not follow the opinion of the Board issued under Article 64. In that case, any supervisory authority concerned or the Commission may communicate the matter to the Board." [ref=f3e6755]:
                                        - paragraph [ref=f3e6756]: where a competent supervisory authority does not request the opinion of the Board in the cases referred to in Article 64(1), or does not follow the opinion of the Board issued under Article 64. In that case, any supervisory authority concerned or the Commission may communicate the matter to the Board.
                              - paragraph [ref=f3e6758]: 2. The decision referred to in paragraph 1 shall be adopted within one month from the referral of the subject-matter by a two-thirds majority of the members of the Board. That period may be extended by a further month on account of the complexity of the subject-matter. The decision referred to in paragraph 1 shall be reasoned and addressed to the lead supervisory authority and all the supervisory authorities concerned and binding on them.
                              - paragraph [ref=f3e6760]: 3. Where the Board has been unable to adopt a decision within the periods referred to in paragraph 2, it shall adopt its decision within two weeks following the expiration of the second month referred to in paragraph 2 by a simple majority of the members of the Board. Where the members of the Board are split, the decision shall by adopted by the vote of its Chair.
                              - paragraph [ref=f3e6762]: 4. The supervisory authorities concerned shall not adopt a decision on the subject matter submitted to the Board under paragraph 1 during the periods referred to in paragraphs 2 and 3.
                              - paragraph [ref=f3e6764]: 5. The Chair of the Board shall notify, without undue delay, the decision referred to in paragraph 1 to the supervisory authorities concerned. It shall inform the Commission thereof. The decision shall be published on the website of the Board without delay after the supervisory authority has notified the final decision referred to in paragraph 6.
                              - paragraph [ref=f3e6766]: 6. The lead supervisory authority or, as the case may be, the supervisory authority with which the complaint has been lodged shall adopt its final decision on the basis of the decision referred to in paragraph 1 of this Article, without undue delay and at the latest by one month after the Board has notified its decision. The lead supervisory authority or, as the case may be, the supervisory authority with which the complaint has been lodged, shall inform the Board of the date when its final decision is notified respectively to the controller or the processor and to the data subject. The final decision of the supervisory authorities concerned shall be adopted under the terms of Article 60(7), (8) and (9). The final decision shall refer to the decision referred to in paragraph 1 of this Article and shall specify that the decision referred to in that paragraph will be published on the website of the Board in accordance with paragraph 5 of this Article. The final decision shall attach the decision referred to in paragraph 1 of this Article.
                            - generic [ref=f3e6767]:
                              - paragraph [ref=f3e6768]: Article 66
                              - paragraph [ref=f3e6770]: Urgency procedure
                              - paragraph [ref=f3e6772]: 1. In exceptional circumstances, where a supervisory authority concerned considers that there is an urgent need to act in order to protect the rights and freedoms of data subjects, it may, by way of derogation from the consistency mechanism referred to in Articles 63, 64 and 65 or the procedure referred to in Article 60, immediately adopt provisional measures intended to produce legal effects on its own territory with a specified period of validity which shall not exceed three months. The supervisory authority shall, without delay, communicate those measures and the reasons for adopting them to the other supervisory authorities concerned, to the Board and to the Commission.
                              - paragraph [ref=f3e6774]: 2. Where a supervisory authority has taken a measure pursuant to paragraph 1 and considers that final measures need urgently be adopted, it may request an urgent opinion or an urgent binding decision from the Board, giving reasons for requesting such opinion or decision.
                              - paragraph [ref=f3e6776]: 3. Any supervisory authority may request an urgent opinion or an urgent binding decision, as the case may be, from the Board where a competent supervisory authority has not taken an appropriate measure in a situation where there is an urgent need to act, in order to protect the rights and freedoms of data subjects, giving reasons for requesting such opinion or decision, including for the urgent need to act.
                              - paragraph [ref=f3e6778]: 4. By derogation from Article 64(3) and Article 65(2), an urgent opinion or an urgent binding decision referred to in paragraphs 2 and 3 of this Article shall be adopted within two weeks by simple majority of the members of the Board.
                            - generic [ref=f3e6779]:
                              - paragraph [ref=f3e6780]: Article 67
                              - paragraph [ref=f3e6782]: Exchange of information
                              - paragraph [ref=f3e6783]: The Commission may adopt implementing acts of general scope in order to specify the arrangements for the exchange of information by electronic means between supervisory authorities, and between supervisory authorities and the Board, in particular the standardised format referred to in Article 64.
                              - paragraph [ref=f3e6784]: Those implementing acts shall be adopted in accordance with the examination procedure referred to in Article 93(2).
                          - generic [ref=f3e6785]:
                            - paragraph [ref=f3e6786]: Section 3
                            - paragraph [ref=f3e6788]:
                              - generic [ref=f3e6789]: European data protection board
                            - generic [ref=f3e6790]:
                              - paragraph [ref=f3e6791]: Article 68
                              - paragraph [ref=f3e6793]: European Data Protection Board
                              - paragraph [ref=f3e6795]: 1. The European Data Protection Board (the ‘Board’) is hereby established as a body of the Union and shall have legal personality.
                              - paragraph [ref=f3e6797]: 2. The Board shall be represented by its Chair.
                              - paragraph [ref=f3e6799]: 3. The Board shall be composed of the head of one supervisory authority of each Member State and of the European Data Protection Supervisor, or their respective representatives.
                              - paragraph [ref=f3e6801]: 4. Where in a Member State more than one supervisory authority is responsible for monitoring the application of the provisions pursuant to this Regulation, a joint representative shall be appointed in accordance with that Member State's law.
                              - paragraph [ref=f3e6803]: 5. The Commission shall have the right to participate in the activities and meetings of the Board without voting right. The Commission shall designate a representative. The Chair of the Board shall communicate to the Commission the activities of the Board.
                              - paragraph [ref=f3e6805]: 6. In the cases referred to in Article 65, the European Data Protection Supervisor shall have voting rights only on decisions which concern principles and rules applicable to the Union institutions, bodies, offices and agencies which correspond in substance to those of this Regulation.
                            - generic [ref=f3e6806]:
                              - paragraph [ref=f3e6807]: Article 69
                              - paragraph [ref=f3e6809]: Independence
                              - paragraph [ref=f3e6811]: 1. The Board shall act independently when performing its tasks or exercising its powers pursuant to Articles 70 and 71.
                              - paragraph [ref=f3e6813]: 2. Without prejudice to requests by the Commission referred to in point (b) of Article 70(1) and in Article 70(2), the Board shall, in the performance of its tasks or the exercise of its powers, neither seek nor take instructions from anybody.
