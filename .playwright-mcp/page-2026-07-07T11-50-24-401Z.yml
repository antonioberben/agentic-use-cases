                              - table [ref=f3e3081]:
                                - rowgroup [ref=f3e3085]:
                                  - row "(b) Member State law to which the controller is subject." [ref=f3e3086]:
                                    - cell "(b)" [ref=f3e3087]:
                                      - paragraph [ref=f3e3088]: (b)
                                    - cell "Member State law to which the controller is subject." [ref=f3e3089]:
                                      - paragraph [ref=f3e3090]: Member State law to which the controller is subject.
                              - paragraph [ref=f3e3091]: "The purpose of the processing shall be determined in that legal basis or, as regards the processing referred to in point (e) of paragraph 1, shall be necessary for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller. That legal basis may contain specific provisions to adapt the application of rules of this Regulation, inter alia: the general conditions governing the lawfulness of processing by the controller; the types of data which are subject to the processing; the data subjects concerned; the entities to, and the purposes for which, the personal data may be disclosed; the purpose limitation; storage periods; and processing operations and processing procedures, including measures to ensure lawful and fair processing such as those for other specific processing situations as provided for in Chapter IX. The Union or the Member State law shall meet an objective of public interest and be proportionate to the legitimate aim pursued."
                            - generic [ref=f3e3092]:
                              - paragraph [ref=f3e3093]: "4. Where the processing for a purpose other than that for which the personal data have been collected is not based on the data subject's consent or on a Union or Member State law which constitutes a necessary and proportionate measure in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially collected, take into account, inter alia:"
