                            - paragraph [ref=f3e5403]: Transfers subject to appropriate safeguards
                            - paragraph [ref=f3e5405]: 1. In the absence of a decision pursuant to Article 45(3), a controller or processor may transfer personal data to a third country or an international organisation only if the controller or processor has provided appropriate safeguards, and on condition that enforceable data subject rights and effective legal remedies for data subjects are available.
