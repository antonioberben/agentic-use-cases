                              - paragraph [ref=f3e7071]: 2. Where the Commission requests advice from the Board, it may indicate a time limit, taking into account the urgency of the matter.
                              - paragraph [ref=f3e7073]: 3. The Board shall forward its opinions, guidelines, recommendations, and best practices to the Commission and to the committee referred to in Article 93 and make them public.
                              - paragraph [ref=f3e7075]: 4. The Board shall, where appropriate, consult interested parties and give them the opportunity to comment within a reasonable period. The Board shall, without prejudice to Article 76, make the results of the consultation procedure publicly available.
                            - generic [ref=f3e7076]:
                              - paragraph [ref=f3e7077]: Article 71
                              - paragraph [ref=f3e7079]: Reports
                              - paragraph [ref=f3e7081]: 1. The Board shall draw up an annual report regarding the protection of natural persons with regard to processing in the Union and, where relevant, in third countries and international organisations. The report shall be made public and be transmitted to the European Parliament, to the Council and to the Commission.
                              - paragraph [ref=f3e7083]: 2. The annual report shall include a review of the practical application of the guidelines, recommendations and best practices referred to in point (l) of Article 70(1) as well as of the binding decisions referred to in Article 65.
                            - generic [ref=f3e7084]:
                              - paragraph [ref=f3e7085]: Article 72
                              - paragraph [ref=f3e7087]: Procedure
                              - paragraph [ref=f3e7089]: 1. The Board shall take decisions by a simple majority of its members, unless otherwise provided for in this Regulation.
                              - paragraph [ref=f3e7091]: 2. The Board shall adopt its own rules of procedure by a two-thirds majority of its members and organise its own operational arrangements.
                            - generic [ref=f3e7092]:
                              - paragraph [ref=f3e7093]: Article 73
                              - paragraph [ref=f3e7095]: Chair
                              - paragraph [ref=f3e7097]: 1. The Board shall elect a chair and two deputy chairs from amongst its members by simple majority.
                              - paragraph [ref=f3e7099]: 2. The term of office of the Chair and of the deputy chairs shall be five years and be renewable once.
