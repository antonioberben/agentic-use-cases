                                    - row "(a) the controller has implemented appropriate technical and organisational protection measures, and those measures were applied to the personal data affected by the personal data breach, in particular those that render the personal data unintelligible to any person who is not authorised to access it, such as encryption;" [ref=f3e4698]:
                                      - cell "(a)" [ref=f3e4699]:
                                        - paragraph [ref=f3e4700]: (a)
