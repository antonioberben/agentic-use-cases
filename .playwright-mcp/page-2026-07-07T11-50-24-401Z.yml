                            - paragraph [ref=f3e3068]: 2. Member States may maintain or introduce more specific provisions to adapt the application of the rules of this Regulation with regard to processing for compliance with points (c) and (e) of paragraph 1 by determining more precisely specific requirements for the processing and other measures to ensure lawful and fair processing including for other specific processing situations as provided for in Chapter IX.
                            - generic [ref=f3e3069]:
                              - paragraph [ref=f3e3070]: "3. The basis for the processing referred to in point (c) and (e) of paragraph 1 shall be laid down by:"
