                          - generic [ref=f3e4572]:
                            - paragraph [ref=f3e4573]: Section 2
                            - paragraph [ref=f3e4575]:
                              - generic [ref=f3e4576]: Security of personal data
                            - generic [ref=f3e4577]:
                              - paragraph [ref=f3e4578]: Article 32
                              - paragraph [ref=f3e4580]: Security of processing
                              - generic [ref=f3e4581]:
                                - paragraph [ref=f3e4582]: "1. Taking into account the state of the art, the costs of implementation and the nature, scope, context and purposes of processing as well as the risk of varying likelihood and severity for the rights and freedoms of natural persons, the controller and the processor shall implement appropriate technical and organisational measures to ensure a level of security appropriate to the risk, including inter alia as appropriate:"
                                - table [ref=f3e4583]:
                                  - rowgroup [ref=f3e4587]:
                                    - row "(a) the pseudonymisation and encryption of personal data;" [ref=f3e4588]:
                                      - cell "(a)" [ref=f3e4589]:
                                        - paragraph [ref=f3e4590]: (a)
                                      - cell "the pseudonymisation and encryption of personal data;" [ref=f3e4591]:
                                        - paragraph [ref=f3e4592]: the pseudonymisation and encryption of personal data;
                                - table [ref=f3e4593]:
                                  - rowgroup [ref=f3e4597]:
                                    - row "(b) the ability to ensure the ongoing confidentiality, integrity, availability and resilience of processing systems and services;" [ref=f3e4598]:
                                      - cell "(b)" [ref=f3e4599]:
                                        - paragraph [ref=f3e4600]: (b)
                                      - cell "the ability to ensure the ongoing confidentiality, integrity, availability and resilience of processing systems and services;" [ref=f3e4601]:
                                        - paragraph [ref=f3e4602]: the ability to ensure the ongoing confidentiality, integrity, availability and resilience of processing systems and services;
                                - table [ref=f3e4603]:
                                  - rowgroup [ref=f3e4607]:
                                    - row "(c) the ability to restore the availability and access to personal data in a timely manner in the event of a physical or technical incident;" [ref=f3e4608]:
                                      - cell "(c)" [ref=f3e4609]:
                                        - paragraph [ref=f3e4610]: (c)
                                      - cell "the ability to restore the availability and access to personal data in a timely manner in the event of a physical or technical incident;" [ref=f3e4611]:
                                        - paragraph [ref=f3e4612]: the ability to restore the availability and access to personal data in a timely manner in the event of a physical or technical incident;
                                - table [ref=f3e4613]:
                                  - rowgroup [ref=f3e4617]:
                                    - row "(d) a process for regularly testing, assessing and evaluating the effectiveness of technical and organisational measures for ensuring the security of the processing." [ref=f3e4618]:
                                      - cell "(d)" [ref=f3e4619]:
                                        - paragraph [ref=f3e4620]: (d)
                                      - cell "a process for regularly testing, assessing and evaluating the effectiveness of technical and organisational measures for ensuring the security of the processing." [ref=f3e4621]:
                                        - paragraph [ref=f3e4622]: a process for regularly testing, assessing and evaluating the effectiveness of technical and organisational measures for ensuring the security of the processing.
                              - paragraph [ref=f3e4624]: 2. In assessing the appropriate level of security account shall be taken in particular of the risks that are presented by processing, in particular from accidental or unlawful destruction, loss, alteration, unauthorised disclosure of, or access to personal data transmitted, stored or otherwise processed.
                              - paragraph [ref=f3e4626]: 3. Adherence to an approved code of conduct as referred to in Article 40 or an approved certification mechanism as referred to in Article 42 may be used as an element by which to demonstrate compliance with the requirements set out in paragraph 1 of this Article.
                              - paragraph [ref=f3e4628]: 4. The controller and processor shall take steps to ensure that any natural person acting under the authority of the controller or the processor who has access to personal data does not process them except on instructions from the controller, unless he or she is required to do so by Union or Member State law.
                            - generic [ref=f3e4629]:
                              - paragraph [ref=f3e4630]: Article 33
                              - paragraph [ref=f3e4632]: Notification of a personal data breach to the supervisory authority
                              - paragraph [ref=f3e4634]: 1. In the case of a personal data breach, the controller shall without undue delay and, where feasible, not later than 72 hours after having become aware of it, notify the personal data breach to the supervisory authority competent in accordance with Article 55, unless the personal data breach is unlikely to result in a risk to the rights and freedoms of natural persons. Where the notification to the supervisory authority is not made within 72 hours, it shall be accompanied by reasons for the delay.
                              - paragraph [ref=f3e4636]: 2. The processor shall notify the controller without undue delay after becoming aware of a personal data breach.
                              - generic [ref=f3e4637]:
                                - paragraph [ref=f3e4638]: "3. The notification referred to in paragraph 1 shall at least:"
                                - table [ref=f3e4639]:
                                  - rowgroup [ref=f3e4643]:
                                    - row "(a) describe the nature of the personal data breach including where possible, the categories and approximate number of data subjects concerned and the categories and approximate number of personal data records concerned;" [ref=f3e4644]:
                                      - cell "(a)" [ref=f3e4645]:
                                        - paragraph [ref=f3e4646]: (a)
                                      - cell "describe the nature of the personal data breach including where possible, the categories and approximate number of data subjects concerned and the categories and approximate number of personal data records concerned;" [ref=f3e4647]:
                                        - paragraph [ref=f3e4648]: describe the nature of the personal data breach including where possible, the categories and approximate number of data subjects concerned and the categories and approximate number of personal data records concerned;
                                - table [ref=f3e4649]:
                                  - rowgroup [ref=f3e4653]:
                                    - row "(b) communicate the name and contact details of the data protection officer or other contact point where more information can be obtained;" [ref=f3e4654]:
                                      - cell "(b)" [ref=f3e4655]:
                                        - paragraph [ref=f3e4656]: (b)
                                      - cell "communicate the name and contact details of the data protection officer or other contact point where more information can be obtained;" [ref=f3e4657]:
                                        - paragraph [ref=f3e4658]: communicate the name and contact details of the data protection officer or other contact point where more information can be obtained;
                                - table [ref=f3e4659]:
                                  - rowgroup [ref=f3e4663]:
                                    - row "(c) describe the likely consequences of the personal data breach;" [ref=f3e4664]:
                                      - cell "(c)" [ref=f3e4665]:
                                        - paragraph [ref=f3e4666]: (c)
                                      - cell "describe the likely consequences of the personal data breach;" [ref=f3e4667]:
                                        - paragraph [ref=f3e4668]: describe the likely consequences of the personal data breach;
                                - table [ref=f3e4669]:
                                  - rowgroup [ref=f3e4673]:
                                    - row "(d) describe the measures taken or proposed to be taken by the controller to address the personal data breach, including, where appropriate, measures to mitigate its possible adverse effects." [ref=f3e4674]:
                                      - cell "(d)" [ref=f3e4675]:
                                        - paragraph [ref=f3e4676]: (d)
                                      - cell "describe the measures taken or proposed to be taken by the controller to address the personal data breach, including, where appropriate, measures to mitigate its possible adverse effects." [ref=f3e4677]:
                                        - paragraph [ref=f3e4678]: describe the measures taken or proposed to be taken by the controller to address the personal data breach, including, where appropriate, measures to mitigate its possible adverse effects.
                              - paragraph [ref=f3e4680]: 4. Where, and in so far as, it is not possible to provide the information at the same time, the information may be provided in phases without undue further delay.
                              - paragraph [ref=f3e4682]: 5. The controller shall document any personal data breaches, comprising the facts relating to the personal data breach, its effects and the remedial action taken. That documentation shall enable the supervisory authority to verify compliance with this Article.
                            - generic [ref=f3e4683]:
                              - paragraph [ref=f3e4684]: Article 34
                              - paragraph [ref=f3e4686]: Communication of a personal data breach to the data subject
                              - paragraph [ref=f3e4688]: 1. When the personal data breach is likely to result in a high risk to the rights and freedoms of natural persons, the controller shall communicate the personal data breach to the data subject without undue delay.
                              - paragraph [ref=f3e4690]: 2. The communication to the data subject referred to in paragraph 1 of this Article shall describe in clear and plain language the nature of the personal data breach and contain at least the information and measures referred to in points (b), (c) and (d) of Article 33(3).
                              - generic [ref=f3e4691]:
                                - paragraph [ref=f3e4692]: "3. The communication to the data subject referred to in paragraph 1 shall not be required if any of the following conditions are met:"
