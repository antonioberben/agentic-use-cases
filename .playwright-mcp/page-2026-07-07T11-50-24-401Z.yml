                              - paragraph [ref=f3e4908]: Designation of the data protection officer
                              - generic [ref=f3e4909]:
                                - paragraph [ref=f3e4910]: "1. The controller and the processor shall designate a data protection officer in any case where:"
                                - table [ref=f3e4911]:
                                  - rowgroup [ref=f3e4915]:
                                    - row "(a) the processing is carried out by a public authority or body, except for courts acting in their judicial capacity;" [ref=f3e4916]:
                                      - cell "(a)" [ref=f3e4917]:
                                        - paragraph [ref=f3e4918]: (a)
                                      - cell "the processing is carried out by a public authority or body, except for courts acting in their judicial capacity;" [ref=f3e4919]:
                                        - paragraph [ref=f3e4920]: the processing is carried out by a public authority or body, except for courts acting in their judicial capacity;
                                - table [ref=f3e4921]:
                                  - rowgroup [ref=f3e4925]:
                                    - row "(b) the core activities of the controller or the processor consist of processing operations which, by virtue of their nature, their scope and/or their purposes, require regular and systematic monitoring of data subjects on a large scale; or" [ref=f3e4926]:
                                      - cell "(b)" [ref=f3e4927]:
                                        - paragraph [ref=f3e4928]: (b)
                                      - cell "the core activities of the controller or the processor consist of processing operations which, by virtue of their nature, their scope and/or their purposes, require regular and systematic monitoring of data subjects on a large scale; or" [ref=f3e4929]:
                                        - paragraph [ref=f3e4930]: the core activities of the controller or the processor consist of processing operations which, by virtue of their nature, their scope and/or their purposes, require regular and systematic monitoring of data subjects on a large scale; or
                                - table [ref=f3e4931]:
                                  - rowgroup [ref=f3e4935]:
                                    - row "(c) the core activities of the controller or the processor consist of processing on a large scale of special categories of data pursuant to Article 9 and personal data relating to criminal convictions and offences referred to in Article 10." [ref=f3e4936]:
                                      - cell "(c)" [ref=f3e4937]:
                                        - paragraph [ref=f3e4938]: (c)
                                      - cell "the core activities of the controller or the processor consist of processing on a large scale of special categories of data pursuant to Article 9 and personal data relating to criminal convictions and offences referred to in Article 10." [ref=f3e4939]:
                                        - paragraph [ref=f3e4940]: the core activities of the controller or the processor consist of processing on a large scale of special categories of data pursuant to Article 9 and personal data relating to criminal convictions and offences referred to in Article 10.
                              - paragraph [ref=f3e4942]: 2. A group of undertakings may appoint a single data protection officer provided that a data protection officer is easily accessible from each establishment.
                              - paragraph [ref=f3e4944]: 3. Where the controller or the processor is a public authority or body, a single data protection officer may be designated for several such authorities or bodies, taking account of their organisational structure and size.
                              - paragraph [ref=f3e4946]: 4. In cases other than those referred to in paragraph 1, the controller or processor or associations and other bodies representing categories of controllers or processors may or, where required by Union or Member State law shall, designate a data protection officer. The data protection officer may act for such associations and other bodies representing controllers or processors.
                              - paragraph [ref=f3e4948]: 5. The data protection officer shall be designated on the basis of professional qualities and, in particular, expert knowledge of data protection law and practices and the ability to fulfil the tasks referred to in Article 39.
                              - paragraph [ref=f3e4950]: 6. The data protection officer may be a staff member of the controller or processor, or fulfil the tasks on the basis of a service contract.
                              - paragraph [ref=f3e4952]: 7. The controller or the processor shall publish the contact details of the data protection officer and communicate them to the supervisory authority.
                            - generic [ref=f3e4953]:
                              - paragraph [ref=f3e4954]: Article 38
                              - paragraph [ref=f3e4956]: Position of the data protection officer
                              - paragraph [ref=f3e4958]: 1. The controller and the processor shall ensure that the data protection officer is involved, properly and in a timely manner, in all issues which relate to the protection of personal data.
                              - paragraph [ref=f3e4960]: 2. The controller and processor shall support the data protection officer in performing the tasks referred to in Article 39 by providing resources necessary to carry out those tasks and access to personal data and processing operations, and to maintain his or her expert knowledge.
                              - paragraph [ref=f3e4962]: 3. The controller and processor shall ensure that the data protection officer does not receive any instructions regarding the exercise of those tasks. He or she shall not be dismissed or penalised by the controller or the processor for performing his tasks. The data protection officer shall directly report to the highest management level of the controller or the processor.
                              - paragraph [ref=f3e4964]: 4. Data subjects may contact the data protection officer with regard to all issues related to processing of their personal data and to the exercise of their rights under this Regulation.
                              - paragraph [ref=f3e4966]: 5. The data protection officer shall be bound by secrecy or confidentiality concerning the performance of his or her tasks, in accordance with Union or Member State law.
                              - paragraph [ref=f3e4968]: 6. The data protection officer may fulfil other tasks and duties. The controller or processor shall ensure that any such tasks and duties do not result in a conflict of interests.
