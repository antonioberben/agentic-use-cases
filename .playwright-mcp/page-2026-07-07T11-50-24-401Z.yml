                                    - row "(a) the processing is based on consent pursuant to point (a) of Article 6(1) or point (a) of Article 9(2) or on a contract pursuant to point (b) of Article 6(1); and" [ref=f3e3982]:
                                      - cell "(a)" [ref=f3e3983]:
