                                  - link "(16)" [ref=f3e2379] [cursor=pointer]:
                                    - /url: "#ntr16-L_2016119EN.01000101-E0016"
                                  - text: provides further specifications on statistical confidentiality for European statistics.
                        - table [ref=f3e2381]:
                          - rowgroup [ref=f3e2385]:
                            - row "(164) As regards the powers of the supervisory authorities to obtain from the controller or processor access to personal data and access to their premises, Member States may adopt by law, within the limits of this Regulation, specific rules in order to safeguard the professional or other equivalent secrecy obligations, in so far as necessary to reconcile the right to the protection of personal data with an obligation of professional secrecy. This is without prejudice to existing Member State obligations to adopt rules on professional secrecy where required by Union law." [ref=f3e2386]:
