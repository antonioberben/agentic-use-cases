                          - generic [ref=f3e3144]:
                            - paragraph [ref=f3e3145]: Article 7
                            - paragraph [ref=f3e3147]: Conditions for consent
                            - paragraph [ref=f3e3149]: 1. Where processing is based on consent, the controller shall be able to demonstrate that the data subject has consented to processing of his or her personal data.
                            - paragraph [ref=f3e3151]: 2. If the data subject's consent is given in the context of a written declaration which also concerns other matters, the request for consent shall be presented in a manner which is clearly distinguishable from the other matters, in an intelligible and easily accessible form, using clear and plain language. Any part of such a declaration which constitutes an infringement of this Regulation shall not be binding.
                            - paragraph [ref=f3e3153]: 3. The data subject shall have the right to withdraw his or her consent at any time. The withdrawal of consent shall not affect the lawfulness of processing based on consent before its withdrawal. Prior to giving consent, the data subject shall be informed thereof. It shall be as easy to withdraw as to give consent.
                            - paragraph [ref=f3e3155]: 4. When assessing whether consent is freely given, utmost account shall be taken of whether, inter alia, the performance of a contract, including the provision of a service, is conditional on consent to the processing of personal data that is not necessary for the performance of that contract.
                          - generic [ref=f3e3156]:
                            - paragraph [ref=f3e3157]: Article 8
                            - paragraph [ref=f3e3159]: Conditions applicable to child's consent in relation to information society services
                            - generic [ref=f3e3160]:
                              - paragraph [ref=f3e3161]: 1. Where point (a) of Article 6(1) applies, in relation to the offer of information society services directly to a child, the processing of the personal data of a child shall be lawful where the child is at least 16 years old. Where the child is below the age of 16 years, such processing shall be lawful only if and to the extent that consent is given or authorised by the holder of parental responsibility over the child.
                              - paragraph [ref=f3e3162]: Member States may provide by law for a lower age for those purposes provided that such lower age is not below 13 years.
                            - paragraph [ref=f3e3164]: 2. The controller shall make reasonable efforts to verify in such cases that consent is given or authorised by the holder of parental responsibility over the child, taking into consideration available technology.
                            - paragraph [ref=f3e3166]: 3. Paragraph 1 shall not affect the general contract law of Member States such as the rules on the validity, formation or effect of a contract in relation to a child.
                          - generic [ref=f3e3167]:
                            - paragraph [ref=f3e3168]: Article 9
                            - paragraph [ref=f3e3170]: Processing of special categories of personal data
                            - paragraph [ref=f3e3172]: 1. Processing of personal data revealing racial or ethnic origin, political opinions, religious or philosophical beliefs, or trade union membership, and the processing of genetic data, biometric data for the purpose of uniquely identifying a natural person, data concerning health or data concerning a natural person's sex life or sexual orientation shall be prohibited.
