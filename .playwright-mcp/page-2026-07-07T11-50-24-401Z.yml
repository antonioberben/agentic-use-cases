                        - table [ref=f3e2346]:
                          - rowgroup [ref=f3e2350]:
                            - row "(161) For the purpose of consenting to the participation in scientific research activities in clinical trials, the relevant provisions of Regulation (EU) No 536/2014 of the European Parliament and of the Council (15) should apply." [ref=f3e2351]:
