            - paragraph [ref=e152]: "The table makes the problem visible: some frameworks are actionable engineering guidance (OWASP, DefenseClaw), some are regulatory requirements (EU AI Act), some are governance models (NIST), and some are threat intelligence databases (MITRE ATLAS). They operate at different layers and serve different audiences."
            - generic [ref=e157]:
