            - 'heading "OWASP Agentic AI: the developer’s starting point" [level=2] [ref=e163]'
            - paragraph [ref=e164]: OWASP’s Agentic AI project is the most immediately useful framework for engineering teams. It maps specific agent behaviors to security risks and provides concrete mitigations.
            - paragraph:
              - img "OWASP Agentic AI Top 10 vulnerability categories for autonomous agent systems"
            - paragraph [ref=e165]: "The project identifies four primary threat categories for agentic systems:"
            - paragraph [ref=e166]:
              - strong [ref=e167]: Excessive agency
              - text: "is the most common failure mode. An agent with access to a database tool that can read, write, and delete rows when it only needs to read. An agent with shell access that can install packages when it should only run predefined scripts. The mitigation is straightforward: least-privilege scoping on every tool, with explicit allowlists rather than denylists."
            - paragraph [ref=e168]:
              - strong [ref=e169]: Prompt injection
              - text: remains the attack vector that keeps security teams awake. Direct injection (user crafts a malicious prompt) is well-understood. Indirect injection (a document, email, or web page contains instructions the agent follows) is harder to defend against because the attack surface includes every data source the agent can access.
            - paragraph [ref=e170]:
              - strong [ref=e171]: Insecure tool use
              - text: "covers agents that call external APIs without validating inputs, that pass user-controlled data into tool parameters, or that trust tool responses without verification. This is the agent equivalent of SQL injection: the tool layer becomes an attack surface when inputs aren’t sanitized."
            - paragraph [ref=e172]:
              - strong [ref=e173]: Data exfiltration through agents
              - text: happens when an agent reads sensitive information from one context and includes it in tool calls, API requests, or responses to a different user. Multi-tenant agent systems are especially vulnerable because the agent may process data across tenant boundaries without built-in isolation.
            - paragraph [ref=e174]: "The Agentic Top 10 introduced entirely new vulnerability classes that have no equivalent in traditional LLM security: ASI07 (Insecure Inter-Agent Communication), ASI08 (Cascading Failures in multi-agent chains), and ASI10 (Rogue Agents that deviate from their assigned goals). These reflect the gap between securing a single model and securing a fleet of autonomous agents that coordinate with each other."
            - paragraph [ref=e175]: OWASP provides a checklist format that development teams can work through sprint by sprint. It does not require enterprise licensing, vendor contracts, or compliance consultants. That practicality is why it belongs at the top of the implementation order.
            - paragraph [ref=e176]: "For additional context: on May 1, 2026, the Five Eyes intelligence alliance (CISA, NSA, and equivalents from Australia, Canada, New Zealand, and the UK) jointly published “Careful Adoption of Agentic AI Services.” Their core warning: “assume that agentic AI systems may behave unexpectedly and plan deployments accordingly.” When five national security agencies agree that agent systems require new safety assumptions, the framework conversation stops being theoretical."
            - 'heading "NIST: the governance layer" [level=2] [ref=e177]'
            - paragraph [ref=e178]: "NIST CAISI launched the AI Agent Standards Initiative in February 2026, covering three domains: agent identity and authentication, agent security and safety, agent interoperability, and (more recently) agent accountability chains."
            - paragraph [ref=e179]: "Where OWASP tells developers what to build, NIST tells organizations how to govern. The NIST AI Risk Management Framework (AI RMF) defines processes for identifying, assessing, and mitigating AI risks across the organization. The agent-specific additions address:"
            - list [ref=e180]:
              - listitem [ref=e181]: How to assign and verify agent identities across organizational boundaries
              - listitem [ref=e182]: How to establish accountability chains when agents act autonomously
              - listitem [ref=e183]: How to maintain audit trails for agent decisions and actions
              - listitem [ref=e184]: How to implement human oversight at appropriate decision points
            - paragraph [ref=e185]: "For startups and small teams, NIST guidance is aspirational rather than immediately actionable. The governance processes assume organizational structures (risk committees, policy review boards) that a five-person startup does not have. But the principles behind them matter: if an agent makes a consequential decision, someone needs to be accountable, and the decision needs to be traceable."
            - paragraph [ref=e186]: "The practical takeaway for builders: implement agent action logging from day one. Every tool call, every API request, every decision point should produce a structured log entry with the full context chain. This costs almost nothing to build but becomes critical when a customer asks “why did your agent do that?” or when a regulator requires an audit trail."
