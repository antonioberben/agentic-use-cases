          - generic [ref=e88]:
            - paragraph [ref=e89]: In the past 12 months, at least seven organizations have published security frameworks, guidance documents, or tooling specifically for AI agent systems. OWASP has its Agentic AI project. NIST launched the AI Agent Standards Initiative through CAISI. The EU AI Act hits full enforcement in August 2026. Cisco open-sourced DefenseClaw. Palo Alto shipped AIRS 3. Google updated SAIF. And smaller players like Lovable have published their own agent security playbooks.
            - paragraph [ref=e90]: Most recently, Lovable announced a partnership with the AI Underwriting Consortium (AIUC) to create AIUC-1, a certification standard specifically for coding agents. And according to Jeff Sutherland’s Agent Security Framework (ASF), 67% of organizations reported AI agent security incidents in Q2 2026.
            - paragraph [ref=e91]: "For a SaaS team shipping agents to production, this creates a practical problem: which of these frameworks actually matters, which ones overlap, and what should get implemented first?"
            - heading "The frameworks, side by side" [level=2] [ref=e92]
