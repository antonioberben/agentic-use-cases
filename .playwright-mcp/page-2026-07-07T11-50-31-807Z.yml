                            - generic [ref=f4e2831]:
                              - paragraph [ref=f4e2832]: "2. Without prejudice to Article 23(3), disclosure of inside information by a person intending to make a takeover bid for the securities of a company or a merger with a company to parties entitled to the securities, shall also constitute a market sounding, provided that:"
