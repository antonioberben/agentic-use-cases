                                - paragraph [ref=f4e1474]: This Regulation, as well as the delegated acts, implementing acts, regulatory technical standards, implementing technical standards and guidelines adopted in accordance therewith, are without prejudice to the application of Union rules on competition.
                        - table [ref=f4e1476]:
                          - rowgroup [ref=f4e1480]:
                            - row [ref=f4e1481]:
                              - cell "(81)" [ref=f4e1482]:
                                - paragraph [ref=f4e1483]: (81)
                              - cell [ref=f4e1484]:
                                - paragraph [ref=f4e1485]: In order to specify the requirements set out in this Regulation, the power to adopt acts in accordance with Article 290 TFEU should be delegated to the Commission in respect of the exemption from the scope of this Regulation of certain public bodies and central banks of third countries and of certain designated public bodies of third countries that have a linking agreement with the Union within the meaning of Article 25 of Directive 2003/87/EC; the indicators for manipulative behaviour listed in Annex I to this Regulation; the thresholds for determining the application of the public disclosure obligation to emission allowance market participants; the circumstances under which trading during a closed period is permitted; and the types of certain transactions conducted by persons discharging managerial responsibilities or persons closely associated with them that would trigger a requirement to notify. It is of particular importance that the Commission carry out appropriate consultations during its preparatory work, including at expert level. The Commission, when preparing and drawing-up delegated acts, should ensure a simultaneous, timely and appropriate transmission of relevant documents to the European Parliament and to the Council.
                        - table [ref=f4e1487]:
                          - rowgroup [ref=f4e1491]:
                            - row "(82) In order to ensure uniform conditions for the implementation of this Regulation in respect of procedures for the reporting of infringements of this Regulation, implementing powers should be conferred on the Commission to specify those procedures, including the arrangements for following up of the reports and measures for the protection of persons working under a contract of employment and measures for the protection of personal data. Those powers should be exercised in accordance with Regulation (EU) No 182/2011 of the European Parliament and of the Council (15)." [ref=f4e1492]:
