                            - generic [ref=f4e3375]:
                              - paragraph [ref=f4e3376]: "6. For the purposes of points (a) to (d) of paragraph 5, an issuer shall notify the competent authority specified under paragraph 3 of its intention to delay the disclosure of the inside information and provide evidence that the conditions set out in points (a), (b) and (c) of paragraph 5 are met. The competent authority specified under paragraph 3 shall consult, as appropriate, the national central bank or the macro-prudential authority, where instituted, or, alternatively, the following authorities:"
