                        - table [ref=f4e1533]:
                          - rowgroup [ref=f4e1537]:
                            - row "(86) Since the objective of this Regulation, namely to prevent market abuse in the form of insider dealing, the unlawful disclosure of inside information and market manipulation, cannot be sufficiently achieved by the Member States but can rather, by reason of its scale and effects, be better achieved at Union level, the Union may adopt measures, in accordance with the principle of subsidiarity as set out in Article 5 of the Treaty on European Union. In accordance with the principle of proportionality, as set out in that Article, this Regulation does not go beyond what is necessary in order to achieve that objective." [ref=f4e1538]:
                              - cell "(86)" [ref=f4e1539]:
