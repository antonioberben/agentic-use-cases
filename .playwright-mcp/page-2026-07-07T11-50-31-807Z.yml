                              - table [ref=f4e2843]:
                                - rowgroup [ref=f4e2847]:
                                  - row "(b) the willingness of parties entitled to the securities to offer their securities is reasonably required for the decision to make the takeover bid or merger." [ref=f4e2848]:
                                    - cell "(b)" [ref=f4e2849]:
