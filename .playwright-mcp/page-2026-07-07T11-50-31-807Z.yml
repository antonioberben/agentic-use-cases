                                    - cell "appropriate arrangements, systems and procedures for persons to comply with the requirements established in paragraphs 1 and 2; and" [ref=f4e3266]:
                                      - paragraph [ref=f4e3267]: appropriate arrangements, systems and procedures for persons to comply with the requirements established in paragraphs 1 and 2; and
                              - table [ref=f4e3268]:
