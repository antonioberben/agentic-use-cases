                                    - cell "has established, implemented and maintained adequate and effective internal arrangements and procedures that effectively ensure that neither the natural person who made the decision on its behalf to acquire or dispose of financial instruments to which the information relates, nor another natural person who may have had an influence on that decision, was in possession of the inside information; and" [ref=f4e2713]:
                                      - paragraph [ref=f4e2714]: has established, implemented and maintained adequate and effective internal arrangements and procedures that effectively ensure that neither the natural person who made the decision on its behalf to acquire or dispose of financial instruments to which the information relates, nor another natural person who may have had an influence on that decision, was in possession of the inside information; and
                              - table [ref=f4e2715]:
                                - rowgroup [ref=f4e2719]:
                                  - row "(b) has not encouraged, made a recommendation to, induced or otherwise influenced the natural person who, on behalf of the legal person, acquired or disposed of financial instruments to which the information relates." [ref=f4e2720]:
                                    - cell "(b)" [ref=f4e2721]:
