                        - table [ref=f4e1354]:
                          - rowgroup [ref=f4e1358]:
                            - row "(70) A sound prudential and conduct of business framework for the financial sector should rest on strong supervisory, investigation and sanction regimes. To that end, supervisory authorities should be equipped with sufficient powers to act and should be able to rely on equal, strong and deterrent sanction regimes against all financial misconduct, and sanctions should be enforced effectively. However, the de Larosière Group considered that none of those elements is currently in place. A review of existing powers to impose sanctions and their practical application aimed at promoting convergence of sanctions across the range of supervisory activities has been carried out in the Commission Communication of 8 December 2010 on Reinforcing sanctioning regimes in the financial sector." [ref=f4e1359]:
                              - cell "(70)" [ref=f4e1360]:
                                - paragraph [ref=f4e1361]: (70)
                              - cell "A sound prudential and conduct of business framework for the financial sector should rest on strong supervisory, investigation and sanction regimes. To that end, supervisory authorities should be equipped with sufficient powers to act and should be able to rely on equal, strong and deterrent sanction regimes against all financial misconduct, and sanctions should be enforced effectively. However, the de Larosière Group considered that none of those elements is currently in place. A review of existing powers to impose sanctions and their practical application aimed at promoting convergence of sanctions across the range of supervisory activities has been carried out in the Commission Communication of 8 December 2010 on Reinforcing sanctioning regimes in the financial sector." [ref=f4e1362]:
                                - paragraph [ref=f4e1363]: A sound prudential and conduct of business framework for the financial sector should rest on strong supervisory, investigation and sanction regimes. To that end, supervisory authorities should be equipped with sufficient powers to act and should be able to rely on equal, strong and deterrent sanction regimes against all financial misconduct, and sanctions should be enforced effectively. However, the de Larosière Group considered that none of those elements is currently in place. A review of existing powers to impose sanctions and their practical application aimed at promoting convergence of sanctions across the range of supervisory activities has been carried out in the Commission Communication of 8 December 2010 on Reinforcing sanctioning regimes in the financial sector.
                        - table [ref=f4e1365]:
                          - rowgroup [ref=f4e1369]:
                            - row [ref=f4e1370]:
                              - cell "(71)" [ref=f4e1371]:
                                - paragraph [ref=f4e1372]: (71)
                              - cell [ref=f4e1373]:
                                - paragraph [ref=f4e1374]: Therefore, a set of administrative sanctions and other administrative measures should be provided for to ensure a common approach in Member States and to enhance their deterrent effect. The possibility of a ban from exercising management functions within investment firms should be available to the competent authority. Sanctions imposed in specific cases should be determined taking into account where appropriate factors such as the disgorgement of any identified financial benefit, the gravity and duration of the infringement, any aggravating or mitigating factors, the need for fines to have a deterrent effect and, where appropriate, include a discount for cooperation with the competent authority. In particular, the actual amount of administrative fines to be imposed in a specific case may reach the maximum level provided for in this Regulation, or the higher level provided for in national law, for very serious infringements, while fines significantly lower than the maximum level may be applied to minor infringements or in case of settlement. This Regulation does not limit Member States’ ability to provide for higher administrative sanctions or other administrative measures.
                        - table [ref=f4e1376]:
                          - rowgroup [ref=f4e1380]:
                            - row [ref=f4e1381]:
                              - cell "(72)" [ref=f4e1382]:
                                - paragraph [ref=f4e1383]: (72)
                              - cell [ref=f4e1384]:
                                - paragraph [ref=f4e1385]: Even though nothing prevents Member States from laying down rules for administrative as well as criminal sanctions for the same infringements, they should not be required to lay down rules for administrative sanctions for infringements of this Regulation which are already subject to national criminal law by 3 July 2016. In accordance with national law, Member States are not obliged to impose both administrative and criminal sanctions for the same offence, but they can do so if their national law so permits. However, maintenance of criminal sanctions rather than administrative sanctions for infringements of this Regulation or of Directive 2014/57/EU should not reduce or otherwise affect the ability of competent authorities to cooperate and access and exchange information in a timely manner with competent authorities in other Member States for the purposes of this Regulation, including after any referral of the relevant infringements to the competent judicial authorities for criminal prosecution.
                        - table [ref=f4e1387]:
                          - rowgroup [ref=f4e1391]:
                            - row [ref=f4e1392]:
                              - cell "(73)" [ref=f4e1393]:
                                - paragraph [ref=f4e1394]: (73)
                              - cell [ref=f4e1395]:
                                - paragraph [ref=f4e1396]: In order to ensure that decisions made by competent authorities have a dissuasive effect on the public at large, they should normally be published. The publication of decisions is also an important tool for competent authorities to inform market participants of what behaviour is considered to be an infringement of this Regulation and to promote good behaviour amongst market participants. If such publication causes disproportionate damage to the persons involved or jeopardises the stability of financial markets or an ongoing investigation the competent authority should publish the administrative sanctions and other administrative measures on an anonymous basis in accordance with national law or delay the publication. Competent authorities should have the option of not publishing sanctions and other administrative measures where anonymous or delayed publication is considered to be insufficient to ensure that the stability of the financial markets will not be jeopardised. Competent authorities should also not be required to publish measures which are deemed to be of a minor nature and the publication of which would be disproportionate.
                        - table [ref=f4e1398]:
                          - rowgroup [ref=f4e1402]:
                            - row [ref=f4e1403]:
                              - cell "(74)" [ref=f4e1404]:
                                - paragraph [ref=f4e1405]: (74)
                              - cell [ref=f4e1406]:
                                - paragraph [ref=f4e1407]: Whistleblowers may bring new information to the attention of competent authorities which assists them in detecting and imposing sanctions in cases of insider dealing and market manipulation. However, whistleblowing may be deterred for fear of retaliation, or for lack of incentives. Reporting of infringements of this Regulation is necessary to ensure that a competent authority may detect and impose sanctions for market abuse. Measures regarding whistleblowing are necessary to facilitate detection of market abuse and to ensure the protection and the respect of the rights of the whistleblower and the accused person. This Regulation should therefore ensure that adequate arrangements are in place to enable whistleblowers to alert competent authorities to possible infringements of this Regulation and to protect them from retaliation. Member States should be allowed to provide for financial incentives for those persons who offer relevant information about potential infringements of this Regulation. However, whistleblowers should only be entitled to such financial incentives where they bring to light new information which they are not already legally obliged to notify and where that information results in a sanction for an infringement of this Regulation. Member States should also ensure that whistleblowing schemes that they implement include mechanisms that provide appropriate protection of an accused person, particularly with regard to the right to the protection of his personal data and procedures to ensure the right of the accused person of defence and to be heard before the adoption of a decision concerning him as well as the right to seek effective remedy before a court against a decision concerning him.
                        - table [ref=f4e1409]:
                          - rowgroup [ref=f4e1413]:
                            - row "(75) Since Member States have adopted legislation implementing Directive 2003/6/EC, and since the delegated acts, regulatory technical standards and implementing technical standards provided for in this Regulation should be adopted before the framework to be introduced can be usefully applied, it is necessary to defer the application of the substantive provisions of this Regulation for a sufficient period of time." [ref=f4e1414]:
