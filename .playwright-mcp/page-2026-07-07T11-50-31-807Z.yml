                        - table [ref=f4e1454]:
                          - rowgroup [ref=f4e1458]:
                            - row "(79) Directive 95/46/EC and Regulation (EC) No 45/2001 govern the processing of personal data carried out by ESMA within the framework of this Regulation and under the supervision of the Member States competent authorities, in particular the public independent authorities designated by the Member States. Any exchange or transmission of information by competent authorities should be in accordance with the rules on the transfer of personal data as laid down in Directive 95/46/EC. Any exchange or transmission of information by ESMA should be in accordance with the rules on the transfer of personal data as laid down in Regulation (EC) No 45/2001." [ref=f4e1459]:
