                          - paragraph [ref=f4e1580]: CHAPTER 1
                          - paragraph [ref=f4e1582]: GENERAL PROVISIONS
                          - generic [ref=f4e1583]:
                            - paragraph [ref=f4e1584]: Article 1
                            - paragraph [ref=f4e1586]: Subject matter
                            - paragraph [ref=f4e1587]: This Regulation establishes a common regulatory framework on insider dealing, the unlawful disclosure of inside information and market manipulation (market abuse) as well as measures to prevent market abuse to ensure the integrity of financial markets in the Union and to enhance investor protection and confidence in those markets.
