                                    - cell "specific procedures for the receipt of reports of infringements and their follow-up, including the establishment of secure communication channels for such reports;" [ref=f4e4579]:
                                      - paragraph [ref=f4e4580]: specific procedures for the receipt of reports of infringements and their follow-up, including the establishment of secure communication channels for such reports;
                              - table [ref=f4e4581]:
                                - rowgroup [ref=f4e4585]:
                                  - row "(b) within their employment, appropriate protection for persons working under a contract of employment, who report infringements or are accused of infringements, against retaliation, discrimination or other types of unfair treatment at a minimum; and" [ref=f4e4586]:
                                    - cell "(b)" [ref=f4e4587]:
                                      - paragraph [ref=f4e4588]: (b)
                                    - cell "within their employment, appropriate protection for persons working under a contract of employment, who report infringements or are accused of infringements, against retaliation, discrimination or other types of unfair treatment at a minimum; and" [ref=f4e4589]:
                                      - paragraph [ref=f4e4590]: within their employment, appropriate protection for persons working under a contract of employment, who report infringements or are accused of infringements, against retaliation, discrimination or other types of unfair treatment at a minimum; and
                              - table [ref=f4e4591]:
                                - rowgroup [ref=f4e4595]:
                                  - row "(c) protection of personal data both of the person who reports the infringement and the natural person who allegedly committed the infringement, including protection in relation to preserving the confidentiality of their identity, at all stages of the procedure without prejudice to disclosure of information being required by national law in the context of investigations or subsequent judicial proceedings." [ref=f4e4596]:
                                    - cell "(c)" [ref=f4e4597]:
