                            - paragraph [ref=f4e2616]: 2. For the purposes of paragraph 1, information shall be deemed to be of a precise nature if it indicates a set of circumstances which exists or which may reasonably be expected to come into existence, or an event which has occurred or which may reasonably be expected to occur, where it is specific enough to enable a conclusion to be drawn as to the possible effect of that set of circumstances or event on the prices of the financial instruments or the related derivative financial instrument, the related spot commodity contracts, or the auctioned products based on the emission allowances. In this respect in the case of a protracted process that is intended to bring about, or that results in, particular circumstances or a particular event, those future circumstances or that future event, and also the intermediate steps of that process which are connected with bringing about or resulting in those future circumstances or that future event, may be deemed to be precise information.
                            - paragraph [ref=f4e2618]: 3. An intermediate step in a protracted process shall be deemed to be inside information if, by itself, it satisfies the criteria of inside information as referred to in this Article.
                            - generic [ref=f4e2619]:
                              - paragraph [ref=f4e2620]: 4. For the purposes of paragraph 1, information which, if it were made public, would be likely to have a significant effect on the prices of financial instruments, derivative financial instruments, related spot commodity contracts, or auctioned products based on emission allowances shall mean information a reasonable investor would be likely to use as part of the basis of his or her investment decisions.
                              - paragraph [ref=f4e2621]: In the case of participants in the emission allowance market with aggregate emissions or rated thermal input at or below the threshold set in accordance with the second subparagraph of Article 17(2), information about their physical operations shall be deemed not to have a significant effect on the price of emission allowances, of auctioned products based thereon, or of derivative financial instruments.
                            - paragraph [ref=f4e2623]: 5. ESMA shall issue guidelines to establish a non-exhaustive indicative list of information which is reasonably expected or is required to be disclosed in accordance with legal or regulatory provisions in Union or national law, market rules, contract, practice or custom, on the relevant commodity derivatives markets or spot markets as referred to in point (b) of paragraph 1. ESMA shall duly take into account specificities of those markets.
                          - generic [ref=f4e2624]:
                            - paragraph [ref=f4e2625]: Article 8
                            - paragraph [ref=f4e2627]: Insider dealing
                            - paragraph [ref=f4e2629]: 1. For the purposes of this Regulation, insider dealing arises where a person possesses inside information and uses that information by acquiring or disposing of, for its own account or for the account of a third party, directly or indirectly, financial instruments to which that information relates. The use of inside information by cancelling or amending an order concerning a financial instrument to which the information relates where the order was placed before the person concerned possessed the inside information, shall also be considered to be insider dealing. In relation to auctions of emission allowances or other auctioned products based thereon that are held pursuant to Regulation (EU) No 1031/2010, the use of inside information shall also comprise submitting, modifying or withdrawing a bid by a person for its own account or for the account of a third party.
                            - generic [ref=f4e2630]:
                              - paragraph [ref=f4e2631]: "2. For the purposes of this Regulation, recommending that another person engage in insider dealing, or inducing another person to engage in insider dealing, arises where the person possesses inside information and:"
                              - table [ref=f4e2632]:
                                - rowgroup [ref=f4e2636]:
                                  - row "(a) recommends, on the basis of that information, that another person acquire or dispose of financial instruments to which that information relates, or induces that person to make such an acquisition or disposal, or" [ref=f4e2637]:
                                    - cell "(a)" [ref=f4e2638]:
                                      - paragraph [ref=f4e2639]: (a)
                                    - cell "recommends, on the basis of that information, that another person acquire or dispose of financial instruments to which that information relates, or induces that person to make such an acquisition or disposal, or" [ref=f4e2640]:
                                      - paragraph [ref=f4e2641]: recommends, on the basis of that information, that another person acquire or dispose of financial instruments to which that information relates, or induces that person to make such an acquisition or disposal, or
                              - table [ref=f4e2642]:
                                - rowgroup [ref=f4e2646]:
                                  - row "(b) recommends, on the basis of that information, that another person cancel or amend an order concerning a financial instrument to which that information relates, or induces that person to make such a cancellation or amendment." [ref=f4e2647]:
                                    - cell "(b)" [ref=f4e2648]:
                                      - paragraph [ref=f4e2649]: (b)
                                    - cell "recommends, on the basis of that information, that another person cancel or amend an order concerning a financial instrument to which that information relates, or induces that person to make such a cancellation or amendment." [ref=f4e2650]:
                                      - paragraph [ref=f4e2651]: recommends, on the basis of that information, that another person cancel or amend an order concerning a financial instrument to which that information relates, or induces that person to make such a cancellation or amendment.
                            - paragraph [ref=f4e2653]: 3. The use of the recommendations or inducements referred to in paragraph 2 amounts to insider dealing within the meaning of this Article where the person using the recommendation or inducement knows or ought to know that it is based upon inside information.
                            - generic [ref=f4e2654]:
                              - paragraph [ref=f4e2655]: "4. This Article applies to any person who possesses inside information as a result of:"
