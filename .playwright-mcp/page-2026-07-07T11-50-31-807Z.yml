                                    - cell "the willingness of parties entitled to the securities to offer their securities is reasonably required for the decision to make the takeover bid or merger." [ref=f4e2851]:
                                      - paragraph [ref=f4e2852]: the willingness of parties entitled to the securities to offer their securities is reasonably required for the decision to make the takeover bid or merger.
                            - paragraph [ref=f4e2854]: 3. A disclosing market participant shall, prior to conducting a market sounding, specifically consider whether the market sounding will involve the disclosure of inside information. The disclosing market participant shall make a written record of its conclusion and the reasons therefor. It shall provide such written records to the competent authority upon request. This obligation shall apply to each disclosure of information throughout the course of the market sounding. The disclosing market participant shall update the written records referred to in this paragraph accordingly.
                            - paragraph [ref=f4e2856]: 4. For the purposes of Article 10(1), disclosure of inside information made in the course of a market sounding shall be deemed to be made in the normal exercise of a person’s employment, profession or duties where the disclosing market participant complies with paragraphs 3 and 5 of this Article.
                            - generic [ref=f4e2857]:
                              - paragraph [ref=f4e2858]: "5. For the purposes of paragraph 4, the disclosing market participant shall, before making the disclosure:"
                              - table [ref=f4e2859]:
                                - rowgroup [ref=f4e2863]:
                                  - row "(a) obtain the consent of the person receiving the market sounding to receive inside information;" [ref=f4e2864]:
                                    - cell "(a)" [ref=f4e2865]:
                                      - paragraph [ref=f4e2866]: (a)
                                    - cell "obtain the consent of the person receiving the market sounding to receive inside information;" [ref=f4e2867]:
