                              - table [ref=f4e2869]:
                                - rowgroup [ref=f4e2873]:
                                  - row "(b) inform the person receiving the market sounding that he is prohibited from using that information, or attempting to use that information, by acquiring or disposing of, for his own account or for the account of a third party, directly or indirectly, financial instruments relating to that information;" [ref=f4e2874]:
                                    - cell "(b)" [ref=f4e2875]:
                                      - paragraph [ref=f4e2876]: (b)
                                    - cell "inform the person receiving the market sounding that he is prohibited from using that information, or attempting to use that information, by acquiring or disposing of, for his own account or for the account of a third party, directly or indirectly, financial instruments relating to that information;" [ref=f4e2877]:
                                      - paragraph [ref=f4e2878]: inform the person receiving the market sounding that he is prohibited from using that information, or attempting to use that information, by acquiring or disposing of, for his own account or for the account of a third party, directly or indirectly, financial instruments relating to that information;
                              - table [ref=f4e2879]:
                                - rowgroup [ref=f4e2883]:
                                  - row "(c) inform the person receiving the market sounding that he is prohibited from using that information, or attempting to use that information, by cancelling or amending an order which has already been placed concerning a financial instrument to which the information relates; and" [ref=f4e2884]:
                                    - cell "(c)" [ref=f4e2885]:
                                      - paragraph [ref=f4e2886]: (c)
                                    - cell "inform the person receiving the market sounding that he is prohibited from using that information, or attempting to use that information, by cancelling or amending an order which has already been placed concerning a financial instrument to which the information relates; and" [ref=f4e2887]:
                                      - paragraph [ref=f4e2888]: inform the person receiving the market sounding that he is prohibited from using that information, or attempting to use that information, by cancelling or amending an order which has already been placed concerning a financial instrument to which the information relates; and
                              - table [ref=f4e2889]:
                                - rowgroup [ref=f4e2893]:
                                  - row "(d) inform the person receiving the market sounding that by agreeing to receive the information he is obliged to keep the information confidential." [ref=f4e2894]:
                                    - cell "(d)" [ref=f4e2895]:
                                      - paragraph [ref=f4e2896]: (d)
                                    - cell "inform the person receiving the market sounding that by agreeing to receive the information he is obliged to keep the information confidential." [ref=f4e2897]:
                                      - paragraph [ref=f4e2898]: inform the person receiving the market sounding that by agreeing to receive the information he is obliged to keep the information confidential.
                              - paragraph [ref=f4e2899]: The disclosing market participant shall make and maintain a record of all information given to the person receiving the market sounding, including the information given in accordance with points (a) to (d) of the first subparagraph, and the identity of the potential investors to whom the information has been disclosed, including but not limited to the legal and natural persons acting on behalf of the potential investor, and the date and time of each disclosure. The disclosing market participant shall provide that record to the competent authority upon request.
                            - generic [ref=f4e2900]:
                              - paragraph [ref=f4e2901]: 6. Where information that has been disclosed in the course of a market sounding ceases to be inside information according to the assessment of the disclosing market participant, the disclosing market participant shall inform the recipient accordingly, as soon as possible.
                              - paragraph [ref=f4e2902]: The disclosing market participant shall maintain a record of the information given in accordance with this paragraph and shall provide it to the competent authority upon request.
                            - paragraph [ref=f4e2904]: 7. Notwithstanding the provisions of this Article, the person receiving the market sounding shall assess for itself whether it is in possession of inside information or when it ceases to be in possession of inside information.
                            - paragraph [ref=f4e2906]: 8. The disclosing market participant shall keep the records referred to in this Article for a period of at least five years.
                            - generic [ref=f4e2907]:
                              - paragraph [ref=f4e2908]: 9. In order to ensure consistent harmonisation of this Article, ESMA shall develop draft regulatory technical standards to determine appropriate arrangements, procedures and record keeping requirements for persons to comply with the requirements laid down in paragraphs 4, 5, 6 and 8.
                              - paragraph [ref=f4e2909]: ESMA shall submit those draft regulatory technical standards to the Commission by 3 July 2015.
                              - paragraph [ref=f4e2910]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the first subparagraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
                            - generic [ref=f4e2911]:
                              - paragraph [ref=f4e2912]: 10. In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to specify the systems and notification templates to be used by persons to comply with the requirements established by paragraphs 4, 5, 6 and 8 of this Article, particularly the precise format of the records referred to in paragraphs 4 to 8 and the technical means for appropriate communication of the information referred to in paragraph 6 to the person receiving the market sounding.
                              - paragraph [ref=f4e2913]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2015.
                              - paragraph [ref=f4e2914]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
