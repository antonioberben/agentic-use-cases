                              - paragraph [ref=f4e3201]: 11. Competent authorities shall notify accepted market practices that they have established before 2 July 2014 to ESMA within three months of the entry into force of the regulatory technical standards referred to in paragraph 7.
                              - paragraph [ref=f4e3202]: The accepted market practices referred to in the first subparagraph of this paragraph shall continue to apply in the Member State concerned until the competent authority has made a decision regarding the continuation of that practice following ESMA’s opinion under paragraph 4.
