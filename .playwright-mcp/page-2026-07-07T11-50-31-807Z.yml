                              - cell "Technical standards in financial services should ensure uniform conditions across the Union in matters covered by this Regulation. As a body with highly specialised expertise, it would be efficient and appropriate to entrust ESMA with the elaboration of draft regulatory technical standards and draft implementing technical standards which do not involve policy choices, for submission to the Commission." [ref=f4e1507]:
                                - paragraph [ref=f4e1508]: Technical standards in financial services should ensure uniform conditions across the Union in matters covered by this Regulation. As a body with highly specialised expertise, it would be efficient and appropriate to entrust ESMA with the elaboration of draft regulatory technical standards and draft implementing technical standards which do not involve policy choices, for submission to the Commission.
                        - table [ref=f4e1510]:
                          - rowgroup [ref=f4e1514]:
                            - row [ref=f4e1515]:
                              - cell "(84)" [ref=f4e1516]:
                                - paragraph [ref=f4e1517]: (84)
                              - cell [ref=f4e1518]:
                                - paragraph [ref=f4e1519]:
                                  - text: The Commission should be empowered to adopt the draft regulatory technical standards developed by ESMA to specify the content of notifications that will have to be made by the operators of regulated markets, MTFs and OTFs concerning the financial instruments that are admitted to trading, traded, or for which a request for admission to trading on their trading venue has been made; the manner and conditions of compilation, publication and maintenance of the list of those instruments by ESMA; the conditions that buy-back programmes and stabilisation measures must meet including conditions for trading, time and volume restrictions, disclosure and reporting obligations and price conditions for the stabilisation; in relation to procedures and arrangements, systems for trading venues aimed at preventing and detecting market abuse and of systems and templates to be used by persons in order to detect and notify suspicious orders and transactions; appropriate arrangements, procedures and record-keeping requirements in the process of market soundings; and in respect of technical arrangements for categories of persons for objective presentation of information recommending an investment strategy and for disclosure of particular interests or indications of conflicts of interest by means of delegated acts pursuant to Article 290 TFEU and in accordance with Articles 10 to 14 of Regulation (EU) No 1093/2010 of the European Parliament and of the Council
                                  - link "(16)" [ref=f4e1520] [cursor=pointer]:
                                    - /url: "#ntr16-L_2014173EN.01000101-E0016"
                                  - text: . It is of particular importance that the Commission carry out appropriate consultations during its preparatory work, including at expert level.
                        - table [ref=f4e1522]:
                          - rowgroup [ref=f4e1526]:
                            - row "(85) The Commission should also be empowered to adopt implementing technical standards by means of implementing acts pursuant to Article 291 TFEU and in accordance with Article 15 of Regulation (EU) No 1093/2010. ESMA should be entrusted with drafting implementing technical standards for submission to the Commission with regard to public disclosure of inside information, formats of insider lists and formats and procedures for the cooperation and exchange of information of competent authorities among themselves and with ESMA." [ref=f4e1527]:
