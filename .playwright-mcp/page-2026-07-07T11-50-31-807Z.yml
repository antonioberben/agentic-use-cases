                              - cell "Ex post information can be used to check the presumption that the ex ante information was price sensitive, but should not be used to take action against persons who drew reasonable conclusions from ex ante information available to them." [ref=f4e746]:
                                - paragraph [ref=f4e747]: Ex post information can be used to check the presumption that the ex ante information was price sensitive, but should not be used to take action against persons who drew reasonable conclusions from ex ante information available to them.
                        - table [ref=f4e749]:
                          - rowgroup [ref=f4e753]:
                            - row "(16) Where inside information concerns a process which occurs in stages, each stage of the process as well as the overall process could constitute inside information. An intermediate step in a protracted process may in itself constitute a set of circumstances or an event which exists or where there is a realistic prospect that they will come into existence or occur, on the basis of an overall assessment of the factors existing at the relevant time. However, that notion should not be interpreted as meaning that the magnitude of the effect of that set of circumstances or that event on the prices of the financial instruments concerned must be taken into consideration. An intermediate step should be deemed to be inside information if it, by itself, meets the criteria laid down in this Regulation for inside information." [ref=f4e754]:
                              - cell "(16)" [ref=f4e755]:
                                - paragraph [ref=f4e756]: (16)
                              - cell "Where inside information concerns a process which occurs in stages, each stage of the process as well as the overall process could constitute inside information. An intermediate step in a protracted process may in itself constitute a set of circumstances or an event which exists or where there is a realistic prospect that they will come into existence or occur, on the basis of an overall assessment of the factors existing at the relevant time. However, that notion should not be interpreted as meaning that the magnitude of the effect of that set of circumstances or that event on the prices of the financial instruments concerned must be taken into consideration. An intermediate step should be deemed to be inside information if it, by itself, meets the criteria laid down in this Regulation for inside information." [ref=f4e757]:
                                - paragraph [ref=f4e758]: Where inside information concerns a process which occurs in stages, each stage of the process as well as the overall process could constitute inside information. An intermediate step in a protracted process may in itself constitute a set of circumstances or an event which exists or where there is a realistic prospect that they will come into existence or occur, on the basis of an overall assessment of the factors existing at the relevant time. However, that notion should not be interpreted as meaning that the magnitude of the effect of that set of circumstances or that event on the prices of the financial instruments concerned must be taken into consideration. An intermediate step should be deemed to be inside information if it, by itself, meets the criteria laid down in this Regulation for inside information.
                        - table [ref=f4e760]:
                          - rowgroup [ref=f4e764]:
                            - row "(17) Information which relates to an event or set of circumstances which is an intermediate step in a protracted process may relate, for example, to the state of contract negotiations, terms provisionally agreed in contract negotiations, the possibility of the placement of financial instruments, conditions under which financial instruments will be marketed, provisional terms for the placement of financial instruments, or the consideration of the inclusion of a financial instrument in a major index or the deletion of a financial instrument from such an index." [ref=f4e765]:
                              - cell "(17)" [ref=f4e766]:
                                - paragraph [ref=f4e767]: (17)
                              - cell "Information which relates to an event or set of circumstances which is an intermediate step in a protracted process may relate, for example, to the state of contract negotiations, terms provisionally agreed in contract negotiations, the possibility of the placement of financial instruments, conditions under which financial instruments will be marketed, provisional terms for the placement of financial instruments, or the consideration of the inclusion of a financial instrument in a major index or the deletion of a financial instrument from such an index." [ref=f4e768]:
                                - paragraph [ref=f4e769]: Information which relates to an event or set of circumstances which is an intermediate step in a protracted process may relate, for example, to the state of contract negotiations, terms provisionally agreed in contract negotiations, the possibility of the placement of financial instruments, conditions under which financial instruments will be marketed, provisional terms for the placement of financial instruments, or the consideration of the inclusion of a financial instrument in a major index or the deletion of a financial instrument from such an index.
                        - table [ref=f4e771]:
                          - rowgroup [ref=f4e775]:
                            - row "(18) Legal certainty for market participants should be enhanced through a closer definition of two of the elements essential to the definition of inside information, namely the precise nature of that information and the significance of its potential effect on the prices of the financial instruments, the related spot commodity contracts, or the auctioned products based on the emission allowances. For derivatives which are wholesale energy products, information required to be disclosed in accordance with Regulation (EU) No 1227/2011 of the European Parliament and of the Council (5) should, in particular, be considered as inside information." [ref=f4e776]:
                              - cell "(18)" [ref=f4e777]:
                                - paragraph [ref=f4e778]: (18)
                              - cell "Legal certainty for market participants should be enhanced through a closer definition of two of the elements essential to the definition of inside information, namely the precise nature of that information and the significance of its potential effect on the prices of the financial instruments, the related spot commodity contracts, or the auctioned products based on the emission allowances. For derivatives which are wholesale energy products, information required to be disclosed in accordance with Regulation (EU) No 1227/2011 of the European Parliament and of the Council (5) should, in particular, be considered as inside information." [ref=f4e779]:
