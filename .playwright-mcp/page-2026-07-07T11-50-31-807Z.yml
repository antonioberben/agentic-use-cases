                              - paragraph [ref=f4e3472]: 2. Issuers or any person acting on their behalf or on their account, shall take all reasonable steps to ensure that any person on the insider list acknowledges in writing the legal and regulatory duties entailed and is aware of the sanctions applicable to insider dealing and unlawful disclosure of inside information.
                              - paragraph [ref=f4e3473]: Where another person acting on behalf or on the account of the issuer assumes the task of drawing up and updating the insider list, the issuer remains fully responsible for complying with this Article. The issuer shall always retain a right of access to the insider list.
