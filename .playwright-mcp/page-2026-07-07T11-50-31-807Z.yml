                                  - text: Legal certainty for market participants should be enhanced through a closer definition of two of the elements essential to the definition of inside information, namely the precise nature of that information and the significance of its potential effect on the prices of the financial instruments, the related spot commodity contracts, or the auctioned products based on the emission allowances. For derivatives which are wholesale energy products, information required to be disclosed in accordance with Regulation (EU) No 1227/2011 of the European Parliament and of the Council
                                  - link "(5)" [ref=f4e781] [cursor=pointer]:
                                    - /url: "#ntr5-L_2014173EN.01000101-E0005"
                                  - text: should, in particular, be considered as inside information.
                        - table [ref=f4e783]:
                          - rowgroup [ref=f4e787]:
                            - row "(19) This Regulation is not intended to prohibit discussions of a general nature regarding the business and market developments between shareholders and management concerning an issuer. Such relationships are essential for the efficient functioning of markets and should not be prohibited by this Regulation." [ref=f4e788]:
                              - cell "(19)" [ref=f4e789]:
                                - paragraph [ref=f4e790]: (19)
                              - cell "This Regulation is not intended to prohibit discussions of a general nature regarding the business and market developments between shareholders and management concerning an issuer. Such relationships are essential for the efficient functioning of markets and should not be prohibited by this Regulation." [ref=f4e791]:
                                - paragraph [ref=f4e792]: This Regulation is not intended to prohibit discussions of a general nature regarding the business and market developments between shareholders and management concerning an issuer. Such relationships are essential for the efficient functioning of markets and should not be prohibited by this Regulation.
                        - table [ref=f4e794]:
                          - rowgroup [ref=f4e798]:
                            - row [ref=f4e799]:
                              - cell "(20)" [ref=f4e800]:
                                - paragraph [ref=f4e801]: (20)
                              - cell [ref=f4e802]:
                                - paragraph [ref=f4e803]: Spot markets and related derivative markets are highly interconnected and global, and market abuse may take place across markets as well as across borders which can lead to significant systemic risks. This is true for both insider dealing and market manipulation. In particular, inside information from a spot market can benefit a person trading on a financial market. Inside information in relation to a derivative of a commodity should be defined as information which both meets the general definition of inside information in relation to financial markets and which is required to be made public in accordance with legal or regulatory provisions at the Union or national level, market rules, contracts or customs on the relevant commodity derivative or spot market. Notable examples of such rules include Regulation (EU) No 1227/2011 for the energy market and the Joint Organisations Database Initiative (JODI) database for oil. Such information may serve as the basis of market participants’ decisions to enter into commodity derivatives or the related spot commodity contracts and should therefore constitute inside information required to be made public, where it is likely to have a significant effect on the prices of such derivatives or related spot commodity contracts.
                                - paragraph [ref=f4e804]: Moreover, manipulative strategies can also extend across spot and derivatives markets. Trading in financial instruments, including commodity derivatives, can be used to manipulate related spot commodity contracts and spot commodity contracts can be used to manipulate related financial instruments. The prohibition of market manipulation should capture these inter-linkages. However, it is not appropriate or practicable to extend the scope of this Regulation to behaviour that does not involve financial instruments, for example, to trading in spot commodity contracts that only affects the spot market. In the specific case of wholesale energy products, the competent authorities should take into account the specific characteristics of the definitions of Regulation (EU) No 1227/2011 when they apply the definitions of inside information, insider dealing and market manipulation under this Regulation to financial instruments related to wholesale energy products.
                        - table [ref=f4e806]:
                          - rowgroup [ref=f4e810]:
                            - row [ref=f4e811]:
                              - cell "(21)" [ref=f4e812]:
                                - paragraph [ref=f4e813]: (21)
                              - cell [ref=f4e814]:
                                - paragraph [ref=f4e815]:
                                  - text: Pursuant to Directive 2003/87/EC of the European Parliament and of the Council
                                  - link "(6)" [ref=f4e816] [cursor=pointer]:
                                    - /url: "#ntr6-L_2014173EN.01000101-E0006"
                                  - text: ", the Commission, Member States and other officially designated bodies are, inter alia, responsible for the technical issuance of emission allowances, their free allocation to eligible industry sectors and new entrants and more generally the development and implementation of the Union’s climate policy framework which underpins the supply of emission allowances to compliance buyers of the Union’s emissions trading scheme (EU ETS). In the exercise of those duties, those public bodies can, inter alia, have access to price-sensitive, non-public information and, pursuant to Directive 2003/87/EC, may need to perform certain market operations in relation to emission allowances. As a consequence of the classification of emission allowances as financial instruments as part of the review of Directive 2004/39/EC of the European Parliament and of the Council"
                                  - link "(7)" [ref=f4e817] [cursor=pointer]:
                                    - /url: "#ntr7-L_2014173EN.01000101-E0007"
                                  - text: ", those instruments will also fall within the scope of this Regulation."
                                - paragraph [ref=f4e818]: In order to preserve the ability of the Commission, Member States and other officially designated bodies to develop and implement the Union’s climate policy, the activities of those public bodies, insofar as they are undertaken in the public interest and explicitly in pursuit of that policy and concerning emission allowances, should be exempt from the application of this Regulation. Such exemption should not have a negative impact on overall market transparency, as those public bodies have statutory obligations to operate in a way that ensures orderly, fair and non-discriminatory disclosure of, and access to, any new decisions, developments and data that have a price-sensitive nature. Furthermore, safeguards of fair and non-discriminatory disclosure of specific price-sensitive information held by public authorities exist under Directive 2003/87/EC and the implementing measures adopted pursuant thereto. At the same time, the exemption for public bodies acting in pursuit of the Union’s climate policy should not extend to cases in which those public bodies engage in conduct or in transactions which are not in the pursuit of the Union’s climate policy or when persons working for those bodies engage in conduct or in transactions on their own account.
                        - table [ref=f4e820]:
                          - rowgroup [ref=f4e824]:
                            - row [ref=f4e825]:
                              - cell "(22)" [ref=f4e826]:
                                - paragraph [ref=f4e827]: (22)
                              - cell [ref=f4e828]:
                                - paragraph [ref=f4e829]: Pursuant to Article 43 TFEU and to the implementation of international agreements concluded under the TFEU, the Commission, Member States and other officially designated bodies are, inter alia, responsible for pursuing the Common Agricultural Policy (CAP) and the Common Fisheries Policy (CFP). In the exercise of those duties, those public bodies undertake activities and take measures aiming to manage the agricultural markets and fisheries, including those of public intervention, imposing additional, or suspending, import duties. In the light of the scope of this Regulation, certain provisions thereof that apply to spot commodity contracts which have or which are likely to have an effect on financial instruments and financial instruments the value of which depends on the value of spot commodity contracts and which have or which are likely to have an effect on spot commodity contracts, it is necessary to ensure that the activity of the Commission, Member States and other bodies officially designated to pursue the CAP and the CFP, is not restricted. In order to preserve the ability of the Commission, Member States and other officially designated bodies to develop and pursue the CAP and the CFP, their activities, insofar as they are undertaken in the public interest and solely in pursuance of those policies, should be exempted from the application of this Regulation. Such exemption should not have a negative impact on overall market transparency, as those public bodies have statutory obligations to operate in a way that ensures orderly, fair and non-discriminatory disclosure of, and access to, any new decisions, developments and data that have a price-sensitive nature. At the same time, the exemption for public bodies acting in pursuance of the CAP and the CFP should not extend to cases where those public bodies engage in conduct or in transactions which are not in pursuance of the CAP and the CFP or where persons working for those bodies engage in conduct or in transactions on their own account.
                        - table [ref=f4e831]:
                          - rowgroup [ref=f4e835]:
                            - row [ref=f4e836]:
                              - cell "(23)" [ref=f4e837]:
                                - paragraph [ref=f4e838]: (23)
                              - cell [ref=f4e839]:
                                - paragraph [ref=f4e840]:
                                  - text: The essential characteristic of insider dealing consists in an unfair advantage being obtained from inside information to the detriment of third parties who are unaware of such information and, consequently, the undermining of the integrity of financial markets and investor confidence. Consequently, the prohibition against insider dealing should apply where a person who is in possession of inside information takes unfair advantage of the benefit gained from that information by entering into market transactions in accordance with that information by acquiring or disposing of, by attempting to acquire or dispose of, by cancelling or amending, or by attempting to cancel or amend, an order to acquire or dispose of, for his own account or for the account of a third party, directly or indirectly, financial instruments to which that information relates. Use of inside information can also consist of trading in emission allowances and derivatives thereof and of bidding in the auctions of emission allowances or other auctioned products based thereon that are held pursuant to Commission Regulation (EU) No 1031/2010
                                  - link "(8)" [ref=f4e841] [cursor=pointer]:
                                    - /url: "#ntr8-L_2014173EN.01000101-E0008"
                                  - text: .
                        - table [ref=f4e843]:
                          - rowgroup [ref=f4e847]:
                            - row "(24) Where a legal or natural person in possession of inside information acquires or disposes of, or attempts to acquire or dispose of, for his own account or for the account of a third party, directly or indirectly, financial instruments to which that information relates, it should be implied that that person has used that information. That presumption is without prejudice to the rights of the defence. The question whether a person has infringed the prohibition on insider dealing or has attempted to commit insider dealing should be analysed in the light of the purpose of this Regulation, which is to protect the integrity of the financial market and to enhance investor confidence, which is based, in turn, on the assurance that investors will be placed on an equal footing and protected from the misuse of inside information." [ref=f4e848]:
                              - cell "(24)" [ref=f4e849]:
                                - paragraph [ref=f4e850]: (24)
                              - cell "Where a legal or natural person in possession of inside information acquires or disposes of, or attempts to acquire or dispose of, for his own account or for the account of a third party, directly or indirectly, financial instruments to which that information relates, it should be implied that that person has used that information. That presumption is without prejudice to the rights of the defence. The question whether a person has infringed the prohibition on insider dealing or has attempted to commit insider dealing should be analysed in the light of the purpose of this Regulation, which is to protect the integrity of the financial market and to enhance investor confidence, which is based, in turn, on the assurance that investors will be placed on an equal footing and protected from the misuse of inside information." [ref=f4e851]:
                                - paragraph [ref=f4e852]: Where a legal or natural person in possession of inside information acquires or disposes of, or attempts to acquire or dispose of, for his own account or for the account of a third party, directly or indirectly, financial instruments to which that information relates, it should be implied that that person has used that information. That presumption is without prejudice to the rights of the defence. The question whether a person has infringed the prohibition on insider dealing or has attempted to commit insider dealing should be analysed in the light of the purpose of this Regulation, which is to protect the integrity of the financial market and to enhance investor confidence, which is based, in turn, on the assurance that investors will be placed on an equal footing and protected from the misuse of inside information.
                        - table [ref=f4e854]:
                          - rowgroup [ref=f4e858]:
                            - row "(25) Orders placed before a person possesses inside information should not be deemed to be insider dealing. However, where a person comes into possession of inside information, there should be a presumption that any subsequent change relating that information to orders placed before possession of such information, including the cancellation or amendment of an order, or an attempt to cancel or amend an order, constitutes insider dealing. That presumption could, however, be rebutted if the person establishes that he or she did not use the inside information when carrying out the transaction." [ref=f4e859]:
                              - cell "(25)" [ref=f4e860]:
                                - paragraph [ref=f4e861]: (25)
                              - cell "Orders placed before a person possesses inside information should not be deemed to be insider dealing. However, where a person comes into possession of inside information, there should be a presumption that any subsequent change relating that information to orders placed before possession of such information, including the cancellation or amendment of an order, or an attempt to cancel or amend an order, constitutes insider dealing. That presumption could, however, be rebutted if the person establishes that he or she did not use the inside information when carrying out the transaction." [ref=f4e862]:
                                - paragraph [ref=f4e863]: Orders placed before a person possesses inside information should not be deemed to be insider dealing. However, where a person comes into possession of inside information, there should be a presumption that any subsequent change relating that information to orders placed before possession of such information, including the cancellation or amendment of an order, or an attempt to cancel or amend an order, constitutes insider dealing. That presumption could, however, be rebutted if the person establishes that he or she did not use the inside information when carrying out the transaction.
                        - table [ref=f4e865]:
                          - rowgroup [ref=f4e869]:
                            - row "(26) Use of inside information can consist of the acquisition or disposal of a financial instrument, or an auctioned product based on emission allowances, of the cancellation or amendment of an order, or the attempt to acquire or dispose of a financial instrument or to cancel or amend an order, by a person who knows, or ought to have known, that the information constitutes inside information. In this respect, the competent authorities should consider what a normal and reasonable person knows or should have known in the circumstances." [ref=f4e870]:
                              - cell "(26)" [ref=f4e871]:
                                - paragraph [ref=f4e872]: (26)
                              - cell "Use of inside information can consist of the acquisition or disposal of a financial instrument, or an auctioned product based on emission allowances, of the cancellation or amendment of an order, or the attempt to acquire or dispose of a financial instrument or to cancel or amend an order, by a person who knows, or ought to have known, that the information constitutes inside information. In this respect, the competent authorities should consider what a normal and reasonable person knows or should have known in the circumstances." [ref=f4e873]:
                                - paragraph [ref=f4e874]: Use of inside information can consist of the acquisition or disposal of a financial instrument, or an auctioned product based on emission allowances, of the cancellation or amendment of an order, or the attempt to acquire or dispose of a financial instrument or to cancel or amend an order, by a person who knows, or ought to have known, that the information constitutes inside information. In this respect, the competent authorities should consider what a normal and reasonable person knows or should have known in the circumstances.
                        - table [ref=f4e876]:
                          - rowgroup [ref=f4e880]:
                            - row "(27) This Regulation should be interpreted in a manner consistent with the measures adopted by the Member States to protect the interests of holders of transferable securities carrying voting rights in a company (or which may carry such rights as a consequence of the exercise of rights or conversion) where the company is subject to a public take-over bid or any other proposed change of control. In particular this Regulation should be interpreted in a manner consistent with the laws, regulations and administrative provisions adopted in relation to takeover bids, merger transactions and other transactions affecting ownership or control of companies regulated by the supervisory authorities appointed by Member States pursuant to Article 4 of Directive 2004/25/EC of the European Parliament and of the Council (9)." [ref=f4e881]:
                              - cell "(27)" [ref=f4e882]:
                                - paragraph [ref=f4e883]: (27)
                              - cell "This Regulation should be interpreted in a manner consistent with the measures adopted by the Member States to protect the interests of holders of transferable securities carrying voting rights in a company (or which may carry such rights as a consequence of the exercise of rights or conversion) where the company is subject to a public take-over bid or any other proposed change of control. In particular this Regulation should be interpreted in a manner consistent with the laws, regulations and administrative provisions adopted in relation to takeover bids, merger transactions and other transactions affecting ownership or control of companies regulated by the supervisory authorities appointed by Member States pursuant to Article 4 of Directive 2004/25/EC of the European Parliament and of the Council (9)." [ref=f4e884]:
                                - paragraph [ref=f4e885]:
                                  - text: This Regulation should be interpreted in a manner consistent with the measures adopted by the Member States to protect the interests of holders of transferable securities carrying voting rights in a company (or which may carry such rights as a consequence of the exercise of rights or conversion) where the company is subject to a public take-over bid or any other proposed change of control. In particular this Regulation should be interpreted in a manner consistent with the laws, regulations and administrative provisions adopted in relation to takeover bids, merger transactions and other transactions affecting ownership or control of companies regulated by the supervisory authorities appointed by Member States pursuant to Article 4 of Directive 2004/25/EC of the European Parliament and of the Council
                                  - link "(9)" [ref=f4e886] [cursor=pointer]:
                                    - /url: "#ntr9-L_2014173EN.01000101-E0009"
                                  - text: .
                        - table [ref=f4e888]:
                          - rowgroup [ref=f4e892]:
                            - row [ref=f4e893]:
                              - cell "(28)" [ref=f4e894]:
                                - paragraph [ref=f4e895]: (28)
                              - cell [ref=f4e896]:
                                - paragraph [ref=f4e897]: Research and estimates based on publicly available data, should not per se be regarded as inside information and the mere fact that a transaction is carried out on the basis of research or estimates should not therefore be deemed to constitute use of inside information. However, for example, where the publication or distribution of information is routinely expected by the market and where such publication or distribution contributes to the price-formation process of financial instruments, or the information provides views from a recognised market commentator or institution which may inform the prices of related financial instruments, the information may constitute inside information. Market actors must therefore consider the extent to which the information is non-public and the possible effect on financial instruments traded in advance of its publication or distribution, to establish whether they would be trading on the basis of inside information.
                        - table [ref=f4e899]:
                          - rowgroup [ref=f4e903]:
                            - row "(29) In order to avoid inadvertently prohibiting forms of financial activity which are legitimate, namely where there is no effect of market abuse, it is necessary to recognise certain legitimate behaviour. This may include, for example, recognising the role of market makers, when acting in the legitimate capacity of providing market liquidity." [ref=f4e904]:
                              - cell "(29)" [ref=f4e905]:
                                - paragraph [ref=f4e906]: (29)
                              - cell "In order to avoid inadvertently prohibiting forms of financial activity which are legitimate, namely where there is no effect of market abuse, it is necessary to recognise certain legitimate behaviour. This may include, for example, recognising the role of market makers, when acting in the legitimate capacity of providing market liquidity." [ref=f4e907]:
                                - paragraph [ref=f4e908]: In order to avoid inadvertently prohibiting forms of financial activity which are legitimate, namely where there is no effect of market abuse, it is necessary to recognise certain legitimate behaviour. This may include, for example, recognising the role of market makers, when acting in the legitimate capacity of providing market liquidity.
                        - table [ref=f4e910]:
                          - rowgroup [ref=f4e914]:
                            - row [ref=f4e915]:
                              - cell "(30)" [ref=f4e916]:
                                - paragraph [ref=f4e917]: (30)
                              - cell [ref=f4e918]:
                                - paragraph [ref=f4e919]: The mere fact that market makers or persons authorised to act as counterparties confine themselves to pursuing their legitimate business of buying or selling financial instruments or that persons authorised to execute orders on behalf of third parties with inside information confine themselves to carrying out, cancelling or amending an order dutifully, should not be deemed to constitute use of such inside information. However, the protection, laid down in this Regulation, of market makers, bodies authorised to act as counterparties or persons authorised to execute orders on behalf of third parties with inside information, does not extend to activities clearly prohibited under this Regulation including, for example, the practice commonly known as ‘front-running’. Where legal persons have taken all reasonable measures to prevent market abuse from occurring but nevertheless natural persons within their employment commit market abuse on behalf of the legal person, this should not be deemed to constitute market abuse by the legal person. Another example that should not be deemed to constitute use of inside information is transactions conducted in the discharge of a prior obligation that has become due. The mere fact of having access to inside information relating to another company and using it in the context of a public takeover bid for the purpose of gaining control of that company or proposing a merger with that company should not be deemed to constitute insider dealing.
                        - table [ref=f4e921]:
                          - rowgroup [ref=f4e925]:
                            - row [ref=f4e926]:
                              - cell "(31)" [ref=f4e927]:
                                - paragraph [ref=f4e928]: (31)
                              - cell [ref=f4e929]:
                                - paragraph [ref=f4e930]: Since the acquisition or disposal of financial instruments necessarily involves a prior decision to acquire or dispose taken by the person who undertakes one or other of those operations, the mere fact of making such an acquisition or disposal should not be deemed to constitute use of inside information. Acting on the basis of one’s own plans and strategies for trading should not be considered as using inside information. However, none of those legal or natural persons should be protected by virtue of their professional function; they should only be protected if they act in a fit and proper manner, meeting both the standards expected of their profession and of this Regulation namely market integrity and investor protection. An infringement could still be deemed to have occurred if the competent authority established that there was an illegitimate reason behind those transactions or orders or that behaviour, or that the person used inside information.
                        - table [ref=f4e932]:
                          - rowgroup [ref=f4e936]:
                            - row [ref=f4e937]:
                              - cell "(32)" [ref=f4e938]:
                                - paragraph [ref=f4e939]: (32)
                              - cell [ref=f4e940]:
                                - paragraph [ref=f4e941]: Market soundings are interactions between a seller of financial instruments and one or more potential investors, prior to the announcement of a transaction, in order to gauge the interest of potential investors in a possible transaction and its pricing, size and structuring. Market soundings could involve an initial or secondary offer of relevant securities, and are distinct from ordinary trading. They are a highly valuable tool to gauge the opinion of potential investors, enhance shareholder dialogue, ensure that deals run smoothly, and that the views of issuers, existing shareholders and potential new investors are aligned. They may be particularly beneficial when markets lack confidence or a relevant benchmark, or are volatile. Thus the ability to conduct market soundings is important for the proper functioning of financial markets and market soundings should not in themselves be regarded as market abuse.
                        - table [ref=f4e943]:
                          - rowgroup [ref=f4e947]:
                            - row "(33) Examples of market soundings include situations in which the sell-side firm has been in discussions with an issuer about a potential transaction, and it has decided to gauge potential investor interest in order to determine the terms that will make up a transaction; where an issuer intends to announce a debt issuance or additional equity offering and key investors are contacted by a sell-side firm and given the full terms of the deal to obtain a financial commitment to participate in the transaction; or where the sell-side is seeking to sell a large amount of securities on behalf of an investor and seeks to gauge potential interest in those securities from other potential investors." [ref=f4e948]:
                              - cell "(33)" [ref=f4e949]:
                                - paragraph [ref=f4e950]: (33)
                              - cell "Examples of market soundings include situations in which the sell-side firm has been in discussions with an issuer about a potential transaction, and it has decided to gauge potential investor interest in order to determine the terms that will make up a transaction; where an issuer intends to announce a debt issuance or additional equity offering and key investors are contacted by a sell-side firm and given the full terms of the deal to obtain a financial commitment to participate in the transaction; or where the sell-side is seeking to sell a large amount of securities on behalf of an investor and seeks to gauge potential interest in those securities from other potential investors." [ref=f4e951]:
                                - paragraph [ref=f4e952]: Examples of market soundings include situations in which the sell-side firm has been in discussions with an issuer about a potential transaction, and it has decided to gauge potential investor interest in order to determine the terms that will make up a transaction; where an issuer intends to announce a debt issuance or additional equity offering and key investors are contacted by a sell-side firm and given the full terms of the deal to obtain a financial commitment to participate in the transaction; or where the sell-side is seeking to sell a large amount of securities on behalf of an investor and seeks to gauge potential interest in those securities from other potential investors.
                        - table [ref=f4e954]:
                          - rowgroup [ref=f4e958]:
                            - row "(34) Conducting market soundings may require disclosure to potential investors of inside information. There will generally only be the potential to benefit financially from trading on the basis of inside information passed in a market sounding where there is an existing market in the financial instrument that is the subject of the market sounding or in a related financial instrument. Given the timing of such discussions, it is possible that inside information may be disclosed to the potential investor in the course of the market sounding after a financial instrument has been admitted to trading on a regulated market or has been traded on an MTF or an OTF. Before engaging in a market sounding, the disclosing market participant should assess whether that market sounding will involve the disclosure of inside information." [ref=f4e959]:
                              - cell "(34)" [ref=f4e960]:
                                - paragraph [ref=f4e961]: (34)
                              - cell "Conducting market soundings may require disclosure to potential investors of inside information. There will generally only be the potential to benefit financially from trading on the basis of inside information passed in a market sounding where there is an existing market in the financial instrument that is the subject of the market sounding or in a related financial instrument. Given the timing of such discussions, it is possible that inside information may be disclosed to the potential investor in the course of the market sounding after a financial instrument has been admitted to trading on a regulated market or has been traded on an MTF or an OTF. Before engaging in a market sounding, the disclosing market participant should assess whether that market sounding will involve the disclosure of inside information." [ref=f4e962]:
                                - paragraph [ref=f4e963]: Conducting market soundings may require disclosure to potential investors of inside information. There will generally only be the potential to benefit financially from trading on the basis of inside information passed in a market sounding where there is an existing market in the financial instrument that is the subject of the market sounding or in a related financial instrument. Given the timing of such discussions, it is possible that inside information may be disclosed to the potential investor in the course of the market sounding after a financial instrument has been admitted to trading on a regulated market or has been traded on an MTF or an OTF. Before engaging in a market sounding, the disclosing market participant should assess whether that market sounding will involve the disclosure of inside information.
                        - table [ref=f4e965]:
                          - rowgroup [ref=f4e969]:
                            - row [ref=f4e970]:
                              - cell "(35)" [ref=f4e971]:
                                - paragraph [ref=f4e972]: (35)
                              - cell [ref=f4e973]:
                                - paragraph [ref=f4e974]: Inside information should be deemed as being disclosed legitimately if it is disclosed in the normal course of the exercise of a person’s employment, profession or duties. Where a market sounding involves the disclosure of inside information, the disclosing market participant will be considered to be acting within the normal course of his employment, profession or duties where, at the time of making the disclosure, he informs and receives the consent of the person to whom the disclosure is made that he may be given inside information; that he will be restricted by the provisions of this Regulation from trading or acting on that information; that reasonable steps must be taken to protect the ongoing confidentiality of the information; and that he must inform the disclosing market participant of the identities of all natural and legal persons to whom the information is disclosed in the course of developing a response to the market sounding. The disclosing market participant should also comply with the obligations, to be set out in detail in regulatory technical standards, regarding the maintenance of records of information disclosed. There should be no presumption that market participants that do not comply with this Regulation when conducting a market sounding have unlawfully disclosed inside information but they should not be able to take advantage of the exemption given to those who have complied with such provisions. The question whether they have infringed the prohibition against the unlawful disclosure of inside information should be analysed in light of all the relevant provisions of this Regulation, and all disclosing market participants should be under an obligation to record in writing their assessment, before engaging in a market sounding, whether that market sounding will involve the disclosure of inside information.
                        - table [ref=f4e976]:
                          - rowgroup [ref=f4e980]:
                            - row "(36) Potential investors who are the subject of a market sounding should, in turn, consider if the information disclosed to them amounts to inside information which would prohibit them from dealing on the basis of it or further disclosing that information. Potential investors remain subject to the rules on insider dealing and unlawful disclosure of inside information, as set out in this Regulation. In order to assist potential investors in their considerations and as regards what steps they should take so as not to contravene this Regulation, ESMA should issue guidelines." [ref=f4e981]:
                              - cell "(36)" [ref=f4e982]:
                                - paragraph [ref=f4e983]: (36)
                              - cell "Potential investors who are the subject of a market sounding should, in turn, consider if the information disclosed to them amounts to inside information which would prohibit them from dealing on the basis of it or further disclosing that information. Potential investors remain subject to the rules on insider dealing and unlawful disclosure of inside information, as set out in this Regulation. In order to assist potential investors in their considerations and as regards what steps they should take so as not to contravene this Regulation, ESMA should issue guidelines." [ref=f4e984]:
                                - paragraph [ref=f4e985]: Potential investors who are the subject of a market sounding should, in turn, consider if the information disclosed to them amounts to inside information which would prohibit them from dealing on the basis of it or further disclosing that information. Potential investors remain subject to the rules on insider dealing and unlawful disclosure of inside information, as set out in this Regulation. In order to assist potential investors in their considerations and as regards what steps they should take so as not to contravene this Regulation, ESMA should issue guidelines.
                        - table [ref=f4e987]:
                          - rowgroup [ref=f4e991]:
                            - row "(37) Regulation (EU) No 1031/2010 provides for two parallel market abuse regimes applicable to the auctions of emission allowances. However, as a consequence of the classification of emission allowances as financial instruments, this Regulation should constitute a single rule book of market abuse measures applicable to the entirety of the primary and secondary markets in emission allowances. This Regulation should also apply to behaviour or transactions, including bids, relating to the auctioning on an auction platform authorised as a regulated market of emission allowances or other auctioned products based thereon, including when auctioned products are not financial instruments, pursuant to Regulation (EU) No 1031/2010." [ref=f4e992]:
                              - cell "(37)" [ref=f4e993]:
                                - paragraph [ref=f4e994]: (37)
                              - cell "Regulation (EU) No 1031/2010 provides for two parallel market abuse regimes applicable to the auctions of emission allowances. However, as a consequence of the classification of emission allowances as financial instruments, this Regulation should constitute a single rule book of market abuse measures applicable to the entirety of the primary and secondary markets in emission allowances. This Regulation should also apply to behaviour or transactions, including bids, relating to the auctioning on an auction platform authorised as a regulated market of emission allowances or other auctioned products based thereon, including when auctioned products are not financial instruments, pursuant to Regulation (EU) No 1031/2010." [ref=f4e995]:
                                - paragraph [ref=f4e996]: Regulation (EU) No 1031/2010 provides for two parallel market abuse regimes applicable to the auctions of emission allowances. However, as a consequence of the classification of emission allowances as financial instruments, this Regulation should constitute a single rule book of market abuse measures applicable to the entirety of the primary and secondary markets in emission allowances. This Regulation should also apply to behaviour or transactions, including bids, relating to the auctioning on an auction platform authorised as a regulated market of emission allowances or other auctioned products based thereon, including when auctioned products are not financial instruments, pursuant to Regulation (EU) No 1031/2010.
                        - table [ref=f4e998]:
                          - rowgroup [ref=f4e1002]:
                            - row "(38) This Regulation should provide measures regarding market manipulation that are capable of being adapted to new forms of trading or new strategies that may be abusive. To reflect the fact that trading in financial instruments is increasingly automated, it is desirable that the definition of market manipulation provide examples of specific abusive strategies that may be carried out by any available means of trading including algorithmic and high-frequency trading. The examples provided are neither intended to be exhaustive nor intended to suggest that the same strategies carried out by other means would not also be abusive." [ref=f4e1003]:
                              - cell "(38)" [ref=f4e1004]:
                                - paragraph [ref=f4e1005]: (38)
                              - cell "This Regulation should provide measures regarding market manipulation that are capable of being adapted to new forms of trading or new strategies that may be abusive. To reflect the fact that trading in financial instruments is increasingly automated, it is desirable that the definition of market manipulation provide examples of specific abusive strategies that may be carried out by any available means of trading including algorithmic and high-frequency trading. The examples provided are neither intended to be exhaustive nor intended to suggest that the same strategies carried out by other means would not also be abusive." [ref=f4e1006]:
                                - paragraph [ref=f4e1007]: This Regulation should provide measures regarding market manipulation that are capable of being adapted to new forms of trading or new strategies that may be abusive. To reflect the fact that trading in financial instruments is increasingly automated, it is desirable that the definition of market manipulation provide examples of specific abusive strategies that may be carried out by any available means of trading including algorithmic and high-frequency trading. The examples provided are neither intended to be exhaustive nor intended to suggest that the same strategies carried out by other means would not also be abusive.
                        - table [ref=f4e1009]:
                          - rowgroup [ref=f4e1013]:
                            - row "(39) The prohibitions against market abuse should also cover those persons who act in collaboration to commit market abuse. Examples could include, but are not limited to, brokers who devise and recommend a trading strategy designed to result in market abuse, persons who encourage a person with inside information to disclose that information unlawfully or persons who develop software in collaboration with a trader for the purpose of facilitating market abuse." [ref=f4e1014]:
                              - cell "(39)" [ref=f4e1015]:
                                - paragraph [ref=f4e1016]: (39)
                              - cell "The prohibitions against market abuse should also cover those persons who act in collaboration to commit market abuse. Examples could include, but are not limited to, brokers who devise and recommend a trading strategy designed to result in market abuse, persons who encourage a person with inside information to disclose that information unlawfully or persons who develop software in collaboration with a trader for the purpose of facilitating market abuse." [ref=f4e1017]:
                                - paragraph [ref=f4e1018]: The prohibitions against market abuse should also cover those persons who act in collaboration to commit market abuse. Examples could include, but are not limited to, brokers who devise and recommend a trading strategy designed to result in market abuse, persons who encourage a person with inside information to disclose that information unlawfully or persons who develop software in collaboration with a trader for the purpose of facilitating market abuse.
                        - table [ref=f4e1020]:
                          - rowgroup [ref=f4e1024]:
                            - row "(40) To ensure that liability is conferred on both the legal person and any natural person who participates in the decision-making of the legal person, it is necessary to give recognition of the different national legal mechanisms in Member States. Such mechanisms should relate directly to the methods of attribution of liability in national law." [ref=f4e1025]:
                              - cell "(40)" [ref=f4e1026]:
                                - paragraph [ref=f4e1027]: (40)
                              - cell "To ensure that liability is conferred on both the legal person and any natural person who participates in the decision-making of the legal person, it is necessary to give recognition of the different national legal mechanisms in Member States. Such mechanisms should relate directly to the methods of attribution of liability in national law." [ref=f4e1028]:
                                - paragraph [ref=f4e1029]: To ensure that liability is conferred on both the legal person and any natural person who participates in the decision-making of the legal person, it is necessary to give recognition of the different national legal mechanisms in Member States. Such mechanisms should relate directly to the methods of attribution of liability in national law.
                        - table [ref=f4e1031]:
                          - rowgroup [ref=f4e1035]:
                            - row "(41) In order to complement the prohibition of market manipulation, this Regulation should include a prohibition against attempting to engage in market manipulation. An attempt to engage in market manipulation should be distinguished from behaviour which is likely to result in market manipulation as both activities are prohibited under this Regulation. Such an attempt may include situations where the activity is started but is not completed, for example as a result of failed technology or an instruction to trade which is not acted upon. Prohibiting attempts to engage in market manipulation is necessary to enable competent authorities to impose sanctions for such attempts." [ref=f4e1036]:
                              - cell "(41)" [ref=f4e1037]:
                                - paragraph [ref=f4e1038]: (41)
                              - cell "In order to complement the prohibition of market manipulation, this Regulation should include a prohibition against attempting to engage in market manipulation. An attempt to engage in market manipulation should be distinguished from behaviour which is likely to result in market manipulation as both activities are prohibited under this Regulation. Such an attempt may include situations where the activity is started but is not completed, for example as a result of failed technology or an instruction to trade which is not acted upon. Prohibiting attempts to engage in market manipulation is necessary to enable competent authorities to impose sanctions for such attempts." [ref=f4e1039]:
                                - paragraph [ref=f4e1040]: In order to complement the prohibition of market manipulation, this Regulation should include a prohibition against attempting to engage in market manipulation. An attempt to engage in market manipulation should be distinguished from behaviour which is likely to result in market manipulation as both activities are prohibited under this Regulation. Such an attempt may include situations where the activity is started but is not completed, for example as a result of failed technology or an instruction to trade which is not acted upon. Prohibiting attempts to engage in market manipulation is necessary to enable competent authorities to impose sanctions for such attempts.
                        - table [ref=f4e1042]:
                          - rowgroup [ref=f4e1046]:
                            - row [ref=f4e1047]:
                              - cell "(42)" [ref=f4e1048]:
                                - paragraph [ref=f4e1049]: (42)
                              - cell [ref=f4e1050]:
                                - paragraph [ref=f4e1051]: Without prejudice to the aim of this Regulation and its directly applicable provisions, a person who enters into transactions or issues orders to trade which may be deemed to constitute market manipulation may be able to establish that his reasons for entering into such transactions or issuing orders to trade were legitimate and that the transactions and orders to trade were in conformity with accepted practice on the market concerned. An accepted market practice can only be established by the competent authority responsible for the market abuse supervision of the market concerned. A practice that is accepted in a particular market cannot be considered applicable to other markets unless the competent authorities of such other markets have officially accepted that practice. An infringement could still be deemed to have occurred if the competent authority established that there was an illegitimate reason behind these transactions or orders to trade.
                        - table [ref=f4e1053]:
                          - rowgroup [ref=f4e1057]:
                            - row "(43) This Regulation should also clarify that engaging in market manipulation or attempting to engage in market manipulation in a financial instrument may take the form of using related financial instruments such as derivative instruments that are traded on another trading venue or OTC." [ref=f4e1058]:
                              - cell "(43)" [ref=f4e1059]:
                                - paragraph [ref=f4e1060]: (43)
                              - cell "This Regulation should also clarify that engaging in market manipulation or attempting to engage in market manipulation in a financial instrument may take the form of using related financial instruments such as derivative instruments that are traded on another trading venue or OTC." [ref=f4e1061]:
                                - paragraph [ref=f4e1062]: This Regulation should also clarify that engaging in market manipulation or attempting to engage in market manipulation in a financial instrument may take the form of using related financial instruments such as derivative instruments that are traded on another trading venue or OTC.
                        - table [ref=f4e1064]:
                          - rowgroup [ref=f4e1068]:
                            - row [ref=f4e1069]:
                              - cell "(44)" [ref=f4e1070]:
                                - paragraph [ref=f4e1071]: (44)
                              - cell [ref=f4e1072]:
                                - paragraph [ref=f4e1073]: Many financial instruments are priced by reference to benchmarks. The actual or attempted manipulation of benchmarks, including interbank offer rates, can have a serious impact on market confidence and may result in significant losses to investors or distort the real economy. Therefore, specific provisions in relation to benchmarks are required in order to preserve the integrity of the markets and ensure that competent authorities can enforce a clear prohibition of the manipulation of benchmarks. Those provisions should cover all published benchmarks including those accessible through the internet whether free of charge or not such as CDS benchmarks and indices of indices. It is necessary to complement the general prohibition of market manipulation by prohibiting the manipulation of the benchmark itself and the transmission of false or misleading information, provision of false or misleading inputs, or any other action that manipulates the calculation of a benchmark, where that calculation is broadly defined to include the receipt and evaluation of all data which relates to the calculation of that benchmark and include in particular trimmed data, and including the benchmark’s methodology, whether algorithmic or judgement-based in whole or in part. Those rules are in addition to Regulation (EU) No 1227/2011 which prohibits the deliberate provision of false information to undertakings which provide price assessments or market reports on wholesale energy products with the effect of misleading market participants acting on the basis of those price assessments or market reports.
                        - table [ref=f4e1075]:
                          - rowgroup [ref=f4e1079]:
                            - row "(45) In order to ensure uniform market conditions between trading venues and facilities subject to this Regulation, any person who operates regulated markets, MTFs and OTFs should be required to establish and to maintain effective arrangements, systems and procedures aimed at preventing and detecting market manipulation and abusive practices." [ref=f4e1080]:
                              - cell "(45)" [ref=f4e1081]:
                                - paragraph [ref=f4e1082]: (45)
                              - cell "In order to ensure uniform market conditions between trading venues and facilities subject to this Regulation, any person who operates regulated markets, MTFs and OTFs should be required to establish and to maintain effective arrangements, systems and procedures aimed at preventing and detecting market manipulation and abusive practices." [ref=f4e1083]:
                                - paragraph [ref=f4e1084]: In order to ensure uniform market conditions between trading venues and facilities subject to this Regulation, any person who operates regulated markets, MTFs and OTFs should be required to establish and to maintain effective arrangements, systems and procedures aimed at preventing and detecting market manipulation and abusive practices.
                        - table [ref=f4e1086]:
                          - rowgroup [ref=f4e1090]:
                            - row "(46) Manipulation or attempted manipulation of financial instruments may also consist in placing orders which may not be executed. Furthermore, a financial instrument may be manipulated through behaviour which occurs outside a trading venue. Persons professionally arranging or executing transactions should be required to establish and to maintain effective arrangements, systems and procedures in place to detect and report suspicious transactions. They should also report suspicious orders and suspicious transactions that take place outside a trading venue." [ref=f4e1091]:
                              - cell "(46)" [ref=f4e1092]:
                                - paragraph [ref=f4e1093]: (46)
                              - cell "Manipulation or attempted manipulation of financial instruments may also consist in placing orders which may not be executed. Furthermore, a financial instrument may be manipulated through behaviour which occurs outside a trading venue. Persons professionally arranging or executing transactions should be required to establish and to maintain effective arrangements, systems and procedures in place to detect and report suspicious transactions. They should also report suspicious orders and suspicious transactions that take place outside a trading venue." [ref=f4e1094]:
                                - paragraph [ref=f4e1095]: Manipulation or attempted manipulation of financial instruments may also consist in placing orders which may not be executed. Furthermore, a financial instrument may be manipulated through behaviour which occurs outside a trading venue. Persons professionally arranging or executing transactions should be required to establish and to maintain effective arrangements, systems and procedures in place to detect and report suspicious transactions. They should also report suspicious orders and suspicious transactions that take place outside a trading venue.
                        - table [ref=f4e1097]:
                          - rowgroup [ref=f4e1101]:
                            - row [ref=f4e1102]:
                              - cell "(47)" [ref=f4e1103]:
                                - paragraph [ref=f4e1104]: (47)
                              - cell [ref=f4e1105]:
                                - paragraph [ref=f4e1106]: The manipulation or attempted manipulation of financial instruments may also consist in disseminating false or misleading information. The spreading of false or misleading information can have a significant impact on the prices of financial instruments in a relatively short period of time. It may consist in the invention of manifestly false information, but also the wilful omission of material facts, as well as the knowingly inaccurate reporting of information. That form of market manipulation is particularly harmful to investors, because it causes them to base their investment decisions on incorrect or distorted information. It is also harmful to issuers, because it reduces the trust in the available information related to them. A lack of market trust can in turn jeopardise an issuer’s ability to issue new financial instruments or to secure credit from other market participants in order to finance its operations. Information spreads through the market place very quickly. As a result, the harm to investors and issuers may persist for a relatively long time until the information is found to be false or misleading, and can be corrected by the issuer or those responsible for its dissemination. It is therefore necessary to qualify the spreading of false or misleading information, including rumours and false or misleading news, as being an infringement of this Regulation. It is therefore appropriate not to allow those active in the financial markets to freely express information contrary to their own opinion or better judgement, which they know or should know to be false or misleading, to the detriment of investors and issuers.
                        - table [ref=f4e1108]:
                          - rowgroup [ref=f4e1112]:
                            - row "(48) Given the rise in the use of websites, blogs and social media, it is important to clarify that disseminating false or misleading information via the internet, including through social media sites or unattributable blogs, should be considered, for the purposes of this Regulation, to be equivalent to doing so via more traditional communication channels." [ref=f4e1113]:
                              - cell "(48)" [ref=f4e1114]:
                                - paragraph [ref=f4e1115]: (48)
                              - cell "Given the rise in the use of websites, blogs and social media, it is important to clarify that disseminating false or misleading information via the internet, including through social media sites or unattributable blogs, should be considered, for the purposes of this Regulation, to be equivalent to doing so via more traditional communication channels." [ref=f4e1116]:
                                - paragraph [ref=f4e1117]: Given the rise in the use of websites, blogs and social media, it is important to clarify that disseminating false or misleading information via the internet, including through social media sites or unattributable blogs, should be considered, for the purposes of this Regulation, to be equivalent to doing so via more traditional communication channels.
                        - table [ref=f4e1119]:
                          - rowgroup [ref=f4e1123]:
                            - row "(49) The public disclosure of inside information by an issuer is essential to avoid insider dealing and ensure that investors are not misled. Issuers should therefore be required to inform the public as soon as possible of inside information. However that obligation may, under special circumstances, prejudice the legitimate interests of the issuer. In such circumstances, delayed disclosure should be permitted provided that the delay would not be likely to mislead the public and the issuer is able to ensure the confidentiality of the information. The issuer is only under an obligation to disclose inside information if it has requested or approved admission of the financial instrument to trading." [ref=f4e1124]:
                              - cell "(49)" [ref=f4e1125]:
                                - paragraph [ref=f4e1126]: (49)
                              - cell "The public disclosure of inside information by an issuer is essential to avoid insider dealing and ensure that investors are not misled. Issuers should therefore be required to inform the public as soon as possible of inside information. However that obligation may, under special circumstances, prejudice the legitimate interests of the issuer. In such circumstances, delayed disclosure should be permitted provided that the delay would not be likely to mislead the public and the issuer is able to ensure the confidentiality of the information. The issuer is only under an obligation to disclose inside information if it has requested or approved admission of the financial instrument to trading." [ref=f4e1127]:
                                - paragraph [ref=f4e1128]: The public disclosure of inside information by an issuer is essential to avoid insider dealing and ensure that investors are not misled. Issuers should therefore be required to inform the public as soon as possible of inside information. However that obligation may, under special circumstances, prejudice the legitimate interests of the issuer. In such circumstances, delayed disclosure should be permitted provided that the delay would not be likely to mislead the public and the issuer is able to ensure the confidentiality of the information. The issuer is only under an obligation to disclose inside information if it has requested or approved admission of the financial instrument to trading.
                        - table [ref=f4e1130]:
                          - rowgroup [ref=f4e1134]:
                            - row [ref=f4e1135]:
                              - cell "(50)" [ref=f4e1136]:
                                - paragraph [ref=f4e1137]: (50)
                              - cell [ref=f4e1138]:
                                - paragraph [ref=f4e1139]: "For the purposes of applying the requirements relating to public disclosure of inside information and delaying such public disclosure, as provided for in this Regulation, legitimate interests may, in particular, relate to the following non-exhaustive circumstances: (a) ongoing negotiations, or related elements, where the outcome or normal pattern of those negotiations would be likely to be affected by public disclosure. In particular, in the event that the financial viability of the issuer is in grave and imminent danger, although not within the scope of the applicable insolvency law, public disclosure of information may be delayed for a limited period where such a public disclosure would seriously jeopardise the interest of existing and potential shareholders by undermining the conclusion of specific negotiations designed to ensure the long-term financial recovery of the issuer; (b) decisions taken or contracts made by the management body of an issuer which need the approval of another body of the issuer in order to become effective, where the organisation of such an issuer requires the separation between those bodies, provided that public disclosure of the information before such approval, together with the simultaneous announcement that the approval remains pending, would jeopardise the correct assessment of the information by the public."
                        - table [ref=f4e1141]:
                          - rowgroup [ref=f4e1145]:
                            - row [ref=f4e1146]:
                              - cell "(51)" [ref=f4e1147]:
                                - paragraph [ref=f4e1148]: (51)
                              - cell [ref=f4e1149]:
                                - paragraph [ref=f4e1150]: Moreover, the requirement to disclose inside information needs to be addressed to the participants in the emission allowance market. In order to avoid exposing the market to reporting that is not useful and to maintain cost-efficiency of the measure foreseen, it appears necessary to limit the regulatory impact of that requirement to only those EU ETS operators which, by virtue of their size and activity, can reasonably be expected to be able to have a significant effect on the price of emission allowances, of auctioned products based thereon, or of derivative financial instruments relating thereto and for bidding in the auctions pursuant to Regulation (EU) No 1031/2010. The Commission should adopt measures establishing a minimum threshold for the purposes of application of that exemption by means of a delegated act. The information to be disclosed should concern the physical operations of the disclosing party and not own plans or strategies for trading emission allowances, auctioned products based thereon, or derivative financial instruments relating thereto. Where emission allowance market participants already comply with equivalent inside information disclosure requirements, notably pursuant to Regulation (EU) No 1227/2011, the obligation to disclose inside information concerning emission allowances should not lead to the duplication of mandatory disclosures with substantially the same content. In the case of participants in the emission allowance market with aggregate emissions or rated thermal input at or below the threshold set, since the information about their physical operations is deemed to be non-material for the purposes of disclosure, it should also be deemed not to have a significant effect on the price of emission allowances, of auctioned products based thereon, or of the derivative financial instruments relating thereto. Such participants in the emission allowance market should nevertheless be covered by the prohibition of insider dealing in relation to any other information they have access to and which is inside information.
                        - table [ref=f4e1152]:
                          - rowgroup [ref=f4e1156]:
                            - row [ref=f4e1157]:
                              - cell "(52)" [ref=f4e1158]:
                                - paragraph [ref=f4e1159]: (52)
                              - cell [ref=f4e1160]:
                                - paragraph [ref=f4e1161]: In order to protect the public interest, to preserve the stability of the financial system and, for example, to avoid liquidity crises in financial institutions from turning into solvency crises due to a sudden withdrawal of funds, it may be appropriate to allow, in exceptional circumstances, the delay of the disclosure of inside information for credit institutions or financial institutions. In particular, this may apply to information pertinent to temporary liquidity problems, where they need to receive central banking lending including emergency liquidity assistance from a central bank where disclosure of the information would have a systemic impact. This delay should be conditional upon the issuer obtaining the consent of the relevant competent authority and it being clear that the wider public and economic interest in delaying disclosure outweighs the interest of the market in receiving the information which is subject to delay.
                        - table [ref=f4e1163]:
                          - rowgroup [ref=f4e1167]:
                            - row "(53) In respect of financial institutions, in particular where they receive central bank lending, including emergency liquidity assistance, the assessment of whether the information is of systemic importance and whether delay of disclosure is in the public interest should be made by the competent authority, after consulting, as appropriate, the national central bank, the macro-prudential authority or any other relevant national authority." [ref=f4e1168]:
                              - cell "(53)" [ref=f4e1169]:
                                - paragraph [ref=f4e1170]: (53)
                              - cell "In respect of financial institutions, in particular where they receive central bank lending, including emergency liquidity assistance, the assessment of whether the information is of systemic importance and whether delay of disclosure is in the public interest should be made by the competent authority, after consulting, as appropriate, the national central bank, the macro-prudential authority or any other relevant national authority." [ref=f4e1171]:
                                - paragraph [ref=f4e1172]: In respect of financial institutions, in particular where they receive central bank lending, including emergency liquidity assistance, the assessment of whether the information is of systemic importance and whether delay of disclosure is in the public interest should be made by the competent authority, after consulting, as appropriate, the national central bank, the macro-prudential authority or any other relevant national authority.
                        - table [ref=f4e1174]:
                          - rowgroup [ref=f4e1178]:
                            - row "(54) The use or attempted use of inside information to trade on one’s own account or on the account of a third party should be clearly prohibited. Use of inside information can also consist of trading in emission allowances and derivatives thereof and of bidding in the auctions of emission allowances or other auctioned products based thereon that are held pursuant to Regulation (EU) No 1031/2010 by persons who know, or who ought to know, that the information they possess constitutes inside information. Information regarding the market participant’s own plans and strategies for trading should not be considered to be inside information, although information regarding a third party’s plans and strategies for trading may amount to inside information." [ref=f4e1179]:
                              - cell "(54)" [ref=f4e1180]:
                                - paragraph [ref=f4e1181]: (54)
                              - cell "The use or attempted use of inside information to trade on one’s own account or on the account of a third party should be clearly prohibited. Use of inside information can also consist of trading in emission allowances and derivatives thereof and of bidding in the auctions of emission allowances or other auctioned products based thereon that are held pursuant to Regulation (EU) No 1031/2010 by persons who know, or who ought to know, that the information they possess constitutes inside information. Information regarding the market participant’s own plans and strategies for trading should not be considered to be inside information, although information regarding a third party’s plans and strategies for trading may amount to inside information." [ref=f4e1182]:
                                - paragraph [ref=f4e1183]: The use or attempted use of inside information to trade on one’s own account or on the account of a third party should be clearly prohibited. Use of inside information can also consist of trading in emission allowances and derivatives thereof and of bidding in the auctions of emission allowances or other auctioned products based thereon that are held pursuant to Regulation (EU) No 1031/2010 by persons who know, or who ought to know, that the information they possess constitutes inside information. Information regarding the market participant’s own plans and strategies for trading should not be considered to be inside information, although information regarding a third party’s plans and strategies for trading may amount to inside information.
                        - table [ref=f4e1185]:
                          - rowgroup [ref=f4e1189]:
                            - row "(55) The requirement to disclose inside information can be burdensome for small and medium-sized enterprises, as defined in Directive 2014/65/EU of the European Parliament and of the Council (10), whose financial instruments are admitted to trading on SME growth markets, given the costs of monitoring information in their possession and seeking legal advice about whether and when information needs to be disclosed. Nevertheless, prompt disclosure of inside information is essential to ensure investor confidence in those issuers. Therefore, ESMA should be able to issue guidelines which assist issuers to comply with the obligation to disclose inside information without compromising investor protection." [ref=f4e1190]:
                              - cell "(55)" [ref=f4e1191]:
                                - paragraph [ref=f4e1192]: (55)
                              - cell "The requirement to disclose inside information can be burdensome for small and medium-sized enterprises, as defined in Directive 2014/65/EU of the European Parliament and of the Council (10), whose financial instruments are admitted to trading on SME growth markets, given the costs of monitoring information in their possession and seeking legal advice about whether and when information needs to be disclosed. Nevertheless, prompt disclosure of inside information is essential to ensure investor confidence in those issuers. Therefore, ESMA should be able to issue guidelines which assist issuers to comply with the obligation to disclose inside information without compromising investor protection." [ref=f4e1193]:
                                - paragraph [ref=f4e1194]:
                                  - text: The requirement to disclose inside information can be burdensome for small and medium-sized enterprises, as defined in Directive 2014/65/EU of the European Parliament and of the Council
                                  - link "(10)" [ref=f4e1195] [cursor=pointer]:
                                    - /url: "#ntr10-L_2014173EN.01000101-E0010"
                                  - text: ", whose financial instruments are admitted to trading on SME growth markets, given the costs of monitoring information in their possession and seeking legal advice about whether and when information needs to be disclosed. Nevertheless, prompt disclosure of inside information is essential to ensure investor confidence in those issuers. Therefore, ESMA should be able to issue guidelines which assist issuers to comply with the obligation to disclose inside information without compromising investor protection."
                        - table [ref=f4e1197]:
                          - rowgroup [ref=f4e1201]:
                            - row [ref=f4e1202]:
                              - cell "(56)" [ref=f4e1203]:
                                - paragraph [ref=f4e1204]: (56)
                              - cell [ref=f4e1205]:
                                - paragraph [ref=f4e1206]:
                                  - text: Insider lists are an important tool for regulators when investigating possible market abuse, but national differences in regard to data to be included in those lists impose unnecessary administrative burdens on issuers. Data fields required for insider lists should therefore be uniform in order to reduce those costs. It is important that persons included on insider lists are informed of that fact and of its implications under this Regulation and Directive 2014/57/EU of the European Parliament and of the Council
                                  - link "(11)" [ref=f4e1207] [cursor=pointer]:
                                    - /url: "#ntr11-L_2014173EN.01000101-E0011"
                                  - text: . The requirement to keep and constantly update insider lists imposes administrative burdens specifically on issuers on SME growth markets. As competent authorities are able to exercise effective market abuse supervision without having those lists available at all times for those issuers, they should be exempt from this obligation in order to reduce the administrative costs imposed by this Regulation. However, such issuers should provide an insider list to the competent authorities upon request.
                        - table [ref=f4e1209]:
                          - rowgroup [ref=f4e1213]:
                            - row "(57) The establishment, by issuers or any person acting on their behalf or account, of lists of persons working for them under a contract of employment or otherwise and having access to inside information relating, directly or indirectly, to the issuer, is a valuable measure for protecting market integrity. Such lists may serve issuers or such persons to control the flow of inside information and thereby help manage their confidentiality duties. Moreover, such lists may also constitute a useful tool for competent authorities to identify any person who has access to inside information and the date on which they gained access. Access to inside information relating, directly or indirectly, to the issuer by persons included on such a list is without prejudice to the prohibitions laid down in this Regulation." [ref=f4e1214]:
                              - cell "(57)" [ref=f4e1215]:
                                - paragraph [ref=f4e1216]: (57)
                              - cell "The establishment, by issuers or any person acting on their behalf or account, of lists of persons working for them under a contract of employment or otherwise and having access to inside information relating, directly or indirectly, to the issuer, is a valuable measure for protecting market integrity. Such lists may serve issuers or such persons to control the flow of inside information and thereby help manage their confidentiality duties. Moreover, such lists may also constitute a useful tool for competent authorities to identify any person who has access to inside information and the date on which they gained access. Access to inside information relating, directly or indirectly, to the issuer by persons included on such a list is without prejudice to the prohibitions laid down in this Regulation." [ref=f4e1217]:
                                - paragraph [ref=f4e1218]: The establishment, by issuers or any person acting on their behalf or account, of lists of persons working for them under a contract of employment or otherwise and having access to inside information relating, directly or indirectly, to the issuer, is a valuable measure for protecting market integrity. Such lists may serve issuers or such persons to control the flow of inside information and thereby help manage their confidentiality duties. Moreover, such lists may also constitute a useful tool for competent authorities to identify any person who has access to inside information and the date on which they gained access. Access to inside information relating, directly or indirectly, to the issuer by persons included on such a list is without prejudice to the prohibitions laid down in this Regulation.
                        - table [ref=f4e1220]:
                          - rowgroup [ref=f4e1224]:
                            - row [ref=f4e1225]:
                              - cell "(58)" [ref=f4e1226]:
                                - paragraph [ref=f4e1227]: (58)
                              - cell [ref=f4e1228]:
                                - paragraph [ref=f4e1229]: Greater transparency of transactions conducted by persons discharging managerial responsibilities at the issuer level and, where applicable, persons closely associated with them, constitutes a preventive measure against market abuse, particularly insider dealing. The publication of those transactions on at least an individual basis can also be a highly valuable source of information to investors. It is necessary to clarify that the obligation to publish those managers’ transactions also includes the pledging or lending of financial instruments, as the pledging of shares can result in a material and potentially destabilising impact on the company in the event of a sudden, unforeseen disposal. Without disclosure, the market would not know that there was the increased possibility of, for example, a significant future change in share ownership, an increase in the supply of shares to the marketplace or a loss of voting rights in that company. For that reason, notification under this Regulation is required where the pledge of the securities is made as part of a wider transaction in which the manager pledges the securities as collateral to gain credit from a third party. Additionally, full and proper market transparency is a prerequisite for the confidence of market actors and, in particular, the confidence of a company’s shareholders. It is also necessary to clarify that the obligation to publish those managers’ transactions includes transactions by another person exercising discretion for the manager. In order to ensure an appropriate balance between the level of transparency and the number of reports notified to competent authorities and the public, thresholds should be introduced in this Regulation below which transactions need not be notified.
                        - table [ref=f4e1231]:
                          - rowgroup [ref=f4e1235]:
                            - row "(59) The notification of transactions conducted by persons discharging managerial responsibilities on their own account, or by a person closely associated with them, is not only valuable information for market participants, but also constitutes an additional means for competent authorities to supervise markets. The obligation to notify transactions is without prejudice to the prohibitions laid down in this Regulation." [ref=f4e1236]:
                              - cell "(59)" [ref=f4e1237]:
                                - paragraph [ref=f4e1238]: (59)
                              - cell "The notification of transactions conducted by persons discharging managerial responsibilities on their own account, or by a person closely associated with them, is not only valuable information for market participants, but also constitutes an additional means for competent authorities to supervise markets. The obligation to notify transactions is without prejudice to the prohibitions laid down in this Regulation." [ref=f4e1239]:
                                - paragraph [ref=f4e1240]: The notification of transactions conducted by persons discharging managerial responsibilities on their own account, or by a person closely associated with them, is not only valuable information for market participants, but also constitutes an additional means for competent authorities to supervise markets. The obligation to notify transactions is without prejudice to the prohibitions laid down in this Regulation.
                        - table [ref=f4e1242]:
                          - rowgroup [ref=f4e1246]:
                            - row "(60) Notification of transactions should be in accordance with the rules on transfer of personal data laid down in Directive 95/46/EC of the European Parliament and of the Council (12)." [ref=f4e1247]:
                              - cell "(60)" [ref=f4e1248]:
                                - paragraph [ref=f4e1249]: (60)
                              - cell "Notification of transactions should be in accordance with the rules on transfer of personal data laid down in Directive 95/46/EC of the European Parliament and of the Council (12)." [ref=f4e1250]:
                                - paragraph [ref=f4e1251]:
                                  - text: Notification of transactions should be in accordance with the rules on transfer of personal data laid down in Directive 95/46/EC of the European Parliament and of the Council
                                  - link "(12)" [ref=f4e1252] [cursor=pointer]:
                                    - /url: "#ntr12-L_2014173EN.01000101-E0012"
                                  - text: .
                        - table [ref=f4e1254]:
                          - rowgroup [ref=f4e1258]:
                            - row "(61) Persons discharging managerial responsibilities should be prohibited from trading before the announcement of an interim financial report or a year-end report which the relevant issuer is obliged to make public according to the rules of the trading venue where the issuer’s shares are admitted to trading or according to national law, unless specific and restricted circumstances exist which would justify a permission by the issuer allowing a person discharging managerial responsibilities to trade. However, any such permission by the issuer is without prejudice to the prohibitions laid down in this Regulation." [ref=f4e1259]:
                              - cell "(61)" [ref=f4e1260]:
                                - paragraph [ref=f4e1261]: (61)
                              - cell "Persons discharging managerial responsibilities should be prohibited from trading before the announcement of an interim financial report or a year-end report which the relevant issuer is obliged to make public according to the rules of the trading venue where the issuer’s shares are admitted to trading or according to national law, unless specific and restricted circumstances exist which would justify a permission by the issuer allowing a person discharging managerial responsibilities to trade. However, any such permission by the issuer is without prejudice to the prohibitions laid down in this Regulation." [ref=f4e1262]:
                                - paragraph [ref=f4e1263]: Persons discharging managerial responsibilities should be prohibited from trading before the announcement of an interim financial report or a year-end report which the relevant issuer is obliged to make public according to the rules of the trading venue where the issuer’s shares are admitted to trading or according to national law, unless specific and restricted circumstances exist which would justify a permission by the issuer allowing a person discharging managerial responsibilities to trade. However, any such permission by the issuer is without prejudice to the prohibitions laid down in this Regulation.
                        - table [ref=f4e1265]:
                          - rowgroup [ref=f4e1269]:
                            - row "(62) A set of effective tools and powers and resources for the competent authority of each Member State guarantees supervisory effectiveness. Accordingly, this Regulation, in particular, provides for a minimum set of supervisory and investigative powers competent authorities of Member States should be entrusted with under national law. Those powers should be exercised, where the national law so requires, by application to the competent judicial authorities. When exercising their powers under this Regulation competent authorities should act objectively and impartially and should remain autonomous in their decision making." [ref=f4e1270]:
                              - cell "(62)" [ref=f4e1271]:
                                - paragraph [ref=f4e1272]: (62)
                              - cell "A set of effective tools and powers and resources for the competent authority of each Member State guarantees supervisory effectiveness. Accordingly, this Regulation, in particular, provides for a minimum set of supervisory and investigative powers competent authorities of Member States should be entrusted with under national law. Those powers should be exercised, where the national law so requires, by application to the competent judicial authorities. When exercising their powers under this Regulation competent authorities should act objectively and impartially and should remain autonomous in their decision making." [ref=f4e1273]:
                                - paragraph [ref=f4e1274]: A set of effective tools and powers and resources for the competent authority of each Member State guarantees supervisory effectiveness. Accordingly, this Regulation, in particular, provides for a minimum set of supervisory and investigative powers competent authorities of Member States should be entrusted with under national law. Those powers should be exercised, where the national law so requires, by application to the competent judicial authorities. When exercising their powers under this Regulation competent authorities should act objectively and impartially and should remain autonomous in their decision making.
                        - table [ref=f4e1276]:
                          - rowgroup [ref=f4e1280]:
                            - row "(63) Market undertakings and all economic actors should also contribute to market integrity. In that sense, the designation of a single competent authority for market abuse should not exclude collaboration links or delegation under the responsibility of the competent authority, between that authority and market undertakings with a view to guaranteeing efficient supervision of compliance with the provisions in this Regulation. Where persons who produce or disseminate investment recommendations or other information recommending or suggesting an investment strategy in one or more financial instruments also deal on own account in such instruments, the competent authorities should, inter alia, be able to require or demand from such persons any information necessary to determine whether the recommendations produced or disseminated by that person are compliant with this Regulation." [ref=f4e1281]:
                              - cell "(63)" [ref=f4e1282]:
                                - paragraph [ref=f4e1283]: (63)
                              - cell "Market undertakings and all economic actors should also contribute to market integrity. In that sense, the designation of a single competent authority for market abuse should not exclude collaboration links or delegation under the responsibility of the competent authority, between that authority and market undertakings with a view to guaranteeing efficient supervision of compliance with the provisions in this Regulation. Where persons who produce or disseminate investment recommendations or other information recommending or suggesting an investment strategy in one or more financial instruments also deal on own account in such instruments, the competent authorities should, inter alia, be able to require or demand from such persons any information necessary to determine whether the recommendations produced or disseminated by that person are compliant with this Regulation." [ref=f4e1284]:
                                - paragraph [ref=f4e1285]: Market undertakings and all economic actors should also contribute to market integrity. In that sense, the designation of a single competent authority for market abuse should not exclude collaboration links or delegation under the responsibility of the competent authority, between that authority and market undertakings with a view to guaranteeing efficient supervision of compliance with the provisions in this Regulation. Where persons who produce or disseminate investment recommendations or other information recommending or suggesting an investment strategy in one or more financial instruments also deal on own account in such instruments, the competent authorities should, inter alia, be able to require or demand from such persons any information necessary to determine whether the recommendations produced or disseminated by that person are compliant with this Regulation.
                        - table [ref=f4e1287]:
                          - rowgroup [ref=f4e1291]:
                            - row [ref=f4e1292]:
                              - cell "(64)" [ref=f4e1293]:
                                - paragraph [ref=f4e1294]: (64)
                              - cell [ref=f4e1295]:
                                - paragraph [ref=f4e1296]: For the purpose of detecting cases of insider dealing and market manipulation, it is necessary for competent authorities to have, in accordance with national law, the ability to access the premises of natural and legal persons in order to seize documents. Access to such premises is necessary where there is a reasonable suspicion that documents and other data relating to the subject matter of an investigation exist and may be relevant to prove a case of insider dealing or market abuse. Additionally access to such premises is necessary where the person of whom a demand for information has already been made fails, wholly or in part, to comply with it or where there are reasonable grounds for believing that if a demand were to be made it would not be complied with or that the documents or information to which the information requirement relates would be removed, tampered with or destroyed. If prior authorisation is needed from the judicial authority of the Member State concerned, in accordance with national law, access to premises should take place after having obtained that prior judicial authorisation.
                        - table [ref=f4e1298]:
                          - rowgroup [ref=f4e1302]:
                            - row [ref=f4e1303]:
                              - cell "(65)" [ref=f4e1304]:
                                - paragraph [ref=f4e1305]: (65)
                              - cell [ref=f4e1306]:
                                - paragraph [ref=f4e1307]: Existing recordings of telephone conversations and data traffic records from investment firms, credit institutions and financial institutions executing and documenting the execution of transactions, as well as existing telephone and data traffic records from telecommunications operators, constitute crucial, and sometimes the only, evidence to detect and prove the existence of insider dealing and market manipulation. Telephone and data traffic records may establish the identity of a person responsible for the dissemination of false or misleading information or that persons have been in contact at a certain time, and that a relationship exists between two or more people. Therefore, competent authorities should be able to require existing recordings of telephone conversations, electronic communications and data traffic records held by an investment firm, a credit institution or a financial institution in accordance with Directive 2014/65/EU. Access to data and telephone records is necessary to provide evidence and investigate leads on possible insider dealing or market manipulation, and therefore for detecting and imposing sanctions for market abuse. In order to introduce a level playing field in the Union in relation to the access to telephone and existing data traffic records held by a telecommunications operator or the existing recordings of telephone conversations and data traffic held by an investment firm, a credit institution or a financial institution, competent authorities should, in accordance with national law, be able to require existing telephone and existing data traffic records held by a telecommunications operator, insofar as permitted under national law and existing recordings of telephone conversations as well as data traffic held by an investment firm, in cases where a reasonable suspicion exists that such records related to the subject matter of the inspection or investigation may be relevant to prove insider dealing or market manipulation infringing this Regulation. Access to telephone and data traffic records held by a telecommunications operator does not encompass access to the content of voice communications by telephone.
                        - table [ref=f4e1309]:
                          - rowgroup [ref=f4e1313]:
                            - row "(66) While this Regulation specifies a minimum set of powers competent authorities should have, those powers are to be exercised within a complete system of national law which guarantees the respect for fundamental rights, including the right to privacy. For the exercise of those powers, which may amount to serious interferences with the right to respect for private and family life, home and communications, Member States should have in place adequate and effective safeguards against any abuse, for instance, where appropriate a requirement to obtain prior authorisation from the judicial authorities of a Member State concerned. Member States should allow the possibility for competent authorities to exercise such intrusive powers to the extent necessary for the proper investigation of serious cases where there are no equivalent means for effectively achieving the same result." [ref=f4e1314]:
                              - cell "(66)" [ref=f4e1315]:
                                - paragraph [ref=f4e1316]: (66)
                              - cell "While this Regulation specifies a minimum set of powers competent authorities should have, those powers are to be exercised within a complete system of national law which guarantees the respect for fundamental rights, including the right to privacy. For the exercise of those powers, which may amount to serious interferences with the right to respect for private and family life, home and communications, Member States should have in place adequate and effective safeguards against any abuse, for instance, where appropriate a requirement to obtain prior authorisation from the judicial authorities of a Member State concerned. Member States should allow the possibility for competent authorities to exercise such intrusive powers to the extent necessary for the proper investigation of serious cases where there are no equivalent means for effectively achieving the same result." [ref=f4e1317]:
                                - paragraph [ref=f4e1318]: While this Regulation specifies a minimum set of powers competent authorities should have, those powers are to be exercised within a complete system of national law which guarantees the respect for fundamental rights, including the right to privacy. For the exercise of those powers, which may amount to serious interferences with the right to respect for private and family life, home and communications, Member States should have in place adequate and effective safeguards against any abuse, for instance, where appropriate a requirement to obtain prior authorisation from the judicial authorities of a Member State concerned. Member States should allow the possibility for competent authorities to exercise such intrusive powers to the extent necessary for the proper investigation of serious cases where there are no equivalent means for effectively achieving the same result.
                        - table [ref=f4e1320]:
                          - rowgroup [ref=f4e1324]:
                            - row "(67) Since market abuse can take place across borders and markets, in all but exceptional circumstances competent authorities should be required to cooperate and exchange information with other competent and regulatory authorities, and with ESMA, in particular in relation to investigation activities. Where a competent authority is convinced that market abuse is being, or has been, carried out in another Member State or affects financial instruments traded in another Member State, it should notify that fact to the competent authority and ESMA. In cases of market abuse with cross-border effects, ESMA should be able to coordinate the investigation if requested to do so by one of the competent authorities concerned." [ref=f4e1325]:
                              - cell "(67)" [ref=f4e1326]:
                                - paragraph [ref=f4e1327]: (67)
                              - cell "Since market abuse can take place across borders and markets, in all but exceptional circumstances competent authorities should be required to cooperate and exchange information with other competent and regulatory authorities, and with ESMA, in particular in relation to investigation activities. Where a competent authority is convinced that market abuse is being, or has been, carried out in another Member State or affects financial instruments traded in another Member State, it should notify that fact to the competent authority and ESMA. In cases of market abuse with cross-border effects, ESMA should be able to coordinate the investigation if requested to do so by one of the competent authorities concerned." [ref=f4e1328]:
                                - paragraph [ref=f4e1329]: Since market abuse can take place across borders and markets, in all but exceptional circumstances competent authorities should be required to cooperate and exchange information with other competent and regulatory authorities, and with ESMA, in particular in relation to investigation activities. Where a competent authority is convinced that market abuse is being, or has been, carried out in another Member State or affects financial instruments traded in another Member State, it should notify that fact to the competent authority and ESMA. In cases of market abuse with cross-border effects, ESMA should be able to coordinate the investigation if requested to do so by one of the competent authorities concerned.
