                                    - cell "(b)" [ref=f4e2743]:
                                      - paragraph [ref=f4e2744]: (b)
                                    - cell "is authorised to execute orders on behalf of third parties, and the acquisition or disposal of financial instruments to which the order relates, is made to carry out such an order legitimately in the normal course of the exercise of that person’s employment, profession or duties." [ref=f4e2745]:
                                      - paragraph [ref=f4e2746]: is authorised to execute orders on behalf of third parties, and the acquisition or disposal of financial instruments to which the order relates, is made to carry out such an order legitimately in the normal course of the exercise of that person’s employment, profession or duties.
                            - generic [ref=f4e2747]:
                              - paragraph [ref=f4e2748]: "3. For the purposes of Articles 8 and 14, it shall not be deemed from the mere fact that a person is in possession of inside information that that person has used that information and has thus engaged in insider dealing on the basis of an acquisition or disposal where that person conducts a transaction to acquire or dispose of financial instruments and that transaction is carried out in the discharge of an obligation that has become due in good faith and not to circumvent the prohibition against insider dealing and:"
                              - table [ref=f4e2749]:
                                - rowgroup [ref=f4e2753]:
                                  - row "(a) that obligation results from an order placed or an agreement concluded before the person concerned possessed inside information; or" [ref=f4e2754]:
                                    - cell "(a)" [ref=f4e2755]:
                                      - paragraph [ref=f4e2756]: (a)
                                    - cell "that obligation results from an order placed or an agreement concluded before the person concerned possessed inside information; or" [ref=f4e2757]:
                                      - paragraph [ref=f4e2758]: that obligation results from an order placed or an agreement concluded before the person concerned possessed inside information; or
                              - table [ref=f4e2759]:
                                - rowgroup [ref=f4e2763]:
                                  - row "(b) that transaction is carried out to satisfy a legal or regulatory obligation that arose, before the person concerned possessed inside information." [ref=f4e2764]:
                                    - cell "(b)" [ref=f4e2765]:
                                      - paragraph [ref=f4e2766]: (b)
                                    - cell "that transaction is carried out to satisfy a legal or regulatory obligation that arose, before the person concerned possessed inside information." [ref=f4e2767]:
                                      - paragraph [ref=f4e2768]: that transaction is carried out to satisfy a legal or regulatory obligation that arose, before the person concerned possessed inside information.
                            - generic [ref=f4e2769]:
                              - paragraph [ref=f4e2770]: 4. For the purposes of Article 8 and 14, it shall not be deemed from the mere fact that a person is in possession of inside information that that person has used that information and has thus engaged in insider dealing, where such person has obtained that inside information in the conduct of a public takeover or merger with a company and uses that inside information solely for the purpose of proceeding with that merger or public takeover, provided that at the point of approval of the merger or acceptance of the offer by the shareholders of that company, any inside information has been made public or has otherwise ceased to constitute inside information.
                              - paragraph [ref=f4e2771]: This paragraph shall not apply to stake-building.
                            - paragraph [ref=f4e2773]: 5. For the purposes of Articles 8 and 14, the mere fact that a person uses its own knowledge that it has decided to acquire or dispose of financial instruments in the acquisition or disposal of those financial instruments shall not of itself constitute use of inside information.
                            - paragraph [ref=f4e2775]: 6. Notwithstanding paragraphs 1 to 5 of this Article, an infringement of the prohibition of insider dealing set out in Article 14 may still be deemed to have occurred if the competent authority establishes that there was an illegitimate reason for the orders to trade, transactions or behaviours concerned.
                          - generic [ref=f4e2776]:
                            - paragraph [ref=f4e2777]: Article 10
                            - paragraph [ref=f4e2779]: Unlawful disclosure of inside information
                            - generic [ref=f4e2780]:
                              - paragraph [ref=f4e2781]: 1. For the purposes of this Regulation, unlawful disclosure of inside information arises where a person possesses inside information and discloses that information to any other person, except where the disclosure is made in the normal exercise of an employment, a profession or duties.
                              - paragraph [ref=f4e2782]: This paragraph applies to any natural or legal person in the situations or circumstances referred to in Article 8(4).
                            - paragraph [ref=f4e2784]: 2. For the purposes of this Regulation the onward disclosure of recommendations or inducements referred to in Article 8(2) amounts to unlawful disclosure of inside information under this Article where the person disclosing the recommendation or inducement knows or ought to know that it was based on inside information.
                          - generic [ref=f4e2785]:
                            - paragraph [ref=f4e2786]: Article 11
                            - paragraph [ref=f4e2788]: Market soundings
                            - generic [ref=f4e2789]:
                              - paragraph [ref=f4e2790]: "1. A market sounding comprises the communication of information, prior to the announcement of a transaction, in order to gauge the interest of potential investors in a possible transaction and the conditions relating to it such as its potential size or pricing, to one or more potential investors by:"
                              - table [ref=f4e2791]:
                                - rowgroup [ref=f4e2795]:
                                  - row "(a) an issuer;" [ref=f4e2796]:
                                    - cell "(a)" [ref=f4e2797]:
