                                    - cell "measures taken by the person responsible for the infringement to prevent its repetition." [ref=f4e4559]:
                                      - paragraph [ref=f4e4560]: measures taken by the person responsible for the infringement to prevent its repetition.
                            - paragraph [ref=f4e4562]: 2. In the exercise of their powers to impose administrative sanctions and other administrative measures under Article 30, competent authorities shall cooperate closely to ensure that the exercise of their supervisory and investigative powers, and the administrative sanctions that they impose, and the other administrative measures that they take, are effective and appropriate under this Regulation. They shall coordinate their actions in accordance with Article 25 in order to avoid duplication and overlaps when exercising their supervisory and investigative powers and when imposing administrative sanctions in respect of cross-border cases.
                          - generic [ref=f4e4563]:
                            - paragraph [ref=f4e4564]: Article 32
                            - paragraph [ref=f4e4566]: Reporting of infringements
                            - paragraph [ref=f4e4568]: 1. Member States shall ensure that competent authorities establish effective mechanisms to enable reporting of actual or potential infringements of this Regulation to competent authorities.
                            - generic [ref=f4e4569]:
                              - paragraph [ref=f4e4570]: "2. The mechanisms referred to in paragraph 1 shall include at least:"
                              - table [ref=f4e4571]:
                                - rowgroup [ref=f4e4575]:
                                  - row "(a) specific procedures for the receipt of reports of infringements and their follow-up, including the establishment of secure communication channels for such reports;" [ref=f4e4576]:
                                    - cell "(a)" [ref=f4e4577]:
