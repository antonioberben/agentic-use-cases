                            - generic [ref=f4e4082]:
                              - paragraph [ref=f4e4083]: 3. Member States shall ensure that appropriate measures are in place so that competent authorities have all the supervisory and investigatory powers that are necessary to fulfil their duties.
                              - paragraph [ref=f4e4084]: This Regulation is without prejudice to laws, regulations and administrative provisions adopted in relation to takeover bids, merger transactions and other transactions affecting the ownership or control of companies regulated by the supervisory authorities appointed by Member States pursuant to Article 4 of Directive 2004/25/EC that impose requirements in addition to the requirements of this Regulation.
                            - paragraph [ref=f4e4086]: 4. A person making information available to the competent authority in accordance with this Regulation shall not be considered to be infringing any restriction on disclosure of information imposed by contract or by any legislative, regulatory or administrative provision, and shall not involve the person notifying in liability of any kind related to such notification.
                          - generic [ref=f4e4087]:
                            - paragraph [ref=f4e4088]: Article 24
                            - paragraph [ref=f4e4090]: Cooperation with ESMA
                            - paragraph [ref=f4e4092]: 1. The competent authorities shall cooperate with ESMA for the purposes of this Regulation, in accordance with Regulation (EU) No 1095/2010.
                            - paragraph [ref=f4e4094]: 2. The competent authorities shall, without delay, provide ESMA with all information necessary to carry out its duties, in accordance with Article 35 of Regulation (EU) No 1095/2010.
                            - generic [ref=f4e4095]:
                              - paragraph [ref=f4e4096]: 3. In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to determine the procedures and forms for exchange of information as referred to in paragraph 2.
                              - paragraph [ref=f4e4097]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2016.
                              - paragraph [ref=f4e4098]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                          - generic [ref=f4e4099]:
                            - paragraph [ref=f4e4100]: Article 25
                            - paragraph [ref=f4e4102]: Obligation to cooperate
                            - generic [ref=f4e4103]:
                              - paragraph [ref=f4e4104]: 1. Competent authorities shall cooperate with each other and with ESMA where necessary for the purposes of this Regulation, unless one of the exceptions in paragraph 2 applies. Competent authorities shall render assistance to competent authorities of other Member States and ESMA. In particular, they shall exchange information without undue delay and cooperate in investigation, supervision and enforcement activities.
                              - paragraph [ref=f4e4105]: The obligation to cooperate and assist laid down in the first subparagraph shall also apply as regards the Commission in relation to the exchange of information relating to commodities which are agricultural products listed in Annex I to the TFEU.
                              - paragraph [ref=f4e4106]: The competent authorities and ESMA shall cooperate in accordance with Regulation (EU) No 1095/2010, in particular Article 35 thereof.
                              - paragraph [ref=f4e4107]: Where Member States have chosen, in accordance with Article 30(1), second subparagraph, to lay down criminal sanctions for infringements of the provisions of this Regulation referred to in that Article, they shall ensure that appropriate measures are in place so that competent authorities have all the necessary powers to liaise with judicial authorities within their jurisdiction to receive specific information related to criminal investigations or proceedings commenced for possible infringements of this Regulation and provide the same to other competent authorities and ESMA to fulfil their obligation to cooperate with each other and ESMA for the purposes of this Regulation.
                            - generic [ref=f4e4108]:
