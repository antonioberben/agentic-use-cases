                        - table [ref=f4e1499]:
                          - rowgroup [ref=f4e1503]:
                            - row "(83) Technical standards in financial services should ensure uniform conditions across the Union in matters covered by this Regulation. As a body with highly specialised expertise, it would be efficient and appropriate to entrust ESMA with the elaboration of draft regulatory technical standards and draft implementing technical standards which do not involve policy choices, for submission to the Commission." [ref=f4e1504]:
                              - cell "(83)" [ref=f4e1505]:
