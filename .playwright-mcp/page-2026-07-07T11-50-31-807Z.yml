                            - paragraph [ref=f4e3097]: 3. For the purposes of applying paragraph 1(a) and (b), and without prejudice to the forms of behaviour set out in paragraph 2, Annex I defines non-exhaustive indicators relating to the employment of a fictitious device or any other form of deception or contrivance, and non-exhaustive indicators related to false or misleading signals and to price securing.
                            - paragraph [ref=f4e3099]: 4. Where the person referred to in this Article is a legal person, this Article shall also apply, in accordance with national law, to the natural persons who participate in the decision to carry out activities for the account of the legal person concerned.
                            - paragraph [ref=f4e3101]: 5. The Commission shall be empowered to adopt delegated acts in accordance with Article 35 specifying the indicators laid down in Annex I, in order to clarify their elements and to take into account technical developments on financial markets.
                          - generic [ref=f4e3102]:
                            - paragraph [ref=f4e3103]: Article 13
                            - paragraph [ref=f4e3105]: Accepted market practices
                            - paragraph [ref=f4e3107]: 1. The prohibition in Article 15 shall not apply to the activities referred to in Article 12(1)(a), provided that the person entering into a transaction, placing an order to trade or engaging in any other behaviour establishes that such transaction, order or behaviour have been carried out for legitimate reasons, and conform with an accepted market practice as established in accordance with this Article.
                            - generic [ref=f4e3108]:
                              - paragraph [ref=f4e3109]: "2. A competent authority may establish an accepted market practice, taking into account the following criteria:"
                              - table [ref=f4e3110]:
                                - rowgroup [ref=f4e3114]:
                                  - row "(a) whether the market practice provides for a substantial level of transparency to the market;" [ref=f4e3115]:
                                    - cell "(a)" [ref=f4e3116]:
                                      - paragraph [ref=f4e3117]: (a)
                                    - cell "whether the market practice provides for a substantial level of transparency to the market;" [ref=f4e3118]:
                                      - paragraph [ref=f4e3119]: whether the market practice provides for a substantial level of transparency to the market;
                              - table [ref=f4e3120]:
                                - rowgroup [ref=f4e3124]:
                                  - row "(b) whether the market practice ensures a high degree of safeguards to the operation of market forces and the proper interplay of the forces of supply and demand;" [ref=f4e3125]:
                                    - cell "(b)" [ref=f4e3126]:
                                      - paragraph [ref=f4e3127]: (b)
                                    - cell "whether the market practice ensures a high degree of safeguards to the operation of market forces and the proper interplay of the forces of supply and demand;" [ref=f4e3128]:
                                      - paragraph [ref=f4e3129]: whether the market practice ensures a high degree of safeguards to the operation of market forces and the proper interplay of the forces of supply and demand;
                              - table [ref=f4e3130]:
                                - rowgroup [ref=f4e3134]:
                                  - row "(c) whether the market practice has a positive impact on market liquidity and efficiency;" [ref=f4e3135]:
                                    - cell "(c)" [ref=f4e3136]:
                                      - paragraph [ref=f4e3137]: (c)
                                    - cell "whether the market practice has a positive impact on market liquidity and efficiency;" [ref=f4e3138]:
                                      - paragraph [ref=f4e3139]: whether the market practice has a positive impact on market liquidity and efficiency;
                              - table [ref=f4e3140]:
                                - rowgroup [ref=f4e3144]:
                                  - row "(d) whether the market practice takes into account the trading mechanism of the relevant market and enables market participants to react properly and in a timely manner to the new market situation created by that practice;" [ref=f4e3145]:
                                    - cell "(d)" [ref=f4e3146]:
                                      - paragraph [ref=f4e3147]: (d)
                                    - cell "whether the market practice takes into account the trading mechanism of the relevant market and enables market participants to react properly and in a timely manner to the new market situation created by that practice;" [ref=f4e3148]:
                                      - paragraph [ref=f4e3149]: whether the market practice takes into account the trading mechanism of the relevant market and enables market participants to react properly and in a timely manner to the new market situation created by that practice;
                              - table [ref=f4e3150]:
                                - rowgroup [ref=f4e3154]:
                                  - row "(e) whether the market practice does not create risks for the integrity of, directly or indirectly, related markets, whether regulated or not, in the relevant financial instrument within the Union;" [ref=f4e3155]:
                                    - cell "(e)" [ref=f4e3156]:
                                      - paragraph [ref=f4e3157]: (e)
                                    - cell "whether the market practice does not create risks for the integrity of, directly or indirectly, related markets, whether regulated or not, in the relevant financial instrument within the Union;" [ref=f4e3158]:
                                      - paragraph [ref=f4e3159]: whether the market practice does not create risks for the integrity of, directly or indirectly, related markets, whether regulated or not, in the relevant financial instrument within the Union;
                              - table [ref=f4e3160]:
                                - rowgroup [ref=f4e3164]:
                                  - row "(f) the outcome of any investigation of the relevant market practice by any competent authority or by another authority, in particular whether the relevant market practice infringed rules or regulations designed to prevent market abuse, or codes of conduct, irrespective of whether it concerns the relevant market or directly or indirectly related markets within the Union; and" [ref=f4e3165]:
                                    - cell "(f)" [ref=f4e3166]:
                                      - paragraph [ref=f4e3167]: (f)
                                    - cell "the outcome of any investigation of the relevant market practice by any competent authority or by another authority, in particular whether the relevant market practice infringed rules or regulations designed to prevent market abuse, or codes of conduct, irrespective of whether it concerns the relevant market or directly or indirectly related markets within the Union; and" [ref=f4e3168]:
                                      - paragraph [ref=f4e3169]: the outcome of any investigation of the relevant market practice by any competent authority or by another authority, in particular whether the relevant market practice infringed rules or regulations designed to prevent market abuse, or codes of conduct, irrespective of whether it concerns the relevant market or directly or indirectly related markets within the Union; and
                              - table [ref=f4e3170]:
                                - rowgroup [ref=f4e3174]:
                                  - row "(g) the structural characteristics of the relevant market, inter alia, whether it is regulated or not, the types of financial instruments traded and the type of market participants, including the extent of retail-investor participation in the relevant market." [ref=f4e3175]:
                                    - cell "(g)" [ref=f4e3176]:
                                      - paragraph [ref=f4e3177]: (g)
                                    - cell "the structural characteristics of the relevant market, inter alia, whether it is regulated or not, the types of financial instruments traded and the type of market participants, including the extent of retail-investor participation in the relevant market." [ref=f4e3178]:
                                      - paragraph [ref=f4e3179]: the structural characteristics of the relevant market, inter alia, whether it is regulated or not, the types of financial instruments traded and the type of market participants, including the extent of retail-investor participation in the relevant market.
                              - paragraph [ref=f4e3180]: A market practice that has been established by a competent authority as an accepted market practice in a particular market shall not be considered to be applicable to other markets unless the competent authorities of those other markets have accepted that practice pursuant to this Article.
                            - paragraph [ref=f4e3182]: 3. Before establishing an accepted market practice in accordance with paragraph 2, the competent authority shall notify ESMA and the other competent authorities of its intention to establish an accepted market practice and shall provide the details of that assessment made in accordance with the criteria laid down in paragraph 2. Such a notification shall be made at least three months before the accepted market practice is intended to take effect.
                            - paragraph [ref=f4e3184]: 4. Within two months following receipt of the notification, ESMA shall issue an opinion to the notifying competent authority assessing the compatibility of the accepted market practice with paragraph 2 and with the regulatory technical standards adopted pursuant to paragraph 7. ESMA shall also assess whether the establishment of the accepted market practice would not threaten the market confidence in the Union’s financial market. The opinion shall be published on ESMA’s website.
                            - paragraph [ref=f4e3186]: 5. Where a competent authority establishes an accepted market practice contrary to the opinion of ESMA issued in accordance with paragraph 4, it shall publish on its website within 24 hours of establishing the accepted market practice a notice setting out in full its reasons for doing so, including why the accepted market practice does not threaten market confidence.
                            - generic [ref=f4e3187]:
                              - paragraph [ref=f4e3188]: 6. Where a competent authority considers that another competent authority has established an accepted market practice that does not meet the criteria set out in paragraph 2, ESMA shall assist the authorities concerned in reaching an agreement in accordance with its powers under Article 19 of Regulation (EU) No 1095/2010.
                              - paragraph [ref=f4e3189]: If the competent authorities concerned fail to reach an agreement, ESMA may take a decision in accordance with Article 19(3) of Regulation (EU) No 1095/2010.
                            - generic [ref=f4e3190]:
                              - paragraph [ref=f4e3191]: 7. In order to ensure consistent harmonisation of this Article, ESMA shall develop draft regulatory technical standards specifying the criteria, the procedure and the requirements for establishing an accepted market practice under paragraphs 2, 3 and 4, and the requirements for maintaining it, terminating it, or modifying the conditions for its acceptance.
                              - paragraph [ref=f4e3192]: ESMA shall submit those draft regulatory technical standards to the Commission by 3 July 2015.
                              - paragraph [ref=f4e3193]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the first subparagraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
                            - paragraph [ref=f4e3195]: 8. Competent authorities shall review regularly, and at least every two years, the accepted market practices that they have established, in particular by taking into account significant changes to the relevant market environment, such as changes to trading rules or to market infrastructures, with a view to deciding whether to maintain it, to terminate it, or to modify the conditions for its acceptance.
                            - paragraph [ref=f4e3197]: 9. ESMA shall publish on its website a list of accepted market practices and in which Member States they are applicable.
                            - paragraph [ref=f4e3199]: 10. ESMA shall monitor the application of accepted market practices and shall submit an annual report to the Commission on how they are applied in the markets concerned.
