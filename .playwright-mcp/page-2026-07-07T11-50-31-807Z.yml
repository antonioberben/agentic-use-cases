                              - table [ref=f4e3388]:
                                - rowgroup [ref=f4e3392]:
                                  - row "(b) in cases other than those referred to in point (a), any other national authority responsible for the supervision of the issuer." [ref=f4e3393]:
                                    - cell "(b)" [ref=f4e3394]:
                                      - paragraph [ref=f4e3395]: (b)
                                    - cell "in cases other than those referred to in point (a), any other national authority responsible for the supervision of the issuer." [ref=f4e3396]:
                                      - paragraph [ref=f4e3397]: in cases other than those referred to in point (a), any other national authority responsible for the supervision of the issuer.
                              - paragraph [ref=f4e3398]: The competent authority specified under paragraph 3 shall ensure that disclosure of the inside information is delayed only for a period as is necessary in the public interest. The competent authority specified under paragraph 3 shall evaluate at least on a weekly basis whether the conditions set out in points (a), (b) and (c) of paragraph 5 are still met.
                              - paragraph [ref=f4e3399]: If the competent authority specified under paragraph 3 does not consent to the delay of disclosure of the inside information, the issuer shall disclose the inside information immediately.
                              - paragraph [ref=f4e3400]: This paragraph shall apply to cases where the issuer does not decide to delay the disclosure of inside information in accordance with paragraph 4.
                              - paragraph [ref=f4e3401]: Reference in this paragraph to the competent authority specified under paragraph 3 is without prejudice to the ability of the competent authority to exercise its functions in any of the ways referred to in Article 23(1).
                            - generic [ref=f4e3402]:
                              - paragraph [ref=f4e3403]: 7. Where disclosure of inside information has been delayed in accordance with paragraph 4 or 5 and the confidentiality of that inside information is no longer ensured, the issuer or the emission allowance market participant shall disclose that inside information to the public as soon as possible.
                              - paragraph [ref=f4e3404]: This paragraph includes situations where a rumour explicitly relates to inside information the disclosure of which has been delayed in accordance with paragraph 4 or 5, where that rumour is sufficiently accurate to indicate that the confidentiality of that information is no longer ensured.
                            - paragraph [ref=f4e3406]: 8. Where an issuer or an emission allowance market participant, or a person acting on their behalf or for their account, discloses any inside information to any third party in the normal course of the exercise of an employment, profession or duties as referred to in Article 10(1), they must make complete and effective public disclosure of that information, simultaneously in the case of an intentional disclosure, and promptly in the case of a non-intentional disclosure. This paragraph shall not apply if the person receiving the information owes a duty of confidentiality, regardless of whether such duty is based on a law, on regulations, on articles of association, or on a contract.
                            - paragraph [ref=f4e3408]: 9. Inside information relating to issuers whose financial instruments are admitted to trading on an SME growth market, may be posted on the trading venue’s website instead of on the website of the issuer where the trading venue chooses to provide this facility for issuers on that market.
