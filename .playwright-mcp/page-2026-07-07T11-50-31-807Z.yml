                                - rowgroup [ref=f4e2709]:
                                  - row "(a) has established, implemented and maintained adequate and effective internal arrangements and procedures that effectively ensure that neither the natural person who made the decision on its behalf to acquire or dispose of financial instruments to which the information relates, nor another natural person who may have had an influence on that decision, was in possession of the inside information; and" [ref=f4e2710]:
                                    - cell "(a)" [ref=f4e2711]:
