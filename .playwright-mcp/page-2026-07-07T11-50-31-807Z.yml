                            - paragraph [ref=f4e3799]: 8. Paragraph 1 shall apply to any subsequent transaction once a total amount of EUR 5 000 has been reached within a calendar year. The threshold of EUR 5 000 shall be calculated by adding without netting all transactions referred to in paragraph 1.
                            - paragraph [ref=f4e3801]: 9. A competent authority may decide to increase the threshold set out in paragraph 8 to EUR 20 000 and shall inform ESMA of its decision and the justification for its decision, with specific reference to market conditions, to adopt the higher threshold prior to its application. ESMA shall publish on its website the list of thresholds that apply in accordance with this Article and the justifications provided by competent authorities for such thresholds.
                            - paragraph [ref=f4e3803]: 10. This Article shall also apply to transactions by persons discharging managerial responsibilities within any auction platform, auctioneer and auction monitor involved in the auctions held under Regulation (EU) No 1031/2010 and to persons closely associated with such persons in so far as their transactions involve emission allowances, derivatives thereof or auctioned products based thereon. Those persons shall notify their transactions to the auction platforms, auctioneers and auction monitor, as applicable, and to the competent authority where the auction platform, auctioneer or auction monitor, as applicable, is registered. The information that is so notified shall be made public by the auction platforms, auctioneers, auction monitor or competent authority in accordance with paragraph 3.
