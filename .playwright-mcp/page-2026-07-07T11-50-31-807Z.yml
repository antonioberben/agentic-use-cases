                            - paragraph [ref=f4e3434]: 11. ESMA shall issue guidelines to establish a non-exhaustive indicative list of the legitimate interests of issuers, as referred to in point (a) of paragraph 4, and of situations in which delay of disclosure of inside information is likely to mislead the public as referred to in point (b) of paragraph 4.
