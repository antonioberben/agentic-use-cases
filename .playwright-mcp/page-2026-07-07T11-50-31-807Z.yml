                    - table [ref=f4e541]:
                      - rowgroup [ref=f4e547]:
                        - row "12.6.2014 EN Official Journal of the European Union L 173/1" [ref=f4e548]:
                          - cell "12.6.2014" [ref=f4e549]:
                            - paragraph [ref=f4e550]: 12.6.2014
                          - cell "EN" [ref=f4e551]:
                            - paragraph [ref=f4e552]: EN
                          - cell "Official Journal of the European Union" [ref=f4e553]:
                            - paragraph [ref=f4e554]: Official Journal of the European Union
                          - cell "L 173/1" [ref=f4e555]:
                            - paragraph [ref=f4e556]: L 173/1
                    - separator [ref=f4e557]
                    - generic [ref=f4e558]:
                      - generic [ref=f4e559]:
                        - paragraph [ref=f4e560]: REGULATION (EU) No 596/2014 OF THE EUROPEAN PARLIAMENT AND OF THE COUNCIL
                        - paragraph [ref=f4e561]: of 16 April 2014
                        - paragraph [ref=f4e562]: on market abuse (market abuse regulation) and repealing Directive 2003/6/EC of the European Parliament and of the Council and Commission Directives 2003/124/EC, 2003/125/EC and 2004/72/EC
                        - paragraph [ref=f4e563]: (Text with EEA relevance)
                      - generic [ref=f4e564]:
                        - paragraph [ref=f4e565]: THE EUROPEAN PARLIAMENT AND THE COUNCIL OF THE EUROPEAN UNION,
                        - paragraph [ref=f4e567]: Having regard to the Treaty on the Functioning of the European Union, and in particular Article 114 thereof,
                        - paragraph [ref=f4e569]: Having regard to the proposal from the European Commission,
                        - paragraph [ref=f4e571]: After transmission of the draft legislative act to the national parliaments,
                        - paragraph [ref=f4e573]:
                          - text: Having regard to the opinion of the European Central Bank
                          - link "(1)" [ref=f4e574] [cursor=pointer]:
                            - /url: "#ntr1-L_2014173EN.01000101-E0001"
                          - text: ","
                        - paragraph [ref=f4e576]:
                          - text: Having regard to the opinion of the European Economic and Social Committee
                          - link "(2)" [ref=f4e577] [cursor=pointer]:
                            - /url: "#ntr2-L_2014173EN.01000101-E0002"
                          - text: ","
                        - paragraph [ref=f4e579]:
                          - text: Acting in accordance with the ordinary legislative procedure
                          - link "(3)" [ref=f4e580] [cursor=pointer]:
                            - /url: "#ntr3-L_2014173EN.01000101-E0003"
                          - text: ","
                        - paragraph [ref=f4e581]: "Whereas:"
                        - table [ref=f4e583]:
                          - rowgroup [ref=f4e587]:
                            - row "(1) A genuine internal market for financial services is crucial for economic growth and job creation in the Union." [ref=f4e588]:
                              - cell "(1)" [ref=f4e589]:
                                - paragraph [ref=f4e590]: (1)
                              - cell "A genuine internal market for financial services is crucial for economic growth and job creation in the Union." [ref=f4e591]:
                                - paragraph [ref=f4e592]: A genuine internal market for financial services is crucial for economic growth and job creation in the Union.
                        - table [ref=f4e594]:
                          - rowgroup [ref=f4e598]:
                            - row "(2) An integrated, efficient and transparent financial market requires market integrity. The smooth functioning of securities markets and public confidence in markets are prerequisites for economic growth and wealth. Market abuse harms the integrity of financial markets and public confidence in securities and derivatives." [ref=f4e599]:
                              - cell "(2)" [ref=f4e600]:
                                - paragraph [ref=f4e601]: (2)
                              - cell "An integrated, efficient and transparent financial market requires market integrity. The smooth functioning of securities markets and public confidence in markets are prerequisites for economic growth and wealth. Market abuse harms the integrity of financial markets and public confidence in securities and derivatives." [ref=f4e602]:
                                - paragraph [ref=f4e603]: An integrated, efficient and transparent financial market requires market integrity. The smooth functioning of securities markets and public confidence in markets are prerequisites for economic growth and wealth. Market abuse harms the integrity of financial markets and public confidence in securities and derivatives.
                        - table [ref=f4e605]:
                          - rowgroup [ref=f4e609]:
                            - row "(3) Directive 2003/6/EC of the European Parliament and of the Council (4) completed and updated the Union’s legal framework to protect market integrity. However, given the legislative, market and technological developments since the entry into force of that Directive, which have resulted in considerable changes to the financial landscape, that Directive should now be replaced. A new legislative instrument is also needed to ensure that there are uniform rules and clarity of key concepts and a single rule book in line with the conclusions of the report of 25 February 2009 by the High Level Group on Financial Supervision in the EU, chaired by Jacques de Larosière (the ‘de Larosière Group’)." [ref=f4e610]:
                              - cell "(3)" [ref=f4e611]:
                                - paragraph [ref=f4e612]: (3)
                              - cell "Directive 2003/6/EC of the European Parliament and of the Council (4) completed and updated the Union’s legal framework to protect market integrity. However, given the legislative, market and technological developments since the entry into force of that Directive, which have resulted in considerable changes to the financial landscape, that Directive should now be replaced. A new legislative instrument is also needed to ensure that there are uniform rules and clarity of key concepts and a single rule book in line with the conclusions of the report of 25 February 2009 by the High Level Group on Financial Supervision in the EU, chaired by Jacques de Larosière (the ‘de Larosière Group’)." [ref=f4e613]:
                                - paragraph [ref=f4e614]:
                                  - text: Directive 2003/6/EC of the European Parliament and of the Council
                                  - link "(4)" [ref=f4e615] [cursor=pointer]:
                                    - /url: "#ntr4-L_2014173EN.01000101-E0004"
                                  - text: completed and updated the Union’s legal framework to protect market integrity. However, given the legislative, market and technological developments since the entry into force of that Directive, which have resulted in considerable changes to the financial landscape, that Directive should now be replaced. A new legislative instrument is also needed to ensure that there are uniform rules and clarity of key concepts and a single rule book in line with the conclusions of the report of 25 February 2009 by the High Level Group on Financial Supervision in the EU, chaired by Jacques de Larosière (the ‘de Larosière Group’).
                        - table [ref=f4e617]:
                          - rowgroup [ref=f4e621]:
                            - row "(4) There is a need to establish a more uniform and stronger framework in order to preserve market integrity, to avoid potential regulatory arbitrage, to ensure accountability in the event of attempted manipulation, and to provide more legal certainty and less regulatory complexity for market participants. This Regulation aims at contributing in a determining manner to the proper functioning of the internal market and should therefore be based on Article 114 of the Treaty on the Functioning of the European Union (TFEU), as interpreted consistently in the case-law of the Court of Justice of the European Union." [ref=f4e622]:
                              - cell "(4)" [ref=f4e623]:
                                - paragraph [ref=f4e624]: (4)
                              - cell "There is a need to establish a more uniform and stronger framework in order to preserve market integrity, to avoid potential regulatory arbitrage, to ensure accountability in the event of attempted manipulation, and to provide more legal certainty and less regulatory complexity for market participants. This Regulation aims at contributing in a determining manner to the proper functioning of the internal market and should therefore be based on Article 114 of the Treaty on the Functioning of the European Union (TFEU), as interpreted consistently in the case-law of the Court of Justice of the European Union." [ref=f4e625]:
                                - paragraph [ref=f4e626]: There is a need to establish a more uniform and stronger framework in order to preserve market integrity, to avoid potential regulatory arbitrage, to ensure accountability in the event of attempted manipulation, and to provide more legal certainty and less regulatory complexity for market participants. This Regulation aims at contributing in a determining manner to the proper functioning of the internal market and should therefore be based on Article 114 of the Treaty on the Functioning of the European Union (TFEU), as interpreted consistently in the case-law of the Court of Justice of the European Union.
                        - table [ref=f4e628]:
                          - rowgroup [ref=f4e632]:
                            - row [ref=f4e633]:
                              - cell "(5)" [ref=f4e634]:
                                - paragraph [ref=f4e635]: (5)
                              - cell [ref=f4e636]:
                                - paragraph [ref=f4e637]: In order to remove the remaining obstacles to trade and the significant distortions of competition resulting from divergences between national laws and to prevent any further obstacles to trade and significant distortions of competition from arising, it is necessary to adopt a Regulation establishing a more uniform interpretation of the Union market abuse framework, which more clearly defines rules applicable in all Member States. Shaping market abuse requirements in the form of a regulation will ensure that those requirements are directly applicable. This should ensure uniform conditions by preventing diverging national requirements as a result of the transposition of a directive. This Regulation will require that all persons follow the same rules in all the Union. It will also reduce regulatory complexity and firms’ compliance costs, especially for firms operating on a cross-border basis, and it will contribute to eliminating distortions of competition.
                        - table [ref=f4e639]:
                          - rowgroup [ref=f4e643]:
                            - row "(6) The Commission Communication of 25 June 2008 on ‘A ‘Small Business Act’ for Europe’ calls on the Union and its Member States to design rules in order to reduce administrative burdens, to adapt legislation to the needs of issuers on markets for small and medium-sized enterprises (SMEs) and to facilitate access to finance for those issuers. A number of provisions in Directive 2003/6/EC impose administrative burdens on issuers, in particular on those whose financial instruments are admitted to trading on SME growth markets, which should be reduced." [ref=f4e644]:
                              - cell "(6)" [ref=f4e645]:
                                - paragraph [ref=f4e646]: (6)
                              - cell "The Commission Communication of 25 June 2008 on ‘A ‘Small Business Act’ for Europe’ calls on the Union and its Member States to design rules in order to reduce administrative burdens, to adapt legislation to the needs of issuers on markets for small and medium-sized enterprises (SMEs) and to facilitate access to finance for those issuers. A number of provisions in Directive 2003/6/EC impose administrative burdens on issuers, in particular on those whose financial instruments are admitted to trading on SME growth markets, which should be reduced." [ref=f4e647]:
                                - paragraph [ref=f4e648]: The Commission Communication of 25 June 2008 on ‘A ‘Small Business Act’ for Europe’ calls on the Union and its Member States to design rules in order to reduce administrative burdens, to adapt legislation to the needs of issuers on markets for small and medium-sized enterprises (SMEs) and to facilitate access to finance for those issuers. A number of provisions in Directive 2003/6/EC impose administrative burdens on issuers, in particular on those whose financial instruments are admitted to trading on SME growth markets, which should be reduced.
                        - table [ref=f4e650]:
                          - rowgroup [ref=f4e654]:
                            - row "(7) Market abuse is a concept that encompasses unlawful behaviour in the financial markets and, for the purposes of this Regulation, it should be understood to consist of insider dealing, unlawful disclosure of inside information and market manipulation. Such behaviour prevents full and proper market transparency, which is a prerequisite for trading for all economic actors in integrated financial markets." [ref=f4e655]:
                              - cell "(7)" [ref=f4e656]:
                                - paragraph [ref=f4e657]: (7)
                              - cell "Market abuse is a concept that encompasses unlawful behaviour in the financial markets and, for the purposes of this Regulation, it should be understood to consist of insider dealing, unlawful disclosure of inside information and market manipulation. Such behaviour prevents full and proper market transparency, which is a prerequisite for trading for all economic actors in integrated financial markets." [ref=f4e658]:
                                - paragraph [ref=f4e659]: Market abuse is a concept that encompasses unlawful behaviour in the financial markets and, for the purposes of this Regulation, it should be understood to consist of insider dealing, unlawful disclosure of inside information and market manipulation. Such behaviour prevents full and proper market transparency, which is a prerequisite for trading for all economic actors in integrated financial markets.
                        - table [ref=f4e661]:
                          - rowgroup [ref=f4e665]:
                            - row [ref=f4e666]:
                              - cell "(8)" [ref=f4e667]:
                                - paragraph [ref=f4e668]: (8)
                              - cell [ref=f4e669]:
                                - paragraph [ref=f4e670]: The scope of Directive 2003/6/EC focused on financial instruments admitted to trading on a regulated market or for which a request for admission to trading on such a market has been made. However, in recent years financial instruments have been increasingly traded on multilateral trading facilities (MTFs). There are also financial instruments which are traded only on other types of organised trading facilities (OTFs) or only over the counter (OTC). The scope of this Regulation should therefore include any financial instrument traded on a regulated market, an MTF or an OTF, and any other conduct or action which can have an effect on such a financial instrument irrespective of whether it takes place on a trading venue. In the case of certain types of MTFs which, like regulated markets, help companies to raise equity finance, the prohibition against market abuse also applies where a request for admission to trading on such a market has been made. The scope of this Regulation should therefore include financial instruments for which an application for admission to trading on an MTF has been made. This should improve investor protection, preserve the integrity of markets and ensure that market abuse of such instruments is clearly prohibited.
                        - table [ref=f4e672]:
                          - rowgroup [ref=f4e676]:
                            - row [ref=f4e677]:
                              - cell "(9)" [ref=f4e678]:
                                - paragraph [ref=f4e679]: (9)
                              - cell [ref=f4e680]:
                                - paragraph [ref=f4e681]: For the purposes of transparency, operators of a regulated market, an MTF or an OTF should notify, without delay, their competent authority of details of the financial instruments which they have admitted to trading, for which there has been a request for admission to trading or that have been traded on their trading venue. A second notification should be made when the instrument ceases to be admitted to trading. Such obligations should also apply to financial instruments for which there has been a request for admission to trading on their trading venue and financial instruments that have been admitted to trading prior to the entry into force of this Regulation. The notifications should be submitted to the European Securities and Markets Authority (ESMA) by the competent authorities and ESMA should publish a list of all of the financial instruments notified. This Regulation applies to financial instruments whether or not they are included in the list published by ESMA.
                        - table [ref=f4e683]:
                          - rowgroup [ref=f4e687]:
                            - row [ref=f4e688]:
                              - cell "(10)" [ref=f4e689]:
                                - paragraph [ref=f4e690]: (10)
                              - cell [ref=f4e691]:
                                - paragraph [ref=f4e692]: It is possible that certain financial instruments which are not traded on a trading venue are used for market abuse. This includes financial instruments the price or value of which depends or has an effect on financial instruments traded on a trading venue, or the trading of which has an effect on the price or value of other financial instruments traded on a trading venue. Examples of where such instruments can be used for market abuse include inside information relating to a share or bond, which can be used to buy a derivative of that share or bond, or an index the value of which depends on that share or bond. Where a financial instrument is used as a reference price, an OTC-traded derivative can be used to benefit from manipulated prices, or be used to manipulate the price of a financial instrument traded on a trading venue. A further example is the planned issue of a new tranche of securities that do not otherwise fall within the scope of this Regulation, but where trading in those securities could affect the price or value of existing listed securities that fall within the scope of this Regulation. This Regulation also covers the situation where the price or value of an instrument traded on a trading venue depends on an OTC-traded instrument. The same principle should apply to spot commodity contracts the prices of which are based on that of a derivative and to the buying of spot commodity contracts to which financial instruments are referenced.
                        - table [ref=f4e694]:
                          - rowgroup [ref=f4e698]:
                            - row "(11) Trading in securities or associated instruments for the stabilisation of securities or trading in own shares in buy-back programmes can be legitimate for economic reasons and should, therefore, in certain circumstances, be exempt from the prohibitions against market abuse provided that the actions are carried out under the necessary transparency, where relevant information regarding the stabilisation or buy-back programme is disclosed." [ref=f4e699]:
                              - cell "(11)" [ref=f4e700]:
                                - paragraph [ref=f4e701]: (11)
                              - cell "Trading in securities or associated instruments for the stabilisation of securities or trading in own shares in buy-back programmes can be legitimate for economic reasons and should, therefore, in certain circumstances, be exempt from the prohibitions against market abuse provided that the actions are carried out under the necessary transparency, where relevant information regarding the stabilisation or buy-back programme is disclosed." [ref=f4e702]:
                                - paragraph [ref=f4e703]: Trading in securities or associated instruments for the stabilisation of securities or trading in own shares in buy-back programmes can be legitimate for economic reasons and should, therefore, in certain circumstances, be exempt from the prohibitions against market abuse provided that the actions are carried out under the necessary transparency, where relevant information regarding the stabilisation or buy-back programme is disclosed.
                        - table [ref=f4e705]:
                          - rowgroup [ref=f4e709]:
                            - row "(12) Trading in own shares in buy-back programmes and Stabilising a financial instrument which would not benefit from the exemptions under this Regulation should not of itself be deemed to constitute market abuse." [ref=f4e710]:
                              - cell "(12)" [ref=f4e711]:
                                - paragraph [ref=f4e712]: (12)
                              - cell "Trading in own shares in buy-back programmes and Stabilising a financial instrument which would not benefit from the exemptions under this Regulation should not of itself be deemed to constitute market abuse." [ref=f4e713]:
                                - paragraph [ref=f4e714]: Trading in own shares in buy-back programmes and Stabilising a financial instrument which would not benefit from the exemptions under this Regulation should not of itself be deemed to constitute market abuse.
                        - table [ref=f4e716]:
                          - rowgroup [ref=f4e720]:
                            - row [ref=f4e721]:
                              - cell "(13)" [ref=f4e722]:
                                - paragraph [ref=f4e723]: (13)
                              - cell [ref=f4e724]:
                                - paragraph [ref=f4e725]: Member States, members of the European System of Central Banks (ESCB), ministries and other agencies and special purpose vehicles of one or several Member States, and the Union and certain other public bodies or persons acting on their behalf should not be restricted in carrying out monetary, exchange-rate or public debt management policy insofar as they are undertaken in the public interest and solely in pursuit of those policies. Neither should transactions or orders carried out, or behaviour by, the Union, a special purpose vehicle of one or several Member States, the European Investment Bank, the European Financial Stability Facility, the European Stability Mechanism or an international financial institution established by two or more Member States, be restricted in mobilising funding and providing financial assistance to the benefit of its members. Such an exemption from the scope of this Regulation may, in accordance with this Regulation, be extended to certain public bodies charged with, or intervening in, public debt management and to central banks of third countries. At the same time, the exemptions for monetary, exchange-rate or public debt management policy should not extend to cases where those bodies engage in transactions, orders or behaviour other than in pursuit of those policies or where persons working for those bodies engage in transactions, orders or behaviour on their own account.
                        - table [ref=f4e727]:
                          - rowgroup [ref=f4e731]:
                            - row "(14) Reasonable investors base their investment decisions on information already available to them, that is to say, on ex ante available information. Therefore, the question whether, in making an investment decision, a reasonable investor would be likely to take into account a particular piece of information should be appraised on the basis of the ex ante available information. Such an assessment has to take into consideration the anticipated impact of the information in light of the totality of the related issuer’s activity, the reliability of the source of information and any other market variables likely to affect the financial instruments, the related spot commodity contracts, or the auctioned products based on the emission allowances in the given circumstances." [ref=f4e732]:
                              - cell "(14)" [ref=f4e733]:
                                - paragraph [ref=f4e734]: (14)
                              - cell "Reasonable investors base their investment decisions on information already available to them, that is to say, on ex ante available information. Therefore, the question whether, in making an investment decision, a reasonable investor would be likely to take into account a particular piece of information should be appraised on the basis of the ex ante available information. Such an assessment has to take into consideration the anticipated impact of the information in light of the totality of the related issuer’s activity, the reliability of the source of information and any other market variables likely to affect the financial instruments, the related spot commodity contracts, or the auctioned products based on the emission allowances in the given circumstances." [ref=f4e735]:
