                                    - cell "has not encouraged, made a recommendation to, induced or otherwise influenced the natural person who, on behalf of the legal person, acquired or disposed of financial instruments to which the information relates." [ref=f4e2723]:
                                      - paragraph [ref=f4e2724]: has not encouraged, made a recommendation to, induced or otherwise influenced the natural person who, on behalf of the legal person, acquired or disposed of financial instruments to which the information relates.
                            - generic [ref=f4e2725]:
                              - paragraph [ref=f4e2726]: "2. For the purposes of Articles 8 and 14, it shall not be deemed from the mere fact that a person is in possession of inside information that that person has used that information and has thus engaged in insider dealing on the basis of an acquisition or disposal where that person:"
                              - table [ref=f4e2727]:
                                - rowgroup [ref=f4e2731]:
                                  - row "(a) for the financial instrument to which that information relates, is a market maker or a person authorised to act as a counterparty, and the acquisition or disposal of financial instruments to which that information relates is made legitimately in the normal course of the exercise of its function as a market maker or as a counterparty for that financial instrument; or" [ref=f4e2732]:
