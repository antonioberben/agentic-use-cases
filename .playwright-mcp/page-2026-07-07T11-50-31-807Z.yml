                            - paragraph [ref=f4e2554]: 3. This Regulation does not apply to the activity of a Member State, the Commission or any other officially designated body, or of any person acting on their behalf, which concerns emission allowances and which is undertaken in pursuit of the Union’s climate policy in accordance with Directive 2003/87/EC.
                            - paragraph [ref=f4e2556]: 4. This Regulation does not apply to the activities of a Member State, the Commission or any other officially designated body, or of any person acting on their behalf, that are undertaken in pursuit of the Union’s Common Agricultural Policy or of the Union’s Common Fisheries Policy in accordance with acts adopted or with international agreements concluded under the TFEU.
                            - generic [ref=f4e2557]:
                              - paragraph [ref=f4e2558]: 5. The Commission shall be empowered to adopt delegated acts in accordance with Article 35 to extend the exemption referred to in paragraph 1 to certain public bodies and central banks of third countries.
                              - paragraph [ref=f4e2559]: To that end, the Commission shall, by 3 January 2016, prepare and present to the European Parliament and to the Council a report assessing the international treatment of public bodies charged with, or intervening in, public debt management and of central banks in third countries.
                              - paragraph [ref=f4e2560]: The report shall include a comparative analysis of the treatment of those bodies and central banks within the legal framework of third countries, and the risk management standards applicable to the transactions entered into by those bodies and central banks in those jurisdictions. If the report concludes, in particular in regard to the comparative analysis, that the exemption of the monetary responsibilities of those third-country central banks from the obligations and prohibitions of this Regulation is necessary the Commission shall extend the exemption referred to in paragraph 1 also to the central banks of those third countries.
                            - paragraph [ref=f4e2562]: 6. The Commission shall also be empowered to adopt delegated acts in accordance with Article 35 to extend the exemption set out in paragraph 3 to certain designated public bodies of third countries that have entered into an agreement with the Union pursuant to Article 25 of Directive 2003/87/EC.
                            - paragraph [ref=f4e2564]: 7. This Article shall not apply to persons working under a contract of employment or otherwise for the entities referred to in this Article where those persons carry out transactions or orders, or engage in behaviour, directly or indirectly, on their own account.
