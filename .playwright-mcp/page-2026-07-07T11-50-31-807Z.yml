                            - generic [ref=f4e3629]:
                              - paragraph [ref=f4e3630]: 2. For the purposes of paragraph 1, and without prejudice to the right of Member States to provide for notification obligations other than those referred to in this Article, all transactions conducted on the own account of the persons referred to in paragraph 1, shall be notified by those persons to the competent authorities.
                              - paragraph [ref=f4e3631]: The rules applicable to notifications, with which persons referred to in paragraph 1 must comply, shall be those of the Member State where the issuer or emission allowance market participant is registered. Notifications shall be made within three working days of the transaction date to the competent authority of that Member State. Where the issuer is not registered in a Member State, the notification shall be made to the competent authority of the home Member State in accordance with point (i) of Article 2(1) of Directive 2004/109/EC or, in the absence thereof, to the competent authority of the trading venue.
                            - generic [ref=f4e3632]:
                              - paragraph [ref=f4e3633]: 3. The issuer or emission allowance market participant shall ensure that the information that is notified in accordance with paragraph 1 is made public promptly and no later than three business days after the transaction in a manner which enables fast access to this information on a non-discriminatory basis in accordance with the implementing technical standards referred to in point (a) of Article 17(10).
                              - paragraph [ref=f4e3634]: The issuer or emission allowance market participant shall use such media as may reasonably be relied upon for the effective dissemination of information to the public throughout the Union, and, where applicable, it shall use the officially appointed mechanism referred to in Article 21 of Directive 2004/109/EC.
                              - paragraph [ref=f4e3635]: Alternatively, national law may provide that a competent authority may itself make public the information.
