                          - rowgroup [ref=f4e1469]:
                            - row "(80) This Regulation, as well as the delegated acts, implementing acts, regulatory technical standards, implementing technical standards and guidelines adopted in accordance therewith, are without prejudice to the application of Union rules on competition." [ref=f4e1470]:
