                              - paragraph [ref=f4e4240]: 9. In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to determine the procedures and forms for exchange of information and assistance as referred to in this Article.
                              - paragraph [ref=f4e4241]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2016.
                              - paragraph [ref=f4e4242]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                          - generic [ref=f4e4243]:
                            - paragraph [ref=f4e4244]: Article 26
                            - paragraph [ref=f4e4246]: Cooperation with third countries
                            - generic [ref=f4e4247]:
                              - paragraph [ref=f4e4248]: 1. The competent authorities of Member States shall, where necessary, conclude cooperation arrangements with supervisory authorities of third countries concerning the exchange of information with supervisory authorities in third countries and the enforcement of obligations arising under this Regulation in third countries. Those cooperation arrangements shall ensure at least an efficient exchange of information that allows the competent authorities to carry out their duties under this Regulation.
                              - paragraph [ref=f4e4249]: A competent authority shall inform ESMA and the other competent authorities where it proposes to enter into such an arrangement.
                            - generic [ref=f4e4250]:
                              - paragraph [ref=f4e4251]: 2. ESMA shall, where possible, facilitate and coordinate the development of cooperation arrangements between the competent authorities and the relevant supervisory authorities of third countries.
                              - paragraph [ref=f4e4252]: In order to ensure consistent harmonisation of this Article, ESMA shall develop draft regulatory technical standards containing a template document for cooperation arrangements that are to be used by competent authorities of Member States where possible.
                              - paragraph [ref=f4e4253]: ESMA shall submit those draft regulatory technical standards to the Commission by 3 July 2015.
                              - paragraph [ref=f4e4254]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the second subparagraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
                              - paragraph [ref=f4e4255]: ESMA shall also, where possible, facilitate and coordinate the exchange between competent authorities of information obtained from supervisory authorities of third countries that may be relevant to the taking of measures under Articles 30 and 31.
                            - paragraph [ref=f4e4257]: 3. The competent authorities shall conclude cooperation arrangements on exchange of information with the supervisory authorities of third countries only where the information disclosed is subject to guarantees of professional secrecy which are at least equivalent to those set out in Article 27. Such exchange of information must be intended for the performance of the tasks of those competent authorities.
                          - generic [ref=f4e4258]:
                            - paragraph [ref=f4e4259]: Article 27
                            - paragraph [ref=f4e4261]: Professional secrecy
                            - paragraph [ref=f4e4263]: 1. Any confidential information received, exchanged or transmitted pursuant to this Regulation shall be subject to the conditions of professional secrecy laid down in paragraphs 2 and 3.
                            - paragraph [ref=f4e4265]: 2. All the information exchanged between the competent authorities under this Regulation that concerns business or operational conditions and other economic or personal affairs shall be considered to be confidential and shall be subject to the requirements of professional secrecy, except where the competent authority states at the time of communication that such information may be disclosed or such disclosure is necessary for legal proceedings.
                            - paragraph [ref=f4e4267]: 3. The obligation of professional secrecy applies to all persons who work or who have worked for the competent authority or for any authority or market undertaking to whom the competent authority has delegated its powers, including auditors and experts contracted by the competent authority. Information covered by professional secrecy may not be disclosed to any other person or authority except by virtue of provisions laid down by Union or national law.
                          - generic [ref=f4e4268]:
                            - paragraph [ref=f4e4269]: Article 28
                            - paragraph [ref=f4e4271]: Data protection
                            - paragraph [ref=f4e4272]: With regard to the processing of personal data within the framework of this Regulation, competent authorities shall carry out their tasks for the purposes of this Regulation in accordance with the national laws, regulations or administrative provisions transposing Directive 95/46/EC. With regard to the processing of personal data by ESMA within the framework of this Regulation, ESMA shall comply with the provisions of Regulation (EC) No 45/2001.
                            - paragraph [ref=f4e4273]: Personal data shall be retained for a maximum period of five years.
                          - generic [ref=f4e4274]:
                            - paragraph [ref=f4e4275]: Article 29
                            - paragraph [ref=f4e4277]: Disclosure of personal data to third countries
                            - paragraph [ref=f4e4279]: 1. The competent authority of a Member State may transfer personal data to a third country provided the requirements of Directive 95/46/EC are fulfilled and only on a case-by-case basis. The competent authority shall ensure that the transfer is necessary for the purpose of this Regulation and that the third country does not transfer the data to another third country unless it is given express written authorisation and complies with the conditions specified by the competent authority of the Member State.
                            - paragraph [ref=f4e4281]: 2. The competent authority of a Member State shall only disclose personal data received from a competent authority of another Member State to a supervisory authority of a third country where the competent authority of the Member State concerned has obtained express agreement from the competent authority which transmitted the data and, where applicable, the data is disclosed solely for the purposes for which that competent authority gave its agreement.
                            - paragraph [ref=f4e4283]: 3. Where a cooperation agreement provides for the exchange of personal data, it shall comply with the national laws, regulations or administrative provisions transposing Directive 95/46/EC.
