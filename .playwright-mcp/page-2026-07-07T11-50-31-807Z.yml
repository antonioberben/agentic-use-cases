                    - separator [ref=f4e4909]
                    - generic [ref=f4e4911]:
                      - paragraph [ref=f4e4912]: ANNEX I
                      - paragraph [ref=f4e4913]: A. Indicators of manipulative behaviour relating to false or misleading signals and to price securing
                      - paragraph [ref=f4e4914]: "For the purposes of applying point (a) of Article 12(1) of this Regulation, and without prejudice to the forms of behaviour set out in paragraph 2 of that Article, the following non-exhaustive indicators, which shall not necessarily be deemed, in themselves, to constitute market manipulation, shall be taken into account when transactions or orders to trade are examined by market participants and competent authorities:"
                      - table [ref=f4e4915]:
                        - rowgroup [ref=f4e4919]:
                          - row "(a) the extent to which orders to trade given or transactions undertaken represent a significant proportion of the daily volume of transactions in the relevant financial instrument, related spot commodity contract, or auctioned product based on emission allowances, in particular when those activities lead to a significant change in their prices;" [ref=f4e4920]:
                            - cell "(a)" [ref=f4e4921]:
                              - paragraph [ref=f4e4922]: (a)
                            - cell "the extent to which orders to trade given or transactions undertaken represent a significant proportion of the daily volume of transactions in the relevant financial instrument, related spot commodity contract, or auctioned product based on emission allowances, in particular when those activities lead to a significant change in their prices;" [ref=f4e4923]:
                              - paragraph [ref=f4e4924]: the extent to which orders to trade given or transactions undertaken represent a significant proportion of the daily volume of transactions in the relevant financial instrument, related spot commodity contract, or auctioned product based on emission allowances, in particular when those activities lead to a significant change in their prices;
                      - table [ref=f4e4925]:
                        - rowgroup [ref=f4e4929]:
                          - row "(b) the extent to which orders to trade given or transactions undertaken by persons with a significant buying or selling position in a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, lead to significant changes in the price of that financial instrument, related spot commodity contract, or auctioned product based on emission allowances;" [ref=f4e4930]:
                            - cell "(b)" [ref=f4e4931]:
                              - paragraph [ref=f4e4932]: (b)
                            - cell "the extent to which orders to trade given or transactions undertaken by persons with a significant buying or selling position in a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, lead to significant changes in the price of that financial instrument, related spot commodity contract, or auctioned product based on emission allowances;" [ref=f4e4933]:
                              - paragraph [ref=f4e4934]: the extent to which orders to trade given or transactions undertaken by persons with a significant buying or selling position in a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, lead to significant changes in the price of that financial instrument, related spot commodity contract, or auctioned product based on emission allowances;
                      - table [ref=f4e4935]:
                        - rowgroup [ref=f4e4939]:
                          - row "(c) whether transactions undertaken lead to no change in beneficial ownership of a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances;" [ref=f4e4940]:
                            - cell "(c)" [ref=f4e4941]:
                              - paragraph [ref=f4e4942]: (c)
                            - cell "whether transactions undertaken lead to no change in beneficial ownership of a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances;" [ref=f4e4943]:
                              - paragraph [ref=f4e4944]: whether transactions undertaken lead to no change in beneficial ownership of a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances;
                      - table [ref=f4e4945]:
                        - rowgroup [ref=f4e4949]:
                          - row "(d) the extent to which orders to trade given or transactions undertaken or orders cancelled include position reversals in a short period and represent a significant proportion of the daily volume of transactions in the relevant financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, and might be associated with significant changes in the price of a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances;" [ref=f4e4950]:
                            - cell "(d)" [ref=f4e4951]:
                              - paragraph [ref=f4e4952]: (d)
                            - cell "the extent to which orders to trade given or transactions undertaken or orders cancelled include position reversals in a short period and represent a significant proportion of the daily volume of transactions in the relevant financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, and might be associated with significant changes in the price of a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances;" [ref=f4e4953]:
                              - paragraph [ref=f4e4954]: the extent to which orders to trade given or transactions undertaken or orders cancelled include position reversals in a short period and represent a significant proportion of the daily volume of transactions in the relevant financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, and might be associated with significant changes in the price of a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances;
                      - table [ref=f4e4955]:
                        - rowgroup [ref=f4e4959]:
                          - row "(e) the extent to which orders to trade given or transactions undertaken are concentrated within a short time span in the trading session and lead to a price change which is subsequently reversed;" [ref=f4e4960]:
                            - cell "(e)" [ref=f4e4961]:
                              - paragraph [ref=f4e4962]: (e)
                            - cell "the extent to which orders to trade given or transactions undertaken are concentrated within a short time span in the trading session and lead to a price change which is subsequently reversed;" [ref=f4e4963]:
                              - paragraph [ref=f4e4964]: the extent to which orders to trade given or transactions undertaken are concentrated within a short time span in the trading session and lead to a price change which is subsequently reversed;
                      - table [ref=f4e4965]:
                        - rowgroup [ref=f4e4969]:
                          - row "(f) the extent to which orders to trade given change the representation of the best bid or offer prices in a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, or more generally the representation of the order book available to market participants, and are removed before they are executed; and" [ref=f4e4970]:
                            - cell "(f)" [ref=f4e4971]:
                              - paragraph [ref=f4e4972]: (f)
                            - cell "the extent to which orders to trade given change the representation of the best bid or offer prices in a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, or more generally the representation of the order book available to market participants, and are removed before they are executed; and" [ref=f4e4973]:
                              - paragraph [ref=f4e4974]: the extent to which orders to trade given change the representation of the best bid or offer prices in a financial instrument, a related spot commodity contract, or an auctioned product based on emission allowances, or more generally the representation of the order book available to market participants, and are removed before they are executed; and
                      - table [ref=f4e4975]:
                        - rowgroup [ref=f4e4979]:
                          - row "(g) the extent to which orders to trade are given or transactions are undertaken at or around a specific time when reference prices, settlement prices and valuations are calculated and lead to price changes which have an effect on such prices and valuations." [ref=f4e4980]:
                            - cell "(g)" [ref=f4e4981]:
                              - paragraph [ref=f4e4982]: (g)
                            - cell "the extent to which orders to trade are given or transactions are undertaken at or around a specific time when reference prices, settlement prices and valuations are calculated and lead to price changes which have an effect on such prices and valuations." [ref=f4e4983]:
                              - paragraph [ref=f4e4984]: the extent to which orders to trade are given or transactions are undertaken at or around a specific time when reference prices, settlement prices and valuations are calculated and lead to price changes which have an effect on such prices and valuations.
                      - paragraph [ref=f4e4985]: B. Indicators of manipulative behaviour relating to the employment of a fictitious device or any other form of deception or contrivance
                      - paragraph [ref=f4e4986]: "For the purposes of applying point (b) of Article 12(1) of this Regulation, and without prejudice to the forms of behaviour set out in paragraph 2 of that Article thereof, the following non-exhaustive indicators, which shall not necessarily be deemed, in themselves, to constitute market manipulation, shall be taken into account where transactions or orders to trade are examined by market participants and competent authorities:"
                      - table [ref=f4e4987]:
                        - rowgroup [ref=f4e4991]:
                          - row "(a) whether orders to trade given or transactions undertaken by persons are preceded or followed by dissemination of false or misleading information by the same persons or by persons linked to them; and" [ref=f4e4992]:
                            - cell "(a)" [ref=f4e4993]:
                              - paragraph [ref=f4e4994]: (a)
                            - cell "whether orders to trade given or transactions undertaken by persons are preceded or followed by dissemination of false or misleading information by the same persons or by persons linked to them; and" [ref=f4e4995]:
                              - paragraph [ref=f4e4996]: whether orders to trade given or transactions undertaken by persons are preceded or followed by dissemination of false or misleading information by the same persons or by persons linked to them; and
                      - table [ref=f4e4997]:
                        - rowgroup [ref=f4e5001]:
                          - row "(b) whether orders to trade are given or transactions are undertaken by persons before or after the same persons or persons linked to them produce or disseminate investment recommendations which are erroneous, biased, or demonstrably influenced by material interest." [ref=f4e5002]:
                            - cell "(b)" [ref=f4e5003]:
                              - paragraph [ref=f4e5004]: (b)
                            - cell "whether orders to trade are given or transactions are undertaken by persons before or after the same persons or persons linked to them produce or disseminate investment recommendations which are erroneous, biased, or demonstrably influenced by material interest." [ref=f4e5005]:
                              - paragraph [ref=f4e5006]: whether orders to trade are given or transactions are undertaken by persons before or after the same persons or persons linked to them produce or disseminate investment recommendations which are erroneous, biased, or demonstrably influenced by material interest.
