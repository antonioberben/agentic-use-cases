                            - paragraph [ref=f4e3861]: 1. Persons who produce or disseminate investment recommendations or other information recommending or suggesting an investment strategy shall take reasonable care to ensure that such information is objectively presented, and to disclose their interests or indicate conflicts of interest concerning the financial instruments to which that information relates.
