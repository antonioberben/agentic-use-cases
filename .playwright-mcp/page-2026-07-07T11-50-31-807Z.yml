                            - paragraph [ref=f4e4151]:
                              - text: 3. Competent authorities and ESMA shall cooperate with the Agency for the Cooperation of Energy Regulators (ACER), established under Regulation (EC) No 713/2009 of the European Parliament and of the Council
                              - link "(27)" [ref=f4e4152] [cursor=pointer]:
                                - /url: "#ntr27-L_2014173EN.01000101-E0027"
                              - text: ", and the national regulatory authorities of the Member States to ensure that a coordinated approach is taken to the enforcement of the relevant rules where transactions, orders to trade or other actions or behaviours relate to one or more financial instruments to which this Regulation applies and also to one or more wholesale energy products to which Article 3, 4 and 5 of Regulation (EU) No 1227/2011 apply. Competent authorities shall consider the specific characteristics of the definitions of Article 2 of Regulation (EU) No 1227/2011 and the provisions of Article 3, 4 and 5 of Regulation (EU) No 1227/2011 when they apply Articles 7, 8 and 12 of this Regulation to financial instruments related to wholesale energy products."
                            - paragraph [ref=f4e4154]: 4. Competent authorities shall, on request, immediately supply any information required for the purpose referred to in paragraph 1.
                            - paragraph [ref=f4e4156]: 5. Where a competent authority is convinced that acts contrary to the provisions of this Regulation are being, or have been, carried out on the territory of another Member State or that acts are affecting financial instruments traded on a trading venue situated in another Member State, it shall give notice of that fact in as specific a manner as possible to the competent authority of the other Member State and to ESMA and, in relation to wholesale energy products, to ACER. The competent authorities of the various Member States involved shall consult each other and ESMA and, in relation to wholesale energy products, ACER, on the appropriate action to take and inform each other of significant interim developments. They shall coordinate their action, in order to avoid possible duplication and overlap when applying administrative sanctions and other administrative measures to those cross-border cases in accordance with Articles 30 and 31, and shall assist each other in the enforcement of their decisions.
                            - generic [ref=f4e4157]:
                              - paragraph [ref=f4e4158]: 6. The competent authority of one Member State may request assistance from the competent authority of another Member State with regard to on-site inspections or investigations.
                              - paragraph [ref=f4e4159]: A requesting competent authority may inform ESMA of any request referred to in the first subparagraph. In the case of an investigation or an inspection with cross-border effect, ESMA shall, if requested to do so by one of the competent authorities, coordinate the investigation or inspection.
