                                      - paragraph [ref=f4e2736]: for the financial instrument to which that information relates, is a market maker or a person authorised to act as a counterparty, and the acquisition or disposal of financial instruments to which that information relates is made legitimately in the normal course of the exercise of its function as a market maker or as a counterparty for that financial instrument; or
                              - table [ref=f4e2737]:
                                - rowgroup [ref=f4e2741]:
