                                    - cell "(b)" [ref=f4e2672]:
                                      - paragraph [ref=f4e2673]: (b)
                                    - cell "having a holding in the capital of the issuer or emission allowance market participant;" [ref=f4e2674]:
                                      - paragraph [ref=f4e2675]: having a holding in the capital of the issuer or emission allowance market participant;
                              - table [ref=f4e2676]:
                                - rowgroup [ref=f4e2680]:
