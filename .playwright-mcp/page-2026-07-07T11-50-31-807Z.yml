                        - generic [ref=f4e3894]:
                          - paragraph [ref=f4e3895]: CHAPTER 4
                          - paragraph [ref=f4e3897]: ESMA AND COMPETENT AUTHORITIES
                          - generic [ref=f4e3898]:
                            - paragraph [ref=f4e3899]: Article 22
                            - paragraph [ref=f4e3901]: Competent authorities
                            - paragraph [ref=f4e3902]: Without prejudice to the competences of the judicial authorities, each Member State shall designate a single administrative competent authority for the purpose of this Regulation. Member States shall inform the Commission, ESMA and the other competent authorities of other Member States accordingly. The competent authority shall ensure that the provisions of this Regulation are applied on its territory, regarding all actions carried out on its territory, and actions carried out abroad relating to instruments admitted to trading on a regulated market, for which a request for admission to trading on such market has been made, auctioned on an auction platform or which are traded on an MTF or an OTF or for which a request for admission to trading has been made on an MTF operating within its territory.
