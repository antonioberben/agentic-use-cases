                          - generic [ref=f4e3238]:
                            - paragraph [ref=f4e3239]: Article 15
                            - paragraph [ref=f4e3241]: Prohibition of market manipulation
                            - paragraph [ref=f4e3242]: A person shall not engage in or attempt to engage in market manipulation.
                          - generic [ref=f4e3243]:
                            - paragraph [ref=f4e3244]: Article 16
                            - paragraph [ref=f4e3246]: Prevention and detection of market abuse
                            - generic [ref=f4e3247]:
                              - paragraph [ref=f4e3248]: 1. Market operators and investment firms that operate a trading venue shall establish and maintain effective arrangements, systems and procedures aimed at preventing and detecting insider dealing, market manipulation and attempted insider dealing and market manipulation, in accordance with Articles 31 and 54 of Directive 2014/65/EU.
                              - paragraph [ref=f4e3249]: A person referred to in the first subparagraph shall report orders and transactions, including any cancellation or modification thereof, that could constitute insider dealing, market manipulation or attempted insider dealing or market manipulation to the competent authority of the trading venue without delay.
                            - paragraph [ref=f4e3251]: 2. Any person professionally arranging or executing transactions shall establish and maintain effective arrangements, systems and procedures to detect and report suspicious orders and transactions. Where such a person has a reasonable suspicion that an order or transaction in any financial instrument, whether placed or executed on or outside a trading venue, could constitute insider dealing, market manipulation or attempted insider dealing or market manipulation, the person shall notify the competent authority as referred to in paragraph 3 without delay.
                            - paragraph [ref=f4e3253]: 3. Without prejudice to Article 22, persons professionally arranging or executing transactions shall be subject to the rules of notification of the Member State in which they are registered or have their head office, or, in the case of a branch, the Member State where the branch is situated. The notification shall be addressed to the competent authority of that Member State.
                            - paragraph [ref=f4e3255]: 4. The competent authorities as referred to in paragraph 3 receiving the notification of suspicious orders and transactions shall transmit such information immediately to the competent authorities of the trading venues concerned.
                            - generic [ref=f4e3256]:
