                            - paragraph [ref=f4e4781]: For the purposes of point (a) of the first subparagraph, ESMA shall undertake a mapping exercise of the application of administrative sanctions and, where Member States have decided, pursuant to the second subparagraph of Article 30(1), to lay down criminal sanctions as referred to therein for infringements of this Regulation, of the application of such criminal sanctions within Member States. That exercise shall also include any data made available under Article 33(1) and (2).
                          - generic [ref=f4e4782]:
                            - paragraph [ref=f4e4783]: Article 39
                            - paragraph [ref=f4e4785]: Entry into force and application
                            - paragraph [ref=f4e4787]: 1. This Regulation shall enter into force on the twentieth day following that of its publication in the Official Journal of the European Union.
                            - paragraph [ref=f4e4789]: 2. It shall apply from 3 July 2016 except for Article 4(4) and (5), Article 5(6), Article 6(5) and (6), Article 7(5), Article 11(9), (10) and (11), Article 12(5), Article 13(7) and (11), Article 16(5), the third subparagraph of Article 17(2), Article 17(3), (10) and (11), Article 18(9), Article 19(13), (14) and (15), Article 20(3), Article 24(3), Article 25(9), the second, third and fourth subparagraphs of Article 26(2), Article 32(5) and Article 33(5), which shall apply on 2 July 2014.
                            - paragraph [ref=f4e4791]: 3. Member States shall take the necessary measures to comply with Articles 22, 23 and 30, Article 31(1) and Articles 32 and 34 by 3 July 2016.
                            - generic [ref=f4e4792]:
                              - paragraph [ref=f4e4793]: 4. References in this Regulation to Directive 2014/65/EU and Regulation (EU) No 600/2014 shall, before 3 January 2017, be read as references to Directive 2004/39/EC in accordance with the correlation table set out in Annex IV to Directive 2014/65/EU in so far as that correlation table contains provisions referring to Directive 2004/39/EC.
                              - paragraph [ref=f4e4794]: Where reference in the provisions of this Regulation is made to OTFs, SME growth markets, emission allowances or auctioned products based thereon, those provisions shall not apply to OTFs, SME growth markets, emission allowances or auctioned products based thereon until 3 January 2017.
