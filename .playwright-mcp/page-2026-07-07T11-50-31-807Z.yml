                                      - paragraph [ref=f4e2695]: being involved in criminal activities.
                              - paragraph [ref=f4e2696]: This Article also applies to any person who possesses inside information under circumstances other than those referred to in the first subparagraph where that person knows or ought to know that it is inside information.
                            - paragraph [ref=f4e2698]: 5. Where the person is a legal person, this Article shall also apply, in accordance with national law, to the natural persons who participate in the decision to carry out the acquisition, disposal, cancellation or amendment of an order for the account of the legal person concerned.
                          - generic [ref=f4e2699]:
                            - paragraph [ref=f4e2700]: Article 9
                            - paragraph [ref=f4e2702]: Legitimate behaviour
                            - generic [ref=f4e2703]:
                              - paragraph [ref=f4e2704]: "1. For the purposes of Articles 8 and 14, it shall not be deemed from the mere fact that a legal person is or has been in possession of inside information that that person has used that information and has thus engaged in insider dealing on the basis of an acquisition or disposal, where that legal person:"
