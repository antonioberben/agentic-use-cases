                              - paragraph [ref=f4e1634]: This Regulation also applies to behaviour or transactions, including bids, relating to the auctioning on an auction platform authorised as a regulated market of emission allowances or other auctioned products based thereon, including when auctioned products are not financial instruments, pursuant to Regulation (EU) No 1031/2010. Without prejudice to any specific provisions referring to bids submitted in the context of an auction, any requirements and prohibitions in this Regulation referring to orders to trade shall apply to such bids.
