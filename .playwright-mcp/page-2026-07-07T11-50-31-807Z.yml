                                - paragraph [ref=f4e1418]: Since Member States have adopted legislation implementing Directive 2003/6/EC, and since the delegated acts, regulatory technical standards and implementing technical standards provided for in this Regulation should be adopted before the framework to be introduced can be usefully applied, it is necessary to defer the application of the substantive provisions of this Regulation for a sufficient period of time.
                        - table [ref=f4e1420]:
                          - rowgroup [ref=f4e1424]:
                            - row "(76) In order to facilitate a smooth transition to the entry into application of this Regulation, market practices existing before the entry into force of this Regulation and accepted by competent authorities in accordance with Commission Regulation (EC) No 2273/2003 (14) for the purpose of applying point 2(a) of Article 1 of Directive 2003/6/EC, may remain applicable provided that they are notified to ESMA within a prescribed time period, until the competent authority has made a decision regarding the continuation of those practices in accordance with this Regulation." [ref=f4e1425]:
