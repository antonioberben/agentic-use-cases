                                      - paragraph [ref=f4e2800]: an issuer;
                              - table [ref=f4e2801]:
                                - rowgroup [ref=f4e2805]:
                                  - row "(b) a secondary offeror of a financial instrument, in such quantity or value that the transaction is distinct from ordinary trading and involves a selling method based on the prior assessment of potential interest from potential investors;" [ref=f4e2806]:
                                    - cell "(b)" [ref=f4e2807]:
                                      - paragraph [ref=f4e2808]: (b)
                                    - cell "a secondary offeror of a financial instrument, in such quantity or value that the transaction is distinct from ordinary trading and involves a selling method based on the prior assessment of potential interest from potential investors;" [ref=f4e2809]:
                                      - paragraph [ref=f4e2810]: a secondary offeror of a financial instrument, in such quantity or value that the transaction is distinct from ordinary trading and involves a selling method based on the prior assessment of potential interest from potential investors;
                              - table [ref=f4e2811]:
