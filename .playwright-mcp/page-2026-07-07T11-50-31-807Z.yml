                              - table [ref=f4e2821]:
                                - rowgroup [ref=f4e2825]:
                                  - row "(d) a third party acting on behalf or on the account of a person referred to in point (a), (b) or (c)." [ref=f4e2826]:
                                    - cell "(d)" [ref=f4e2827]:
