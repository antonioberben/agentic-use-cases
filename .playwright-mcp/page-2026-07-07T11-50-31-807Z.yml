                                            - cell "(ii)" [ref=f4e4677]:
                                              - paragraph [ref=f4e4678]: (ii)
                                            - cell "the proportionality of the publication of such decisions with regard to measures which are deemed to be of a minor nature." [ref=f4e4679]:
                                              - paragraph [ref=f4e4680]: the proportionality of the publication of such decisions with regard to measures which are deemed to be of a minor nature.
                              - paragraph [ref=f4e4681]: Where a competent authority takes a decision to publish a decision on an anonymous basis as referred to in point (b) of the third subparagraph, it may postpone the publication of the relevant data for a reasonable period of time where it is foreseeable that the reasons for anonymous publication will cease to exist during that period.
                            - paragraph [ref=f4e4683]: 2. Where the decision is subject to an appeal before a national judicial, administrative or other authority, competent authorities shall also publish immediately on their website such information and any subsequent information on the outcome of such an appeal. Moreover, any decision annulling a decision subject to appeal shall also be published.
                            - paragraph [ref=f4e4685]: 3. Competent authorities shall ensure that any decision that is published in accordance with this Article shall remain accessible on their website for a period of at least five years after its publication. Personal data contained in such publications shall be kept on the website of the competent authority for the period which is necessary in accordance with the applicable data protection rules.
                        - generic [ref=f4e4686]:
                          - paragraph [ref=f4e4687]: CHAPTER 6
                          - paragraph [ref=f4e4689]: DELEGATED ACTS AND IMPLEMENTING ACTS
                          - generic [ref=f4e4690]:
                            - paragraph [ref=f4e4691]: Article 35
                            - paragraph [ref=f4e4693]: Exercise of the delegation
                            - paragraph [ref=f4e4695]: 1. The power to adopt delegated acts is conferred on the Commission subject to the conditions laid down in this Article.
                            - paragraph [ref=f4e4697]: 2. The power to adopt delegated acts referred to in Article 6(5) and (6), Article 12(5), the third subparagraph of Article 17(2), Article 17(3), and Article 19(13) and (14) shall be conferred on the Commission for an indeterminate period of time from 2 July 2014.
                            - paragraph [ref=f4e4699]: 3. The delegation of power referred to in Article 6(5) and (6), Article 12(5), the third subparagraph of Article 17(2), Article 17(3), and Article 19(13) and (14), may be revoked at any time by the European Parliament or by the Council. A decision of revocation shall put an end to the delegation of the power specified in that decision. It shall take effect the day following the publication of the decision in the Official Journal of the European Union or at a later date specified therein. It shall not affect the validity of any delegated acts already in force.
                            - paragraph [ref=f4e4701]: 4. As soon as it adopts a delegated act, the Commission shall notify it simultaneously to the European Parliament and to the Council.
                            - paragraph [ref=f4e4703]: 5. A delegated act adopted pursuant to referred to Article 6(5) and (6), Article 12(5), the third subparagraph of Article 17(2), Article 17(3), or Article 19(13) or (14), shall enter into force only if no objection has been expressed either by the European Parliament or the Council within a period of three months of notification of that act to the European Parliament and the Council or if, before the expiry of that period, the European Parliament and the Council have both informed the Commission that they will not object. That period shall be extended by three months at the initiative of the European Parliament or the Council.
