                                    - cell "protection of personal data both of the person who reports the infringement and the natural person who allegedly committed the infringement, including protection in relation to preserving the confidentiality of their identity, at all stages of the procedure without prejudice to disclosure of information being required by national law in the context of investigations or subsequent judicial proceedings." [ref=f4e4599]:
                                      - paragraph [ref=f4e4600]: protection of personal data both of the person who reports the infringement and the natural person who allegedly committed the infringement, including protection in relation to preserving the confidentiality of their identity, at all stages of the procedure without prejudice to disclosure of information being required by national law in the context of investigations or subsequent judicial proceedings.
                            - paragraph [ref=f4e4602]: 3. Member States shall require employers who carry out activities that are regulated by financial services regulation to have in place appropriate internal procedures for their employees to report infringements of this Regulation.
                            - paragraph [ref=f4e4604]: 4. Member States may provide for financial incentives to persons who offer relevant information about potential infringements of this Regulation to be granted in accordance with national law where such persons do not have other pre-existing legal or contractual duties to report such information, and provided that the information is new, and that it results in the imposition of an administrative or criminal sanction, or the taking of another administrative measure, for an infringement of this Regulation.
                            - paragraph [ref=f4e4606]: 5. The Commission shall adopt implementing acts to specify the procedures referred to in paragraph 1, including the arrangements for reporting and for following-up reports, and measures for the protection of persons working under a contract of employment and measures for the protection of personal data. Those implementing acts shall be adopted in accordance with the examination procedure referred to in Article 36(2).
                          - generic [ref=f4e4607]:
                            - paragraph [ref=f4e4608]: Article 33
                            - paragraph [ref=f4e4610]: Exchange of information with ESMA
                            - paragraph [ref=f4e4612]: 1. Competent authorities shall provide ESMA annually with aggregated information regarding all administrative sanctions and other administrative measures imposed by the competent authority in accordance with Articles 30, 31 and 32. ESMA shall publish that information in an annual report. Competent authorities shall also provide ESMA annually with anonymised and aggregated data regarding all administrative investigations undertaken in accordance with those Articles.
                            - paragraph [ref=f4e4614]: 2. Where Member States have, in accordance with the second subparagraph of Article 30(1), laid down criminal sanctions for the infringements referred to in that Article, their competent authorities shall provide ESMA annually with anonymised and aggregated data regarding all criminal investigations undertaken and criminal penalties imposed by the judicial authorities in accordance with Articles 30, 31 and 32. ESMA shall publish data on criminal sanctions imposed in an annual report.
                            - paragraph [ref=f4e4616]: 3. Where the competent authority has disclosed administrative or criminal sanctions or other administrative measures to the public, it shall simultaneously notify ESMA thereof.
                            - paragraph [ref=f4e4618]: 4. Where a published administrative or criminal sanction or other administrative measure relates to an investment firm authorised in accordance with Directive 2014/65/EU, ESMA shall add a reference to that published sanction or measure in the register of investment firms established under Article 5(3) of that Directive.
                            - generic [ref=f4e4619]:
                              - paragraph [ref=f4e4620]: 5. In order to ensure uniform conditions of application of this Article, ESMA shall develop draft implementing technical standards to determine the procedures and forms for exchange of information as referred to in this Article.
                              - paragraph [ref=f4e4621]: ESMA shall submit those draft implementing technical standards to the Commission by 3 July 2016.
                              - paragraph [ref=f4e4622]: Power is conferred on the Commission to adopt the implementing technical standards referred to in the first subparagraph in accordance with Article 15 of Regulation (EU) No 1095/2010.
                          - generic [ref=f4e4623]:
                            - paragraph [ref=f4e4624]: Article 34
                            - paragraph [ref=f4e4626]: Publication of decisions
                            - generic [ref=f4e4627]:
                              - paragraph [ref=f4e4628]: 1. Subject to the third subparagraph, competent authorities shall publish any decision imposing an administrative sanction or other administrative measure in relation to an infringement of this Regulation on their website immediately after the person subject to that decision has been informed of that decision. Such publication shall include at least information on the type and nature of the infringement and the identity of the person subject to the decision.
                              - paragraph [ref=f4e4629]: The first subparagraph does not apply to decisions imposing measures that are of an investigatory nature.
                              - paragraph [ref=f4e4630]: "Where a competent authority considers that the publication of the identity of the legal person subject to the decision, or of the personal data of a natural person, would be disproportionate following a case-by-case assessment conducted on the proportionality of the publication of such data, or where such publication would jeopardise an ongoing investigation or the stability of the financial markets, it shall do any of the following:"
                              - table [ref=f4e4631]:
                                - rowgroup [ref=f4e4635]:
                                  - row "(a) defer publication of the decision until the reasons for that deferral cease to exist;" [ref=f4e4636]:
                                    - cell "(a)" [ref=f4e4637]:
                                      - paragraph [ref=f4e4638]: (a)
                                    - cell "defer publication of the decision until the reasons for that deferral cease to exist;" [ref=f4e4639]:
                                      - paragraph [ref=f4e4640]: defer publication of the decision until the reasons for that deferral cease to exist;
                              - table [ref=f4e4641]:
                                - rowgroup [ref=f4e4645]:
                                  - row "(b) publish the decision on an anonymous basis in accordance with national law where such publication ensures the effective protection of the personal data concerned;" [ref=f4e4646]:
                                    - cell "(b)" [ref=f4e4647]:
                                      - paragraph [ref=f4e4648]: (b)
                                    - cell "publish the decision on an anonymous basis in accordance with national law where such publication ensures the effective protection of the personal data concerned;" [ref=f4e4649]:
                                      - paragraph [ref=f4e4650]: publish the decision on an anonymous basis in accordance with national law where such publication ensures the effective protection of the personal data concerned;
                              - table [ref=f4e4651]:
                                - rowgroup [ref=f4e4655]:
                                  - 'row "(c) not publish the decision in the event that the competent authority is of the opinion that publication in accordance with point (a) or (b) will be insufficient to ensure: (i) that the stability of financial markets is not jeopardised; or (ii) the proportionality of the publication of such decisions with regard to measures which are deemed to be of a minor nature." [ref=f4e4656]':
                                    - cell "(c)" [ref=f4e4657]:
                                      - paragraph [ref=f4e4658]: (c)
                                    - 'cell "not publish the decision in the event that the competent authority is of the opinion that publication in accordance with point (a) or (b) will be insufficient to ensure: (i) that the stability of financial markets is not jeopardised; or (ii) the proportionality of the publication of such decisions with regard to measures which are deemed to be of a minor nature." [ref=f4e4659]':
                                      - paragraph [ref=f4e4660]: "not publish the decision in the event that the competent authority is of the opinion that publication in accordance with point (a) or (b) will be insufficient to ensure:"
                                      - table [ref=f4e4661]:
