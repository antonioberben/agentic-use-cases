                        - table [ref=f4e1432]:
                          - rowgroup [ref=f4e1436]:
                            - row "(77) This Regulation respects the fundamental rights and observes the principles recognised in the Charter of Fundamental Rights of the European Union (Charter). Accordingly, this Regulation should be interpreted and applied in accordance with those rights and principles. In particular, when this Regulation refers to rules governing the freedom of the press and the freedom of expression in other media and the rules or codes governing the journalist profession, account should be taken of those freedoms as guaranteed in the Union and in the Member States and as recognised pursuant to Article 11 of the Charter and to other relevant provisions." [ref=f4e1437]:
