                              - paragraph [ref=f4e4211]: Competent authorities may also cooperate with competent authorities of other Member States with respect to facilitating the recovery of pecuniary sanctions.
                            - generic [ref=f4e4212]:
                              - paragraph [ref=f4e4213]: 7. Without prejudice to Article 258 TFEU, a competent authority whose request for information or assistance in accordance with paragraphs 1, 3, 4 and 5 is not acted upon within a reasonable time or whose request for information or assistance is rejected may refer that rejection or absence of action within a reasonable timeframe to ESMA.
                              - paragraph [ref=f4e4214]: In those situations, ESMA may act in accordance with Article 19 of Regulation (EU) No 1095/2010, without prejudice to the possibility of ESMA acting in accordance with Article 17 of Regulation (EU) No 1095/2010.
                            - generic [ref=f4e4215]:
                              - paragraph [ref=f4e4216]: 8. Competent authorities shall cooperate and exchange information with relevant national and third-country regulatory authorities responsible for the related spot markets where they have reasonable grounds to suspect that acts, which constitute insider dealing, unlawful disclosure of information or market manipulation infringing this Regulation, are being, or have been, carried out. Such cooperation shall ensure a consolidated overview of the financial and spot markets, and shall detect and impose sanctions for cross-market and cross-border market abuses.
