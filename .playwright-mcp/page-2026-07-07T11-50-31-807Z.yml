                              - paragraph [ref=f4e3278]: ESMA shall submit those draft regulatory technical standards to the Commission by 3 July 2016.
                              - paragraph [ref=f4e3279]: Power is delegated to the Commission to adopt the regulatory technical standards referred to in the first subparagraph in accordance with Articles 10 to 14 of Regulation (EU) No 1095/2010.
                        - generic [ref=f4e3280]:
                          - paragraph [ref=f4e3281]: CHAPTER 3
                          - paragraph [ref=f4e3283]: DISCLOSURE REQUIREMENTS
                          - generic [ref=f4e3284]:
                            - paragraph [ref=f4e3285]: Article 17
                            - paragraph [ref=f4e3287]: Public disclosure of inside information
                            - generic [ref=f4e3288]:
                              - paragraph [ref=f4e3289]: 1. An issuer shall inform the public as soon as possible of inside information which directly concerns that issuer.
                              - paragraph [ref=f4e3290]:
                                - text: The issuer shall ensure that the inside information is made public in a manner which enables fast access and complete, correct and timely assessment of the information by the public and, where applicable, in the officially appointed mechanism referred to in Article 21 of Directive 2004/109/EC of the European Parliament and the Council
                                - link "(24)" [ref=f4e3291] [cursor=pointer]:
                                  - /url: "#ntr24-L_2014173EN.01000101-E0024"
                                - text: . The issuer shall not combine the disclosure of inside information to the public with the marketing of its activities. The issuer shall post and maintain on its website for a period of at least five years, all inside information it is required to disclose publicly.
                              - paragraph [ref=f4e3292]: This Article shall apply to issuers who have requested or approved admission of their financial instruments to trading on a regulated market in a Member State or, in the case of instruments only traded on an MTF or on an OTF, issuers who have approved trading of their financial instruments on an MTF or an OTF or have requested admission to trading of their financial instruments on an MTF in a Member State.
                            - generic [ref=f4e3293]:
                              - paragraph [ref=f4e3294]: 2. An emission allowance market participant shall publicly, effectively and in a timely manner disclose inside information concerning emission allowances which it holds in respect of its business, including aviation activities as specified in Annex I to Directive 2003/87/EC or installations within the meaning of Article 3(e) of that Directive which the participant concerned, or its parent undertaking or related undertaking, owns or controls or for the operational matters of which the participant, or its parent undertaking or related undertaking, is responsible, in whole or in part. With regard to installations, such disclosure shall include information relevant to the capacity and utilisation of installations, including planned or unplanned unavailability of such installations.
                              - paragraph [ref=f4e3295]: The first subparagraph shall not apply to a participant in the emission allowance market where the installations or aviation activities that it owns, controls or is responsible for, in the preceding year have had emissions not exceeding a minimum threshold of carbon dioxide equivalent and, where they carry out combustion activities, have had a rated thermal input not exceeding a minimum threshold.
                              - paragraph [ref=f4e3296]: The Commission shall be empowered to adopt delegated acts in accordance with Article 35 establishing a minimum threshold of carbon dioxide equivalent and a minimum threshold of rated thermal input for the purposes of the application of the exemption provided for in the second subparagraph of this paragraph.
                            - paragraph [ref=f4e3298]: 3. The Commission shall be empowered to adopt delegated acts in accordance with Article 35 specifying the competent authority for the notifications of paragraphs 4 and 5 of this Article.
                            - generic [ref=f4e3299]:
                              - paragraph [ref=f4e3300]: "4. An issuer or an emission allowance market participant, may, on its own responsibility, delay disclosure to the public of inside information provided that all of the following conditions are met:"
                              - table [ref=f4e3301]:
                                - rowgroup [ref=f4e3305]:
                                  - row "(a) immediate disclosure is likely to prejudice the legitimate interests of the issuer or emission allowance market participant;" [ref=f4e3306]:
                                    - cell "(a)" [ref=f4e3307]:
                                      - paragraph [ref=f4e3308]: (a)
                                    - cell "immediate disclosure is likely to prejudice the legitimate interests of the issuer or emission allowance market participant;" [ref=f4e3309]:
                                      - paragraph [ref=f4e3310]: immediate disclosure is likely to prejudice the legitimate interests of the issuer or emission allowance market participant;
                              - table [ref=f4e3311]:
                                - rowgroup [ref=f4e3315]:
                                  - row "(b) delay of disclosure is not likely to mislead the public;" [ref=f4e3316]:
                                    - cell "(b)" [ref=f4e3317]:
                                      - paragraph [ref=f4e3318]: (b)
                                    - cell "delay of disclosure is not likely to mislead the public;" [ref=f4e3319]:
                                      - paragraph [ref=f4e3320]: delay of disclosure is not likely to mislead the public;
                              - table [ref=f4e3321]:
                                - rowgroup [ref=f4e3325]:
                                  - row "(c) the issuer or emission allowance market participant is able to ensure the confidentiality of that information." [ref=f4e3326]:
                                    - cell "(c)" [ref=f4e3327]:
                                      - paragraph [ref=f4e3328]: (c)
                                    - cell "the issuer or emission allowance market participant is able to ensure the confidentiality of that information." [ref=f4e3329]:
                                      - paragraph [ref=f4e3330]: the issuer or emission allowance market participant is able to ensure the confidentiality of that information.
                              - paragraph [ref=f4e3331]: In the case of a protracted process that occurs in stages and that is intended to bring about, or that results in, a particular circumstance or a particular event, an issuer or an emission allowance market participant may on its own responsibility delay the public disclosure of inside information relating to this process, subject to points (a), (b) and (c) of the first subparagraph.
                              - paragraph [ref=f4e3332]: Where an issuer or emission allowance market participant has delayed the disclosure of inside information under this paragraph, it shall inform the competent authority specified under paragraph 3 that disclosure of the information was delayed and shall provide a written explanation of how the conditions set out in this paragraph were met, immediately after the information is disclosed to the public. Alternatively, Member States may provide that a record of such an explanation is to be provided only upon the request of the competent authority specified under paragraph 3.
                            - generic [ref=f4e3333]:
                              - paragraph [ref=f4e3334]: "5. In order to preserve the stability of the financial system, an issuer that is a credit institution or a financial institution, may, on its own responsibility, delay the public disclosure of inside information, including information which is related to a temporary liquidity problem and, in particular, the need to receive temporary liquidity assistance from a central bank or lender of last resort, provided that all of the following conditions are met:"
                              - table [ref=f4e3335]:
